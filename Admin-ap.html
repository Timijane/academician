<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Approvals Hub | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: #dcfce7; --success-text: #16a34a; --warning-bg: #fef9c3;
            --warning-text: #ca8a04; --danger-bg: #fee2e2; --danger-text: #dc2626;
            --info-bg: #dbeafe; --info-text: #2563eb; --input-bg: rgba(255,255,255,0.9);
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.2); --info-text: #60a5fa;
            --input-bg: rgba(30,41,59,0.8); --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: all 0.3s ease; position: relative; overflow-x: hidden; }

        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.08), transparent 70%); filter: blur(80px); z-index: 0; animation: float 20s infinite alternate; pointer-events: none; }
        .orb-1 { top: -150px; left: -100px; } .orb-2 { bottom: -200px; right: -50px; width: 500px; height: 500px; animation-duration: 25s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px, 30px) scale(1.15); } }

        .main-container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 5; }

        /* Top Navigation */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); flex-wrap: wrap; gap: 1rem; }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
        .nav-logo { display: flex; align-items: center; gap: 0.75rem; }
        .nav-logo i { font-size: 2rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-logo h2 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 0.75rem; align-items: center; }
        .nav-link { padding: 0.6rem 1.2rem; border-radius: 0.75rem; color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; border: 1px solid transparent; }
        .nav-link:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--hover-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--text-primary); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.3rem 0.3rem 0.3rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.85rem; }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem; }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem; min-width: 200px; display: none; z-index: 1000; }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.75rem 1rem; color: var(--text-primary); border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        /* Tab Navigation */
        .tab-navigation { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 0.4rem; overflow-x: auto; box-shadow: var(--shadow); }
        .tab-btn { padding: 0.8rem 1.5rem; border-radius: 1.25rem; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.3s; white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; font-family: inherit; }
        .tab-btn:hover { background: var(--hover-bg); color: var(--accent); }
        .tab-btn.active { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .tab-content { display: none; animation: fadeSlideIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; text-align: center; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        .stat-card h3 { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-card p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }

        /* Cards */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        /* Filters */
        .filters-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        .search-box input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); }
        .filter-select { padding: 0.75rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); font-family: inherit; }

        /* User Grid */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
        .user-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; transition: all 0.2s; }
        .user-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .user-card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
        .user-info h4 { font-size: 0.95rem; margin-bottom: 0.15rem; }
        .user-info span { font-size: 0.75rem; color: var(--text-secondary); }
        .user-detail { font-size: 0.8rem; color: var(--text-secondary); margin: 0.3rem 0; }

        /* Permission Items */
        .request-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; margin-bottom: 0.75rem; transition: all 0.2s; }
        .request-item:hover { border-color: var(--accent); }

        /* Badges */
        .badge { padding: 0.2rem 0.7rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-pending { background: var(--warning-bg); color: var(--warning-text); }
        .badge-approved { background: var(--success-bg); color: var(--success-text); }
        .badge-rejected { background: var(--danger-bg); color: var(--danger-text); }

        /* Buttons */
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .empty-state i { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }
        .loading-content i { font-size: 2.5rem; color: var(--accent); }

        .sub-tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
        .sub-tab { padding: 0.5rem 1rem; border-radius: 1.5rem; font-weight: 500; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); border: 1px solid var(--border); background: transparent; }
        .sub-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        @media (max-width: 768px) {
            .main-container { padding: 0.75rem; }
            .top-nav { flex-direction: column; align-items: stretch; }
            .nav-left { flex-direction: column; }
            .user-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="main-container">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-logo">
                    <i class="fas fa-shield-alt"></i>
                    <h2>Admin Panel</h2>
                </div>
                <div class="nav-links">
                    <a href="admin-dashboard.html" class="nav-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
                    <a href="admin-academic-review.html" class="nav-link"><i class="fas fa-book-open"></i> Academic Review</a>
                </div>
            </div>
            <div class="nav-right">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger"><span class="profile-name" id="profileName">Admin</span><div class="profile-pic" id="profilePic">A</div></div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-navigation" id="tabNavigation">
            <button class="tab-btn active" data-tab="users"><i class="fas fa-user-check"></i> User Approvals</button>
            <button class="tab-btn" data-tab="permissions"><i class="fas fa-envelope-open-text"></i> Permission Book</button>
        </div>

        <!-- TAB 1: User Approvals -->
        <div class="tab-content active" id="tab-users">
            <div class="stats-grid" id="userStats">
                <div class="stat-card"><h3 id="statTotal">0</h3><p>Total Pending</p></div>
                <div class="stat-card"><h3 id="statTeachers">0</h3><p>Teachers</p></div>
                <div class="stat-card"><h3 id="statStudents">0</h3><p>Students</p></div>
                <div class="stat-card"><h3 id="statStaff">0</h3><p>Staff</p></div>
            </div>

            <div class="filters-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearchInput" placeholder="Search by name or email...">
                </div>
                <select id="roleFilter" class="filter-select">
                    <option value="all">All Roles</option>
                    <option value="teacher">Teachers</option>
                    <option value="student">Students</option>
                    <option value="nonTeachingStaff">Staff</option>
                </select>
                <button class="btn btn-outline btn-sm" id="refreshUsersBtn"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div id="usersContainer" class="user-grid">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading users...</p></div>
            </div>
        </div>

        <!-- TAB 2: Permission Book -->
        <div class="tab-content" id="tab-permissions">
            <div class="filters-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="permSearchInput" placeholder="Search by name, role, date...">
                </div>
                <select id="permStatusFilter" class="filter-select">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
                <select id="permRoleFilter" class="filter-select">
                    <option value="all">All Roles</option>
                    <option value="teacher">Teacher</option>
                    <option value="non-teaching">Non-Teaching</option>
                </select>
                <button class="btn btn-outline btn-sm" id="refreshPermBtn"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="card">
                <div class="card-header"><h3><i class="fas fa-list"></i> Permission Requests</h3></div>
                <div id="permissionsContainer">
                    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Remark Modal -->
    <div class="modal-overlay" id="remarkModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:2000;">
        <div class="modal-content" style="background:var(--card-bg);border:1px solid var(--border);border-radius:1.5rem;padding:1.5rem;max-width:500px;width:90%;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h3>Add Remark</h3>
                <i class="fas fa-times" style="cursor:pointer;" onclick="closeRemarkModal()"></i>
            </div>
            <textarea id="remarkText" class="form-control" rows="3" placeholder="Optional remark..."></textarea>
            <div class="btn-group" style="justify-content:flex-end;margin-top:1rem;">
                <button class="btn btn-outline" onclick="closeRemarkModal()">Cancel</button>
                <button class="btn btn-success" id="remarkApproveBtn">Approve</button>
                <button class="btn btn-danger" id="remarkRejectBtn">Reject</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><i class="fas fa-spinner fa-spin fa-2x"></i><h3 style="margin-top:1rem;">Processing...</h3></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== STATE ====================
        let currentUser = null, userData = null;
        let allUsers = [], pendingUsers = [];
        let allPermissions = [];
        let currentPermId = null, currentPermAction = null;
        let unsubscribeUsers = null;

        // ==================== UTILITY ====================
        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // ==================== THEME ====================
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutop-theme', next);
            themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark';
        });

        // ==================== TAB NAVIGATION ====================
        document.getElementById('tabNavigation').addEventListener('click', (e) => {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'permissions') loadPermissions();
        });

        // ==================== USER APPROVALS ====================
        function setupUsersListener() {
            if (unsubscribeUsers) unsubscribeUsers();
            unsubscribeUsers = db.collection('users').onSnapshot(snap => {
                allUsers = [];
                snap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
                pendingUsers = allUsers.filter(u => u.approved === false || u.approved === undefined);
                updateUserStats();
                renderUserCards();
            }, err => console.error('Listener error:', err));
        }

        function updateUserStats() {
            document.getElementById('statTotal').textContent = pendingUsers.length;
            document.getElementById('statTeachers').textContent = pendingUsers.filter(u => u.role === 'teacher').length;
            document.getElementById('statStudents').textContent = pendingUsers.filter(u => u.role === 'student').length;
            document.getElementById('statStaff').textContent = pendingUsers.filter(u => u.role === 'nonTeachingStaff').length;
        }

        function renderUserCards() {
            const roleFilter = document.getElementById('roleFilter').value;
            const search = (document.getElementById('userSearchInput')?.value || '').toLowerCase();
            let filtered = pendingUsers;
            if (roleFilter !== 'all') filtered = filtered.filter(u => u.role === roleFilter);
            if (search) filtered = filtered.filter(u => `${u.firstName||''} ${u.surname||''} ${u.email||''}`.toLowerCase().includes(search));

            const container = document.getElementById('usersContainer');
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><h3>All clear!</h3><p>No pending approvals.</p></div>';
                return;
            }

            container.innerHTML = filtered.map(u => {
                const name = `${u.firstName||''} ${u.surname||''}`.trim() || 'Unnamed';
                const initials = (u.firstName?.[0]||'') + (u.surname?.[0]||'') || '?';
                const roleLabel = u.role === 'teacher' ? 'Teacher' : u.role === 'student' ? 'Student' : u.role === 'nonTeachingStaff' ? 'Staff' : u.role;
                let extra = '';
                if (u.role === 'teacher') extra = `<div class="user-detail"><i class="fas fa-chalkboard"></i> ${u.classTeaching||'No class'}</div>`;
                else if (u.role === 'student') extra = `<div class="user-detail"><i class="fas fa-graduation-cap"></i> ${u.class||'No class'}</div>`;
                else if (u.role === 'nonTeachingStaff') extra = `<div class="user-detail"><i class="fas fa-building"></i> ${u.department||'No dept'}</div>`;

                return `
                    <div class="user-card">
                        <div class="user-card-header">
                            <div class="user-avatar">${initials}</div>
                            <div class="user-info">
                                <h4>${escapeHtml(name)}</h4>
                                <span>${roleLabel}</span>
                            </div>
                        </div>
                        <div class="user-detail"><i class="fas fa-envelope"></i> ${escapeHtml(u.email||'—')}</div>
                        <div class="user-detail"><i class="fas fa-phone"></i> ${escapeHtml(u.phone||'—')}</div>
                        ${extra}
                        <div class="btn-group" style="margin-top:0.75rem;">
                            <button class="btn btn-success btn-sm" onclick="approveUser('${u.id}')"><i class="fas fa-check"></i> Approve</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectUser('${u.id}')"><i class="fas fa-times"></i> Reject</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.approveUser = async (id) => {
            if (!confirm('Approve this user?')) return;
            showLoading();
            try {
                await db.collection('users').doc(id).update({ approved: true });
                await db.collection('auditLogs').add({
                    userId: auth.currentUser.uid,
                    userName: `${userData.firstName||''} ${userData.surname||''}`.trim(),
                    action: 'USER_APPROVED',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { userId: id }
                }).catch(() => {});
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        };

        window.rejectUser = async (id) => {
            if (!confirm('Reject & delete this user?')) return;
            showLoading();
            try {
                await db.collection('users').doc(id).delete();
                await db.collection('auditLogs').add({
                    userId: auth.currentUser.uid,
                    userName: `${userData.firstName||''} ${userData.surname||''}`.trim(),
                    action: 'USER_REJECTED',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { userId: id }
                }).catch(() => {});
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        };

        document.getElementById('roleFilter').addEventListener('change', renderUserCards);
        document.getElementById('userSearchInput').addEventListener('input', renderUserCards);
        document.getElementById('refreshUsersBtn').addEventListener('click', () => {
            if (unsubscribeUsers) { unsubscribeUsers(); setupUsersListener(); }
        });

        // ==================== PERMISSION BOOK ====================
        async function loadPermissions() {
            showLoading();
            try {
                const snap = await db.collection('permissions').orderBy('createdAt', 'desc').get();
                allPermissions = [];
                snap.forEach(doc => allPermissions.push({ id: doc.id, ...doc.data() }));
                renderPermissions();
            } catch(e) { console.error(e); }
            finally { hideLoading(); }
        }

        function renderPermissions() {
            const statusFilter = document.getElementById('permStatusFilter').value;
            const roleFilter = document.getElementById('permRoleFilter').value;
            const search = (document.getElementById('permSearchInput')?.value || '').toLowerCase();
            let filtered = allPermissions;
            if (statusFilter !== 'all') filtered = filtered.filter(p => p.status === statusFilter);
            if (roleFilter !== 'all') filtered = filtered.filter(p => p.userRole === roleFilter);
            if (search) filtered = filtered.filter(p => `${p.userName||''} ${p.userRole||''} ${p.date||''}`.toLowerCase().includes(search));

            const container = document.getElementById('permissionsContainer');
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No requests</h3></div>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                const sb = p.status === 'pending' ? 'badge-pending' : p.status === 'approved' ? 'badge-approved' : 'badge-rejected';
                const timeInfo = p.requestType === 'full_day' ? 'Full Day' : `${p.startTime} – ${p.endTime}`;
                return `
                    <div class="request-item">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;">
                            <div>
                                <strong>${escapeHtml(p.userName)}</strong> (${p.userRole==='teacher'?'Teacher':'Non-Teaching'})
                                ${p.userClass !== 'N/A' ? `| Class: ${p.userClass}` : ''}
                                <br><small>📅 ${p.date} | ${timeInfo}</small>
                            </div>
                            <span class="badge ${sb}">${p.status}</span>
                        </div>
                        <div style="margin:0.5rem 0;"><strong>Reason:</strong> ${escapeHtml(p.reason)}</div>
                        ${p.adminRemark ? `<div><strong>Remark:</strong> ${escapeHtml(p.adminRemark)}</div>` : ''}
                        ${p.status === 'pending' ? `
                            <div class="btn-group" style="margin-top:0.5rem;">
                                <button class="btn btn-success btn-sm" onclick="processPermission('${p.id}','approve')"><i class="fas fa-check"></i> Approve</button>
                                <button class="btn btn-danger btn-sm" onclick="processPermission('${p.id}','reject')"><i class="fas fa-times"></i> Reject</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        window.processPermission = (id, action) => {
            currentPermId = id;
            currentPermAction = action;
            document.getElementById('remarkText').value = '';
            document.getElementById('remarkModal').style.display = 'flex';
        };

        document.getElementById('remarkApproveBtn').addEventListener('click', async () => {
            if (!currentPermId) return;
            const remark = document.getElementById('remarkText').value.trim();
            showLoading();
            try {
                await db.collection('permissions').doc(currentPermId).update({
                    status: 'approved',
                    adminRemark: remark || 'Approved',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeRemarkModal();
                loadPermissions();
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        });

        document.getElementById('remarkRejectBtn').addEventListener('click', async () => {
            if (!currentPermId) return;
            const remark = document.getElementById('remarkText').value.trim();
            if (!remark) { alert('Provide a reason for rejection'); return; }
            showLoading();
            try {
                await db.collection('permissions').doc(currentPermId).update({
                    status: 'rejected',
                    adminRemark: remark,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeRemarkModal();
                loadPermissions();
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        });

        window.closeRemarkModal = () => { document.getElementById('remarkModal').style.display = 'none'; currentPermId = null; };

        document.getElementById('permStatusFilter').addEventListener('change', renderPermissions);
        document.getElementById('permRoleFilter').addEventListener('change', renderPermissions);
        document.getElementById('permSearchInput').addEventListener('input', renderPermissions);
        document.getElementById('refreshPermBtn').addEventListener('click', loadPermissions);

        // ==================== AUTH ====================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'admin-login.html'; return; }
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || !['master-admin', 'admin'].includes(doc.data().role)) {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                currentUser = user;
                userData = doc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0]||'A')+(userData.surname?.[0]||'A');
                document.getElementById('profileName').textContent = userData.firstName || 'Admin';
                setupUsersListener();
            } catch(e) { console.error(e); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));

        window.addEventListener('beforeunload', () => { if (unsubscribeUsers) unsubscribeUsers(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Take CBT</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.3s;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .title h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }
        .title p {
            color: var(--text-secondary);
        }
        .timer {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.8rem 2rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            box-shadow: var(--shadow);
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .question-counter {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            background: var(--hover-bg);
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover {
            background: var(--input-bg);
        }
        .option input[type="radio"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--accent);
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-glow);
            transform: scale(1.05);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }
        .btn-success {
            background: var(--success-text);
            color: white;
        }
        .btn-success:hover {
            background: #0f7b3a;
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            z-index: 100;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .loading-overlay.active { display: flex; }
        .loading-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
        }
        .loading-content i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .timer { align-self: stretch; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
    </div>

    <div class="container">
        <div class="header">
            <div class="title">
                <h1 id="examTitle">Loading...</h1>
                <p id="examMeta"></p>
            </div>
            <div class="timer" id="timer">--:--</div>
        </div>

        <div class="card" id="questionCard" style="display: none;">
            <div class="question-counter" id="questionCounter"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()">← Previous</button>
                <button class="btn btn-outline" id="nextBtn" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <div style="text-align: center;" id="submitContainer">
            <button class="btn btn-success" id="submitBtn" onclick="submitExam()" style="display: none;">Submit Test</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>Loading...</h3>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Get assignment ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const assignmentId = urlParams.get('id');
        if (!assignmentId) {
            alert('No assignment specified.');
            window.location.href = 'student-assignments.html';
        }

        let currentUser = null;
        let assignment = null;
        let questions = [];          // original questions from Firestore
        let shuffledIndices = [];     // shuffled order of indices
        let answers = [];             // array of selected answers (index of option for each question)
        let currentIndex = 0;         // current question index in shuffled order
        let timerInterval = null;
        let timeRemaining = 0;         // in seconds

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            currentUser = user;
            await loadAssignment();
        });

        async function loadAssignment() {
            showLoading();
            try {
                // Fetch assignment document
                const doc = await db.collection('assignments').doc(assignmentId).get();
                if (!doc.exists) {
                    alert('Assignment not found.');
                    window.location.href = 'student-assignments.html';
                    return;
                }
                assignment = doc.data();

                // Check if already submitted
                const submissionSnap = await db.collection('submissions')
                    .where('assignmentId', '==', assignmentId)
                    .where('studentId', '==', currentUser.uid)
                    .get();
                if (!submissionSnap.empty) {
                    alert('You have already submitted this test.');
                    window.location.href = 'student-assignments.html';
                    return;
                }

                // Set up header
                document.getElementById('examTitle').textContent = assignment.title;
                document.getElementById('examMeta').textContent = `${assignment.subject} | ${assignment.type} | Total Questions: ${assignment.questions?.length || 0}`;

                // Get questions array
                if (!assignment.questions || assignment.questions.length === 0) {
                    alert('No questions found for this test.');
                    window.location.href = 'student-assignments.html';
                    return;
                }
                questions = assignment.questions;

                // Shuffle order for this student
                shuffledIndices = [...Array(questions.length).keys()];
                for (let i = shuffledIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
                }

                // Initialize answers array (null means not answered)
                answers = new Array(questions.length).fill(null);

                // Set timer
                const timeLimit = assignment.timeLimit || 0; // in minutes
                if (timeLimit > 0) {
                    timeRemaining = timeLimit * 60;
                } else {
                    timeRemaining = 0;
                    document.getElementById('timer').style.display = 'none';
                }

                // Show first question
                currentIndex = 0;
                renderQuestion();

                // Start timer if needed
                if (timeRemaining > 0) {
                    timerInterval = setInterval(updateTimer, 1000);
                }

                // Show submit button only on last question? We'll show it always, but user can submit anytime
                document.getElementById('submitBtn').style.display = 'inline-block';
                document.getElementById('questionCard').style.display = 'block';
            } catch (error) {
                console.error('Error loading assignment:', error);
                alert('Error loading assignment.');
            } finally {
                hideLoading();
            }
        }

        function renderQuestion() {
            const actualIdx = shuffledIndices[currentIndex];
            const q = questions[actualIdx];

            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = q.question;

            const optionsContainer = document.getElementById('optionsContainer');
            let html = '';
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx); // A, B, C, D
                const checked = (answers[actualIdx] === idx) ? 'checked' : '';
                html += `
                    <label class="option">
                        <input type="radio" name="option" value="${idx}" ${checked} onchange="saveAnswer(${currentIndex}, ${idx})">
                        <span><strong>${letter}.</strong> ${opt}</span>
                    </label>
                `;
            });
            optionsContainer.innerHTML = html;

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === questions.length - 1);
        }

        window.saveAnswer = (shuffledIdx, optionIdx) => {
            const actualIdx = shuffledIndices[shuffledIdx];
            answers[actualIdx] = optionIdx;
        };

        window.prevQuestion = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        window.nextQuestion = () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        };

        function updateTimer() {
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert('Time is up! Your test will be submitted automatically.');
                submitExam(true);
                return;
            }
            timeRemaining--;
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            document.getElementById('timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        window.submitExam = async (isAuto = false) => {
            if (!isAuto && !confirm('Are you sure you want to submit your test?')) return;

            // Build answers array for submission
            const submittedAnswers = [];
            for (let i = 0; i < questions.length; i++) {
                const selected = answers[i];
                submittedAnswers.push({
                    questionId: `q${i}`, // we don't have separate question IDs; we'll use index
                    questionIndex: i,
                    selected: selected !== null ? String.fromCharCode(65 + selected) : null
                });
            }

            // Count answered questions
            const answeredCount = answers.filter(a => a !== null).length;
            if (!isAuto && answeredCount < questions.length) {
                if (!confirm(`You have answered ${answeredCount} out of ${questions.length} questions. Submit anyway?`)) return;
            }

            showLoading();
            try {
                await db.collection('submissions').add({
                    assignmentId,
                    studentId: currentUser.uid,
                    studentName: currentUser.displayName || 'Student',
                    answers: submittedAnswers,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'submitted'
                });

                alert('Test submitted successfully!');
                window.location.href = 'student-assignments.html';
            } catch (error) {
                console.error('Submit error:', error);
                alert('Error submitting: ' + error.message);
            } finally {
                hideLoading();
            }
        };

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // Prevent back navigation during test (optional)
        window.addEventListener('beforeunload', (e) => {
            if (assignment && timeRemaining > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Attendance Kiosk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.75);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #b91c1c;
            --info-bg: rgba(59,130,246,0.1); --info-text: #1d4ed8;
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
            --input-bg: rgba(255,255,255,0.9); --lock-bg: #1e293b; --lock-text: #e2e8f0;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.15); --info-text: #60a5fa;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
            --input-bg: rgba(30,41,59,0.8); --lock-bg: #0f172a; --lock-text: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s; overflow: hidden; }

        .kiosk-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; }
        .kiosk-top-bar { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .kiosk-date { font-size: 1.1rem; font-weight: 600; }
        .kiosk-date span { color: var(--accent); }
        .kiosk-clock { font-size: 2rem; font-weight: 700; font-family: 'Space Grotesk', monospace; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .kiosk-actions { display: flex; gap: 0.5rem; align-items: center; }
        .kiosk-main { flex: 1; display: flex; overflow: hidden; }
        .kiosk-sidebar { width: 320px; background: var(--card-bg); backdrop-filter: blur(12px); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .kiosk-search { padding: 1rem; border-bottom: 1px solid var(--border); position: relative; }
        .kiosk-search input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 2rem; color: var(--text-primary); font-size: 0.9rem; font-family: inherit; }
        .kiosk-search i { position: absolute; left: 1.8rem; top: 1.7rem; color: var(--text-secondary); }
        .staff-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .staff-card { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0.8rem; border-radius: 1rem; cursor: pointer; transition: 0.2s; margin-bottom: 0.3rem; border: 2px solid transparent; }
        .staff-card:hover { background: var(--hover-bg); border-color: var(--accent); }
        .staff-card.selected { background: var(--info-bg); border-color: var(--accent); }
        .staff-card.checked-in { border-left: 4px solid var(--success-text); }
        .staff-card.checked-out { opacity: 0.6; }
        .staff-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .staff-info { flex: 1; min-width: 0; }
        .staff-info .name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .staff-info .role { font-size: 0.72rem; color: var(--text-secondary); }
        .staff-status { display: flex; flex-direction: column; align-items: flex-end; gap: 0.15rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.present { background: var(--success-text); box-shadow: 0 0 8px var(--success-text); }
        .status-dot.late { background: var(--warning-text); box-shadow: 0 0 8px var(--warning-text); }
        .status-dot.absent { background: var(--text-secondary); }

        .kiosk-content { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); position: relative; }
        .welcome-screen { text-align: center; }
        .welcome-screen i { font-size: 6rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; display: block; }
        .welcome-screen h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .welcome-screen p { color: var(--text-secondary); font-size: 1rem; }

        .action-panel { text-align: center; max-width: 500px; width: 100%; padding: 2rem; }
        .action-panel .staff-name-large { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
        .action-panel .staff-role { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .big-btn { padding: 1.2rem 3rem; border: none; border-radius: 2rem; font-weight: 700; font-size: 1.2rem; cursor: pointer; transition: 0.2s; width: 100%; font-family: inherit; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
        .big-btn-checkin { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .big-btn-checkout { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .big-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .big-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .time-info { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }

        .camera-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .camera-overlay.active { display: flex; }
        .camera-overlay video { max-width: 90%; max-height: 60vh; border-radius: 1.5rem; border: 3px solid var(--accent); }
        .camera-overlay .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 5rem; color: white; font-weight: 800; text-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; }
        .camera-overlay .flash { position: fixed; top:0; left:0; width:100%; height:100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
        .camera-msg { color: white; font-size: 1.2rem; margin-top: 1.5rem; text-align: center; }
        .camera-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }

        .btn { padding: 0.6rem 1.5rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 0.4rem; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .btn-white { background: white; color: #000; border: 1px solid #ccc; }
        .btn:hover { opacity: 0.9; }

        .lock-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--lock-bg); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .lock-overlay.active { display: flex; }
        .lock-overlay i { font-size: 4rem; color: var(--accent); margin-bottom: 1.5rem; }
        .lock-overlay h2 { color: var(--lock-text); margin-bottom: 1.5rem; font-size: 1.3rem; }
        .lock-overlay input { padding: 0.8rem 1.5rem; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; font-size: 1.3rem; text-align: center; letter-spacing: 3px; width: 220px; font-family: 'Space Grotesk', monospace; }
        .lock-overlay input:focus { outline: none; border-color: var(--accent); }
        .lock-error { color: var(--danger-text); margin-top: 0.75rem; font-size: 0.85rem; display: none; }
        .lock-error.show { display: block; }

        .settings-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 150; display: none; align-items: center; justify-content: center; }
        .settings-overlay.active { display: flex; }
        .settings-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 2rem; padding: 2rem; max-width: 500px; width: 90%; }
        .settings-card h3 { font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .setting-row label { font-weight: 500; font-size: 0.9rem; }
        .setting-row input { padding: 0.5rem 0.75rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text-primary); font-family: inherit; font-size: 0.9rem; }
        .setting-row input[type="time"] { width: 130px; }
        .setting-row input[type="password"] { width: 180px; }

        .toast { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); background: var(--success-text); color: white; padding: 0.75rem 2rem; border-radius: 2rem; font-weight: 600; z-index: 300; animation: slideDown 0.3s; font-size: 0.9rem; }
        .debug-info { position: fixed; bottom: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 0.65rem; padding: 0.3rem 0.6rem; border-radius: 0.5rem; z-index: 50; max-width: 300px; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-100%); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .kiosk-sidebar { width: 260px; }
            .kiosk-clock { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="lock-overlay" id="lockOverlay">
        <i class="fas fa-lock"></i>
        <h2>Enter Admin PIN to Exit Kiosk</h2>
        <input type="password" id="lockPinInput" placeholder="••••••" maxlength="10" autocomplete="off">
        <div class="lock-error" id="lockError">Incorrect PIN</div>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-card">
            <h3><i class="fas fa-cog"></i> Kiosk Settings</h3>
            <div class="setting-row">
                <label>Morning Cut-off (late after)</label>
                <input type="time" id="morningCutoff" value="07:10">
            </div>
            <div class="setting-row">
                <label>Afternoon Start (early before)</label>
                <input type="time" id="afternoonStart" value="14:00">
            </div>
            <div class="setting-row">
                <label>Kiosk Exit PIN</label>
                <input type="password" id="exitPinInput" value="1234" maxlength="10" placeholder="Set PIN">
            </div>
            <div class="setting-row">
                <label>Attendance Collection</label>
                <select id="attendanceCollection" style="padding:0.5rem;border-radius:0.75rem;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);font-family:inherit;">
                    <option value="attendance">attendance (teacher)</option>
                    <option value="staffAttendance">staffAttendance (all staff)</option>
                </select>
            </div>
            <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;">
                <button class="btn btn-white" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" id="saveSettingsBtn"><i class="fas fa-save"></i> Save Settings</button>
            </div>
        </div>
    </div>

    <div class="camera-overlay" id="cameraOverlay">
        <video id="video" autoplay playsinline></video>
        <div class="countdown" id="countdown">3</div>
        <div class="flash" id="flash"></div>
        <div class="camera-msg" id="cameraMsg">Position your face in the frame</div>
        <div class="camera-btns">
            <button class="btn btn-outline" id="cancelCameraBtn">Cancel</button>
            <button class="btn btn-primary" id="captureBtn" style="display:none;"><i class="fas fa-camera"></i> Capture Now</button>
        </div>
    </div>

    <div class="kiosk-wrapper">
        <div class="kiosk-top-bar">
            <div class="kiosk-date"><span id="currentDate"></span></div>
            <div class="kiosk-clock" id="liveClock">00:00:00</div>
            <div class="kiosk-actions">
                <button class="btn btn-outline" id="settingsBtn" style="border-color:var(--border);color:var(--text-primary);font-size:0.75rem;" title="Settings"><i class="fas fa-cog"></i></button>
            </div>
        </div>
        <div class="kiosk-main">
            <div class="kiosk-sidebar">
                <div class="kiosk-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search staff...">
                </div>
                <div class="staff-list" id="staffList">
                    <p style="text-align:center;padding:2rem;color:var(--text-secondary);">Loading staff...</p>
                </div>
            </div>
            <div class="kiosk-content" id="kioskContent">
                <div class="welcome-screen">
                    <i class="fas fa-fingerprint"></i>
                    <h2>Attendance Kiosk</h2>
                    <p>Select your name from the list to check in or out</p>
                    <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:0.5rem;">
                        <i class="fas fa-info-circle"></i> Late after: <strong id="lateDisplay">07:10 AM</strong> · Early before: <strong id="earlyDisplay">02:00 PM</strong>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <div class="debug-info" id="debugInfo">Ready</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function debug(msg) { const el = document.getElementById('debugInfo'); if (el) el.textContent = msg; console.log(msg); }

        let isMasterAdmin = false;
        let morningCutoff = '07:10', afternoonStart = '14:00', exitPinCode = '1234';
        let staffList = [], todayAttendance = {};
        let selectedStaffId = null, attendanceCol = 'attendance';
        let videoStream = null, captureTimeout = null;
        let unsubscribeStaff = null, unsubscribeAttendance = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', s);
        })();

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // === AUTH ===
        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'admin-login.html'; return; }
            debug('Auth: ' + user.uid);
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || !['master-admin', 'admin'].includes(doc.data().role)) {
                    alert('Unauthorized.');
                    window.location.href = 'index.html';
                    return;
                }
                isMasterAdmin = doc.data().role === 'master-admin';
                debug('Role: ' + doc.data().role + ', masterAdmin: ' + isMasterAdmin);

                const configDoc = await db.collection('config').doc('attendanceKiosk').get();
                if (configDoc.exists) {
                    const c = configDoc.data();
                    morningCutoff = c.morningCutoff || '07:10';
                    afternoonStart = c.afternoonStart || '14:00';
                    exitPinCode = c.exitPin || '1234';
                    attendanceCol = c.attendanceCollection || 'attendance';
                    debug('Config loaded: ' + morningCutoff + ' / ' + afternoonStart + ' / col: ' + attendanceCol);
                } else {
                    debug('No config found — using defaults');
                }
                document.getElementById('morningCutoff').value = morningCutoff;
                document.getElementById('afternoonStart').value = afternoonStart;
                document.getElementById('exitPinInput').value = exitPinCode;
                document.getElementById('attendanceCollection').value = attendanceCol;
                document.getElementById('lateDisplay').textContent = morningCutoff + ' AM';
                document.getElementById('earlyDisplay').textContent = afternoonStart + ' PM';
                document.getElementById('settingsBtn').style.display = isMasterAdmin ? 'inline-flex' : 'none';

                loadStaff();
                setupAttendanceListener();
            } catch (e) { debug('Auth error: ' + e.message); }
        });

        // === LOAD STAFF ===
        function loadStaff() {
            if (unsubscribeStaff) unsubscribeStaff();
            debug('Loading staff...');

            // Query teachers first
            unsubscribeStaff = db.collection('users')
                .where('role', '==', 'teacher')
                .where('approved', '==', true)
                .onSnapshot(snap => {
                    staffList = [];
                    snap.forEach(d => staffList.push({ id: d.id, ...d.data() }));
                    // Also load non-teaching staff
                    loadNonTeachingStaff();
                }, error => {
                    debug('Staff query error: ' + error.message);
                    document.getElementById('staffList').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--danger-text);">Error: ' + error.message + '</p>';
                });
        }

        async function loadNonTeachingStaff() {
            try {
                const snap = await db.collection('users')
                    .where('role', '==', 'nonTeachingStaff')
                    .where('approved', '==', true)
                    .get();
                snap.forEach(d => {
                    if (!staffList.find(s => s.id === d.id)) {
                        staffList.push({ id: d.id, ...d.data() });
                    }
                });
                staffList.sort((a, b) => `${a.surname||''} ${a.firstName||''}`.localeCompare(`${b.surname||''} ${b.firstName||''}`));
                debug('Staff loaded: ' + staffList.length);
                renderStaffList();
            } catch (e) {
                debug('Non-teaching load error: ' + e.message);
                renderStaffList();
            }
        }

        function setupAttendanceListener() {
            const today = new Date().toISOString().split('T')[0];
            if (unsubscribeAttendance) unsubscribeAttendance();
            debug('Setting up attendance listener on: ' + attendanceCol + ' for ' + today);

            unsubscribeAttendance = db.collection(attendanceCol)
                .where('date', '==', today)
                .onSnapshot(snap => {
                    todayAttendance = {};
                    snap.forEach(d => {
                        const r = d.data();
                        todayAttendance[r.staffId] = r;
                    });
                    debug('Attendance records: ' + Object.keys(todayAttendance).length);
                    renderStaffList();
                }, error => {
                    debug('Attendance listener error: ' + error.message);
                });
        }

        function renderStaffList() {
            const search = (document.getElementById('searchInput').value || '').toLowerCase();
            const filtered = staffList.filter(s => {
                const name = `${s.firstName||''} ${s.surname||''}`.toLowerCase();
                return name.includes(search) || (s.role||'').toLowerCase().includes(search);
            });

            const el = document.getElementById('staffList');
            if (!filtered.length) {
                el.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-secondary);">No staff found.</p>';
                return;
            }

            el.innerHTML = filtered.map(s => {
                const name = `${s.firstName||''} ${s.surname||''}`.trim() || 'Unknown';
                const initials = (s.firstName?.[0]||'') + (s.surname?.[0]||'') || '?';
                const role = s.role === 'teacher' ? 'Teacher' : 'Non-Teaching';
                const rec = todayAttendance[s.id];
                let statusClass = 'absent', statusLabel = '';
                let cardClass = '';
                if (rec) {
                    if (rec.checkInTime) {
                        const ci = new Date(rec.checkInTime.seconds * 1000);
                        const cutoff = new Date();
                        const [ch, cm] = morningCutoff.split(':').map(Number);
                        cutoff.setHours(ch, cm, 0);
                        statusClass = ci <= cutoff ? 'present' : 'late';
                        statusLabel = ci.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        cardClass = 'checked-in';
                    }
                    if (rec.checkOutTime) {
                        cardClass = 'checked-out';
                        statusLabel = 'Done';
                    }
                }
                const sel = s.id === selectedStaffId ? ' selected' : '';
                return `<div class="staff-card${sel} ${cardClass}" onclick="selectStaff('${s.id}')">
                    <div class="staff-avatar">${initials}</div>
                    <div class="staff-info"><div class="name">${name}</div><div class="role">${role}</div></div>
                    <div class="staff-status"><span class="status-dot ${statusClass}"></span><span style="font-size:0.65rem;color:var(--text-secondary);">${statusLabel}</span></div>
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderStaffList);

        window.selectStaff = id => {
            selectedStaffId = id;
            renderStaffList();
            const staff = staffList.find(s => s.id === id);
            if (!staff) return;
            const rec = todayAttendance[id];
            const name = `${staff.firstName||''} ${staff.surname||''}`.trim();

            const canCheckIn = !rec || !rec.checkInTime;
            const canCheckOut = rec && rec.checkInTime && !rec.checkOutTime;

            let html = `<div class="action-panel">
                <div class="staff-avatar" style="width:80px;height:80px;font-size:1.5rem;margin:0 auto 1rem;">${(staff.firstName?.[0]||'')+(staff.surname?.[0]||'')}</div>
                <div class="staff-name-large">${name}</div>
                <div class="staff-role">${staff.role==='teacher'?'Teacher':'Non-Teaching Staff'}</div>`;

            if (canCheckIn) {
                html += `<button class="big-btn big-btn-checkin" onclick="startCheckIn()"><i class="fas fa-sign-in-alt"></i> Check In</button>`;
            } else if (canCheckOut) {
                html += `<button class="big-btn big-btn-checkout" onclick="startCheckOut()"><i class="fas fa-sign-out-alt"></i> Check Out</button>`;
            } else if (rec && rec.checkOutTime) {
                const ci = rec.checkInTime ? new Date(rec.checkInTime.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
                const co = rec.checkOutTime ? new Date(rec.checkOutTime.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
                html += `<div style="padding:2rem;text-align:center;">
                    <i class="fas fa-check-circle" style="font-size:3rem;color:var(--success-text);display:block;margin-bottom:0.5rem;"></i>
                    <p style="font-size:1.1rem;font-weight:600;">Completed for Today</p>
                    <p style="color:var(--text-secondary);">Check-in: ${ci}<br>Check-out: ${co}</p></div>`;
            }

            html += `<div class="time-info"><i class="fas fa-clock"></i> Late after ${morningCutoff} · Early before ${afternoonStart}</div></div>`;
            document.getElementById('kioskContent').innerHTML = html;
        };

        window.startCheckIn = () => { if (selectedStaffId) startCamera('in'); };
        window.startCheckOut = () => { if (selectedStaffId) startCamera('out'); };

        async function startCamera(actionType) {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
                document.getElementById('video').srcObject = videoStream;
                document.getElementById('cameraOverlay').classList.add('active');
                document.getElementById('cameraMsg').textContent = 'Position your face in the frame';
                document.getElementById('captureBtn').style.display = 'inline-flex';
                document.getElementById('countdown').style.display = 'none';

                document.getElementById('captureBtn').onclick = () => capturePhoto(actionType);
                document.getElementById('cancelCameraBtn').onclick = stopCamera;

                clearTimeout(captureTimeout);
                document.getElementById('cameraMsg').textContent = 'Capturing in 5 seconds...';
                const cd = document.getElementById('countdown');
                cd.style.display = 'block';
                let count = 5;
                cd.textContent = count;
                captureTimeout = setInterval(() => {
                    count--;
                    cd.textContent = count;
                    if (count <= 0) { clearInterval(captureTimeout); capturePhoto(actionType); }
                }, 1000);
            } catch (e) {
                alert('Camera access denied. Please allow camera permissions.');
                debug('Camera error: ' + e.message);
            }
        }

        async function capturePhoto(actionType) {
            clearInterval(captureTimeout);
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
            const fileName = `kiosk/${selectedStaffId}_${Date.now()}.jpg`;
            const ref = storage.ref().child(fileName);
            await ref.put(blob);
            const photoURL = await ref.getDownloadURL();

            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const docRef = db.collection(attendanceCol).doc(`${selectedStaffId}_${today}`);

            const data = {
                staffId: selectedStaffId,
                date: today,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (actionType === 'in') {
                data.checkInTime = firebase.firestore.FieldValue.serverTimestamp();
                data.checkInPhoto = photoURL;
                const cutoff = new Date();
                const [ch, cm] = morningCutoff.split(':').map(Number);
                cutoff.setHours(ch, cm, 0);
                data.late = now > cutoff;
            } else {
                data.checkOutTime = firebase.firestore.FieldValue.serverTimestamp();
                data.checkOutPhoto = photoURL;
                const start = new Date();
                const [sh, sm] = afternoonStart.split(':').map(Number);
                start.setHours(sh, sm, 0);
                data.early = now < start;
            }

            await docRef.set(data, { merge: true });
            stopCamera();
            showToast(actionType === 'in' ? '✅ Check-in recorded!' : '✅ Check-out recorded!');
            selectStaff(selectedStaffId);
        }

        function stopCamera() {
            clearInterval(captureTimeout);
            if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
            document.getElementById('cameraOverlay').classList.remove('active');
            document.getElementById('video').srcObject = null;
        }

        // === LOCK SCREEN ===
        let lockActive = false;
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !lockActive) {
                e.preventDefault();
                showLockScreen();
            }
        });

        function showLockScreen() {
            lockActive = true;
            document.getElementById('lockOverlay').classList.add('active');
            document.getElementById('lockPinInput').value = '';
            document.getElementById('lockError').classList.remove('show');
            setTimeout(() => document.getElementById('lockPinInput').focus(), 200);
        }

        document.getElementById('lockPinInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const pin = document.getElementById('lockPinInput').value;
                if (pin === exitPinCode) {
                    lockActive = false;
                    document.getElementById('lockOverlay').classList.remove('active');
                    selectedStaffId = null;
                    renderStaffList();
                    document.getElementById('kioskContent').innerHTML = `
                        <div class="welcome-screen">
                            <i class="fas fa-fingerprint"></i>
                            <h2>Attendance Kiosk</h2>
                            <p>Select your name from the list to check in or out</p>
                        </div>`;
                } else {
                    document.getElementById('lockError').classList.add('show');
                    document.getElementById('lockPinInput').value = '';
                }
            }
        });

        // === SETTINGS ===
        document.getElementById('settingsBtn').addEventListener('click', () => {
            if (!isMasterAdmin) return;
            // Verify PIN first
            lockActive = true;
            document.getElementById('lockOverlay').classList.add('active');
            document.getElementById('lockPinInput').value = '';
            document.getElementById('lockError').classList.remove('show');
            document.getElementById('lockPinInput').focus();

            // Override enter handler temporarily
            const origHandler = document.getElementById('lockPinInput').onkeypress;
            document.getElementById('lockPinInput').onkeypress = null;
            document.getElementById('lockPinInput').addEventListener('keypress', function tempHandler(e) {
                if (e.key === 'Enter') {
                    const pin = document.getElementById('lockPinInput').value;
                    if (pin === exitPinCode) {
                        document.getElementById('lockOverlay').classList.remove('active');
                        document.getElementById('settingsOverlay').classList.add('active');
                        lockActive = false;
                        document.getElementById('lockPinInput').removeEventListener('keypress', tempHandler);
                        document.getElementById('lockPinInput').addEventListener('keypress', e => {
                            if (e.key === 'Enter') {
                                const p = document.getElementById('lockPinInput').value;
                                if (p === exitPinCode) {
                                    lockActive = false;
                                    document.getElementById('lockOverlay').classList.remove('active');
                                }
                            }
                        });
                    } else {
                        document.getElementById('lockError').classList.add('show');
                    }
                }
            });
        });

        window.closeSettings = () => document.getElementById('settingsOverlay').classList.remove('active');

        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            debug('Saving settings...');
            morningCutoff = document.getElementById('morningCutoff').value || '07:10';
            afternoonStart = document.getElementById('afternoonStart').value || '14:00';
            exitPinCode = document.getElementById('exitPinInput').value || '1234';
            attendanceCol = document.getElementById('attendanceCollection').value || 'attendance';

            try {
                await db.collection('config').doc('attendanceKiosk').set({
                    morningCutoff, afternoonStart, exitPin: exitPinCode,
                    attendanceCollection: attendanceCol,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('lateDisplay').textContent = morningCutoff + ' AM';
                document.getElementById('earlyDisplay').textContent = afternoonStart + ' PM';
                document.getElementById('settingsOverlay').classList.remove('active');
                
                // Re-setup attendance with new collection
                setupAttendanceListener();
                
                showToast('⚙️ Settings saved!');
                debug('Settings saved: ' + morningCutoff + ' / ' + afternoonStart + ' / pin:' + exitPinCode + ' / col:' + attendanceCol);
                if (selectedStaffId) selectStaff(selectedStaffId);
            } catch (e) {
                alert('Error saving: ' + e.message);
                debug('Save error: ' + e.message);
            }
        });

        window.addEventListener('beforeunload', () => {
            if (unsubscribeStaff) unsubscribeStaff();
            if (unsubscribeAttendance) unsubscribeAttendance();
            stopCamera();
        });
    </script>
</body>
</html>

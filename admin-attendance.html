<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Attendance Kiosk</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        /* (same styles as before, with minor additions) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .kiosk-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top navigation bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-link:hover {
            color: var(--accent);
        }
        .nav-link.active {
            color: var(--accent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
        }
        .header p {
            color: var(--text-secondary);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        #cameraPreview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
        }
        #cameraPreview video {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 1rem;
        }
        .camera-controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }
        .search-input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-input i {
            color: var(--text-secondary);
        }
        .search-input input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
        }

        .staff-table {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .staff-name {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .staff-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .btn-check {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-check-in {
            background: var(--success-bg);
            color: var(--success-text);
        }
        .btn-check-out {
            background: var(--warning-bg);
            color: var(--warning-text);
        }
        .btn-check:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
        .status-badge.present { background: var(--success-text); }
        .status-badge.late { background: var(--warning-text); }
        .status-badge.absent { background: var(--danger-text); }

        .settings-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .time-setting {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .time-setting input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.4rem 0.8rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="kiosk-container">
        <!-- Top navigation -->
        <div class="top-nav">
            <div class="nav-links">
                <a href="admin-dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="admin-attendance-review.html" class="nav-link"><i class="fas fa-chart-bar"></i> Attendance Review</a>
                <span class="nav-link active"><i class="fas fa-fingerprint"></i> Kiosk</span>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
            </div>
        </div>

        <div class="header">
            <div>
                <h1>Attendance Kiosk</h1>
                <p>Staff check‑in / check‑out · Today's date: <span id="currentDate"></span></p>
            </div>
        </div>

        <!-- Settings panel (visible only to master admin) -->
        <div class="settings-panel" id="settingsPanel" style="display: none;">
            <div class="time-setting">
                <label>Morning cut‑off (late after):</label>
                <input type="time" id="morningCutoff" value="07:10">
            </div>
            <div class="time-setting">
                <label>Afternoon start (early before):</label>
                <input type="time" id="afternoonStart" value="14:00">
            </div>
            <button class="btn btn-primary" id="saveSettings">Save Settings</button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <div class="search-input">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name or role...">
            </div>
        </div>

        <!-- Staff table -->
        <div class="staff-table">
            <table id="staffTable">
                <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Check‑In</th>
                        <th>Check‑Out</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="staffTableBody">
                    <tr><td colspan="6" style="text-align:center;">Loading staff...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Camera preview modal -->
    <div id="cameraPreview">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="btn btn-primary" id="captureBtn">Capture & Confirm</button>
            <button class="btn btn-secondary" id="cancelCameraBtn">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Display current date
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Authentication and role check
        let currentUser = null;
        let isMasterAdmin = false;
        let morningCutoff = '07:10';
        let afternoonStart = '14:00';
        let staffList = [];
        let todayAttendance = {};

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || (userDoc.data().role !== 'masterAdmin' && !userDoc.data().isCoAdmin)) {
                alert('You are not authorized to use the attendance kiosk.');
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            isMasterAdmin = userDoc.data().role === 'masterAdmin';

            if (isMasterAdmin) {
                document.getElementById('settingsPanel').style.display = 'flex';
                const configDoc = await db.collection('config').doc('attendance').get();
                if (configDoc.exists) {
                    const config = configDoc.data();
                    morningCutoff = config.morningCutoff || '07:10';
                    afternoonStart = config.afternoonStart || '14:00';
                }
                document.getElementById('morningCutoff').value = morningCutoff;
                document.getElementById('afternoonStart').value = afternoonStart;
            }

            // Load staff
            await loadStaff();
            // Set up real-time listener for today's attendance
            setupAttendanceListener();
        });

        async function loadStaff() {
            const snapshot = await db.collection('users')
                .where('role', 'in', ['teacher', 'nonTeachingStaff'])
                .get();
            staffList = [];
            snapshot.forEach(doc => {
                staffList.push({ id: doc.id, ...doc.data() });
            });
            renderStaffTable();
        }

        function setupAttendanceListener() {
            const today = new Date().toISOString().split('T')[0];
            db.collection('attendance')
                .where('date', '==', today)
                .onSnapshot(snapshot => {
                    todayAttendance = {};
                    snapshot.forEach(doc => {
                        const record = doc.data();
                        todayAttendance[record.staffId] = record;
                    });
                    renderStaffTable();
                });
        }

        function renderStaffTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = staffList.filter(s => 
                ((s.firstName + ' ' + s.surname).toLowerCase().includes(searchTerm)) ||
                (s.role.toLowerCase().includes(searchTerm))
            );

            let html = '';
            filtered.forEach(staff => {
                const name = `${staff.firstName || ''} ${staff.surname || ''}`.trim() || 'Unknown';
                const initials = (staff.firstName?.[0] || '') + (staff.surname?.[0] || '') || '?';
                const role = staff.role === 'teacher' ? 'Teacher' : 'Non‑Teaching';
                const record = todayAttendance[staff.id] || {};
                const checkInTime = record.checkInTime ? new Date(record.checkInTime.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
                const checkOutTime = record.checkOutTime ? new Date(record.checkOutTime.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
                
                let statusClass = 'absent';
                let statusText = 'Absent';
                if (record.checkInTime) {
                    const checkInDate = new Date(record.checkInTime.seconds * 1000);
                    const cutoff = new Date();
                    const [ch, cm] = morningCutoff.split(':').map(Number);
                    cutoff.setHours(ch, cm, 0);
                    if (checkInDate <= cutoff) {
                        statusClass = 'present';
                        statusText = 'Present';
                    } else {
                        statusClass = 'late';
                        statusText = 'Late';
                    }
                }

                html += `
                <tr>
                    <td>
                        <div class="staff-name">
                            <div class="staff-avatar">${initials}</div>
                            ${name}
                        </div>
                    </td>
                    <td>${role}</td>
                    <td><span class="status-badge ${statusClass}"></span> ${statusText}</td>
                    <td>${checkInTime}</td>
                    <td>${checkOutTime}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-check btn-check-in" ${record.checkInTime ? 'disabled' : ''} onclick="startCheckIn('${staff.id}')">Check In</button>
                            <button class="btn-check btn-check-out" ${!record.checkInTime || record.checkOutTime ? 'disabled' : ''} onclick="startCheckOut('${staff.id}')">Check Out</button>
                        </div>
                    </td>
                </tr>
                `;
            });
            document.getElementById('staffTableBody').innerHTML = html || '<tr><td colspan="6" style="text-align:center;">No staff found</td></tr>';
        }

        document.getElementById('searchInput').addEventListener('input', renderStaffTable);

        // Camera handling
        let currentAction = null;
        let videoStream = null;
        const cameraPreview = document.getElementById('cameraPreview');
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('captureBtn');
        const cancelBtn = document.getElementById('cancelCameraBtn');

        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = videoStream;
                cameraPreview.style.display = 'flex';
            } catch (err) {
                alert('Camera access denied or not available.');
                console.error(err);
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            cameraPreview.style.display = 'none';
            currentAction = null;
        }

        window.startCheckIn = (staffId) => {
            currentAction = { type: 'in', staffId };
            startCamera();
        };

        window.startCheckOut = (staffId) => {
            currentAction = { type: 'out', staffId };
            startCamera();
        };

        cancelBtn.addEventListener('click', stopCamera);

        captureBtn.addEventListener('click', async () => {
            if (!currentAction) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');
            const blob = await (await fetch(dataUrl)).blob();

            const timestamp = Date.now();
            const staffId = currentAction.staffId;
            const fileName = `attendance/${staffId}_${timestamp}.jpg`;
            const storageRef = storage.ref().child(fileName);
            await storageRef.put(blob);
            const photoURL = await storageRef.getDownloadURL();

            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const attendanceRef = db.collection('attendance').doc(`${staffId}_${today}`);
            const attendanceDoc = await attendanceRef.get();
            const existing = attendanceDoc.exists ? attendanceDoc.data() : {};

            const updateData = {
                staffId,
                date: today,
                [`${currentAction.type === 'in' ? 'checkInTime' : 'checkOutTime'}`]: firebase.firestore.FieldValue.serverTimestamp(),
                [`${currentAction.type === 'in' ? 'checkInPhoto' : 'checkOutPhoto'}`]: photoURL,
            };

            if (currentAction.type === 'in') {
                const cutoff = new Date();
                const [ch, cm] = morningCutoff.split(':').map(Number);
                cutoff.setHours(ch, cm, 0);
                updateData.late = now > cutoff;
            }

            if (currentAction.type === 'out') {
                const start = new Date();
                const [sh, sm] = afternoonStart.split(':').map(Number);
                start.setHours(sh, sm, 0);
                updateData.early = now < start;
            }

            await attendanceRef.set(updateData, { merge: true });
            stopCamera();
        });

        document.getElementById('saveSettings').addEventListener('click', async () => {
            const newMorning = document.getElementById('morningCutoff').value;
            const newAfternoon = document.getElementById('afternoonStart').value;
            await db.collection('config').doc('attendance').set({
                morningCutoff: newMorning,
                afternoonStart: newAfternoon
            });
            morningCutoff = newMorning;
            afternoonStart = newAfternoon;
            alert('Settings saved.');
        });
    </script>
</body>
</html>

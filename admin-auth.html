<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA | Super Admin Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --input-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
        }
        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(15, 23, 42, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --input-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: all 0.4s ease;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; }

        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 0.8rem;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2); }

        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 0.8rem;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        .switch-mode { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
        .switch-mode a { color: var(--accent); text-decoration: none; font-weight: 700; }

        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            z-index: 100;
        }

        /* Error Message Style */
        .error-toast {
            background: #ef4444;
            color: white;
            padding: 10px;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <div class="auth-card">
        <div class="header">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--accent); margin-bottom: 10px;"></i>
            <h1 id="auth-title">Super Admin Login</h1>
            <p id="auth-subtitle">Authorized personnel only</p>
        </div>

        <div id="error-box" class="error-toast"></div>

        <form id="adminForm">
            <div class="form-group">
                <label>Admin Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="master@edumeta.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Access Key</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('password')"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Verify Identity</button>
        </form>

        <div class="switch-mode">
            <span id="switch-text">New Master Admin?</span> 
            <a href="#" onclick="toggleAuthMode()" id="switch-link">Request Setup</a>
        </div>
    </div>

    <script>
        let isLogin = true;
        const MASTER_EMAIL = "okewunmitimileyin23@gmail.com";

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = event.target;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Super Admin Login" : "Master Registration";
            document.getElementById('submit-btn').innerText = isLogin ? "Verify Identity" : "Create Master Profile";
            document.getElementById('switch-text').innerText = isLogin ? "New Master Admin?" : "Already have access?";
            document.getElementById('switch-link').innerText = isLogin ? "Request Setup" : "Login here";
        }

        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailValue = document.getElementById('email').value;
            const errorBox = document.getElementById('error-box');

            if(emailValue !== MASTER_EMAIL) {
                errorBox.innerText = "CRITICAL ERROR: This email is not registered as the Master Admin.";
                errorBox.style.display = "block";
                return;
            }

            // Here you would normally link to Firebase auth
            alert("Verification Success. Welcome, Master Admin.");
            window.location.href = "admin-dashboard.html"; 
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · School Calendar | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] { --bg-primary: #f0f5fa; --bg-sidebar: rgba(255,255,255,0.75); --text-primary: #0b1e33; --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --gradient-start: #1e3c72; --gradient-end: #2a5298; }
        :root[data-theme="dark"] { --bg-primary: #0a0f1e; --bg-sidebar: rgba(15,23,42,0.8); --text-primary: #f0f4fa; --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05); --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --gradient-start: #3b82f6; --gradient-end: #8b5cf6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; transition: width 0.3s; z-index: 100; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
        .sidebar .logo-area i { font-size: 2.2rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; white-space: nowrap; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.2rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.5rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); transform: translateX(5px); border-color: var(--border); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; box-shadow: 0 5px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s; }
        .main-content.expanded { margin-left: 90px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.3rem 0.3rem 0.3rem 1rem; }
        .profile-name { font-weight: 600; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem; min-width: 200px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.75rem 1rem; color: var(--text-primary); border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-weight: 500; }
        .form-control, .form-select { width: 100%; padding: 0.75rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .event-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.2rem; transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .event-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .event-date { color: var(--accent); font-size: 0.85rem; margin-bottom: 0.5rem; }
        .event-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; white-space: pre-wrap; }
        .event-meta { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; max-width: 550px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .events-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-shield-alt"></i><h2>Admin Panel</h2></div>
        <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="admin-approvals.html" class="nav-item"><i class="fas fa-user-check"></i><span>Approvals</span></a>
        <a href="admin-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="admin-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="admin-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="admin-payments.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="admin-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="admin-calendar.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>Calendar</span></a>
        <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title"><h1>School Calendar</h1><p>Manage school events and activities</p></div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown"><div class="profile-trigger"><span class="profile-name" id="profileName">Admin</span><div class="profile-pic" id="profilePic">AD</div></div><div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div></div>
            </div>
        </div>
        <!-- Create Event Card -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-plus-circle"></i> Add New Event</h3><button class="btn btn-outline btn-sm" id="toggleFormBtn">Hide Form</button></div>
            <form id="eventForm">
                <div class="form-group"><label>Event Title</label><input type="text" id="eventTitle" class="form-control" required></div>
                <div class="form-group"><label>Event Date</label><input type="date" id="eventDate" class="form-control" required></div>
                <div class="form-group"><label>Description (optional)</label><textarea id="eventDesc" class="form-control" rows="3"></textarea></div>
                <div class="form-group"><label>Session / Term (optional)</label><input type="text" id="eventSession" class="form-control" placeholder="e.g., 2024/2025 First Term"></div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Event</button>
            </form>
        </div>
        <!-- Events List -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-list"></i> All Events</h3></div>
            <div id="eventsContainer" class="events-grid">Loading...</div>
        </div>
    </div>
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header"><h3>Edit Event</h3><i class="fas fa-times" style="cursor:pointer" onclick="closeEditModal()"></i></div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Title</label><input type="text" id="editTitle" class="form-control" required></div>
                <div class="form-group"><label>Date</label><input type="date" id="editDate" class="form-control" required></div>
                <div class="form-group"><label>Description</label><textarea id="editDesc" class="form-control" rows="3"></textarea></div>
                <div class="form-group"><label>Session / Term</label><input type="text" id="editSession" class="form-control"></div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;"><button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button><button type="submit" class="btn btn-primary">Update</button><button type="button" class="btn btn-danger" onclick="deleteEvent()">Delete</button></div>
            </form>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0", authDomain: "triangle-6e6b7.firebaseapp.com", projectId: "triangle-6e6b7", storageBucket: "triangle-6e6b7.firebasestorage.app", messagingSenderId: "673937760480", appId: "1:673937760480:web:f03c06e1207232213ef085" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // UI elements
        const sidebar = document.getElementById('sidebar'), mainContent = document.getElementById('mainContent'), toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('collapsed'); mainContent.classList.toggle('expanded'); });
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => { const current = html.getAttribute('data-theme'); const next = current === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('edutop-theme', next); themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark'; });
        let currentUserData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'admin-login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || !['master-admin', 'admin'].includes(userDoc.data().role)) { auth.signOut(); window.location.href = 'index.html'; return; }
            currentUserData = userDoc.data();
            document.getElementById('profileName').textContent = currentUserData.firstName || 'Admin';
            document.getElementById('profilePic').textContent = (currentUserData.firstName?.[0] || 'A') + (currentUserData.surname?.[0] || 'A');
            loadEvents();
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
        // Toggle form visibility
        const form = document.getElementById('eventForm');
        const toggleBtnForm = document.getElementById('toggleFormBtn');
        toggleBtnForm.addEventListener('click', () => {
            if (form.style.display === 'none') { form.style.display = 'block'; toggleBtnForm.textContent = 'Hide Form'; }
            else { form.style.display = 'none'; toggleBtnForm.textContent = 'Show Form'; }
        });
        // Add event
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const desc = document.getElementById('eventDesc').value.trim();
            const session = document.getElementById('eventSession').value.trim();
            if (!title || !date) { alert('Title and date required'); return; }
            try {
                await db.collection('calendarEvents').add({
                    title, date, description: desc, sessionTerm: session || null,
                    createdBy: auth.currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('Event added!');
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
                document.getElementById('eventSession').value = '';
                loadEvents();
            } catch(err) { alert('Error: '+err.message); }
        });
        async function loadEvents() {
            const snap = await db.collection('calendarEvents').orderBy('date', 'asc').get();
            const container = document.getElementById('eventsContainer');
            if (snap.empty) { container.innerHTML = '<p>No events yet. Add one above.</p>'; return; }
            let html = '';
            snap.forEach(doc => {
                const ev = doc.data();
                const displayDate = new Date(ev.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                html += `<div class="event-card"><div class="event-title">${escapeHtml(ev.title)}</div><div class="event-date"><i class="fas fa-calendar-day"></i> ${displayDate}</div>${ev.sessionTerm ? `<div class="event-date"><i class="fas fa-clock"></i> ${escapeHtml(ev.sessionTerm)}</div>` : ''}<div class="event-desc">${escapeHtml(ev.description) || 'No description'}</div><div class="event-meta"><button class="btn btn-outline btn-sm" onclick="editEvent('${doc.id}', '${escapeHtml(ev.title)}', '${ev.date}', '${escapeHtml(ev.description || '')}', '${escapeHtml(ev.sessionTerm || '')}')">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteEventById('${doc.id}')">Delete</button></div></div>`;
            });
            container.innerHTML = html;
        }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        // Edit modal
        let currentEditId = null;
        window.editEvent = (id, title, date, desc, session) => {
            currentEditId = id;
            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDate').value = date;
            document.getElementById('editDesc').value = desc;
            document.getElementById('editSession').value = session;
            document.getElementById('editModal').classList.add('active');
        };
        window.closeEditModal = () => { document.getElementById('editModal').classList.remove('active'); currentEditId = null; };
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentEditId) return;
            const title = document.getElementById('editTitle').value.trim();
            const date = document.getElementById('editDate').value;
            const desc = document.getElementById('editDesc').value.trim();
            const session = document.getElementById('editSession').value.trim();
            try {
                await db.collection('calendarEvents').doc(currentEditId).update({
                    title, date, description: desc, sessionTerm: session || null
                });
                alert('Event updated');
                closeEditModal();
                loadEvents();
            } catch(err) { alert('Error: '+err.message); }
        });
        window.deleteEvent = async () => {
            if (!currentEditId) return;
            if (!confirm('Delete this event?')) return;
            await db.collection('calendarEvents').doc(currentEditId).delete();
            closeEditModal();
            loadEvents();
        };
        window.deleteEventById = async (id) => {
            if (!confirm('Delete this event?')) return;
            await db.collection('calendarEvents').doc(id).delete();
            loadEvents();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Daily Reports</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar .logo-area {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2.5rem; padding: 0 0.5rem;
        }
        .sidebar .logo-area i { font-size: 2rem; color: var(--accent); }
        .sidebar .logo-area h2 { font-size: 1.2rem; font-weight: 600; white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem;
            border-radius: 0.75rem; color: var(--text-secondary); transition: 0.2s;
            cursor: pointer; margin-bottom: 0.3rem; white-space: nowrap; text-decoration: none;
        }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); }
        .sidebar .nav-item.active { background: var(--accent); color: white; }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.5rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded { margin-left: 80px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }
        .page-title h1 { font-size: 2rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-icon {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem;
            min-width: 150px; display: none; z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 1rem; color: var(--text-primary); border-radius: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); }

        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 1.2rem; text-align: center; box-shadow: var(--shadow);
        }
        .stat-card .stat-icon { font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 600; line-height: 1.2; }
        .stat-card .stat-label { color: var(--text-secondary); font-size: 0.9rem; }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 3rem; padding: 0.3rem;
            width: fit-content;
        }
        .tab {
            padding: 0.6rem 1.8rem; border-radius: 3rem; font-weight: 500; cursor: pointer;
            transition: 0.2s; color: var(--text-secondary);
        }
        .tab.active { background: var(--accent); color: white; }

        .reports-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .teacher-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .teacher-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .teacher-name {
            font-weight: 500;
        }
        .report-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .status-badge {
            padding: 0.25rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-badge.pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-badge.approved { background: var(--success-bg); color: var(--success-text); }
        .status-badge.rejected { background: var(--danger-bg); color: var(--danger-text); }

        .report-content {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--hover-bg);
            border-radius: 1rem;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .report-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .btn {
            padding: 0.25rem 0.8rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-approve { background: var(--success-text); color: white; }
        .btn-deny { background: var(--danger-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-graduation-cap"></i>
            <h2>EduTop Admin</h2>
        </div>
        <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="admin-approvals.html" class="nav-item"><i class="fas fa-user-check"></i><span>Approvals</span></a>
        <a href="admin-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="admin-syllabus.html" class="nav-item"><i class="fas fa-list"></i><span>Syllabus</span></a>
        <a href="admin-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="admin-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="admin-payments.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="admin-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="admin-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="admin-daily-reports.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Daily Reports</span></a>
        <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Daily Reports</h1>
                <p>Welcome back, <span id="adminName">Admin</span></p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">MA</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><i class="fas fa-hourglass-half stat-icon"></i><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><i class="fas fa-check-circle stat-icon"></i><div class="stat-value" id="statApproved">0</div><div class="stat-label">Approved</div></div>
            <div class="stat-card"><i class="fas fa-times-circle stat-icon"></i><div class="stat-value" id="statRejected">0</div><div class="stat-label">Rejected</div></div>
            <div class="stat-card"><i class="fas fa-file-alt stat-icon"></i><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="statusTabs">
            <div class="tab active" data-status="pending">Pending</div>
            <div class="tab" data-status="approved">Approved</div>
            <div class="tab" data-status="rejected">Rejected</div>
            <div class="tab" data-status="all">All</div>
        </div>

        <!-- Reports Grid -->
        <div id="reportsContainer" class="reports-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        let currentUser = null;
        let currentUserData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || (userDoc.data().role !== 'masterAdmin' && !userDoc.data().permissions?.reviewLessons)) {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUserData = userDoc.data();
            document.getElementById('adminName').textContent = currentUserData.firstName || 'Admin';
            document.getElementById('profileInitials').textContent = 
                (currentUserData.firstName?.[0] || 'A') + (currentUserData.surname?.[0] || 'A');

            setupReportsListener();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        let unsubscribe = null;
        let allReports = [];

        function setupReportsListener() {
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('dailyReports')
                .orderBy('date', 'desc')
                .onSnapshot(snapshot => {
                    allReports = [];
                    snapshot.forEach(doc => allReports.push({ id: doc.id, ...doc.data() }));
                    updateStats();
                    filterByStatus(currentStatus);
                }, error => {
                    console.error('Listener error:', error);
                });
        }

        function updateStats() {
            const pending = allReports.filter(r => r.status === 'pending').length;
            const approved = allReports.filter(r => r.status === 'approved').length;
            const rejected = allReports.filter(r => r.status === 'rejected').length;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
            document.getElementById('statTotal').textContent = allReports.length;
        }

        let currentStatus = 'pending';
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                filterByStatus(currentStatus);
            });
        });

        function filterByStatus(status) {
            let filtered = allReports;
            if (status !== 'all') {
                filtered = filtered.filter(r => r.status === status);
            }
            renderReports(filtered);
        }

        function renderReports(reports) {
            const container = document.getElementById('reportsContainer');
            if (!reports.length) {
                container.innerHTML = '<div class="empty-state">No reports found.</div>';
                return;
            }
            let html = '';
            reports.forEach(r => {
                const teacherName = r.teacherName || 'Unknown';
                const initials = teacherName.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() || '?';
                const statusClass = r.status;
                html += `
                <div class="report-card">
                    <div class="report-header">
                        <div class="teacher-info">
                            <div class="teacher-avatar">${initials}</div>
                            <div>
                                <div class="teacher-name">${teacherName}</div>
                                <div class="report-date">${r.date}</div>
                            </div>
                        </div>
                        <span class="status-badge ${statusClass}">${r.status}</span>
                    </div>
                    <div class="report-content">${r.content}</div>
                    <div class="report-actions">
                        ${r.status === 'pending' ? `
                            <button class="btn btn-approve" onclick="approveReport('${r.id}')">Approve</button>
                            <button class="btn btn-deny" onclick="denyReport('${r.id}')">Deny</button>
                        ` : ''}
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        window.approveReport = async (id) => {
            if (!confirm('Approve this report?')) return;
            try {
                await db.collection('dailyReports').doc(id).update({
                    status: 'approved',
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    reviewedBy: auth.currentUser.uid
                });
                alert('Report approved.');
            } catch (error) {
                console.error('Error approving:', error);
                alert('Error: ' + error.message);
            }
        };

        window.denyReport = async (id) => {
            if (!confirm('Deny this report?')) return;
            try {
                await db.collection('dailyReports').doc(id).update({
                    status: 'rejected',
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    reviewedBy: auth.currentUser.uid
                });
                alert('Report denied.');
            } catch (error) {
                console.error('Error denying:', error);
                alert('Error: ' + error.message);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Admin Dashboard</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Chart.js (optional for stats, but we'll use simple cards) -->
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }
        .sidebar .logo-area i {
            font-size: 2rem;
            color: var(--accent);
        }
        .sidebar .logo-area h2 {
            font-size: 1.2rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar.collapsed .logo-area h2 {
            display: none;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 0.75rem;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
            margin-bottom: 0.3rem;
            white-space: nowrap;
        }
        .sidebar .nav-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }
        .sidebar .nav-item.active {
            background: var(--accent);
            color: white;
        }
        .sidebar .nav-item i {
            font-size: 1.2rem;
            width: 1.5rem;
        }
        .sidebar.collapsed .nav-item span {
            display: none;
        }
        .sidebar .toggle-btn {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            padding: 1rem 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Main content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded {
            margin-left: 80px;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
        }
        .page-title p {
            color: var(--text-secondary);
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            border-radius: 0.5rem;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }
        .stat-info h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .stat-info .value {
            font-size: 2rem;
            font-weight: 600;
        }
        .stat-icon {
            font-size: 2.5rem;
            color: var(--accent);
            opacity: 0.8;
        }

        /* Recent activity */
        .recent-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .section-header a {
            color: var(--accent);
            text-decoration: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .badge {
            padding: 0.25rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge.success { background: #22c55e20; color: #22c55e; }
        .badge.warning { background: #f59e0b20; color: #f59e0b; }
        .badge.error { background: #ef444420; color: #ef4444; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2 { display: none; }
            .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-graduation-cap"></i>
            <h2>EduTop Admin</h2>
        </div>
        <a href="admin-dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="admin-approvals.html" class="nav-item"><i class="fas fa-user-check"></i><span>Approvals</span></a>
        <a href="admin-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="admin-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="admin-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="admin-payments.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="admin-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="admin-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="page-title">
                <h1>Dashboard</h1>
                <p>Welcome back, <span id="adminName">Admin</span></p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i>
                    <span>Light</span>
                    <i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">MA</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards (populated by JS) -->
        <div class="stats-grid" id="statsGrid">
            <!-- Will be filled dynamically -->
        </div>

        <!-- Recent Activity -->
        <div class="recent-section">
            <div class="section-header">
                <h2>Recent Activity</h2>
                <a href="admin-audit.html">View all <i class="fas fa-arrow-right"></i></a>
            </div>
            <table id="recentTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recentActivityBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Dark';
            } else {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Light';
            }
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Check auth and load data
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            // Verify master admin role
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'masterAdmin') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            const userData = userDoc.data();
            document.getElementById('adminName').textContent = userData.firstName || 'Admin';
            const initials = (userData.firstName?.[0] || 'M') + (userData.surname?.[0] || 'A');
            document.getElementById('profileInitials').textContent = initials;

            // Load stats
            loadStats();
            loadRecentActivity();
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });

        // Load stats cards
        async function loadStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = ''; // Clear skeletons

            // Total users
            const usersSnap = await db.collection('users').get();
            const totalUsers = usersSnap.size;

            // Pending approvals
            const pendingSnap = await db.collection('users').where('approved', '==', false).get();
            const pendingApprovals = pendingSnap.size;

            // Total lesson notes
            const notesSnap = await db.collection('lessonNotes').get();
            const totalNotes = notesSnap.size;

            // Pending lesson notes
            const pendingNotesSnap = await db.collection('lessonNotes').where('status', '==', 'pending').get();
            const pendingNotes = pendingNotesSnap.size;

            // Today's attendance (mock for now – can be implemented later)
            const todayAttendance = '87%';

            // Staff count
            const staffSnap = await db.collection('users').where('role', 'in', ['teacher', 'nonTeachingStaff', 'admin']).get();
            const staffCount = staffSnap.size;

            // Student count
            const studentSnap = await db.collection('users').where('role', '==', 'student').get();
            const studentCount = studentSnap.size;

            // Build cards
            const cards = [
                { title: 'Total Users', value: totalUsers, icon: 'fa-users' },
                { title: 'Pending Approvals', value: pendingApprovals, icon: 'fa-hourglass-half' },
                { title: 'Staff', value: staffCount, icon: 'fa-user-tie' },
                { title: 'Students', value: studentCount, icon: 'fa-user-graduate' },
                { title: 'Total Lesson Notes', value: totalNotes, icon: 'fa-book' },
                { title: 'Pending Notes', value: pendingNotes, icon: 'fa-clock' },
                { title: "Today's Attendance", value: todayAttendance, icon: 'fa-calendar-check' }
            ];

            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'stat-card';
                cardDiv.innerHTML = `
                    <div class="stat-info">
                        <h3>${card.title}</h3>
                        <div class="value">${card.value}</div>
                    </div>
                    <i class="fas ${card.icon} stat-icon"></i>
                `;
                statsGrid.appendChild(cardDiv);
            });
        }

        // Load recent activity from audit logs
        async function loadRecentActivity() {
            const logsSnap = await db.collection('auditLogs')
                .orderBy('timestamp', 'desc')
                .limit(5)
                .get();
            const tbody = document.getElementById('recentActivityBody');
            tbody.innerHTML = '';
            if (logsSnap.empty) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No recent activity</td></tr>';
                return;
            }
            logsSnap.forEach(doc => {
                const log = doc.data();
                const time = log.timestamp ? log.timestamp.toDate().toLocaleString() : 'N/A';
                const user = log.userName || log.userId || 'Unknown';
                const action = log.action || 'Action';
                const status = log.status || 'success';
                const statusClass = status === 'success' ? 'badge success' : (status === 'warning' ? 'badge warning' : 'badge error');
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${time}</td>
                    <td>${user}</td>
                    <td>${action}</td>
                    <td><span class="${statusClass}">${status}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        // Optionally set up real-time listeners for stats that change often (pending approvals, notes)
        // We can just reload stats every 30 seconds or use onSnapshot
        // For simplicity, we reload on page focus
        window.addEventListener('focus', () => {
            if (auth.currentUser) {
                loadStats();
                loadRecentActivity();
            }
        });
    </script>
</body>
</html>

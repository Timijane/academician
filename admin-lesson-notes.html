<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Admin Lesson Notes</title>
    <!-- Font Awesome, Inter, Firebase -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Reuse same styling as admin-timetable, plus modal for content */
        * { margin:0; padding:0; box-sizing:border-box; }
        /* ... copy all styles from admin-timetable.html ... */
        .modal-content { max-width: 1000px; }
        .content-preview { white-space: pre-wrap; background: var(--hover-bg); padding:1rem; border-radius:0.5rem; max-height:400px; overflow-y:auto; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">...</div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">...</div>
        <div class="tabs">
            <div class="tab active" data-tab="syllabus">Pending Syllabi</div>
            <div class="tab" data-tab="lessonNotes">Pending Lesson Notes</div>
        </div>

        <!-- Pending Syllabi -->
        <div id="syllabusSection" class="card" style="display:block;">
            <div class="card-header"><h3>Pending Syllabus Proposals</h3></div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Teacher</th><th>Subject</th><th>Class</th><th>Submitted</th><th>Weeks</th><th>Actions</th></tr></thead>
                    <tbody id="syllabusBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Pending Lesson Notes -->
        <div id="lessonNotesSection" class="card" style="display:none;">
            <div class="card-header"><h3>Pending Lesson Notes</h3></div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Teacher</th><th>Subject</th><th>Week</th><th>Topic</th><th>Submitted</th><th>Actions</th></tr></thead>
                    <tbody id="lessonNotesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Review</h3>
                <i class="fas fa-times" onclick="closeModal()"></i>
            </div>
            <div id="modalContent"></div>
            <textarea id="feedbackInput" class="feedback-input" placeholder="Feedback (required for rejection)"></textarea>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="handleApprove()">Approve</button>
                <button class="btn btn-danger" onclick="handleReject()">Reject</button>
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { ... };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ... (sidebar, theme, auth check with reviewLessons permission) ...

        let currentItem = null; // { type, id, data }

        // Load pending syllabi
        async function loadSyllabi() {
            const snapshot = await db.collection('syllabus')
                .where('status', '==', 'pending')
                .orderBy('submittedAt', 'desc')
                .get();
            const tbody = document.getElementById('syllabusBody');
            if (snapshot.empty) { tbody.innerHTML = '<tr><td colspan="6">No pending syllabi.</td></tr>'; return; }
            const teacherIds = [...new Set(snapshot.docs.map(d => d.data().teacherId))];
            const teacherMap = await fetchTeacherNames(teacherIds);
            let html = '';
            snapshot.forEach(doc => {
                const s = doc.data();
                const teacher = teacherMap[s.teacherId] || {};
                const teacherName = `${teacher.firstName||''} ${teacher.surname||''}`.trim() || 'Unknown';
                html += `<tr onclick="openSyllabus('${doc.id}')">
                    <td>${teacherName}</td><td>${s.subject}</td><td>${s.classId}</td>
                    <td>${s.submittedAt?.toDate().toLocaleString()}</td><td>${s.weeks?.length || 0}</td>
                    <td><button class="btn btn-sm btn-primary">Review</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function openSyllabus(id) {
            // fetch full syllabus and show modal
            db.collection('syllabus').doc(id).get().then(doc => {
                const data = doc.data();
                currentItem = { type: 'syllabus', id, data };
                document.getElementById('modalTitle').textContent = 'Review Syllabus';
                let weeksHtml = '<table><tr><th>Week</th><th>Topic</th><th>Objectives</th></tr>';
                data.weeks.forEach(w => {
                    weeksHtml += `<tr><td>${w.week}</td><td>${w.topic}</td><td>${w.objectives}</td></tr>`;
                });
                weeksHtml += '</table>';
                document.getElementById('modalContent').innerHTML = `
                    <p><strong>Teacher:</strong> ${data.teacherId}<br>
                    <strong>Subject:</strong> ${data.subject}<br>
                    <strong>Class:</strong> ${data.classId}</p>
                    ${weeksHtml}
                `;
                document.getElementById('feedbackInput').value = '';
                document.querySelector('.modal').classList.add('active');
            });
        }

        // Load pending lesson notes
        async function loadLessonNotes() {
            const snapshot = await db.collection('lessonNotes')
                .where('status', '==', 'pending')
                .orderBy('submittedAt', 'desc')
                .get();
            const tbody = document.getElementById('lessonNotesBody');
            if (snapshot.empty) { tbody.innerHTML = '<tr><td colspan="6">No pending lesson notes.</td></tr>'; return; }
            const teacherIds = [...new Set(snapshot.docs.map(d => d.data().teacherId))];
            const teacherMap = await fetchTeacherNames(teacherIds);
            let html = '';
            snapshot.forEach(doc => {
                const n = doc.data();
                const teacher = teacherMap[n.teacherId] || {};
                const teacherName = `${teacher.firstName||''} ${teacher.surname||''}`.trim() || 'Unknown';
                html += `<tr onclick="openLessonNote('${doc.id}')">
                    <td>${teacherName}</td><td>${n.subject}</td><td>Week ${n.week}</td>
                    <td>${n.topic}</td><td>${n.submittedAt?.toDate().toLocaleString()}</td>
                    <td><button class="btn btn-sm btn-primary">Review</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function openLessonNote(id) {
            db.collection('lessonNotes').doc(id).get().then(doc => {
                const data = doc.data();
                currentItem = { type: 'lessonNote', id, data };
                document.getElementById('modalTitle').textContent = 'Review Lesson Note';
                document.getElementById('modalContent').innerHTML = `
                    <p><strong>Teacher:</strong> ${data.teacherId}<br>
                    <strong>Subject:</strong> ${data.subject}<br>
                    <strong>Week:</strong> ${data.week} – ${data.topic}</p>
                    <div class="content-preview">${data.lessonNote.replace(/\n/g, '<br>')}</div>
                `;
                document.getElementById('feedbackInput').value = '';
                document.querySelector('.modal').classList.add('active');
            });
        }

        window.handleApprove = async () => {
            if (!currentItem) return;
            const { type, id, data } = currentItem;
            try {
                if (type === 'syllabus') {
                    await db.collection('syllabus').doc(id).update({
                        status: 'approved',
                        reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        reviewedBy: auth.currentUser.uid,
                        feedback: document.getElementById('feedbackInput').value
                    });
                } else {
                    await db.collection('lessonNotes').doc(id).update({
                        status: 'approved',
                        reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        reviewedBy: auth.currentUser.uid,
                        feedback: document.getElementById('feedbackInput').value
                    });
                }
                alert('Approved.');
                closeModal();
                loadSyllabi();
                loadLessonNotes();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.handleReject = async () => {
            if (!currentItem) return;
            const feedback = document.getElementById('feedbackInput').value;
            if (!feedback) { alert('Please provide feedback for rejection.'); return; }
            try {
                if (currentItem.type === 'syllabus') {
                    await db.collection('syllabus').doc(currentItem.id).update({
                        status: 'rejected',
                        reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        reviewedBy: auth.currentUser.uid,
                        feedback
                    });
                } else {
                    await db.collection('lessonNotes').doc(currentItem.id).update({
                        status: 'rejected',
                        reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        reviewedBy: auth.currentUser.uid,
                        feedback
                    });
                }
                alert('Rejected.');
                closeModal();
                loadSyllabi();
                loadLessonNotes();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        function closeModal() {
            document.querySelector('.modal').classList.remove('active');
            currentItem = null;
        }

        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => t.addEventListener('click', (e) => {
            tabs.forEach(tab => tab.classList.remove('active'));
            e.target.classList.add('active');
            if (e.target.dataset.tab === 'syllabus') {
                document.getElementById('syllabusSection').style.display = 'block';
                document.getElementById('lessonNotesSection').style.display = 'none';
                loadSyllabi();
            } else {
                document.getElementById('syllabusSection').style.display = 'none';
                document.getElementById('lessonNotesSection').style.display = 'block';
                loadLessonNotes();
            }
        }));

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'admin-login.html'; return; }
            // check permission (same as timetable admin)
            // then load initial tab
            loadSyllabi();
        });
    </script>
</body>
</html>

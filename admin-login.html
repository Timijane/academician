<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Master Admin</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 41, 59, 0.8);
            --error: #ef4444;
            --success: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 2.5rem 2rem; width: min(520px, 100%);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: rgba(0,0,0,0.2); border-radius: 3rem; padding: 0.3rem;
        }
        .tab {
            flex: 1; text-align: center; padding: 0.8rem 0;
            border-radius: 3rem; font-weight: 600; cursor: pointer;
            transition: 0.2s; color: var(--text-secondary);
        }
        .tab.active {
            background: var(--accent); color: white;
        }

        h2 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; }

        .input-group {
            margin-bottom: 1.5rem; position: relative;
        }
        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 0.2rem 1rem;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .input-wrapper i {
            color: var(--text-secondary); font-size: 1.2rem; width: 2rem;
        }
        .input-wrapper input, .input-wrapper select {
            width: 100%; background: transparent; border: none;
            padding: 1rem 0; font-size: 1rem;
            color: var(--text-primary); outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-secondary); opacity: 0.6;
        }
        .input-wrapper .phone-prefix {
            color: var(--text-secondary); font-size: 1rem; padding-right: 0.3rem;
        }
        .toggle-password {
            cursor: pointer; color: var(--text-secondary);
            font-size: 1.2rem; padding: 0 0.5rem;
        }
        .toggle-password:hover { color: var(--accent); }

        .btn-primary {
            width: 100%; background: var(--accent); border: none;
            border-radius: 3rem; padding: 1.2rem;
            font-size: 1.2rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .btn-primary:hover {
            filter: brightness(1.1); transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        .btn-google {
            width: 100%; background: transparent; border: 2px solid var(--border);
            border-radius: 3rem; padding: 1rem;
            font-size: 1rem; font-weight: 500; color: var(--text-primary);
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-google:hover {
            background: var(--input-bg); border-color: var(--accent);
        }
        .btn-google i { color: #DB4437; }

        .message {
            font-size: 0.9rem; margin-top: 0.5rem; display: none;
        }
        .error-message { color: var(--error); }
        .success-message { color: var(--success); }
        .info-message { color: var(--accent); }

        .footer-note {
            margin-top: 1.5rem; text-align: center; font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .resend-link {
            color: var(--accent); cursor: pointer; text-decoration: underline;
        }

        .hidden { display: none; }
        .divider { text-align: center; margin: 1rem 0; color: var(--text-secondary); }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="glass-card">
        <!-- Tab switcher -->
        <div class="tabs">
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="signupTab">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <div class="sub">Master admin credentials</div>
            <form id="adminLoginForm">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="admin@edutopscholars.org" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="loginError"></div>
                <div class="message info-message" id="loginInfo"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
            </form>
            <div class="divider">or</div>
            <button class="btn-google" id="googleLoginBtn"><i class="fab fa-google"></i> Sign in with Google</button>
        </div>

        <!-- Signup Form (initially hidden) -->
        <div id="signupForm" class="hidden">
            <h2>Create master account</h2>
            <div class="sub">Only for the primary administrator</div>
            <form id="adminSignupForm">
                <div class="input-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupFirstName" placeholder="John" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupSurname" placeholder="Doe" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email (must be master admin email)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="okewunmitimileyin23@gmail.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Phone (with +234)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <span class="phone-prefix">+234</span>
                        <input type="tel" id="signupPhone" placeholder="800 000 0000">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Min. 8 characters" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength" style="font-size:0.85rem; margin-top:0.3rem;"></div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirm', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="signupError"></div>
                <div class="message success-message" id="signupSuccess"></div>
                <button type="submit" class="btn-primary" id="signupBtn">Register</button>
            </form>
        </div>

        <div class="footer-note">
            Secure access · only master admin allowed
        </div>
    </div>

    <script>
        // ==================== FIREBASE INIT ====================
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Master admin email (only allowed)
        const MASTER_EMAIL = 'okewunmitimileyin23@gmail.com';

        // ==================== THEME TOGGLE ====================
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                updateIcon('dark');
            }
        })();

        // ==================== TAB SWITCHING ====================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginDiv = document.getElementById('loginForm');
        const signupDiv = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginDiv.classList.remove('hidden');
            signupDiv.classList.add('hidden');
            clearMessages();
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupDiv.classList.remove('hidden');
            loginDiv.classList.add('hidden');
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginInfo').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }

        // ==================== PASSWORD TOGGLE ====================
        window.togglePassword = function(fieldId, eyeIcon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        };

        // ==================== PASSWORD STRENGTH ====================
        document.getElementById('signupPassword')?.addEventListener('input', function() {
            const pwd = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            if (pwd.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            let strength = 'Weak';
            let color = 'var(--error)';
            if (pwd.length >= 8 && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) {
                strength = 'Strong';
                color = 'var(--success)';
            } else if (pwd.length >= 6 && (/[A-Z]/.test(pwd) || /[0-9]/.test(pwd))) {
                strength = 'Medium';
                color = '#eab308';
            }
            strengthDiv.innerHTML = `Strength: <span style="color:${color}">${strength}</span>`;
        });

        // ==================== LOGIN HANDLER ====================
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const infoDiv = document.getElementById('loginInfo');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check email verification
                if (!user.emailVerified) {
                    // Offer to resend verification
                    infoDiv.innerHTML = `Email not verified. <span class="resend-link" id="resendVerification">Resend verification email</span>`;
                    infoDiv.style.display = 'block';
                    document.getElementById('resendVerification').addEventListener('click', async () => {
                        await user.sendEmailVerification();
                        infoDiv.textContent = 'Verification email sent. Please check your inbox.';
                    });
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                // Check if email is master admin
                if (user.email !== MASTER_EMAIL) {
                    await auth.signOut();
                    errorDiv.textContent = 'Access denied. Only master admin can log in.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                // Fetch user document from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    // Should not happen if signup was done, but just in case, create it
                    await db.collection('users').doc(user.uid).set({
                        firstName: '',
                        surname: '',
                        email: user.email,
                        phone: '',
                        role: 'masterAdmin',
                        approved: true,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    const data = userDoc.data();
                    if (data.role !== 'masterAdmin') {
                        await auth.signOut();
                        errorDiv.textContent = 'You do not have master admin privileges.';
                        errorDiv.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Sign in';
                        return;
                    }
                }

                // Redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in';
            }
        });

        // ==================== SIGNUP HANDLER ====================
        document.getElementById('adminSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('signupFirstName').value.trim();
            const surname = document.getElementById('signupSurname').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phoneInput = document.getElementById('signupPhone').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirm = document.getElementById('signupConfirm').value.trim();
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            const signupBtn = document.getElementById('signupBtn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Basic validations
            if (!firstName || !surname || !email || !password || !confirm) {
                errorDiv.textContent = 'All fields except phone are required.';
                errorDiv.style.display = 'block';
                return;
            }
            if (email !== MASTER_EMAIL) {
                errorDiv.textContent = `Only the master admin email (${MASTER_EMAIL}) can register.`;
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            // Format phone: add +234 if not already, but allow empty
            let phone = phoneInput;
            if (phone) {
                // Remove any non-digit except leading +
                phone = phone.replace(/\s+/g, '');
                if (!phone.startsWith('+')) {
                    phone = '+234' + phone.replace(/^0+/, '');
                }
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';

            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Send email verification
                await user.sendEmailVerification();

                // Store user data in Firestore
                await db.collection('users').doc(user.uid).set({
                    firstName,
                    surname,
                    email: user.email,
                    phone: phone || '',
                    role: 'masterAdmin',
                    approved: true,  // auto-approved
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                successDiv.textContent = 'Account created! Please verify your email before logging in.';
                successDiv.style.display = 'block';

                // Sign out the user so they can't access until verified
                await auth.signOut();

                // Optionally switch to login tab after a few seconds
                setTimeout(() => {
                    loginTab.click();
                }, 4000);
            } catch (error) {
                console.error('Signup error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Register';
            }
        });

        // ==================== GOOGLE SIGN-IN ====================
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            const errorDiv = document.getElementById('loginError');
            const infoDiv = document.getElementById('loginInfo');
            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';

            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Enforce master admin email
                if (user.email !== MASTER_EMAIL) {
                    await auth.signOut();
                    errorDiv.textContent = `Access denied. Only master admin (${MASTER_EMAIL}) can log in.`;
                    errorDiv.style.display = 'block';
                    return;
                }

                // Google accounts are typically verified, but we can trust emailVerified
                if (!user.emailVerified) {
                    // This is unlikely, but handle
                    await user.sendEmailVerification();
                    infoDiv.textContent = 'Your email is not verified. A verification email has been sent.';
                    infoDiv.style.display = 'block';
                    await auth.signOut();
                    return;
                }

                // Check or create Firestore user document
                const userDocRef = db.collection('users').doc(user.uid);
                const userDoc = await userDocRef.get();
                if (!userDoc.exists) {
                    // Create from Google profile
                    const firstName = user.displayName ? user.displayName.split(' ')[0] : '';
                    const surname = user.displayName ? user.displayName.split(' ').slice(1).join(' ') : '';
                    await userDocRef.set({
                        firstName,
                        surname,
                        email: user.email,
                        phone: '',
                        role: 'masterAdmin',
                        approved: true,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    const data = userDoc.data();
                    if (data.role !== 'masterAdmin') {
                        await auth.signOut();
                        errorDiv.textContent = 'You do not have master admin privileges.';
                        errorDiv.style.display = 'block';
                        return;
                    }
                }

                // Redirect
                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                console.error('Google sign-in error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>

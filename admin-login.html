<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop · Master Admin</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
            --orb-1: rgba(37, 99, 235, 0.15);
            --orb-2: rgba(124, 58, 237, 0.15);
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 41, 59, 0.8);
            --error: #ef4444;
            --success: #4ade80;
            --orb-1: rgba(56, 189, 248, 0.2);
            --orb-2: rgba(168, 85, 247, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating orbs for depth */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--orb-1), transparent 70%);
            filter: blur(60px);
            z-index: 0;
            animation: float 18s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, var(--orb-2), transparent); animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        /* Back to homepage button */
        .back-home {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1001;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .back-home i { font-size: 1.2rem; color: var(--accent); }
        .back-home:hover {
            transform: scale(1.02) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 2.5rem 2rem; width: min(480px, 100%);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: rgba(0,0,0,0.2); border-radius: 3rem; padding: 0.3rem;
        }
        .tab {
            flex: 1; text-align: center; padding: 0.8rem 0;
            border-radius: 3rem; font-weight: 600; cursor: pointer;
            transition: 0.2s; color: var(--text-secondary);
        }
        .tab.active {
            background: var(--accent); color: white;
        }

        h2 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; }

        .input-group {
            margin-bottom: 1.5rem; position: relative;
        }
        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 0.2rem 1rem;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .input-wrapper i {
            color: var(--text-secondary); font-size: 1.2rem; width: 2rem;
        }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 1rem 0; font-size: 1rem;
            color: var(--text-primary); outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-secondary); opacity: 0.6;
        }
        .toggle-password {
            cursor: pointer; color: var(--text-secondary);
            font-size: 1.2rem; padding: 0 0.5rem;
        }
        .toggle-password:hover { color: var(--accent); }

        .btn-primary {
            width: 100%; background: var(--accent); border: none;
            border-radius: 3rem; padding: 1.2rem;
            font-size: 1.2rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-primary:hover {
            filter: brightness(1.1); transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        .message {
            font-size: 0.9rem; margin-top: 0.5rem; display: none;
            padding: 0.75rem; border-radius: 1rem; background: rgba(0,0,0,0.1);
        }
        .error-message { color: var(--error); border-left: 4px solid var(--error); }
        .success-message { color: var(--success); border-left: 4px solid var(--success); }
        .info-message { color: var(--accent); border-left: 4px solid var(--accent); }

        .footer-note {
            margin-top: 1.5rem; text-align: center; font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Back to homepage button -->
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Home</a>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="glass-card">
        <!-- Tab switcher -->
        <div class="tabs">
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="signupTab">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <div class="sub">Master admin access only</div>
            <form id="adminLoginForm">
                <div class="input-group">
                    <label>Email (Gmail)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="admin@school.org" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="loginError"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign in as Admin</button>
            </form>
        </div>

        <!-- Signup Form (initially hidden) -->
        <div id="signupForm" class="hidden">
            <h2>Create master account</h2>
            <div class="sub">First admin only · one‑time setup</div>
            <form id="adminSignupForm">
                <div class="input-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupFirstName" placeholder="John" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupSurname" placeholder="Doe" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email (must be Gmail)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="admin@gmail.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Min. 8 characters" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength" style="font-size:0.85rem; margin-top:0.3rem;"></div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirm', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="signupError"></div>
                <div class="message success-message" id="signupSuccess"></div>
                <button type="submit" class="btn-primary" id="signupBtn">Register as Master Admin</button>
            </form>
        </div>

        <div class="footer-note">
            🔒 Strict role‑based access · Only approved master admin allowed
        </div>
    </div>

    <script>
        // ==================== FIREBASE INIT (NEW CONFIG) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== THEME TOGGLE ====================
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                updateIcon('dark');
            }
        })();

        // ==================== TAB SWITCHING ====================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginDiv = document.getElementById('loginForm');
        const signupDiv = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginDiv.classList.remove('hidden');
            signupDiv.classList.add('hidden');
            clearMessages();
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupDiv.classList.remove('hidden');
            loginDiv.classList.add('hidden');
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }

        // ==================== PASSWORD TOGGLE ====================
        window.togglePassword = function(fieldId, eyeIcon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        };

        // ==================== PASSWORD STRENGTH ====================
        document.getElementById('signupPassword')?.addEventListener('input', function() {
            const pwd = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            if (pwd.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            let strength = 'Weak';
            let color = 'var(--error)';
            if (pwd.length >= 8 && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) {
                strength = 'Strong';
                color = 'var(--success)';
            } else if (pwd.length >= 6 && (/[A-Z]/.test(pwd) || /[0-9]/.test(pwd))) {
                strength = 'Medium';
                color = '#eab308';
            }
            strengthDiv.innerHTML = `Strength: <span style="color:${color}">${strength}</span>`;
        });

        // ==================== LOGIN HANDLER (STRICT CHECKS) ====================
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Fetch user document from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    throw new Error('User record not found. Please contact support.');
                }

                const userData = userDoc.data();
                // Check role and approval status
                if (!['master-admin', 'admin'].includes(userData.role)) {
                    throw new Error('Access denied. This portal is for administrators only.');
                }
                if (userData.status !== 'approved') {
                    throw new Error('Your account is not yet approved. Please wait for activation.');
                }

                // All checks passed → redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                // Sign out if partially logged in
                await auth.signOut();
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in as Admin';
            }
        });

        // ==================== SIGNUP HANDLER (ONLY FIRST MASTER ADMIN) ====================
        document.getElementById('adminSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('signupFirstName').value.trim();
            const surname = document.getElementById('signupSurname').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirm = document.getElementById('signupConfirm').value.trim();
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            const signupBtn = document.getElementById('signupBtn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!firstName || !surname || !email || !password || !confirm) {
                errorDiv.textContent = 'All fields are required.';
                errorDiv.style.display = 'block';
                return;
            }
            if (!email.endsWith('@gmail.com')) {
                errorDiv.textContent = 'Master admin must use a Gmail address.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Checking availability...';

            try {
                // 1. Check if any master-admin already exists
                const masterAdminQuery = await db.collection('users')
                    .where('role', 'in', ['master-admin', 'admin'])
                    .limit(1)
                    .get();

                if (!masterAdminQuery.empty) {
                    throw new Error('Master admin already exists. Only one master admin account is allowed.');
                }

                // 2. Create user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // 3. Create Firestore document (pending approval)
                await db.collection('users').doc(user.uid).set({
                    firstName,
                    surname,
                    email: user.email,
                    role: 'master-admin',  // first admin becomes master
                    status: 'pending',      // requires admin approval
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 4. Show success and switch to login tab
                successDiv.textContent = 'Account created! You will be able to log in once approved.';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    loginTab.click();  // switch to login
                }, 3000);
            } catch (error) {
                console.error('Signup error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Register as Master Admin';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Timetable Review</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar .logo-area {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2.5rem; padding: 0 0.5rem;
        }
        .sidebar .logo-area i { font-size: 2rem; color: var(--accent); }
        .sidebar .logo-area h2 { font-size: 1.2rem; font-weight: 600; white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem;
            border-radius: 0.75rem; color: var(--text-secondary); transition: 0.2s;
            cursor: pointer; margin-bottom: 0.3rem; white-space: nowrap; text-decoration: none;
        }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); }
        .sidebar .nav-item.active { background: var(--accent); color: white; }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.5rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded { margin-left: 80px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }
        .page-title h1 { font-size: 2rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-icon {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem;
            min-width: 150px; display: none; z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 1rem; color: var(--text-primary); border-radius: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-sm { padding: 0.25rem 0.8rem; font-size: 0.85rem; }

        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background: var(--hover-bg);
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge.pending { background: var(--warning-bg); color: var(--warning-text); }

        .proposal-item {
            cursor: pointer;
            transition: background 0.2s;
        }
        .proposal-item:hover {
            background: var(--hover-bg);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .feedback-input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--input-bg);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-graduation-cap"></i>
            <h2>EduTop Admin</h2>
        </div>
        <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="admin-approvals.html" class="nav-item"><i class="fas fa-user-check"></i><span>Approvals</span></a>
        <a href="admin-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="admin-timetable.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="admin-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="admin-payments.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="admin-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="admin-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Timetable Review</h1>
                <p>Approve or reject teacher timetable proposals</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">MA</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Pending Proposals</h3>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Class</th>
                            <th>Teacher</th>
                            <th>Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="proposalsBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Review Timetable</h3>
                <i class="fas fa-times" style="cursor:pointer;" onclick="closeReviewModal()"></i>
            </div>
            <div id="modalContent"></div>
            <textarea id="feedbackInput" class="feedback-input" placeholder="Feedback (optional, especially for rejection)"></textarea>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="handleApprove()">Approve</button>
                <button class="btn btn-danger" onclick="handleReject()">Reject</button>
                <button class="btn btn-outline" onclick="closeReviewModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check (only master admin or co-admin with permissions)
        let currentUser = null;
        let currentUserData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || (userDoc.data().role !== 'masterAdmin' && !userDoc.data().permissions?.reviewLessons)) {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUserData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (currentUserData.firstName?.[0] || 'A') + (currentUserData.surname?.[0] || 'A');
            document.querySelector('.page-title p').textContent = `Welcome back, ${currentUserData.firstName || 'Admin'}`;

            loadProposals();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        async function loadProposals() {
            const snapshot = await db.collection('timetableProposals')
                .where('status', '==', 'pending')
                .orderBy('submittedAt', 'desc')
                .get();
            const tbody = document.getElementById('proposalsBody');
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4">No pending proposals.</td></tr>';
                return;
            }
            // Fetch teacher names
            const teacherIds = [...new Set(snapshot.docs.map(d => d.data().teacherId))];
            const teacherPromises = teacherIds.map(id => db.collection('users').doc(id).get());
            const teacherSnaps = await Promise.all(teacherPromises);
            const teacherMap = {};
            teacherSnaps.forEach(snap => {
                if (snap.exists) teacherMap[snap.id] = snap.data();
            });

            let html = '';
            snapshot.forEach(doc => {
                const p = doc.data();
                const teacher = teacherMap[p.teacherId] || {};
                const teacherName = `${teacher.firstName || ''} ${teacher.surname || ''}`.trim() || 'Unknown';
                const date = p.submittedAt ? p.submittedAt.toDate().toLocaleString() : 'N/A';
                html += `
                <tr class="proposal-item" onclick="openReviewModal('${doc.id}')">
                    <td>${p.classId}</td>
                    <td>${teacherName}</td>
                    <td>${date}</td>
                    <td><span class="badge pending">Pending</span></td>
                </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Review modal
        const reviewModal = document.getElementById('reviewModal');
        const modalContent = document.getElementById('modalContent');
        const feedbackInput = document.getElementById('feedbackInput');
        let currentProposalId = null;

        window.openReviewModal = async (proposalId) => {
            currentProposalId = proposalId;
            const doc = await db.collection('timetableProposals').doc(proposalId).get();
            const proposal = doc.data();
            // Build table from periods
            let periodsHtml = '<table><thead><tr><th>Start</th><th>End</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th></tr></thead><tbody>';
            proposal.periods.forEach(p => {
                periodsHtml += `<tr>
                    <td>${p.startTime}</td>
                    <td>${p.endTime}</td>
                    <td>${p.monday || ''}</td>
                    <td>${p.tuesday || ''}</td>
                    <td>${p.wednesday || ''}</td>
                    <td>${p.thursday || ''}</td>
                    <td>${p.friday || ''}</td>
                </tr>`;
            });
            periodsHtml += '</tbody></table>';
            modalContent.innerHTML = `
                <p><strong>Class:</strong> ${proposal.classId}</p>
                ${periodsHtml}
            `;
            feedbackInput.value = '';
            reviewModal.classList.add('active');
        };

        window.closeReviewModal = () => {
            reviewModal.classList.remove('active');
            currentProposalId = null;
        };

        window.handleApprove = async () => {
            if (!currentProposalId) return;
            const doc = await db.collection('timetableProposals').doc(currentProposalId).get();
            const proposal = doc.data();
            // Save to timetables collection
            await db.collection('timetables').doc(proposal.classId).set({
                periods: proposal.periods,
                approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
                approvedBy: auth.currentUser.uid
            });
            // Update proposal status
            await doc.ref.update({
                status: 'approved',
                reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                reviewedBy: auth.currentUser.uid,
                feedback: feedbackInput.value
            });
            // Log audit
            await db.collection('auditLogs').add({
                userId: auth.currentUser.uid,
                action: `Approved timetable for ${proposal.classId}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeReviewModal();
            loadProposals();
        };

        window.handleReject = async () => {
            if (!currentProposalId) return;
            const doc = await db.collection('timetableProposals').doc(currentProposalId).get();
            await doc.ref.update({
                status: 'rejected',
                reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
                reviewedBy: auth.currentUser.uid,
                feedback: feedbackInput.value
            });
            await db.collection('auditLogs').add({
                userId: auth.currentUser.uid,
                action: `Rejected timetable proposal ${currentProposalId}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeReviewModal();
            loadProposals();
        };
    </script>
</body>
</html>

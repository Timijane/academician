<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Timetable Review</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>
<body>
    <!-- Sidebar and top bar (unchanged) -->
    ...

    <div class="main-content">
        <!-- Tabs (unchanged) -->
        ...

        <!-- Pending Tab -->
        <div id="pendingSection" class="card">
            <div class="card-header">
                <h3>Pending Proposals</h3>
            </div>
            <div id="pendingError" class="feedback-message" style="display: none; margin-bottom: 1rem;"></div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Class</th>
                            <th>Teacher</th>
                            <th>Submitted</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="pendingBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Approved and Rejected sections (unchanged) -->
        ...

    </div>

    <!-- Review Modal (unchanged) -->
    ...

    <script>
        // Firebase config (same)
        const firebaseConfig = {...};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ... (theme, sidebar, auth check - same as before)

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'admin-login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || (userDoc.data().role !== 'masterAdmin' && !userDoc.data().permissions?.reviewLessons)) {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUserData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (currentUserData.firstName?.[0] || 'A') + (currentUserData.surname?.[0] || 'A');
            document.querySelector('.page-title p').textContent = `Welcome back, ${currentUserData.firstName || 'Admin'}`;

            // Load all tabs with error handling
            loadPending();
            loadApproved();
            loadRejected();
        });

        // ---------- Load Pending with error handling ----------
        async function loadPending() {
            const tbody = document.getElementById('pendingBody');
            const errorDiv = document.getElementById('pendingError');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            errorDiv.style.display = 'none';

            try {
                const snapshot = await db.collection('timetableProposals')
                    .where('status', '==', 'pending')
                    .orderBy('submittedAt', 'desc')
                    .get();

                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4">No pending proposals.</td></tr>';
                    return;
                }

                // Fetch teacher names (same as before)
                const teacherIds = [...new Set(snapshot.docs.map(d => d.data().teacherId))];
                const teacherMap = await fetchTeacherNames(teacherIds);

                let html = '';
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const teacher = teacherMap[p.teacherId] || {};
                    const teacherName = `${teacher.firstName || ''} ${teacher.surname || ''}`.trim() || 'Unknown';
                    const date = p.submittedAt ? p.submittedAt.toDate().toLocaleString() : 'N/A';
                    html += `
                    <tr class="proposal-item" onclick="openReviewModal('${doc.id}')">
                        <td>${p.classId}</td>
                        <td>${teacherName}</td>
                        <td>${date}</td>
                        <td><span class="badge pending">Pending</span></td>
                    </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (error) {
                console.error('Error loading pending proposals:', error);
                errorDiv.style.display = 'block';
                if (error.code === 'failed-precondition' && error.message.includes('index')) {
                    // Missing index
                    errorDiv.innerHTML = `
                        <strong>Missing Firestore index.</strong><br>
                        Please create the required index by clicking 
                        <a href="https://console.firebase.google.com/v1/r/project/edutopscholars-be54a/firestore/indexes?create_composite=Ck5wcm9qZWN0cy9lZHV0b3BzY2hvbGFycy1iZTU0YS9kYXRhYmFzZXMvKGRlZmF1bHQpL2NvbGxlY3Rpb25Hcm91cHMvdGltZXRhYmxlUHJvcG9zYWxzL2luZGV4ZXMvXxABGgsKBXN0YXR1cxABGg4KCHN1Ym1pdHRlZEF0EAE" target="_blank">this link</a>.
                    `;
                } else if (error.code === 'permission-denied') {
                    errorDiv.textContent = 'Permission denied. Make sure your admin account has the "reviewLessons" permission.';
                } else {
                    errorDiv.textContent = `Error: ${error.message}`;
                }
                tbody.innerHTML = '<tr><td colspan="4">Failed to load data. See error above.</td></tr>';
            }
        }

        // Load Approved and Rejected similarly (add try/catch blocks)
        async function loadApproved() {
            const tbody = document.getElementById('approvedBody');
            const errorDiv = document.getElementById('approvedError') || createErrorDiv('approvedError', 'approvedSection');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            errorDiv.style.display = 'none';
            try {
                const snapshot = await db.collection('timetables').get();
                // ... rest of loading logic
            } catch (error) {
                console.error('Error loading approved timetables:', error);
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Error: ${error.message}`;
                tbody.innerHTML = '<tr><td colspan="4">Failed to load data.</td></tr>';
            }
        }

        async function loadRejected() {
            const tbody = document.getElementById('rejectedBody');
            const errorDiv = document.getElementById('rejectedError') || createErrorDiv('rejectedError', 'rejectedSection');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            errorDiv.style.display = 'none';
            try {
                const snapshot = await db.collection('timetableProposals')
                    .where('status', '==', 'rejected')
                    .orderBy('submittedAt', 'desc')
                    .get();
                // ... rest
            } catch (error) {
                console.error('Error loading rejected proposals:', error);
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Error: ${error.message}`;
                tbody.innerHTML = '<tr><td colspan="4">Failed to load data.</td></tr>';
            }
        }

        // Helper to create error div if not present
        function createErrorDiv(id, sectionId) {
            const section = document.getElementById(sectionId);
            const div = document.createElement('div');
            div.id = id;
            div.className = 'feedback-message';
            div.style.display = 'none';
            section.insertBefore(div, section.querySelector('.table-responsive'));
            return div;
        }

        // fetchTeacherNames unchanged
        async function fetchTeacherNames(teacherIds) { ... }

        // Rest of the script (review modal, approve/reject) unchanged
    </script>
</body>
</html>

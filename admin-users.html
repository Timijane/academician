<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · User Management</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same base styles as admin-dashboard.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar (same) */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }
        .sidebar .logo-area i {
            font-size: 2rem;
            color: var(--accent);
        }
        .sidebar .logo-area h2 {
            font-size: 1.2rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar.collapsed .logo-area h2 {
            display: none;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 0.75rem;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            text-decoration: none;
        }
        .sidebar .nav-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }
        .sidebar .nav-item.active {
            background: var(--accent);
            color: white;
        }
        .sidebar .nav-item i {
            font-size: 1.2rem;
            width: 1.5rem;
        }
        .sidebar.collapsed .nav-item span {
            display: none;
        }
        .sidebar .toggle-btn {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            padding: 1rem 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded {
            margin-left: 80px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
        }
        .page-title p {
            color: var(--text-secondary);
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            border-radius: 0.5rem;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        /* Filters and table */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
        }
        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-sm {
            padding: 0.25rem 0.8rem;
            font-size: 0.85rem;
        }
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .badge {
            padding: 0.25rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge.approved { background: #22c55e20; color: #22c55e; }
        .badge.pending { background: #f59e0b20; color: #f59e0b; }
        .badge.suspended { background: #ef444420; color: #ef4444; }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-primary);
        }
        .text-right {
            text-align: right;
        }
    </style>
</head>
<body>
    <!-- Sidebar (same as dashboard) -->
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-graduation-cap"></i>
            <h2>EduTop Admin</h2>
        </div>
        <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="admin-users.html" class="nav-item active"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="admin-approvals.html" class="nav-item"><i class="fas fa-user-check"></i><span>Approvals</span></a>
        <a href="admin-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="admin-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="admin-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="admin-payments.html" class="nav-item"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="admin-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="admin-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>User Management</h1>
                <p>Manage all users, approvals, and roles</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">MA</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <select id="roleFilter" class="filter-select">
                <option value="all">All Roles</option>
                <option value="masterAdmin">Master Admin</option>
                <option value="admin">Admin (Co‑Admin)</option>
                <option value="teacher">Teacher</option>
                <option value="student">Student</option>
                <option value="nonTeachingStaff">Non‑Teaching Staff</option>
                <option value="pending">Pending Approval</option>
            </select>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name or email...">
            </div>
        </div>

        <!-- Users table -->
        <div class="table-container">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Class / Dept</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" style="text-align:center;">Loading users...</td></tr>
                </tbody>
             </>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit User</h3>
                <i class="fas fa-times" style="cursor:pointer;" onclick="closeEditModal()"></i>
            </div>
            <form id="editForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" class="form-control">
                </div>
                <div class="form-group">
                    <label>Surname</label>
                    <input type="text" id="editSurname" class="form-control">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="editPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="editRole" class="form-control">
                        <option value="masterAdmin">Master Admin</option>
                        <option value="admin">Admin (Co‑Admin)</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student</option>
                        <option value="nonTeachingStaff">Non‑Teaching Staff</option>
                    </select>
                </div>
                <div class="form-group" id="editClassGroup">
                    <label>Class / Department</label>
                    <input type="text" id="editClass" class="form-control" placeholder="e.g., Basic 3">
                </div>
                <div class="text-right">
                    <button type="button" class="btn btn-primary" onclick="saveUserEdit()">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar & theme (same as dashboard)
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        let currentUserRole = null;
        let currentUserData = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'masterAdmin') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUserData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (currentUserData.firstName?.[0] || 'M') + (currentUserData.surname?.[0] || 'A');
            document.querySelector('.page-title p').textContent = `Welcome back, ${currentUserData.firstName || 'Admin'}`;

            // Load users with real-time listener
            setupUsersListener();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        // Real-time listener for users
        let unsubscribeUsers = null;
        function setupUsersListener() {
            if (unsubscribeUsers) unsubscribeUsers();
            unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                const allUsers = [];
                snapshot.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
                filterAndDisplayUsers(allUsers);
            }, error => {
                console.error('Listener error:', error);
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6">Error loading users</td></tr>';
            });
        }

        // Filter and search
        const roleFilter = document.getElementById('roleFilter');
        const searchInput = document.getElementById('searchInput');
        let allUsers = [];

        function filterAndDisplayUsers(users) {
            allUsers = users;
            applyFilters();
        }

        function applyFilters() {
            const role = roleFilter.value;
            const search = searchInput.value.toLowerCase().trim();
            let filtered = allUsers;

            if (role !== 'all') {
                if (role === 'pending') {
                    filtered = filtered.filter(u => u.approved === false);
                } else {
                    filtered = filtered.filter(u => u.role === role);
                }
            }

            if (search) {
                filtered = filtered.filter(u => 
                    (u.firstName?.toLowerCase().includes(search) || 
                     u.surname?.toLowerCase().includes(search) ||
                     u.email?.toLowerCase().includes(search))
                );
            }

            displayUsers(filtered);
        }

        roleFilter.addEventListener('change', applyFilters);
        searchInput.addEventListener('input', applyFilters);

        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No users found</td></tr>';
                return;
            }

            let html = '';
            users.forEach(u => {
                const name = `${u.firstName || ''} ${u.surname || ''}`.trim() || '—';
                const roleDisplay = u.role === 'masterAdmin' ? 'Master Admin' : 
                                    u.role === 'admin' ? 'Admin' : 
                                    u.role === 'teacher' ? 'Teacher' : 
                                    u.role === 'student' ? 'Student' : 
                                    u.role === 'nonTeachingStaff' ? 'Non‑Teaching' : u.role;
                const classDept = u.classTeaching || u.class || u.department || '—';
                const status = u.approved ? (u.suspended ? 'Suspended' : 'Active') : 'Pending';
                const statusClass = u.suspended ? 'suspended' : (u.approved ? 'approved' : 'pending');

                // Build action buttons
                let actions = '';
                if (u.role !== 'masterAdmin') { // Cannot modify master admin
                    if (!u.approved) {
                        actions += `<button class="btn btn-primary btn-sm" onclick="approveUser('${u.id}')">Approve</button>`;
                    }
                    if (u.role === 'teacher' && !u.isCoAdmin) {
                        actions += `<button class="btn btn-primary btn-sm" onclick="makeCoAdmin('${u.id}')">Make Co‑Admin</button>`;
                    }
                    if (u.role === 'admin' || u.isCoAdmin) {
                        actions += `<button class="btn btn-primary btn-sm" onclick="removeCoAdmin('${u.id}')">Remove Co‑Admin</button>`;
                    }
                    actions += `<button class="btn btn-primary btn-sm" onclick="editUser('${u.id}')">Edit</button>`;
                    actions += `<button class="btn btn-primary btn-sm" onclick="toggleSuspend('${u.id}', ${u.suspended || false})">${u.suspended ? 'Activate' : 'Suspend'}</button>`;
                } else {
                    actions = '—';
                }

                html += `<tr>
                    <td>${name}</td>
                    <td>${u.email || '—'}</td>
                    <td>${roleDisplay}</td>
                    <td>${classDept}</td>
                    <td><span class="badge ${statusClass}">${status}</span></td>
                    <td class="action-buttons">${actions}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // Action functions
        window.approveUser = async (userId) => {
            if (!confirm('Approve this user?')) return;
            await db.collection('users').doc(userId).update({ approved: true });
            // Log audit
            await db.collection('auditLogs').add({
                userId: auth.currentUser.uid,
                action: `Approved user ${userId}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'success'
            });
        };

        window.makeCoAdmin = async (userId) => {
            if (!confirm('Promote this teacher to co‑admin? They will retain teacher role and gain admin permissions.')) return;
            await db.collection('users').doc(userId).update({
                role: 'admin', // or keep teacher and set isCoAdmin: true
                isCoAdmin: true,
                permissions: { reviewLessons: true, manageAttendance: true } // default permissions
            });
            await logAudit(`Promoted ${userId} to co‑admin`);
        };

        window.removeCoAdmin = async (userId) => {
            if (!confirm('Remove co‑admin privileges? They will revert to teacher.')) return;
            const userDoc = await db.collection('users').doc(userId).get();
            const userData = userDoc.data();
            if (userData.role === 'admin' && userData.isCoAdmin) {
                await db.collection('users').doc(userId).update({
                    role: 'teacher',
                    isCoAdmin: false,
                    permissions: firebase.firestore.FieldValue.delete()
                });
            } else {
                await db.collection('users').doc(userId).update({
                    isCoAdmin: false,
                    permissions: firebase.firestore.FieldValue.delete()
                });
            }
            await logAudit(`Removed co‑admin from ${userId}`);
        };

        window.toggleSuspend = async (userId, currentlySuspended) => {
            const action = currentlySuspended ? 'activate' : 'suspend';
            if (!confirm(`${action} this user?`)) return;
            await db.collection('users').doc(userId).update({
                suspended: !currentlySuspended
            });
            await logAudit(`${action} user ${userId}`);
        };

        // Edit user modal
        const editModal = document.getElementById('editModal');
        window.editUser = async (userId) => {
            const userDoc = await db.collection('users').doc(userId).get();
            const user = userDoc.data();
            document.getElementById('editUserId').value = userId;
            document.getElementById('editFirstName').value = user.firstName || '';
            document.getElementById('editSurname').value = user.surname || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editRole').value = user.role || 'teacher';
            // Handle class/department field based on role
            const classField = document.getElementById('editClass');
            if (user.role === 'teacher') {
                classField.value = user.classTeaching || '';
            } else if (user.role === 'student') {
                classField.value = user.class || '';
            } else if (user.role === 'nonTeachingStaff') {
                classField.value = user.department || '';
            } else {
                classField.value = '';
            }
            editModal.classList.add('active');
        };

        window.closeEditModal = () => {
            editModal.classList.remove('active');
        };

        window.saveUserEdit = async () => {
            const userId = document.getElementById('editUserId').value;
            const updates = {
                firstName: document.getElementById('editFirstName').value,
                surname: document.getElementById('editSurname').value,
                phone: document.getElementById('editPhone').value,
                role: document.getElementById('editRole').value
            };
            const role = updates.role;
            const classVal = document.getElementById('editClass').value;
            if (role === 'teacher') updates.classTeaching = classVal;
            else if (role === 'student') updates.class = classVal;
            else if (role === 'nonTeachingStaff') updates.department = classVal;

            await db.collection('users').doc(userId).update(updates);
            await logAudit(`Edited user ${userId}`);
            closeEditModal();
        };

        async function logAudit(action) {
            await db.collection('auditLogs').add({
                userId: auth.currentUser.uid,
                userName: currentUserData?.firstName + ' ' + currentUserData?.surname,
                action,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'success'
            });
        }

        // Cleanup listener on page unload
        window.addEventListener('beforeunload', () => {
            if (unsubscribeUsers) unsubscribeUsers();
        });
    </script>
</body>
</html>

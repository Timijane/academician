<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA · Gateway</title>
    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #0f172a; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 600px;
        }
        .role-card {
            background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 1.5rem;
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; text-decoration: none; color: white;
        }
        .role-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .full-width { grid-column: span 2; }
        h1 { margin-bottom: 2rem; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h1>EDUMETA SYSTEM</h1>
    <div class="grid">
        <a href="login.html?role=admin" class="role-card full-width">Master Admin</a>
        <a href="login.html?role=teacher" class="role-card">Teacher</a>
        <a href="login.html?role=staff" class="role-card">Non-Teaching Staff</a>
        <a href="login.html?role=student" class="role-card">Student Portal</a>
        <a href="parent-access.html" class="role-card">Parent Guest View</a>
    </div>
</body>
</html>

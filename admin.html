<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDUMETA · Master Admin</title>
  <style>
    /* Same professional glass-morphism styles as before */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      background: url('admin.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: brightness(0.5);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin-bottom: 1.5rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }

    h2 {
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .sub {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.3rem;
      position: relative;
    }

    input, select, textarea {
      width: 100%;
      padding: 1rem 1.2rem;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 3rem;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: 0.15s;
    }

    textarea {
      border-radius: 1.5rem;
      resize: vertical;
      min-height: 80px;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.6);
    }

    input:focus, select:focus, textarea:focus {
      border-color: white;
      background: rgba(255,255,255,0.2);
    }

    select option {
      background: #1e293b;
      color: white;
    }

    .password-container {
      display: flex;
      align-items: center;
      position: relative;
    }

    .password-container input {
      flex: 1;
      padding-right: 4rem;
    }

    .password-container button {
      position: absolute;
      right: 0.8rem;
      background: none;
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      opacity: 0.8;
    }

    .password-container button:hover { opacity: 1; }

    .hidden { display: none; }

    #forgot-password {
      display: block;
      text-align: right;
      margin: 0.2rem 0 1.2rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
    }
    #forgot-password:hover { color: white; }

    #auth-button {
      width: 100%;
      background: white;
      color: #1e293b;
      border: none;
      border-radius: 3rem;
      padding: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 1.5rem;
    }
    #auth-button:hover { background: #f0f0f0; }

    .social-login {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1.5rem 0 1.2rem;
    }

    .social-login button {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 3rem;
      padding: 0.9rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.15s;
    }
    .social-login button:hover {
      background: rgba(255,255,255,0.25);
      border-color: white;
    }

    #recaptcha-container {
      margin: 1rem 0;
    }

    #switch-auth {
      text-align: center;
      color: rgba(255,255,255,0.8);
    }
    #switch-auth a {
      color: white;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .message {
      background: rgba(0,0,0,0.5);
      border-radius: 3rem;
      padding: 0.8rem 1.5rem;
      text-align: center;
      margin: 1rem 0;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body>
<div class="glass-card">
  <a href="index.html" class="back-link">← Back to roles</a>
  <h2 id="auth-title">Master Admin Login</h2>
  <div class="sub" id="auth-description">Login to master admin dashboard</div>

  <form id="auth-form">
    <!-- First name (signup only) -->
    <div class="form-group hidden" id="firstname-group">
      <input type="text" id="firstname" placeholder="First Name">
    </div>
    <!-- Last name (signup only) -->
    <div class="form-group hidden" id="lastname-group">
      <input type="text" id="lastname" placeholder="Last Name">
    </div>

    <!-- Email -->
    <div class="form-group">
      <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <!-- Password -->
    <div class="form-group password-container">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" class="toggle-pw" data-target="password">Show</button>
    </div>

    <!-- Confirm Password (signup only) -->
    <div class="form-group password-container hidden" id="confirm-password-group">
      <input type="password" id="confirm-password" placeholder="Confirm Password">
      <button type="button" class="toggle-pw" data-target="confirm-password">Show</button>
    </div>

    <!-- Forgot password (login only) -->
    <a href="#" id="forgot-password">Forgot Password?</a>

    <button type="submit" id="auth-button">Login</button>
  </form>

  <!-- reCAPTCHA for phone auth -->
  <div id="recaptcha-container"></div>

  <!-- Social login -->
  <div class="social-login">
    <button id="google-login"><span style="font-size:1.2rem;">G</span> Sign in with Google</button>
    <button id="apple-login"><span style="font-size:1.2rem;"></span> Sign in with Apple</button>
    <button id="phone-login"><span style="font-size:1.2rem;">📱</span> Sign in with Phone</button>
  </div>

  <p id="switch-auth">Don't have an account? <a href="#" id="toggle-auth">Sign Up</a></p>
  <div id="message-area"></div>
</div>

<script type="module">
  // ==================== FIREBASE INIT ====================
  import { initializeApp } from 'firebase/app';
  import { getAuth, GoogleAuthProvider, OAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification, RecaptchaVerifier, signInWithPhoneNumber } from 'firebase/auth';
  import { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';

  const firebaseConfig = {
    apiKey: "AIzaSyA8BCzF4xcTAMYu5Rt1ROMRuZLVYh5iwRQ",
    authDomain: "edumeta-c5588.firebaseapp.com",
    projectId: "edumeta-c5588",
    storageBucket: "edumeta-c5588.firebasestorage.app",
    messagingSenderId: "332853259697",
    appId: "1:332853259697:web:92e0c07e43d1c3bf432190",
    measurementId: "G-WY24HER46Q"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const googleProvider = new GoogleAuthProvider();
  const appleProvider = new OAuthProvider('apple.com');

  // ==================== ROLE HANDLING ====================
  // URL parameter: ?role=admin (from index.html) but our Firestore role is "master-admin"
  const urlParams = new URLSearchParams(window.location.search);
  const urlRole = urlParams.get('role'); // e.g., "admin"
  
  // Map the URL role to the actual Firestore role
  let expectedRole;
  if (urlRole === 'admin') {
    expectedRole = 'master-admin';
  } else {
    // Fallback: if someone directly uses ?role=master-admin, accept that too
    expectedRole = urlRole || 'master-admin';
  }

  // Display the correct role name in the UI
  document.getElementById('auth-title').textContent = 
    expectedRole === 'master-admin' ? 'Master Admin Login' : 'Admin Login';
  document.getElementById('auth-description').textContent = 
    `Login to ${expectedRole} dashboard`;

  // ==================== STATE ====================
  let isLoginMode = true;

  // DOM elements
  const authForm = document.getElementById('auth-form');
  const authButton = document.getElementById('auth-button');
  const switchLink = document.getElementById('toggle-auth');
  const switchText = document.getElementById('switch-auth');
  const forgotLink = document.getElementById('forgot-password');
  const firstNameGroup = document.getElementById('firstname-group');
  const lastNameGroup = document.getElementById('lastname-group');
  const confirmPwGroup = document.getElementById('confirm-password-group');

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const firstNameInput = document.getElementById('firstname');
  const lastNameInput = document.getElementById('lastname');
  const confirmPwInput = document.getElementById('confirm-password');

  const messageDiv = document.getElementById('message-area');

  function showMessage(msg, isError = false) {
    messageDiv.innerHTML = `<div class="message" style="background:${isError?'rgba(220,38,38,0.3)':'rgba(34,197,94,0.3)'};">${msg}</div>`;
    setTimeout(() => messageDiv.innerHTML = '', 5000);
  }

  // Toggle password visibility
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const targetId = e.target.dataset.target;
      const pwField = document.getElementById(targetId);
      if (pwField.type === 'password') {
        pwField.type = 'text';
        e.target.textContent = 'Hide';
      } else {
        pwField.type = 'password';
        e.target.textContent = 'Show';
      }
    });
  });

  // Switch between login/signup UI
  function setAuthMode(mode) {
    isLoginMode = mode;
    if (isLoginMode) {
      authButton.textContent = 'Login';
      firstNameGroup.classList.add('hidden');
      lastNameGroup.classList.add('hidden');
      confirmPwGroup.classList.add('hidden');
      forgotLink.classList.remove('hidden');
      switchText.innerHTML = `Don't have an account? <a href="#" id="toggle-auth">Sign Up</a>`;
    } else {
      authButton.textContent = 'Sign Up';
      firstNameGroup.classList.remove('hidden');
      lastNameGroup.classList.remove('hidden');
      confirmPwGroup.classList.remove('hidden');
      forgotLink.classList.add('hidden');
      switchText.innerHTML = `Already have an account? <a href="#" id="toggle-auth">Login</a>`;
    }
    // Re-attach toggle event
    document.getElementById('toggle-auth').addEventListener('click', (e) => {
      e.preventDefault();
      setAuthMode(!isLoginMode);
    });
  }

  setAuthMode(true);

  // ==================== AUTH FUNCTIONS ====================
  async function registerUser(email, password, firstName, lastName) {
    // For master admin, we don't have extra fields, but we keep the flow.
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await sendEmailVerification(user);

    const userData = {
      uid: user.uid,
      email,
      firstName,
      lastName,
      role: expectedRole, // store as "master-admin"
      createdAt: new Date(),
      emailVerified: false
    };

    // Save to pending_users (admin must approve later)
    await setDoc(doc(db, 'pending_users', user.uid), {
      ...userData,
      status: 'pending'
    });

    showMessage('Registration submitted. Await admin approval.');
    setAuthMode(true);
  }

  async function loginUser(email, password) {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Check email verification (optional, but recommended)
    if (!user.emailVerified) {
      throw new Error('Please verify your email first.');
    }

    // Check if user is approved
    const approvedRef = doc(db, 'approved_users', user.uid);
    const approvedSnap = await getDoc(approvedRef);

    if (!approvedSnap.exists()) {
      throw new Error('Your account is not yet approved by admin.');
    }

    const userData = approvedSnap.data();
    // Compare the stored role with the expected role (master-admin)
    if (userData.role !== expectedRole) {
      throw new Error(`Wrong login role. Expected ${expectedRole}, found ${userData.role}.`);
    }

    // Redirect to the correct dashboard
    window.location.href = `/${expectedRole}-dashboard.html`; // e.g., /master-admin-dashboard.html
  }

  async function loginWithGoogle() {
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;

    const approvedRef = doc(db, 'approved_users', user.uid);
    const approvedSnap = await getDoc(approvedRef);
    if (approvedSnap.exists()) {
      const userData = approvedSnap.data();
      if (userData.role === expectedRole) {
        window.location.href = `/${expectedRole}-dashboard.html`;
        return;
      } else {
        throw new Error('Wrong login role.');
      }
    }

    // Not approved yet
    const userData = {
      uid: user.uid,
      email: user.email,
      firstName: user.displayName?.split(' ')[0] || '',
      lastName: user.displayName?.split(' ')[1] || '',
      role: expectedRole,
      status: 'pending',
      createdAt: new Date(),
      emailVerified: user.emailVerified
    };
    await setDoc(doc(db, 'pending_users', user.uid), userData, { merge: true });
    showMessage('Google account submitted for approval.');
  }

  async function loginWithApple() {
    const result = await signInWithPopup(auth, appleProvider);
    const user = result.user;

    const approvedRef = doc(db, 'approved_users', user.uid);
    const approvedSnap = await getDoc(approvedRef);
    if (approvedSnap.exists()) {
      const userData = approvedSnap.data();
      if (userData.role === expectedRole) {
        window.location.href = `/${expectedRole}-dashboard.html`;
        return;
      } else {
        throw new Error('Wrong login role.');
      }
    }

    const userData = {
      uid: user.uid,
      email: user.email,
      firstName: user.displayName?.split(' ')[0] || '',
      lastName: user.displayName?.split(' ')[1] || '',
      role: expectedRole,
      status: 'pending',
      createdAt: new Date(),
      emailVerified: user.emailVerified
    };
    await setDoc(doc(db, 'pending_users', user.uid), userData, { merge: true });
    showMessage('Apple account submitted for approval.');
  }

  async function loginWithPhone() {
    if (!window.recaptchaVerifier) {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'normal' });
    }
    const appVerifier = window.recaptchaVerifier;
    const phoneNumber = prompt('Enter phone number with country code (e.g., +1234567890)');
    if (!phoneNumber) return;

    const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, appVerifier);
    const code = prompt('Enter OTP sent to phone');
    await confirmationResult.confirm(code);
    const user = auth.currentUser;

    const approvedRef = doc(db, 'approved_users', user.uid);
    const approvedSnap = await getDoc(approvedRef);
    if (approvedSnap.exists()) {
      const userData = approvedSnap.data();
      if (userData.role === expectedRole) {
        window.location.href = `/${expectedRole}-dashboard.html`;
        return;
      } else {
        throw new Error('Wrong login role.');
      }
    }

    const userData = {
      uid: user.uid,
      phone: user.phoneNumber,
      role: expectedRole,
      status: 'pending',
      createdAt: new Date()
    };
    await setDoc(doc(db, 'pending_users', user.uid), userData);
    showMessage('Phone account submitted for approval.');
  }

  async function resetPassword(email) {
    await sendPasswordResetEmail(auth, email);
    showMessage('Password reset email sent.');
  }

  // ==================== EVENT LISTENERS ====================
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    try {
      if (isLoginMode) {
        await loginUser(email, password);
      } else {
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        if (!firstName || !lastName) throw new Error('First and last name required');
        if (password !== confirmPwInput.value) throw new Error('Passwords do not match');
        await registerUser(email, password, firstName, lastName);
      }
    } catch (error) {
      showMessage(error.message, true);
    }
  });

  forgotLink.addEventListener('click', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return showMessage('Enter your email first.', true);
    try {
      await resetPassword(email);
    } catch (error) {
      showMessage(error.message, true);
    }
  });

  document.getElementById('google-login').addEventListener('click', async () => {
    try { await loginWithGoogle(); } catch (error) { showMessage(error.message, true); }
  });

  document.getElementById('apple-login').addEventListener('click', async () => {
    try { await loginWithApple(); } catch (error) { showMessage(error.message, true); }
  });

  document.getElementById('phone-login').addEventListener('click', async () => {
    try { await loginWithPhone(); } catch (error) { showMessage(error.message, true); }
  });
</script>
</body>
</html>

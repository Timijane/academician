<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA | Portal Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --transition: all 0.3s ease; }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --input-bg: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
        }
        [data-theme="light"] {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --input-bg: rgba(0, 0, 0, 0.05);
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: var(--transition);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            z-index: 100;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.8rem; margin-bottom: 0.5rem; text-align: center; }
        .sub-text { opacity: 0.7; font-size: 0.9rem; margin-bottom: 2rem; text-align: center; }

        form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        .input-group { margin-bottom: 5px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; opacity: 0.8; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            outline: none;
            font-size: 0.9rem;
        }

        .password-wrapper { position: relative; }
        .password-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
        }

        .btn-primary {
            grid-column: span 2;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition);
        }

        .auth-switch { grid-column: span 2; text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .auth-switch span { color: var(--accent); cursor: pointer; font-weight: bold; }

        /* Hidden fields by default */
        .role-specific { display: none; }
        
        @media (max-width: 500px) {
            form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .btn-primary { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="glass-card">
        <h2 id="portalTitle">Portal Access</h2>
        <p class="sub-text" id="portalDesc">Sign in to continue to your dashboard</p>

        <form id="dynamicForm">
            <div class="input-group signup-only role-specific">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="John">
            </div>
            <div class="input-group signup-only role-specific">
                <label>Surname</label>
                <input type="text" id="lastName" placeholder="Doe">
            </div>

            <div class="input-group full-width">
                <label>Gmail Address</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>

            <div class="input-group teacher-only role-specific full-width">
                <label>Qualifications</label>
                <input type="text" id="qualifications" placeholder="B.Ed, M.Sc, etc.">
            </div>
            <div class="input-group teacher-only role-specific">
                <label>Primary Education</label>
                <input type="text" id="schPrimary" placeholder="School Name">
            </div>
            <div class="input-group teacher-only role-specific">
                <label>Junior Secondary</label>
                <input type="text" id="schJunior" placeholder="School Name">
            </div>
            <div class="input-group teacher-only role-specific">
                <label>Senior Secondary</label>
                <input type="text" id="schSenior" placeholder="School Name">
            </div>
            <div class="input-group teacher-only role-specific">
                <label>Higher Institution</label>
                <input type="text" id="schHigher" placeholder="University Name">
            </div>

            <div class="input-group contact-field role-specific full-width">
                <label>Phone Number</label>
                <input type="tel" id="phone" value="+234 " placeholder="+234 812 345 6789">
            </div>

            <div class="input-group class-field role-specific full-width">
                <label>Assigned Class</label>
                <select id="assignedClass">
                    <option value="">Select Class</option>
                    <option value="creche">Creche</option>
                    <option value="nursery1">Nursery 1</option>
                    <option value="nursery2">Nursery 2</option>
                    <option value="kg1">KG 1</option>
                    <option value="kg2">KG 2</option>
                    <option value="basic1">Basic 1</option>
                    <option value="basic2">Basic 2</option>
                    <option value="basic3">Basic 3</option>
                    <option value="basic4">Basic 4</option>
                    <option value="basic5">Basic 5</option>
                    <option value="basic6">Basic 6</option>
                    <option value="jss1">JSS 1</option>
                    <option value="jss2">JSS 2</option>
                    <option value="jss3">JSS 3</option>
                    <option value="sss1">SSS 1</option>
                    <option value="sss2">SSS 2</option>
                    <option value="sss3">SSS 3</option>
                </select>
            </div>

            <div class="input-group password-wrapper full-width">
                <label>Password</label>
                <input type="password" id="pass1" required placeholder="••••••••">
                <i class="fas fa-eye-slash" onclick="togglePass('pass1', this)"></i>
            </div>
            <div class="input-group password-wrapper signup-only role-specific full-width">
                <label>Confirm Password</label>
                <input type="password" id="pass2" placeholder="••••••••">
                <i class="fas fa-eye-slash" onclick="togglePass('pass2', this)"></i>
            </div>

            <button type="submit" class="btn-primary" id="mainBtn">Sign In</button>
        </form>

        <div class="auth-switch">
            <p id="toggleText">New here? <span onclick="toggleAuthMode()">Create Account</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8BCzF4xcTAMYu5Rt1ROMRuZLVYh5iwRQ",
            authDomain: "edumeta-c5588.firebaseapp.com",
            projectId: "edumeta-c5588",
            storageBucket: "edumeta-c5588.firebasestorage.app",
            messagingSenderId: "332853259697",
            appId: "1:332853259697:web:92e0c07e43d1c3bf432190"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Detect Role from URL (e.g., auth.html?role=teacher)
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'student';
        let isLogin = true;

        // Initialize Page UI based on role
        document.getElementById('portalTitle').innerText = `${role.toUpperCase()} Portal`;
        
        window.toggleAuthMode = () => {
            isLogin = !isLogin;
            updateUI();
        };

        function updateUI() {
            document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('toggleText').innerHTML = isLogin ? 
                `New here? <span onclick="toggleAuthMode()">Create Account</span>` : 
                `Already have an account? <span onclick="toggleAuthMode()">Login</span>`;
            
            // Show/Hide fields
            document.querySelectorAll('.signup-only').forEach(el => el.style.display = isLogin ? 'none' : 'block');
            
            if (!isLogin) {
                if (role === 'teacher') {
                    document.querySelectorAll('.teacher-only, .contact-field, .class-field').forEach(el => el.style.display = 'block');
                } else if (role === 'student') {
                    document.querySelectorAll('.class-field, .contact-field').forEach(el => el.style.display = 'block');
                } else if (role === 'staff' || role === 'co-admin') {
                    document.querySelectorAll('.contact-field').forEach(el => el.style.display = 'block');
                }
            } else {
                document.querySelectorAll('.role-specific').forEach(el => el.style.display = 'none');
            }
        }

        updateUI();

        // Handle Form Submission
        document.getElementById('dynamicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass1').value;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                    alert("Logged in! Checking approval status...");
                    // Redirect logic here
                } else {
                    const p2 = document.getElementById('pass2').value;
                    if(pass !== p2) throw new Error("Passwords do not match");

                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(userCred.user);
                    
                    // Save detailed data to Firestore
                    await setDoc(doc(db, "users", userCred.user.uid), {
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: email,
                        role: role,
                        phone: document.getElementById('phone').value,
                        status: "pending", // STOPS LOGIN UNTIL ADMIN APPROVES
                        createdAt: new Date()
                    });

                    alert("Registration successful! Please verify your email and wait for Admin approval.");
                }
            } catch (err) {
                alert(err.message);
            }
        });

        window.togglePass = (id, icon) => {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye-slash';
            }
        };

        window.toggleTheme = () => {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.getElementById('themeIcon').className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · School Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same global styles as admin version but simpler */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] { --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        :root[data-theme="dark"] { --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05); --card-bg: rgba(15,23,42,0.6); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .event-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.2rem; box-shadow: var(--shadow); transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .event-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .event-date { color: var(--accent); font-size: 0.85rem; margin-bottom: 0.5rem; }
        .event-desc { color: var(--text-secondary); font-size: 0.9rem; white-space: pre-wrap; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border); padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; color: var(--text-primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        @media (max-width: 768px) { .events-grid { grid-template-columns: 1fr; } body { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div><h1>School Calendar</h1><div class="subtitle">Upcoming events and activities</div></div>
            <div style="display: flex; gap: 1rem;">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <a href="dashboard.html" class="btn-outline"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>
        <div id="eventsContainer" class="events-grid">Loading events...</div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0", authDomain: "triangle-6e6b7.firebaseapp.com", projectId: "triangle-6e6b7", storageBucket: "triangle-6e6b7.firebasestorage.app", messagingSenderId: "673937760480", appId: "1:673937760480:web:f03c06e1207232213ef085" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutop-theme', next);
            themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark';
        });
        async function loadEvents() {
            const snap = await db.collection('calendarEvents').orderBy('date', 'asc').get();
            const container = document.getElementById('eventsContainer');
            if (snap.empty) { container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-alt"></i><h3>No events scheduled</h3><p>Check back later for updates.</p></div>'; return; }
            let html = '';
            snap.forEach(doc => {
                const ev = doc.data();
                const displayDate = new Date(ev.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                html += `<div class="event-card"><div class="event-title">${escapeHtml(ev.title)}</div><div class="event-date"><i class="fas fa-calendar-day"></i> ${displayDate}</div>${ev.sessionTerm ? `<div class="event-date"><i class="fas fa-clock"></i> ${escapeHtml(ev.sessionTerm)}</div>` : ''}<div class="event-desc">${escapeHtml(ev.description) || 'No description'}</div></div>`;
            });
            container.innerHTML = html;
        }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        loadEvents();
    </script>
</body>
</html>

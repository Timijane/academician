<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edutopscholars · Co‑admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 41, 59, 0.8);
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 3rem 2.5rem; width: min(480px, 100%);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h2 { font-size: 2.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .sub { color: var(--text-secondary); margin-bottom: 2.5rem; }

        .input-group {
            margin-bottom: 1.75rem; position: relative;
        }
        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 0.2rem 1rem;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .input-wrapper i {
            color: var(--text-secondary); font-size: 1.2rem; width: 2rem;
        }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 1rem 0; font-size: 1rem;
            color: var(--text-primary); outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-secondary); opacity: 0.6;
        }
        .toggle-password {
            cursor: pointer; color: var(--text-secondary);
            font-size: 1.2rem; padding: 0 0.5rem;
        }
        .toggle-password:hover { color: var(--accent); }

        .btn-primary {
            width: 100%; background: var(--accent); border: none;
            border-radius: 3rem; padding: 1.2rem;
            font-size: 1.2rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .btn-primary:hover {
            filter: brightness(1.1); transform: scale(1.02);
        }

        .message {
            font-size: 0.9rem; margin-top: 0.5rem; display: none;
        }
        .error-message { color: var(--error); }

        .footer-note {
            margin-top: 2rem; text-align: center; color: var(--text-secondary);
        }
        .footer-note a {
            color: var(--accent); text-decoration: none; font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="glass-card">
        <h2>Co‑admin Login</h2>
        <div class="sub">Access delegated admin tasks</div>
        <form id="coadminLoginForm">
            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="coadmin@edutopscholars.org" required>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                </div>
            </div>
            <div class="message error-message" id="loginError"></div>
            <button type="submit" class="btn-primary">Sign in</button>
        </form>
        <div class="footer-note">
            Only approved co‑admins can log in.<br>
            <a href="index.html">← Back to portal</a>
        </div>
    </div>

    <script>
        // Theme toggle
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                updateIcon('dark');
            }
        })();

        // Password toggle
        window.togglePassword = function(fieldId, eyeIcon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        };

        // Form validation
        document.getElementById('coadminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            if (!email || !password) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';
            // Demo: In production, authenticate with Firebase and check role 'co-admin'
            alert('Login successful (demo). Redirecting to co‑admin dashboard...');
            window.location.href = 'coadmin-dashboard.html';
        });
    </script>
</body>
</html>

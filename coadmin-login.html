<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Co‑Admin</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* === SAME STYLES AS PREVIOUS PAGES === */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 41, 59, 0.8);
            --error: #ef4444;
            --success: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 2.5rem 2rem; width: min(520px, 100%);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: rgba(0,0,0,0.2); border-radius: 3rem; padding: 0.3rem;
        }
        .tab {
            flex: 1; text-align: center; padding: 0.8rem 0;
            border-radius: 3rem; font-weight: 600; cursor: pointer;
            transition: 0.2s; color: var(--text-secondary);
        }
        .tab.active {
            background: var(--accent); color: white;
        }

        h2 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; }

        .input-group {
            margin-bottom: 1.5rem; position: relative;
        }
        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 0.2rem 1rem;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .input-wrapper i {
            color: var(--text-secondary); font-size: 1.2rem; width: 2rem;
        }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 1rem 0; font-size: 1rem;
            color: var(--text-primary); outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-secondary); opacity: 0.6;
        }
        .toggle-password {
            cursor: pointer; color: var(--text-secondary);
            font-size: 1.2rem; padding: 0 0.5rem;
        }
        .toggle-password:hover { color: var(--accent); }

        .btn-primary {
            width: 100%; background: var(--accent); border: none;
            border-radius: 3rem; padding: 1.2rem;
            font-size: 1.2rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .btn-primary:hover {
            filter: brightness(1.1); transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        .message {
            font-size: 0.9rem; margin-top: 0.5rem; display: none;
        }
        .error-message { color: var(--error); }
        .success-message { color: var(--success); }
        .info-message { color: var(--accent); }

        .footer-note {
            margin-top: 1.5rem; text-align: center; font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .resend-link {
            color: var(--accent); cursor: pointer; text-decoration: underline;
        }
        .invite-message {
            text-align: center; padding: 2rem; color: var(--text-secondary);
        }
        .invite-message i {
            font-size: 3rem; margin-bottom: 1rem; color: var(--accent);
        }

        .hidden { display: none; }
        .divider { text-align: center; margin: 1rem 0; color: var(--text-secondary); }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="glass-card">
        <!-- Tab switcher -->
        <div class="tabs">
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="signupTab">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <div class="sub">Co‑admin login</div>
            <form id="coadminLoginForm">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="coadmin@edutopscholars.org" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="loginError"></div>
                <div class="message info-message" id="loginInfo"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
            </form>
        </div>

        <!-- Signup Form (hidden, with invite message) -->
        <div id="signupForm" class="hidden">
            <div class="invite-message">
                <i class="fas fa-user-shield"></i>
                <h3>Co‑admins are appointed by invitation</h3>
                <p>If you have been designated as a co‑admin, the master admin will create your account. Please check your email for login credentials or contact the school administrator.</p>
            </div>
        </div>

        <div class="footer-note">
            Secure access · role‑based authentication
        </div>
    </div>

    <script>
        // ==================== FIREBASE INIT ====================
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== THEME TOGGLE ====================
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                updateIcon('dark');
            }
        })();

        // ==================== TAB SWITCHING ====================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginDiv = document.getElementById('loginForm');
        const signupDiv = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginDiv.classList.remove('hidden');
            signupDiv.classList.add('hidden');
            clearMessages();
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupDiv.classList.remove('hidden');
            loginDiv.classList.add('hidden');
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginInfo').style.display = 'none';
        }

        // ==================== PASSWORD TOGGLE ====================
        window.togglePassword = function(fieldId, eyeIcon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        };

        // ==================== LOGIN HANDLER ====================
        document.getElementById('coadminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const infoDiv = document.getElementById('loginInfo');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check email verification
                if (!user.emailVerified) {
                    infoDiv.innerHTML = `Email not verified. <span class="resend-link" id="resendVerification">Resend verification email</span>`;
                    infoDiv.style.display = 'block';
                    document.getElementById('resendVerification').addEventListener('click', async () => {
                        await user.sendEmailVerification();
                        infoDiv.textContent = 'Verification email sent. Please check your inbox.';
                    });
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                // Fetch user document
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await auth.signOut();
                    errorDiv.textContent = 'User record not found. Please contact admin.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                const userData = userDoc.data();

                // Check if user has coAdmin role or is admin with coAdmin permissions
                // We'll check role === 'coAdmin' OR (role === 'admin' && userData.permissions?.coAdmin)
                // For simplicity, we accept role === 'coAdmin' or role === 'admin' (since co‑admin is a type of admin)
                // But per your spec, co‑admin is separate. We'll use role === 'coAdmin' for dedicated co‑admins.
                // However, a user who is both teacher and co‑admin might have role 'teacher' and a coAdmin flag.
                // To handle that, we can check for a field isCoAdmin === true.
                // We'll implement a flexible check: if role is 'coAdmin' OR (role is 'teacher' and isCoAdmin === true) OR (role is 'admin' and permissions include coAdmin duties).
                // Let's keep it simple: we'll check for role === 'coAdmin' OR userData.isCoAdmin === true.
                // If neither, deny.

                const isCoAdmin = (userData.role === 'coAdmin') || (userData.isCoAdmin === true);

                if (!isCoAdmin) {
                    await auth.signOut();
                    errorDiv.textContent = 'Access denied. You are not registered as a co‑admin.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                // Check approval (co‑admins should be approved)
                if (userData.approved === false) {
                    await auth.signOut();
                    errorDiv.textContent = 'Your account is pending approval. You cannot log in yet.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                // Redirect to co‑admin dashboard
                window.location.href = 'coadmin-dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>

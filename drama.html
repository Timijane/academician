<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Drama TV</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid red;
        }

        header h1 {
            margin: 0;
            color: red;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #222;
        }

        nav a {
            color: #fff;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: red;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: url('https://via.placeholder.com/1200x500') no-repeat center/cover;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
        }

        .videos {
            padding: 20px;
        }

        .videos h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .video-card {
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
        }

        .video-card iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #000;
            margin-top: 20px;
            border-top: 2px solid red;
        }
    </style>
</head>

<body>

<header>
    <h1>Mr Drama TV</h1>
    <p>Your Home of Entertainment</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Videos</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to Mr Drama TV</h2>
    <p>Watch the latest drama, skits, and entertainment videos</p>
</section>

<section class="videos">
    <h2>Latest Videos</h2>

    <div class="video-grid">

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
            <p>Drama Episode 1</p>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
            <p>Comedy Skit</p>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
            <p>Latest Upload</p>
        </div>

    </div>
</section>

<footer>
    <p>&copy; 2026 Mr Drama TV | All Rights Reserved</p>
</footer>

</body>
</html>

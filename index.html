<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTop • kinetic access</title>
  <!-- Bootstrap 5 minimal grid & utilities -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 (sharp icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- expressive fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      transition: background-image 0.7s cubic-bezier(0.23, 1, 0.32, 1), background-color 0.5s;
      background-size: cover;
      background-position: center 20%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }

    /* ===== LIGHT MODE – radiant morning campus ===== */
    body.light-mode {
      background: linear-gradient(125deg, rgba(255, 248, 235, 0.4) 0%, rgba(210, 235, 255, 0.5) 80%),
                  url('https://images.unsplash.com/photo-1509062522246-3755977927d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: soft-light;
    }

    /* ===== DARK MODE – deep indigo night library ===== */
    body.dark-mode {
      background: linear-gradient(135deg, rgba(10, 20, 40, 0.75) 0%, rgba(0, 5, 15, 0.85) 100%),
                  url('https://images.unsplash.com/photo-1526367790995-84ba933f4b1f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: overlay;
    }

    /* floating nano‑orbs (kinetic depth) */
    .orb {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(130, 200, 255, 0.2) 0%, transparent 70%);
      filter: blur(70px);
      z-index: 0;
      animation: orbFloat 18s infinite alternate ease-in-out;
    }
    .orb-1 { top: -150px; left: -150px; background: radial-gradient(circle, rgba(180, 140, 255, 0.25), transparent 75%); }
    .orb-2 { bottom: -180px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle at 70% 30%, rgba(255, 200, 130, 0.2), transparent); animation-duration: 24s; }
    .orb-3 { top: 40%; left: 60%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(70, 200, 220, 0.15), transparent 80%); animation: orbFloat 22s reverse; }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      100% { transform: translate(70px, -40px) scale(1.2); opacity: 0.9; }
    }

    /* theme toggle — liquid glass */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 999;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 80px;
      padding: 14px 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
      transition: 0.4s;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.05) inset;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.06) translateY(-5px);
      box-shadow: 0 35px 55px rgba(0,0,0,0.5);
    }
    .theme-toggle i { font-size: 1.5rem; filter: drop-shadow(0 2px 4px black); }

    /* main header – kinetic typography */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 4.5rem;
      background: linear-gradient(145deg, #fffde7, #d6edff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(0,0,0,0.6);
      letter-spacing: -1.5px;
      margin-bottom: 0.25rem;
      animation: textGlitch 5s infinite alternate;
    }
    @keyframes textGlitch {
      0% { transform: skew(0deg); text-shadow: 0 0 20px cyan; }
      95% { transform: skew(0deg); }
      100% { transform: skew(0.3deg, 0.6deg); text-shadow: -3px 0 magenta, 3px 0 cyan; }
    }

    .subhead {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 4px 20px black;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(14px);
      display: inline-block;
      padding: 0.6rem 2.5rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.3);
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }

    /* ===== CARDS – liquid glass + animated borders ===== */
    .card {
      border: none;
      border-radius: 42px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px) saturate(200%);
      -webkit-backdrop-filter: blur(18px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 35px 70px rgba(0,0,0,0.45);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      height: 100%;
      padding: 2.5rem 1.8rem;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    body.dark-mode .card {
      background: rgba(0, 12, 28, 0.45);
      border-color: rgba(255,255,255,0.1);
    }

    /* shimmer line */
    .card::after {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 44px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }
    .card:hover::after {
      opacity: 1;
      animation: shine 1.5s;
    }
    @keyframes shine {
      0% { transform: translateX(-100%); }
      40% { transform: translateX(100%); }
      100% { transform: translateX(200%); }
    }

    .card:hover {
      transform: translateY(-18px) scale(1.02);
      box-shadow: 0 60px 100px rgba(0,0,0,0.7);
      background: rgba(255,255,255,0.2);
    }

    .card-title {
      font-weight: 700;
      font-size: 2.4rem;
      margin-bottom: 2.2rem;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(130deg, #ffffff, #ffeacb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 6px 14px rgba(0,0,0,0.5);
    }

    /* main action buttons – iridescent */
    .btn-role {
      background: linear-gradient(135deg, #3f6ed8, #253e7a);
      border: none;
      color: white;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 60px;
      width: 100%;
      margin-bottom: 16px;
      font-size: 1.3rem;
      box-shadow: 0 18px 30px -5px #001b4b, 0 0 0 1px rgba(255,255,255,0.3) inset;
      transition: all 0.3s;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }
    .btn-role:hover {
      background: linear-gradient(135deg, #5388f0, #2f4b9c);
      transform: scale(1.04) translateY(-5px);
      box-shadow: 0 28px 45px -8px #000f33, 0 0 0 2px rgba(255,255,255,0.5) inset;
    }

    /* unified link style (signup) */
    .small-link {
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1.5px dashed rgba(255,255,255,0.5);
      text-shadow: 0 2px 6px black;
      transition: 0.2s;
      font-size: 1.15rem;
      padding: 0 2px;
    }
    .small-link:hover {
      border-bottom-color: white;
      color: #fff9e0;
      text-shadow: 0 0 10px cyan;
    }

    /* parent special – subtle */
    .parent-note {
      font-size: 1.05rem;
      opacity: 0.9;
      border-bottom: none !important;
      cursor: default;
    }

    footer {
      margin-top: 4rem;
      color: white;
      font-weight: 500;
      text-shadow: 0 2px 8px black;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
    }

    /* container z-elevation */
    .container { position: relative; z-index: 20; }

    /* responsive touch */
    @media (max-width: 768px) {
      h1 { font-size: 3.2rem; }
      .card { padding: 2rem 1rem; }
    }
  </style>
</head>
<body class="light-mode">
  <!-- kinetic orbs (3 for depth) -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- theme toggle with micro-icon animation -->
  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun" id="toggleIconSun"></i>
    <span id="themeLabel">Light</span>
    <i class="fas fa-moon" id="toggleIconMoon"></i>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-5">
        <h1>EduTop Scholars</h1>
        <div class="subhead">✦  enterprise · fluid access  ✦</div>
      </div>
    </div>

    <!-- role cards – all signup links now point to login pages (unified) -->
    <div class="row g-4">
      <!-- Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-crown me-2" style="font-size: 2rem; vertical-align: middle;"></i> Admin</div>
          <a href="admin-login.html" class="btn btn-role"><i class="fas fa-lock me-2"></i>Login</a>
          <!-- signup now goes to same login page (admin-login.html) -->
          <small><a href="admin-login.html" class="small-link"><i class="fas fa-pen me-1"></i>Sign up</a></small>
        </div>
      </div>

      <!-- Co‑Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-users-cog me-2"></i>Co‑Admin</div>
          <a href="coadmin-login.html" class="btn btn-role"><i class="fas fa-shield-alt me-2"></i>Login</a>
          <small><a href="coadmin-login.html" class="small-link"><i class="fas fa-pen me-1"></i>Sign up</a></small>
        </div>
      </div>

      <!-- Teacher -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-chalkboard-user me-2"></i>Teacher</div>
          <a href="teacher-login.html" class="btn btn-role"><i class="fas fa-chalkboard me-2"></i>Login</a>
          <small><a href="teacher-login.html" class="small-link"><i class="fas fa-pen me-1"></i>Sign up</a></small>
        </div>
      </div>

      <!-- Student -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-graduation-cap me-2"></i>Student</div>
          <a href="student-login.html" class="btn btn-role"><i class="fas fa-user-graduate me-2"></i>Login</a>
          <small><a href="student-login.html" class="small-link"><i class="fas fa-pen me-1"></i>Sign up</a></small>
        </div>
      </div>

      <!-- Non‑Teaching Staff -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-briefcase me-2"></i>Staff</div>
          <a href="nonteaching-login.html" class="btn btn-role"><i class="fas fa-clipboard-list me-2"></i>Login</a>
          <small><a href="nonteaching-login.html" class="small-link"><i class="fas fa-pen me-1"></i>Sign up</a></small>
        </div>
      </div>

      <!-- Parent (unique: parent-access.html) -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title"><i class="fas fa-family me-2"></i>Parent</div>
          <a href="parent-access.html" class="btn btn-role"><i class="fas fa-child me-2"></i>Access</a>
          <!-- no signup — direct access note -->
          <small><span class="small-link parent-note"><i class="far fa-eye me-1"></i>no account needed</span></small>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2025 EduTop · where access is art</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Firebase (present but not used for UI — kept for structure) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    const firebaseConfig = {
      apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
      authDomain: "triangle-6e6b7.firebaseapp.com",
      projectId: "triangle-6e6b7",
      storageBucket: "triangle-6e6b7.firebasestorage.app",
      messagingSenderId: "673937760480",
      appId: "1:673937760480:web:f03c06e1207232213ef085",
      measurementId: "G-ELBMT8WHQ9"
    };
    initializeApp(firebaseConfig);

    // --- artistic theme switcher + dual background images ---
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const themeLabel = document.getElementById('themeLabel');
    const sunIcon = document.getElementById('toggleIconSun');
    const moonIcon = document.getElementById('toggleIconMoon');

    // saved theme / default light
    const savedTheme = localStorage.getItem('theme') || 'light';
    body.classList.add(savedTheme === 'dark' ? 'dark-mode' : 'light-mode');
    updateToggleUI(savedTheme);

    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('light-mode')) {
        body.classList.replace('light-mode', 'dark-mode');
        localStorage.setItem('theme', 'dark');
        updateToggleUI('dark');
      } else {
        body.classList.replace('dark-mode', 'light-mode');
        localStorage.setItem('theme', 'light');
        updateToggleUI('light');
      }
    });

    function updateToggleUI(mode) {
      themeLabel.textContent = mode === 'dark' ? 'Dark' : 'Light';
      // subtle icon emphasis (just for delight)
      if (mode === 'dark') {
        sunIcon.style.opacity = '0.5';
        moonIcon.style.opacity = '1';
      } else {
        sunIcon.style.opacity = '1';
        moonIcon.style.opacity = '0.5';
      }
    }

    // tiny extra kinetic: add a data attribute to body for background differentiation
    // (already handled by CSS classes)
  </script>
  <!-- inline spark: make icons interact -->
  <style>
    /* micro joy: theme icons opacity transition */
    #toggleIconSun, #toggleIconMoon { transition: opacity 0.3s, transform 0.2s; }
    .theme-toggle:hover #toggleIconSun { transform: rotate(20deg); }
    .theme-toggle:hover #toggleIconMoon { transform: rotate(-10deg); }
    /* card title icons */
    .card-title i { filter: drop-shadow(0 4px 6px black); }
  </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA · Enterprise Academic Management</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Theme variables */
        :root[data-theme="light"] {
            --bg-gradient-start: #f0f4fa;
            --bg-gradient-end: #d9e2ef;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.2);
            --card-bg: rgba(255, 255, 255, 0.4);
            --icon-color: #2563eb;
        }

        :root[data-theme="dark"] {
            --bg-gradient-start: #0b1120;
            --bg-gradient-end: #1a2639;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
            --card-bg: rgba(255, 255, 255, 0.03);
            --icon-color: #38bdf8;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.3s ease;
            position: relative;
        }

        /* Animated background overlay (subtle moving pattern) */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path d="M10 50 Q 30 30 50 50 T 90 50" stroke="white" fill="none" stroke-width="1"/><circle cx="20" cy="30" r="2" fill="white"/><circle cx="80" cy="70" r="2" fill="white"/></svg>') repeat;
            pointer-events: none;
        }

        .theme-toggle {
            position: fixed;
            top: 1.8rem;
            right: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 0.8rem 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--text-primary);
            font-weight: 500;
            z-index: 100;
            transition: all 0.2s;
        }
        .theme-toggle i {
            font-size: 1.2rem;
            color: var(--accent);
        }
        .theme-toggle:hover {
            transform: scale(1.02);
            background: var(--card-bg);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 1100px;
            box-shadow: var(--shadow);
            color: var(--text-primary);
            transition: background 0.3s, border 0.3s;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(to right, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .subhead {
            font-size: 1.2rem;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0 1rem;
        }

        .role-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2rem 1rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.2);
        }

        .role-card i {
            font-size: 2.8rem;
            color: var(--icon-color);
            transition: transform 0.2s;
        }

        .role-card span {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .role-card small {
            font-size: 0.85rem;
            opacity: 0.7;
            color: var(--text-secondary);
        }

        .role-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: var(--accent);
            border-color: transparent;
            box-shadow: 0 25px 30px -10px var(--accent);
        }

        .role-card:hover i,
        .role-card:hover span,
        .role-card:hover small {
            color: white;
        }

        .footer-note {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--glass-border);
            padding-top: 1.8rem;
        }
        .footer-note a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .glass-card { padding: 2.5rem 1.5rem; border-radius: 2rem; }
            .theme-toggle { top: 1rem; right: 1rem; padding: 0.6rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
        <span>Theme</span>
    </div>

    <main class="glass-card">
        <h1>EDUMETA</h1>
        <div class="subhead">Integrated command centre for modern education</div>

        <div class="role-grid">
            <!-- Super Admin (hardcoded Gmail only) -->
            <a href="master-admin-auth.html" class="role-card">
                <i class="fas fa-user-shield"></i>
                <span>Super Admin</span>
                <small>Full system control</small>
            </a>
            <!-- Gate Attendance (separate kiosk) -->
            <a href="gate-attendance.html" class="role-card">
                <i class="fas fa-camera-retro"></i>
                <span>Gate Attendance</span>
                <small>Staff check‑in</small>
            </a>
            <!-- Teacher / Staff Portal -->
            <a href="teacher-auth.html" class="role-card">
                <i class="fas fa-chalkboard-user"></i>
                <span>Staff Portal</span>
                <small>Teachers & non‑teaching</small>
            </a>
            <!-- Student Hub -->
            <a href="student-auth.html" class="role-card">
                <i class="fas fa-user-graduate"></i>
                <span>Student Hub</span>
                <small>Learning & results</small>
            </a>
            <!-- Parent View (no login, access via token) -->
            <a href="parent-access.html" class="role-card">
                <i class="fas fa-people-arrows"></i>
                <span>Parent Access</span>
                <small>Child's progress</small>
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-shield-alt" style="margin-right: 0.4rem;"></i> 
            Secure enterprise system · Role‑based approval · <a href="#">About EDUMETA</a>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            // Update icon
            const icon = document.querySelector('.theme-toggle i');
            icon.className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Optional: system preference match
        (function() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const html = document.documentElement;
            if (!html.getAttribute('data-theme')) {
                html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
            const icon = document.querySelector('.theme-toggle i');
            icon.className = html.getAttribute('data-theme') === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDUMETA · Select Role</title>
  <style>
    body {
      margin: 0; font-family: 'Inter', sans-serif;
      background: #0f172a; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
    }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 650px; width: 90%; }
    .role-card {
      background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 1.5rem;
      text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s; text-decoration: none; color: white;
    }
    .role-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); border-color: white; }
    .admin-card { grid-column: span 2; background: linear-gradient(135deg, #1e293b, #334155); }
    h1 { margin-bottom: 2.5rem; font-weight: 700; letter-spacing: -1px; font-size: 2.5rem; }
    p { opacity: 0.6; margin-top: 0.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Welcome to EDUMETA</h1>
  <div class="grid">
    <a href="master-admin-login.html" class="role-card admin-card">
      <h2>Master Admin</h2>
      <p>System control & approvals</p>
    </a>
    <a href="teacher-login.html" class="role-card">
      <h2>Teacher</h2>
      <p>Classroom & Lesson Notes</p>
    </a>
    <a href="staff-login.html" class="role-card">
      <h2>Staff</h2>
      <p>Non-teaching & Operations</p>
    </a>
    <a href="student-login.html" class="role-card">
      <h2>Student</h2>
      <p>Learning & Assignments</p>
    </a>
  </div>
</body>
</html>

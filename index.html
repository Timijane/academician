<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edutopscholars · Enterprise Academic Hub</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light & Dark theme variables */
        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80'); /* bright academic */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --accent-glow: #3b82f6;
            --border: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.3);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80'); /* evening campus */
            --glass-bg: rgba(15, 23, 42, 0.85);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-glow: #7dd3fc;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(30, 41, 59, 0.5);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            transition: background 0.3s, color 0.2s;
            padding: 1rem;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--accent);
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 1000;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        /* Main glass container */
        .portal {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 3.5rem 2.5rem;
            width: min(1200px, 100%);
            box-shadow: var(--shadow);
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Role grid */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .role-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2rem 1rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.2);
        }

        .role-card i {
            font-size: 3rem;
            color: var(--accent);
            transition: 0.2s;
        }

        .role-card span {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .role-card:hover {
            background: var(--accent);
            border-color: transparent;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 30px -10px var(--accent-glow);
        }

        .role-card:hover i,
        .role-card:hover span {
            color: white;
        }

        .footer-note {
            margin-top: 3rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 1.8rem;
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .portal { padding: 2rem 1.5rem; }
            h1 { font-size: 2.8rem; }
            .role-grid { gap: 1rem; }
            .role-card { padding: 1.5rem 0.5rem; }
            .role-card i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="portal">
        <h1>Edutopscholars</h1>
        <div class="tagline">where knowledge meets innovation</div>

        <div class="role-grid">
            <!-- Admin (Master) -->
            <a href="admin-login.html" class="role-card">
                <i class="fas fa-user-shield"></i>
                <span>Admin</span>
            </a>
            <!-- Co‑admin -->
            <a href="coadmin-login.html" class="role-card">
                <i class="fas fa-users-cog"></i>
                <span>Co‑admin</span>
            </a>
            <!-- Teacher -->
            <a href="teacher-login.html" class="role-card">
                <i class="fas fa-chalkboard-user"></i>
                <span>Teacher</span>
            </a>
            <!-- Student -->
            <a href="student-login.html" class="role-card">
                <i class="fas fa-user-graduate"></i>
                <span>Student</span>
            </a>
            <!-- Non‑teaching staff -->
            <a href="nonteaching-login.html" class="role-card">
                <i class="fas fa-briefcase"></i>
                <span>Non‑teaching</span>
            </a>
            <!-- Parent (guest access) -->
            <a href="parent-access.html" class="role-card">
                <i class="fas fa-family"></i>
                <span>Parent</span>
            </a>
        </div>

        <div class="footer-note">
            ⚡ Institution‑grade security · role‑based workflows · real‑time analytics
        </div>
    </div>

    <script>
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');

            // Set initial icon based on theme
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }

            // Toggle theme
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });

            // Load saved theme
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                // default dark
                updateIcon('dark');
            }
        })();
    </script>
</body>
</html>

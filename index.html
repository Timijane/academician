<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA · Secure Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dark Theme Variables */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --overlay: rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --accent: #38bdf8;
            --btn-hover: rgba(255, 255, 255, 0.2);
        }

        /* Light Theme Variables */
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --overlay: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #2563eb;
            --btn-hover: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80') no-repeat center center/cover;
            transition: var(--transition);
            overflow: hidden;
        }

        .overlay-layer {
            position: absolute;
            inset: 0;
            background: var(--overlay);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 10;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
        }

        .glass-card {
            position: relative;
            z-index: 2;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 3.5rem 2.5rem;
            width: 90%;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
        }

        .role-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.2rem 1.5rem;
            border-radius: 1.2rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .role-btn i {
            font-size: 1.4rem;
            color: var(--accent);
            width: 30px;
        }

        .role-btn:hover {
            background: var(--accent);
            color: #ffffff;
            transform: translateY(-5px);
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .role-btn:hover i {
            color: #ffffff;
        }

        @media (max-width: 600px) {
            .glass-card { padding: 2rem 1.5rem; }
            header h1 { font-size: 2.5rem; }
            .role-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="overlay-layer"></div>

    <button class="theme-toggle" id="themeSwitcher" title="Toggle Day/Night Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="glass-card">
        <header>
            <h1>EDUMETA</h1>
            <p>Academic Tech-Based School Management</p>
        </header>

        <nav class="role-grid">
            <a href="admin-auth.html" class="role-btn">
                <i class="fas fa-crown"></i>
                <span>Master Admin</span>
            </a>

            <a href="coadmin-auth.html" class="role-btn">
                <i class="fas fa-user-shield"></i>
                <span>Co‑Admin</span>
            </a>

            <a href="teacher-auth.html" class="role-btn">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Teacher Portal</span>
            </a>

            <a href="staff-auth.html" class="role-btn">
                <i class="fas fa-user-cog"></i>
                <span>Non-Teaching Staff</span>
            </a>

            <a href="student-auth.html" class="role-btn">
                <i class="fas fa-user-graduate"></i>
                <span>Student Hub</span>
            </a>

            <a href="parent-portal.html" class="role-btn">
                <i class="fas fa-family"></i>
                <span>Parent Access</span>
            </a>
        </nav>
    </div>

    <script>
        const themeSwitcher = document.getElementById('themeSwitcher');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        themeSwitcher.addEventListener('click', () => {
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Optional: Auto-detect system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            html.setAttribute('data-theme', 'light');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>

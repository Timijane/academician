<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTop Scholars – Enterprise School Management</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font (Inter + Space Grotesk) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      transition: background 0.6s ease;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Light mode background – bright educational campus */
    body.light-mode {
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.5)), 
                  url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: overlay;
    }

    /* Dark mode background – night university library */
    body.dark-mode {
      background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,20,40,0.7)), 
                  url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: overlay;
    }

    /* Floating orbs for depth */
    .orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 30% 30%, rgba(100,180,255,0.25), transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: float 20s infinite alternate ease-in-out;
    }
    .orb-1 { top: -100px; left: -100px; }
    .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(200,130,255,0.2), transparent); animation-duration: 25s; }

    @keyframes float {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(50px,50px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 25px;
      right: 25px;
      z-index: 1000;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 60px;
      padding: 12px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.4s cubic-bezier(0.2,0.9,0.3,1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Headers */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 4.2rem;
      background: linear-gradient(135deg, #ffffff, #f0f5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 25px rgba(0,0,0,0.6);
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }
    .subhead {
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 4px 15px rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Glass cards */
    .card {
      border: none;
      border-radius: 32px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s;
      height: 100%;
      padding: 2.2rem 1.5rem;
      text-align: center;
      color: white;
    }
    body.dark-mode .card {
      background: rgba(0,10,25,0.5);
    }
    .card:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 50px 90px rgba(0,0,0,0.6);
      background: rgba(255,255,255,0.2);
    }
    .card-title {
      font-weight: 700;
      font-size: 2.2rem;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #ffffff, #e0f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    .btn-role {
      background: linear-gradient(135deg, #3a7bd5, #2d5aa0);
      border: none;
      color: white;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 60px;
      width: 100%;
      margin-bottom: 15px;
      font-size: 1.2rem;
      box-shadow: 0 10px 20px rgba(0,40,100,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .btn-role:hover {
      background: linear-gradient(135deg, #2d5aa0, #1f3f7a);
      transform: scale(1.02) translateY(-3px);
    }

    .small-link {
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed rgba(255,255,255,0.5);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .small-link:hover {
      border-bottom-color: white;
    }

    footer {
      margin-top: 4rem;
      color: white;
      font-weight: 600;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body class="light-mode">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-4">
        <h1>EduTop Scholars</h1>
        <div class="subhead">Enterprise School Management</div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Admin</div>
          <a href="admin-login.html" class="btn btn-role"><i class="fas fa-lock me-2"></i>Login</a>
          <small><a href="admin-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>
      <!-- Co‑Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Co‑Admin</div>
          <a href="coadmin-login.html" class="btn btn-role"><i class="fas fa-users-cog me-2"></i>Login</a>
          <small><a href="coadmin-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>
      <!-- Teacher -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Teacher</div>
          <a href="teacher-login.html" class="btn btn-role"><i class="fas fa-chalkboard-teacher me-2"></i>Login</a>
          <small><a href="teacher-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>
      <!-- Student -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Student</div>
          <a href="student-login.html" class="btn btn-role"><i class="fas fa-user-graduate me-2"></i>Login</a>
          <small><a href="student-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>
      <!-- Non‑Teaching Staff -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Staff</div>
          <a href="nonteaching-login.html" class="btn btn-role"><i class="fas fa-briefcase me-2"></i>Login</a>
          <small><a href="nonteaching-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>
      <!-- Parent -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Parent</div>
          <a href="parent-access.html" class="btn btn-role"><i class="fas fa-child me-2"></i>Access</a>
          <small class="small-link" style="border-bottom: none;">No account needed</small>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2025 EduTop Scholars – The future of education management.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    const firebaseConfig = {
      apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
      authDomain: "triangle-6e6b7.firebaseapp.com",
      projectId: "triangle-6e6b7",
      storageBucket: "triangle-6e6b7.firebasestorage.app",
      messagingSenderId: "673937760480",
      appId: "1:673937760480:web:f03c06e1207232213ef085",
      measurementId: "G-ELBMT8WHQ9"
    };
    initializeApp(firebaseConfig);

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme') || 'light';
    body.classList.add(savedTheme === 'dark' ? 'dark-mode' : 'light-mode');
    updateToggleText(savedTheme);

    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('light-mode')) {
        body.classList.replace('light-mode', 'dark-mode');
        localStorage.setItem('theme', 'dark');
        updateToggleText('dark');
      } else {
        body.classList.replace('dark-mode', 'light-mode');
        localStorage.setItem('theme', 'light');
        updateToggleText('light');
      }
    });

    function updateToggleText(mode) {
      themeToggle.querySelector('span').textContent = mode === 'dark' ? 'Dark' : 'Light';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDUMETA · Choose Role</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 600px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    h1 { color: #1e293b; margin-bottom: 0.5rem; }
    .sub { color: #475569; margin-bottom: 2rem; }
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
    .role-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 2rem;
      padding: 1.5rem 0.5rem;
      text-decoration: none;
      color: #1e293b;
      font-weight: 600;
      transition: all 0.15s;
    }
    .role-card:hover {
      border-color: #3b82f6;
      background: #eff6ff;
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to EDUMETA</h1>
    <div class="sub">Select your role to continue</div>
    <div class="role-grid">
      <a href="admin.html" class="role-card">👑 Admin</a>
      <a href="teacher.html" class="role-card">📚 Teacher</a>
      <a href="student.html" class="role-card">🎓 Student</a>
      <a href="parent.html" class="role-card">👪 Parent</a>
    </div>
  </div>
</body>
</html>

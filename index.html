<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDUMETA · Choose Role</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      background: url('welcome.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: brightness(0.6);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 90%;
      max-width: 800px;
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 2.5rem;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.2rem;
    }

    .role-btn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 3rem;
      padding: 1.2rem 0.8rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      text-decoration: none;
      display: block;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .role-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      border-color: white;
      transform: scale(1.02);
    }

    @media (max-width: 480px) {
      .glass-card { padding: 2rem 1.5rem; }
      h1 { font-size: 2.2rem; }
      .role-btn { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>EDUMETA</h1>
    <p class="sub">Academic Tech‑Based School Management</p>
    <div class="role-grid">
      <a href="admin.html?role=admin" class="role-btn">👑 Admin</a>
      <a href="co-admin.html?role=co-admin" class="role-btn">🛡️ Co‑Admin</a>
      <a href="teacher.html?role=teacher" class="role-btn">📚 Teacher</a>
      <a href="student.html?role=student" class="role-btn">🎓 Student</a>
      <a href="parent.html?role=parent" class="role-btn">👪 Parent</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTop Scholars • 2030 Enterprise School Management</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font (Inter + Space Grotesk for headings) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      transition: background 0.5s ease;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Light mode background (abstract gradient + subtle image) */
    body.light-mode {
      background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(240,248,255,0.9)), 
                  url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: overlay;
    }

    /* Dark mode background (deep tech) */
    body.dark-mode {
      background: linear-gradient(135deg, rgba(0,5,15,0.9), rgba(0,20,40,0.95)), 
                  url('https://images.unsplash.com/photo-1557683316-973673baf926?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-blend-mode: overlay;
    }

    /* Floating orbs (2030 touch) */
    .orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 30% 30%, rgba(100,150,255,0.3), transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: float 20s infinite alternate ease-in-out;
    }
    .orb-1 { top: -100px; left: -100px; }
    .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(200,100,255,0.2), transparent); animation-duration: 25s; }

    @keyframes float {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(50px,50px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
    }

    /* Theme toggle button (glass) */
    .theme-toggle {
      position: fixed;
      top: 25px;
      right: 25px;
      z-index: 1000;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 60px;
      padding: 12px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.4s cubic-bezier(0.2,0.9,0.3,1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .theme-toggle i {
      font-size: 1.3rem;
      transition: transform 0.3s;
    }
    .theme-toggle:hover i {
      transform: rotate(15deg);
    }

    /* Header titles */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 4rem;
      background: linear-gradient(135deg, #fff, #e0f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 15px 30px rgba(0,0,0,0.3);
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }
    .subhead {
      font-size: 1.2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      background: rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Glass card design */
    .card {
      border: none;
      border-radius: 32px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s;
      height: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
      color: white;
    }

    body.dark-mode .card {
      background: rgba(0,10,30,0.3);
      border-color: rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      background: rgba(255,255,255,0.2);
    }
    body.dark-mode .card:hover {
      background: rgba(20,40,70,0.5);
    }

    .card-title {
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #d0e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-role {
      background: linear-gradient(135deg, #3a7bd5, #2d5aa0);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 50px;
      transition: all 0.3s;
      width: 100%;
      margin-bottom: 12px;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 20px rgba(0,40,100,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-role:hover {
      background: linear-gradient(135deg, #2d5aa0, #1f3f7a);
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 20px 30px rgba(0,0,0,0.4);
      color: white;
    }

    .small-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
      border-bottom: 1px dashed transparent;
    }
    .small-link:hover {
      color: white;
      border-bottom-color: white;
    }

    footer {
      margin-top: 4rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      text-align: center;
      backdrop-filter: blur(5px);
      padding: 1rem;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      .card-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body class="light-mode">

  <!-- Floating orbs for 2030 vibe -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
    <span>Light</span>
    <i class="fas fa-moon"></i>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-4">
        <h1>EduTop Scholars</h1>
        <div class="subhead">Enterprise School Management • 2030</div>
      </div>
    </div>

    <!-- Role Cards (6 roles) -->
    <div class="row g-4">
      <!-- Master Admin / Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Admin</div>
          <a href="admin-login.html" class="btn btn-role"><i class="fas fa-lock me-2"></i>Login</a>
          <small><a href="admin-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>

      <!-- Co‑Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Co‑Admin</div>
          <a href="coadmin-login.html" class="btn btn-role"><i class="fas fa-users-cog me-2"></i>Login</a>
          <small><a href="coadmin-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>

      <!-- Teacher -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Teacher</div>
          <a href="teacher-login.html" class="btn btn-role"><i class="fas fa-chalkboard-teacher me-2"></i>Login</a>
          <small><a href="teacher-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>

      <!-- Student -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Student</div>
          <a href="student-login.html" class="btn btn-role"><i class="fas fa-user-graduate me-2"></i>Login</a>
          <small><a href="student-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>

      <!-- Non‑Teaching Staff -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Staff</div>
          <a href="nonteaching-login.html" class="btn btn-role"><i class="fas fa-briefcase me-2"></i>Login</a>
          <small><a href="nonteaching-signup.html" class="small-link">Sign up</a></small>
        </div>
      </div>

      <!-- Parent (guest) -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Parent</div>
          <a href="parent-access.html" class="btn btn-role"><i class="fas fa-child me-2"></i>Access</a>
          <small class="small-link" style="cursor: default;">No account needed</small>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2025 EduTop Scholars – The future of education management. All rights reserved.</p>
    </footer>
  </div>

  <!-- Bootstrap JS (optional for interactions) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase SDK (modular) – config replaced with new one -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';

    // ✅ NEW FIREBASE CONFIG (provided by user)
    const firebaseConfig = {
      apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
      authDomain: "triangle-6e6b7.firebaseapp.com",
      projectId: "triangle-6e6b7",
      storageBucket: "triangle-6e6b7.firebasestorage.app",
      messagingSenderId: "673937760480",
      appId: "1:673937760480:web:f03c06e1207232213ef085",
      measurementId: "G-ELBMT8WHQ9"
    };

    // Initialize Firebase (no redirects, no loading overlay)
    const app = initializeApp(firebaseConfig);
    console.log('🔥 Firebase initialized (EduTop 2030)');

    // ----- THEME TOGGLE (unchanged) -----
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme') || 'light';
    body.classList.add(savedTheme === 'dark' ? 'dark-mode' : 'light-mode');
    updateToggleText(savedTheme);

    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('light-mode')) {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
        updateToggleText('dark');
      } else {
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
        localStorage.setItem('theme', 'light');
        updateToggleText('light');
      }
    });

    function updateToggleText(mode) {
      const span = themeToggle.querySelector('span');
      span.textContent = mode === 'dark' ? 'Dark' : 'Light';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTop Scholars – Enterprise School Management</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background-image 0.3s ease, background-color 0.3s ease;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Light mode background (default) */
    body.light-mode {
      background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-color: #f8f9fa;
    }

    /* Dark mode background */
    body.dark-mode {
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-color: #1e1e1e;
    }

    /* Overlay to improve readability (already in gradient) */

    .container {
      position: relative;
      z-index: 2;
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 500;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
    }

    .theme-toggle i {
      font-size: 1.2rem;
    }

    /* Dark mode card styles */
    body.dark-mode .card {
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f0f0f0;
    }

    body.dark-mode .card-title {
      color: #ffffff;
    }

    body.dark-mode .btn-role {
      background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
    }

    body.dark-mode .btn-outline-role {
      border-color: #4a6fa5;
      color: #4a6fa5;
    }

    body.dark-mode .btn-outline-role:hover {
      background: #4a6fa5;
      color: white;
    }

    body.dark-mode small a {
      color: #a0c0f0;
    }

    /* Light mode card styles */
    body.light-mode .card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      height: 100%;
      padding: 1.5rem;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    }

    .card-title {
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .btn-role {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: none;
      color: white;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 50px;
      transition: all 0.3s;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn-role:hover {
      background: linear-gradient(135deg, #2980b9, #1c6ea9);
      transform: scale(1.02);
      color: white;
    }

    .btn-outline-role {
      background: transparent;
      border: 2px solid #3498db;
      color: #3498db;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 50px;
      transition: all 0.3s;
      display: inline-block;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .btn-outline-role:hover {
      background: #3498db;
      color: white;
    }

    small a {
      color: #2c3e50;
      text-decoration: none;
      font-weight: 500;
    }

    small a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 2000;
      color: white;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-left-color: white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Grid adjustments */
    .row {
      margin-top: 2rem;
    }
  </style>
</head>
<body class="light-mode">

  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
    <span>Light</span>
    <i class="fas fa-moon"></i>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-spinner" style="display: none;">
    <div class="spinner"></div>
    <p>Loading, please wait...</p>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-5">
        <h1 style="font-weight: 700; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.5);">EduTop Scholars</h1>
        <p style="color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.5);">Enterprise School Management System</p>
      </div>
    </div>

    <!-- Role Cards (6 roles) -->
    <div class="row g-4">
      <!-- Master Admin / Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Administrator</div>
          <a href="admin-login.html" class="btn btn-role">Login</a>
          <small><a href="admin-signup.html">Sign up</a></small>
        </div>
      </div>

      <!-- Co‑Admin -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Co‑Admin</div>
          <a href="coadmin-login.html" class="btn btn-role">Login</a>
          <small><a href="coadmin-signup.html">Sign up</a></small>
        </div>
      </div>

      <!-- Teacher -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Teacher</div>
          <a href="teacher-login.html" class="btn btn-role">Login</a>
          <small><a href="teacher-signup.html">Sign up</a></small>
        </div>
      </div>

      <!-- Student -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Student</div>
          <a href="student-login.html" class="btn btn-role">Login</a>
          <small><a href="student-signup.html">Sign up</a></small>
        </div>
      </div>

      <!-- Non‑Teaching Staff -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Non‑Teaching Staff</div>
          <a href="nonteaching-login.html" class="btn btn-role">Login</a>
          <small><a href="nonteaching-signup.html">Sign up</a></small>
        </div>
      </div>

      <!-- Parent (guest) -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-title">Parent</div>
          <a href="parent-access.html" class="btn btn-role">Access</a>
          <small>No account needed</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (for any components, but not strictly needed) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase SDK (modular) -->
  <script type="module">
    // Import Firebase
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
      authDomain: "edutopscholars-be54a.firebaseapp.com",
      projectId: "edutopscholars-be54a",
      storageBucket: "edutopscholars-be54a.firebasestorage.app",
      messagingSenderId: "713866508372",
      appId: "1:713866508372:web:92d49db6c867a48654d5c1",
      measurementId: "G-CCCDYZQ6LE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingOverlay = document.getElementById('loadingOverlay');

    function showLoading() { loadingOverlay.style.display = 'flex'; }
    function hideLoading() { loadingOverlay.style.display = 'none'; }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        showLoading();
        try {
          const userDocRef = doc(db, 'users', user.uid);
          const userDoc = await getDoc(userDocRef);
          if (userDoc.exists()) {
            const userData = userDoc.data();
            const role = userData.role;
            const approved = userData.approved;

            if (!approved && role !== 'masterAdmin') {
              hideLoading();
              alert('Your account is pending approval.');
              return;
            }

            let dashboardUrl = '';
            switch (role) {
              case 'masterAdmin':
              case 'admin':
                dashboardUrl = 'admin-dashboard.html';
                break;
              case 'coAdmin':
                dashboardUrl = 'coadmin-dashboard.html';
                break;
              case 'teacher':
                dashboardUrl = 'teacher-dashboard.html';
                break;
              case 'student':
                dashboardUrl = 'student-dashboard.html';
                break;
              case 'nonTeachingStaff':
                dashboardUrl = 'nonteaching-dashboard.html';
                break;
              default:
                hideLoading();
                return;
            }
            window.location.href = dashboardUrl;
          } else {
            console.warn('No user document');
            hideLoading();
          }
        } catch (error) {
          console.error(error);
          hideLoading();
        }
      } else {
        hideLoading();
      }
    });

    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    // Check local storage for theme preference
    const savedTheme = localStorage.getItem('theme') || 'light';
    body.classList.add(savedTheme === 'dark' ? 'dark-mode' : 'light-mode');
    updateToggleText(savedTheme);

    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('light-mode')) {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
        updateToggleText('dark');
      } else {
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
        localStorage.setItem('theme', 'light');
        updateToggleText('light');
      }
    });

    function updateToggleText(mode) {
      const span = themeToggle.querySelector('span');
      span.textContent = mode === 'dark' ? 'Dark' : 'Light';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Parent Access</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* === SAME STYLES (but no tabs) === */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&q=80');
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 41, 59, 0.8);
            --error: #ef4444;
            --success: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 2.5rem;
            padding: 2.5rem 2rem; width: min(480px, 100%);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h2 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; }

        .input-group {
            margin-bottom: 1.5rem; position: relative;
        }
        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-weight: 500; font-size: 0.95rem; color: var(--text-secondary);
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 0.2rem 1rem;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .input-wrapper i {
            color: var(--text-secondary); font-size: 1.2rem; width: 2rem;
        }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 1rem 0; font-size: 1rem;
            color: var(--text-primary); outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-secondary); opacity: 0.6;
        }

        .btn-primary {
            width: 100%; background: var(--accent); border: none;
            border-radius: 3rem; padding: 1.2rem;
            font-size: 1.2rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .btn-primary:hover {
            filter: brightness(1.1); transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        .message {
            font-size: 0.9rem; margin-top: 0.5rem; display: none;
        }
        .error-message { color: var(--error); }
        .success-message { color: var(--success); }

        .footer-note {
            margin-top: 1.5rem; text-align: center; font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Student info display (initially hidden) */
        #studentInfo {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border);
        }
        .info-label {
            font-weight: 500;
            color: var(--text-secondary);
        }
        .info-value {
            font-weight: 600;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="glass-card">
        <h2>Parent Access</h2>
        <div class="sub">Enter student credentials to view progress</div>

        <form id="parentAccessForm">
            <div class="input-group">
                <label>Student ID (Admission Number)</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="studentId" placeholder="e.g., STU-2025-001" required>
                </div>
            </div>
            <div class="input-group">
                <label>PIN (provided by school)</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" id="studentPin" placeholder="4-digit PIN" maxlength="4" pattern="\d{4}" inputmode="numeric" required>
                </div>
            </div>
            <div class="message error-message" id="accessError"></div>
            <div class="message success-message" id="accessSuccess"></div>
            <button type="submit" class="btn-primary" id="accessBtn">View Progress</button>
        </form>

        <!-- Student info display (hidden until success) -->
        <div id="studentInfo" style="display: none;">
            <h3 style="margin-bottom: 1rem;">Student Information</h3>
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="infoName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Class</span>
                <span class="info-value" id="infoClass">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Attendance Rate</span>
                <span class="info-value" id="infoAttendance">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Average Score</span>
                <span class="info-value" id="infoAverage">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Report</span>
                <span class="info-value" id="infoReport">-</span>
            </div>
        </div>

        <div class="footer-note">
            Secure guest access · PIN provided by class teacher
        </div>
    </div>

    <script>
        // ==================== FIREBASE INIT ====================
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==================== THEME TOGGLE ====================
        (function() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon(theme) {
                icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
            toggleBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                updateIcon(next);
                localStorage.setItem('edutopscholars-theme', next);
            });
            const saved = localStorage.getItem('edutopscholars-theme');
            if (saved && (saved === 'dark' || saved === 'light')) {
                html.setAttribute('data-theme', saved);
                updateIcon(saved);
            } else {
                updateIcon('dark');
            }
        })();

        // ==================== PARENT ACCESS HANDLER ====================
        document.getElementById('parentAccessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value.trim();
            const pin = document.getElementById('studentPin').value.trim();
            const errorDiv = document.getElementById('accessError');
            const successDiv = document.getElementById('accessSuccess');
            const accessBtn = document.getElementById('accessBtn');
            const studentInfoDiv = document.getElementById('studentInfo');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            studentInfoDiv.style.display = 'none';

            if (!studentId || !pin) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }

            accessBtn.disabled = true;
            accessBtn.textContent = 'Verifying...';

            try {
                // Query for student with matching admission number and PIN
                // Assuming admission number is stored in a field 'admissionNumber' in the student's user document.
                // PIN is stored in a field 'parentPIN' (hashed ideally, but for simplicity we store plain).
                // We'll query the users collection where role='student' and admissionNumber == studentId.
                const studentsRef = db.collection('users');
                const snapshot = await studentsRef
                    .where('role', '==', 'student')
                    .where('admissionNumber', '==', studentId)
                    .limit(1)
                    .get();

                if (snapshot.empty) {
                    throw new Error('Student not found.');
                }

                const studentDoc = snapshot.docs[0];
                const studentData = studentDoc.data();

                // Check PIN
                if (studentData.parentPIN !== pin) {
                    throw new Error('Invalid PIN.');
                }

                // Success – display student info (mock data, adjust fields as needed)
                document.getElementById('infoName').textContent = `${studentData.firstName || ''} ${studentData.surname || ''}`;
                document.getElementById('infoClass').textContent = studentData.class || 'Not assigned';
                // These fields would come from other collections (attendance, scores) – we'll mock for now
                document.getElementById('infoAttendance').textContent = '95%'; // mock
                document.getElementById('infoAverage').textContent = '78%'; // mock
                document.getElementById('infoReport').textContent = 'Term 1, 2025'; // mock

                studentInfoDiv.style.display = 'block';
                successDiv.textContent = 'Access granted. Showing student progress.';
                successDiv.style.display = 'block';
            } catch (error) {
                console.error('Access error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                accessBtn.disabled = false;
                accessBtn.textContent = 'View Progress';
            }
        });
    </script>
</body>
</html>

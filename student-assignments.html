<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · My Work</title>
    <!-- Font Awesome, Google Fonts, Firebase SDK same as before -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same base styles as previous pages, but we'll include minimal */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] { --bg-primary: #f0f5fa; --bg-sidebar: rgba(255,255,255,0.75); --text-primary: #0b1e33; --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --success-bg: rgba(34,197,94,0.2); --success-text: #16a34a; --warning-bg: rgba(245,158,11,0.2); --warning-text: #b45309; --danger-bg: rgba(239,68,68,0.2); --danger-text: #b91c1c; --input-bg: rgba(255,255,255,0.9); }
        :root[data-theme="dark"] { --bg-primary: #0a0f1e; --bg-sidebar: rgba(15, 23, 42, 0.8); --text-primary: #f0f4fa; --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05); --card-bg: rgba(15, 23, 42, 0.6); --hover-bg: rgba(30, 41, 59, 0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24; --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171; --input-bg: rgba(30,41,59,0.8); }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; transition: background 0.3s; position: relative; overflow-x: hidden; }
        .orb { position: fixed; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%); filter: blur(80px); z-index: 0; animation: float 25s infinite alternate ease-in-out; }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.2); } }
        .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.4rem; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 1.2rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.4rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(5px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 8px 20px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.3rem; width: 1.8rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1); position: relative; z-index: 5; }
        .main-content.expanded { margin-left: 90px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 2.4rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.2rem; }
        .page-title p { color: var(--text-secondary); font-weight: 400; }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer; color: var(--text-secondary); font-weight: 500; transition: 0.2s; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.4rem 0.4rem 0.4rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.1rem; box-shadow: 0 5px 15px var(--accent); background-size: cover; background-position: center; }
        .dropdown-menu { position: absolute; right: 0; top: 60px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.5rem; min-width: 180px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.8rem 1.2rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem; transition: 0.2s; }

        .card { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 1.5rem; margin-bottom: 2rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .card-header h2 { font-size: 1.5rem; font-weight: 600; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 0.8rem; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
        td { padding: 0.8rem; border-bottom: 1px solid var(--border); }
        .badge { padding: 0.2rem 0.8rem; border-radius: 2rem; font-size: 0.8rem; display: inline-block; }
        .badge.pending { background: var(--warning-bg); color: var(--warning-text); }
        .badge.submitted { background: var(--success-bg); color: var(--success-text); }
        .badge.overdue { background: var(--danger-bg); color: var(--danger-text); }
        .btn { padding: 0.4rem 1rem; border: none; border-radius: 2rem; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        @media (max-width: 768px) { .sidebar { width: 90px; } .sidebar .logo-area h2 { display: none; } .sidebar .nav-item span { display: none; } .main-content { margin-left: 90px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- student sidebar, same as before -->
    </div>
    <div class="main-content">
        <div class="top-bar">...</div>
        <div class="card">
            <div class="card-header"><h2>Assignments</h2></div>
            <div class="table-responsive"><table><thead><tr><th>Subject</th><th>Title</th><th>Due Date</th><th>Status</th><th>Score</th><th>Action</th></tr></thead><tbody id="assignmentsList"></tbody></table></div>
        </div>
        <div class="card">
            <div class="card-header"><h2>Tests</h2></div>
            <div class="table-responsive"><table><thead><tr><th>Subject</th><th>Title</th><th>Start Date</th><th>Due Date</th><th>Status</th><th>Score</th><th>Action</th></tr></thead><tbody id="testsList"></tbody></table></div>
        </div>
        <div class="card">
            <div class="card-header"><h2>Exams</h2></div>
            <div class="table-responsive"><table><thead><tr><th>Subject</th><th>Title</th><th>Start Date</th><th>Due Date</th><th>Status</th><th>Score</th><th>Action</th></tr></thead><tbody id="examsList"></tbody></table></div>
        </div>
    </div>
    <script>
        // Firebase init
        const firebaseConfig = {...};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;
        let studentClass = null;
        let assignments = [], tests = [], exams = [];
        let submissionsMap = new Map(); // key = assignmentId (or testId, examId) -> submission

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'student') { auth.signOut(); window.location.href = 'index.html'; return; }
            currentUser = user;
            studentClass = userDoc.data().class;
            await loadSubmissions();
            await loadAssignments();
            await loadTests();
            await loadExams();
        });

        async function loadSubmissions() {
            const snap = await db.collection('submissions').where('studentId','==',currentUser.uid).get();
            submissionsMap.clear();
            snap.forEach(doc => { const s = doc.data(); submissionsMap.set(s.assessmentId, s); });
        }

        async function loadAssignments() {
            const snap = await db.collection('assignments').where('classId','==',studentClass).where('status','==','published').where('type','==','assignment').get();
            assignments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderAssignments();
        }
        async function loadTests() {
            const snap = await db.collection('tests').where('classId','==',studentClass).where('status','==','published').get();
            tests = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTests();
        }
        async function loadExams() {
            const snap = await db.collection('exams').where('classId','==',studentClass).where('status','==','published').get();
            exams = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderExams();
        }

        function renderAssignments() {
            const tbody = document.getElementById('assignmentsList');
            if (!assignments.length) { tbody.innerHTML = '<tr><td colspan="6">No assignments</td></tr>'; return; }
            let html = '';
            assignments.forEach(a => {
                const sub = submissionsMap.get(a.id);
                const due = new Date(a.dueDate);
                const now = new Date();
                let status = sub ? 'submitted' : (due < now ? 'overdue' : 'pending');
                let badgeClass = status === 'submitted' ? 'submitted' : (status === 'overdue' ? 'overdue' : 'pending');
                let score = sub ? (sub.score ? sub.score + '/' + a.totalPoints : '—') : '—';
                let action = '';
                if (sub) action = `<button class="btn btn-outline" onclick="viewResult('${a.id}','assignment')">View</button>`;
                else action = `<button class="btn btn-primary" onclick="startAssignment('${a.id}')">Start</button>`;
                html += `<tr><td>${a.subject}</td><td>${a.title}</td><td>${a.dueDate}</td><td><span class="badge ${badgeClass}">${status}</span></td><td>${score}</td><td>${action}</td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderTests() {
            const tbody = document.getElementById('testsList');
            if (!tests.length) { tbody.innerHTML = '<tr><td colspan="7">No tests</td></tr>'; return; }
            let html = '';
            tests.forEach(t => {
                const sub = submissionsMap.get(t.id);
                const due = new Date(t.dueDate);
                const now = new Date();
                let status = sub ? 'submitted' : (due < now ? 'overdue' : 'pending');
                let badgeClass = status === 'submitted' ? 'submitted' : (status === 'overdue' ? 'overdue' : 'pending');
                let score = sub ? (sub.score ? sub.score + '/' + t.totalPoints : '—') : '—';
                let action = '';
                if (sub) action = `<button class="btn btn-outline" onclick="viewResult('${t.id}','test')">View</button>`;
                else action = `<button class="btn btn-primary" onclick="startTest('${t.id}')">Start Test</button>`;
                html += `<tr><td>${t.subject}</td><td>${t.title}</td><td>${t.startDate}</td><td>${t.dueDate}</td><td><span class="badge ${badgeClass}">${status}</span></td><td>${score}</td><td>${action}</td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderExams() { /* similar to tests */ }

        window.startAssignment = (id) => { window.location.href = `student-assignment.html?id=${id}`; };
        window.startTest = (id) => { window.location.href = `student-test.html?id=${id}`; };
        window.startExam = (id) => { window.location.href = `student-exam.html?id=${id}`; };
        window.viewResult = (id, type) => { window.location.href = `student-result.html?assessmentId=${id}&type=${type}`; };
    </script>
</body>
</html>

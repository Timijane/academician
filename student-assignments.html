<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · My Assignments</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --bg-sidebar: rgba(255,255,255,0.75);
            --glass-border: rgba(255,255,255,0.3);
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --bg-sidebar: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.4rem; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 1.2rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.4rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(5px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 8px 20px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.3rem; width: 1.8rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            z-index: 5;
        }
        .main-content.expanded { margin-left: 90px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .page-title h1 { font-size: 2.4rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.2rem; }
        .page-title p { color: var(--text-secondary); font-weight: 400; }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer; color: var(--text-secondary); font-weight: 500; transition: 0.2s; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.4rem 0.4rem 0.4rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.1rem; box-shadow: 0 5px 15px var(--accent); background-size: cover; background-position: center; }
        .dropdown-menu { position: absolute; right: 0; top: 60px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.5rem; min-width: 180px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.8rem 1.2rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem; transition: 0.2s; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 { font-size: 1.3rem; font-weight: 600; }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 0.5rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            color: var(--text-primary);
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 1rem 0.8rem; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 1rem 0.8rem; border-bottom: 1px solid var(--border); }

        .badge {
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
        }
        .badge.pending { background: var(--warning-bg); color: var(--warning-text); }
        .badge.submitted { background: var(--success-bg); color: var(--success-text); }
        .badge.overdue { background: var(--danger-bg); color: var(--danger-text); }
        .badge.assignment { background: var(--hover-bg); color: var(--text-secondary); }
        .badge.test { background: var(--accent); color: white; }
        .badge.exam { background: var(--success-text); color: white; }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); border-color: var(--accent); }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .sidebar { width: 90px; }
            .sidebar .logo-area h2 { display: none; }
            .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 90px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-user-graduate"></i>
            <h2>Student Panel</h2>
        </div>
        <a href="student-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="student-assignments.html" class="nav-item active"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="student-tests.html" class="nav-item"><i class="fas fa-laptop"></i><span>Tests & Exams</span></a>
        <a href="student-classroom.html" class="nav-item"><i class="fas fa-chalkboard"></i><span>Classroom</span></a>
        <a href="student-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="student-evaluation.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Evaluation</span></a>
        <a href="student-summary.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>Summary</span></a>
        <a href="student-submit.html" class="nav-item"><i class="fas fa-upload"></i><span>Submit</span></a>
        <a href="student-profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Assignments</h1>
                <p>View and submit your assignments, tests, and exams</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-trigger">
                        <span class="profile-name" id="profileName">Student</span>
                        <div class="profile-pic" id="profilePic">ST</div>
                    </div>
                    <div class="dropdown-menu">
                        <a href="student-profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <select id="typeFilter">
                <option value="all">All Types</option>
                <option value="assignment">Assignments</option>
                <option value="test">Tests</option>
                <option value="exam">Exams</option>
            </select>
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="submitted">Submitted</option>
                <option value="overdue">Overdue</option>
            </select>
            <input type="text" id="searchFilter" placeholder="Search by title...">
        </div>

        <!-- Assignments List -->
        <div class="card">
            <div class="card-header">
                <h3>All Items</h3>
            </div>
            <div class="table-responsive">
                <table id="assignmentsTable">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Subject</th>
                            <th>Title</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Score</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="assignmentsBody">
                        <tr><td colspan="7" class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Global variables
        let currentUser = null;
        let userData = null;
        let studentClass = null;
        let allAssignments = [];
        let submissionsMap = new Map(); // assignmentId -> submission doc

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'student') {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                userData = userDoc.data();
                const isApproved = userData.approved === true || userData.status === 'approved';
                if (!isApproved) {
                    alert('Your account is pending approval.');
                    auth.signOut(); window.location.href = 'student-login.html'; return;
                }
                currentUser = user;
                studentClass = userData.class;
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || 'T');
                document.getElementById('profileName').textContent = userData.firstName || 'Student';

                await loadSubmissions();
                await loadAssignments();
            } catch (error) {
                console.error(error);
                alert('Error loading data.');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        // Load all submissions by this student
        async function loadSubmissions() {
            const snapshot = await db.collection('submissions')
                .where('studentId', '==', currentUser.uid)
                .get();
            submissionsMap.clear();
            snapshot.forEach(doc => {
                const data = doc.data();
                submissionsMap.set(data.assignmentId, { id: doc.id, ...data });
            });
        }

        // Load assignments for this class that are published
        async function loadAssignments() {
            if (!studentClass) return;
            const snapshot = await db.collection('assignments')
                .where('classId', '==', studentClass)
                .where('status', '==', 'published')
                .orderBy('dueDate', 'asc')
                .get();
            allAssignments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            filterAndRender();
        }

        // Filter based on dropdowns and search
        function filterAndRender() {
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = allAssignments;

            if (typeFilter !== 'all') {
                filtered = filtered.filter(a => a.type === typeFilter);
            }

            // For status, we need submission info
            const now = new Date();
            filtered = filtered.filter(a => {
                const sub = submissionsMap.get(a.id);
                const due = new Date(a.dueDate + 'T23:59:59');
                if (statusFilter === 'all') return true;
                if (statusFilter === 'submitted') return !!sub;
                if (statusFilter === 'pending') return !sub && due >= now;
                if (statusFilter === 'overdue') return !sub && due < now;
                return true;
            });

            if (searchTerm) {
                filtered = filtered.filter(a => a.title.toLowerCase().includes(searchTerm));
            }

            renderAssignments(filtered);
        }

        // Render assignments into table
        function renderAssignments(assignments) {
            const tbody = document.getElementById('assignmentsBody');
            if (assignments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading-spinner">No assignments found.</td></tr>';
                return;
            }
            let html = '';
            const now = new Date();
            assignments.forEach(a => {
                const sub = submissionsMap.get(a.id);
                const due = new Date(a.dueDate + 'T23:59:59');
                let status, badgeClass, scoreDisplay = '—';
                if (sub) {
                    status = 'submitted';
                    badgeClass = 'submitted';
                    if (sub.score !== undefined) {
                        scoreDisplay = sub.score + '/' + a.totalPoints;
                    } else {
                        scoreDisplay = 'Pending';
                    }
                } else {
                    if (due < now) {
                        status = 'overdue';
                        badgeClass = 'overdue';
                    } else {
                        status = 'pending';
                        badgeClass = 'pending';
                    }
                }
                const typeBadge = `<span class="badge ${a.type}">${a.type}</span>`;
                let actionButton = '';
                if (sub) {
                    actionButton = `<button class="btn btn-outline btn-sm" onclick="viewSubmission('${a.id}')">View</button>`;
                } else if (a.type === 'cbt' || a.type === 'test' || a.type === 'exam') {
                    // Check if start date is valid
                    if (a.startDate) {
                        const start = new Date(a.startDate + 'T00:00:00');
                        if (start > now) {
                            actionButton = `<span class="badge pending">Starts ${a.startDate}</span>`;
                        } else {
                            actionButton = `<button class="btn btn-primary btn-sm" onclick="startCBT('${a.id}')">Start Test</button>`;
                        }
                    } else {
                        actionButton = `<button class="btn btn-primary btn-sm" onclick="startCBT('${a.id}')">Start Test</button>`;
                    }
                } else {
                    // Assignment (upload)
                    actionButton = `<button class="btn btn-outline btn-sm" onclick="openAssignment('${a.id}')">View</button>`;
                }
                html += `
                    <tr>
                        <td>${typeBadge}</td>
                        <td>${a.subject}</td>
                        <td>${a.title}</td>
                        <td>${a.dueDate}</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                        <td>${scoreDisplay}</td>
                        <td>${actionButton}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Event listeners for filters
        document.getElementById('typeFilter').addEventListener('change', filterAndRender);
        document.getElementById('statusFilter').addEventListener('change', filterAndRender);
        document.getElementById('searchFilter').addEventListener('input', filterAndRender);

        // Start CBT (test/exam)
        window.startCBT = (assignmentId) => {
            window.location.href = `student-take-cbt.html?id=${assignmentId}`;
        };

        // Open assignment (for upload type)
        window.openAssignment = (assignmentId) => {
            window.location.href = `student-assignment-detail.html?id=${assignmentId}`;
        };

        // View submission (after graded)
        window.viewSubmission = (assignmentId) => {
            window.location.href = `student-submission-result.html?id=${assignmentId}`;
        };
    </script>
</body>
</html>

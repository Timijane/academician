<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · My Classroom</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        /* Top navigation */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.4rem 0.4rem 0.4rem 1rem;
        }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 1.1rem;
            box-shadow: 0 5px 15px var(--accent);
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 60px;
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 1.2rem;
            padding: 0.5rem; min-width: 180px; display: none;
            z-index: 1000; box-shadow: var(--shadow);
        }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            padding: 0.8rem 1.2rem; color: var(--text-primary);
            border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem;
            transition: 0.2s; text-decoration: none;
        }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
        }

        /* Main container – wide */
        .main-container {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 5;
        }

        /* Subject & Week tabs */
        .subject-tabs, .week-tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: var(--card-bg); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 3rem;
            padding: 0.3rem; width: fit-content; flex-wrap: wrap;
        }
        .tab {
            padding: 0.7rem 2rem; border-radius: 3rem; font-weight: 500;
            cursor: pointer; transition: 0.2s; color: var(--text-secondary);
            white-space: nowrap;
        }
        .tab.active { background: var(--accent); color: white; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 { font-size: 1.3rem; font-weight: 600; }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .resource-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }
        .resource-card h4 {
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
        }
        .resource-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .resource-card .badge {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge.published { background: var(--success-bg); color: var(--success-text); }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover { background: var(--hover-bg); border-color: var(--accent); }
        .btn-sm { padding: 0.3rem 1rem; font-size: 0.9rem; }

        .error-message {
            background: var(--danger-bg);
            color: var(--danger-text);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--danger-text);
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .main-container { padding: 0 1rem; }
            .top-nav { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <a href="student-dashboard.html" class="nav-btn"><i class="fas fa-chart-pie"></i> Dashboard</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
            </div>
            <div class="profile-dropdown">
                <div class="profile-trigger">
                    <span class="profile-name" id="profileName">Student</span>
                    <div class="profile-pic" id="profilePic">ST</div>
                </div>
                <div class="dropdown-menu">
                    <a href="student-profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                    <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Subject Tabs -->
        <div class="subject-tabs" id="subjectTabs"></div>

        <!-- Week Tabs -->
        <div class="week-tabs" id="weekTabs"></div>

        <!-- Resources Card -->
        <div class="card">
            <div class="card-header">
                <h3>Learning Materials for <span id="currentSubject"></span> – Week <span id="currentWeek"></span></h3>
            </div>
            <div id="resourcesContainer">
                <p class="empty-state">Select a subject and week to view materials.</p>
            </div>
        </div>

        <!-- Upcoming Virtual Classes -->
        <div class="card">
            <div class="card-header">
                <h3>Upcoming Virtual Classes</h3>
            </div>
            <div id="virtualClassesContainer">
                <p class="empty-state">No upcoming virtual classes.</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Global variables
        let currentUser = null;
        let userData = null;
        let studentClass = null;
        let subjects = [];
        let currentSubject = null;
        let weeks = [];
        let currentWeek = null;
        let lessonNotesMap = {};

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'student') {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                userData = userDoc.data();
                const isApproved = userData.approved === true || userData.status === 'approved';
                if (!isApproved) {
                    alert('Your account is pending approval.');
                    auth.signOut(); window.location.href = 'student-login.html'; return;
                }
                currentUser = user;
                studentClass = userData.class;
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || 'T');
                document.getElementById('profileName').textContent = userData.firstName || 'Student';

                await loadAllMaterials();
                await loadVirtualClasses();
            } catch (error) {
                console.error(error);
                document.getElementById('errorMessage').textContent = 'Error loading data.';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        // Load all approved lesson notes for the student's class that have published resources
        async function loadAllMaterials() {
            if (!studentClass) return;
            try {
                const snapshot = await db.collection('lessonNotes')
                    .where('classId', '==', studentClass)
                    .where('status', '==', 'approved')
                    .get();

                subjects = [];
                lessonNotesMap = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    // Only include if at least one resource is published
                    if (data.studentResourcePublished || data.handwrittenPublished || (data.youtubeLinks && data.youtubeLinks.length && data.youtubePublished)) {
                        const subj = data.subject;
                        if (!subjects.includes(subj)) subjects.push(subj);
                        const key = `${subj}_${data.week}`;
                        lessonNotesMap[key] = { id: doc.id, ...data };
                    }
                });

                renderSubjectTabs();
                if (subjects.length > 0) {
                    switchSubject(subjects[0]);
                } else {
                    document.getElementById('resourcesContainer').innerHTML = '<p class="empty-state">No learning materials available yet.</p>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('errorMessage').textContent = 'Error loading materials.';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function renderSubjectTabs() {
            const container = document.getElementById('subjectTabs');
            container.innerHTML = '';
            subjects.forEach(sub => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = sub;
                tab.onclick = (e) => switchSubject(sub, e.target);
                container.appendChild(tab);
            });
        }

        function switchSubject(subject, clickedElement) {
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            if (clickedElement) clickedElement.classList.add('active');
            currentSubject = subject;
            document.getElementById('currentSubject').textContent = subject;

            weeks = [];
            for (let key in lessonNotesMap) {
                if (key.startsWith(subject + '_')) {
                    const week = lessonNotesMap[key].week;
                    if (!weeks.includes(week)) weeks.push(week);
                }
            }
            weeks.sort((a,b) => a - b);
            renderWeekTabs();
            if (weeks.length > 0) {
                selectWeek(weeks[0]);
            } else {
                document.getElementById('resourcesContainer').innerHTML = '<p class="empty-state">No weeks available for this subject.</p>';
            }
        }

        function renderWeekTabs() {
            const container = document.getElementById('weekTabs');
            container.innerHTML = '';
            weeks.forEach(week => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = `Week ${week}`;
                tab.onclick = (e) => selectWeek(week, e.target);
                container.appendChild(tab);
            });
        }

        function selectWeek(week, clickedElement) {
            document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
            if (clickedElement) clickedElement.classList.add('active');
            currentWeek = week;
            document.getElementById('currentWeek').textContent = week;
            renderResources();
        }

        // Helper to download content as a text file
        function downloadAsFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function renderResources() {
            const key = `${currentSubject}_${currentWeek}`;
            const note = lessonNotesMap[key];
            const container = document.getElementById('resourcesContainer');

            if (!note) {
                container.innerHTML = '<p class="empty-state">No materials for this week.</p>';
                return;
            }

            let html = '<div class="resource-grid">';

            // Student Resource (if published)
            if (note.studentResource && note.studentResourcePublished) {
                html += `
                    <div class="resource-card">
                        <h4><i class="fas fa-users"></i> Student Resource</h4>
                        <p>${note.studentResource}</p>
                        <button class="btn btn-outline btn-sm" onclick="downloadAsFile(\`${note.studentResource.replace(/`/g, '\\`')}\`, 'StudentResource_${currentSubject}_Week${currentWeek}.txt')">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                `;
            }

            // Handwritten Notes (if published)
            if (note.handwrittenNotes && note.handwrittenPublished) {
                html += `
                    <div class="resource-card">
                        <h4><i class="fas fa-pen-fancy"></i> Handwritten Notes</h4>
                        <p>${note.handwrittenNotes}</p>
                        <button class="btn btn-outline btn-sm" onclick="downloadAsFile(\`${note.handwrittenNotes.replace(/`/g, '\\`')}\`, 'Handwritten_${currentSubject}_Week${currentWeek}.txt')">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                `;
            }

            // YouTube Links (if published)
            if (note.youtubeLinks && note.youtubeLinks.length && note.youtubePublished) {
                let linksHtml = '<ul>';
                note.youtubeLinks.forEach(link => {
                    linksHtml += `<li><a href="${link}" target="_blank">${link}</a></li>`;
                });
                linksHtml += '</ul>';
                html += `
                    <div class="resource-card">
                        <h4><i class="fab fa-youtube"></i> YouTube Links</h4>
                        ${linksHtml}
                    </div>
                `;
            }

            html += '</div>';

            // If none of the above, show message
            if (!note.studentResourcePublished && !note.handwrittenPublished && !(note.youtubeLinks && note.youtubeLinks.length && note.youtubePublished)) {
                html = '<p class="empty-state">No published materials for this week.</p>';
            }

            container.innerHTML = html;
        }

        // Expose download function globally
        window.downloadAsFile = downloadAsFile;

        async function loadVirtualClasses() {
            if (!studentClass) return;
            try {
                const now = new Date();
                const snapshot = await db.collection('virtualClasses')
                    .where('classId', '==', studentClass)
                    .orderBy('date', 'asc')
                    .orderBy('time', 'asc')
                    .get();

                const container = document.getElementById('virtualClassesContainer');
                if (snapshot.empty) {
                    container.innerHTML = '<p class="empty-state">No upcoming virtual classes.</p>';
                    return;
                }

                let html = '<div class="resource-grid">';
                snapshot.forEach(doc => {
                    const vc = doc.data();
                    html += `
                        <div class="resource-card">
                            <h4><i class="fas fa-video"></i> ${vc.subject} – Week ${vc.week}</h4>
                            <p><strong>Platform:</strong> ${vc.platform}</p>
                            <p><strong>Date:</strong> ${vc.date} at ${vc.time}</p>
                            <p><strong>Duration:</strong> ${vc.duration} min</p>
                            <a href="${vc.link}" target="_blank" class="btn btn-outline">Join</a>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error(error);
                // Silently fail – not critical
            }
        }
    </script>
</body>
</html>

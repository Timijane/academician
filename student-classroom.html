<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Student Classroom</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --bg-surface: rgba(255,255,255,0.75); --text-primary: #0b1e33;
            --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298;
            --accent-light: rgba(30,60,114,0.08); --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --shadow-sm: 0 5px 15px -5px rgba(0,0,0,0.05);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #b91c1c;
            --info-bg: rgba(59,130,246,0.1); --info-text: #1d4ed8;
            --input-bg: rgba(255,255,255,0.9);
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
            --resource-bg: #fefce8; --key-point-bg: #eff6ff;
            --meeting-soon-bg: rgba(245,158,11,0.1); --meeting-live-bg: rgba(34,197,94,0.1);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --bg-surface: rgba(15,23,42,0.8); --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa;
            --accent-light: rgba(59,130,246,0.1); --border: rgba(255,255,255,0.06);
            --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --shadow-sm: 0 5px 15px -5px rgba(0,0,0,0.3);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.15); --info-text: #60a5fa;
            --input-bg: rgba(30,41,59,0.8);
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
            --resource-bg: #1a1f2e; --key-point-bg: #1e293b;
            --meeting-soon-bg: rgba(245,158,11,0.1); --meeting-live-bg: rgba(34,197,94,0.1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s; position: relative; overflow-x: hidden; }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; animation: float 25s infinite alternate ease-in-out; }
        .orb-1 { width: 400px; height: 400px; top: -150px; right: -150px; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.12), transparent 70%); }
        .orb-2 { width: 500px; height: 500px; bottom: -200px; left: -200px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.10), transparent 70%); animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.15); } }

        .top-nav { position: sticky; top: 0; z-index: 100; background: var(--bg-surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
        .nav-brand i { font-size: 1.6rem; }
        .nav-btn { background: transparent; border: 1px solid var(--border); border-radius: 2rem; padding: 0.55rem 1.3rem; color: var(--text-primary); font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; }
        .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.7rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.35rem 0.35rem 0.35rem 0.9rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1rem; box-shadow: 0 3px 12px var(--accent); }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--bg-surface); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.5rem; min-width: 180px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.8rem 1.2rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }
        .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.4rem 1rem; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary); }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 3rem; position: relative; z-index: 5; }

        .welcome-banner { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; color: white; position: relative; overflow: hidden; }
        .welcome-banner h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .welcome-banner p { opacity: 0.9; font-size: 1rem; }
        .welcome-banner .banner-decoration { position: absolute; right: -50px; top: -50px; font-size: 8rem; opacity: 0.15; transform: rotate(15deg); }

        .sub-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.3rem; width: fit-content; flex-wrap: wrap; }
        .sub-tab { padding: 0.6rem 1.8rem; border-radius: 3rem; font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: 0.2s; color: var(--text-secondary); display: flex; align-items: center; gap: 0.4rem; }
        .sub-tab.active { background: var(--accent); color: white; }
        .sub-tab:hover:not(.active) { color: var(--accent); }
        .sub-tab .count-badge { background: rgba(255,255,255,0.2); border-radius: 1rem; padding: 0.1rem 0.6rem; font-size: 0.75rem; }

        .subject-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.3rem; width: fit-content; flex-wrap: wrap; }
        .subject-tab { padding: 0.7rem 2rem; border-radius: 3rem; font-weight: 500; cursor: pointer; transition: 0.2s; color: var(--text-secondary); white-space: nowrap; }
        .subject-tab.active { background: var(--accent); color: white; }
        .subject-tab:hover:not(.active) { color: var(--accent); }

        .week-selector { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem; flex-wrap: wrap; }
        .week-chip { padding: 0.55rem 1.3rem; border-radius: 2rem; font-weight: 500; font-size: 0.85rem; cursor: pointer; background: var(--card-bg); color: var(--text-secondary); border: 1px solid var(--border); white-space: nowrap; transition: 0.2s; }
        .week-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
        .week-chip:hover:not(.active) { border-color: var(--accent); }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; transition: all 0.3s; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .btn { padding: 0.6rem 1.3rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.35rem 0.9rem; font-size: 0.8rem; border-radius: 1.5rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .resource-container { margin-bottom: 1.5rem; }
        .textbook-content { background: var(--resource-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; font-size: 1.05rem; line-height: 1.9; }
        .textbook-content h2 { color: var(--accent); margin-bottom: 1rem; font-size: 1.5rem; }
        .textbook-content h3 { color: var(--text-primary); margin: 1.5rem 0 0.5rem; font-size: 1.2rem; }
        .textbook-content .key-point { background: var(--key-point-bg); border-left: 4px solid var(--accent); padding: 0.8rem 1.2rem; margin: 1rem 0; border-radius: 0.5rem; }
        .textbook-content ul, .textbook-content ol { padding-left: 1.5rem; margin: 0.8rem 0; }
        .textbook-content p { margin-bottom: 1rem; }
        .textbook-content strong { color: var(--accent); }

        .handwriting-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .handwriting-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.2rem; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .handwriting-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
        .handwriting-card img { width: 100%; display: block; min-height: 200px; object-fit: cover; background: #f0f0f0; }
        .handwriting-card .img-caption { padding: 0.8rem; font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem; }
        .handwriting-card .img-caption i { color: var(--accent); font-size: 0.7rem; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .video-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.2rem; overflow: hidden; transition: 0.2s; }
        .video-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
        .video-embed-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        .video-embed-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-card .video-info { padding: 1rem; }
        .video-card .video-info h4 { font-size: 0.95rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; }
        .video-card .video-info p { font-size: 0.8rem; color: var(--text-secondary); }
        .platform-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; }
        .platform-badge.youtube { background: #ff000022; color: #ff4444; }
        .platform-badge.vimeo { background: #1ab7ea22; color: #1ab7ea; }

        .meetings-list { display: flex; flex-direction: column; gap: 1rem; }
        .meeting-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.2rem; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; transition: 0.2s; }
        .meeting-card:hover { border-color: var(--accent); }
        .meeting-card.live { border: 2px solid var(--success-text); background: var(--meeting-live-bg); }
        .meeting-card.soon { border: 2px solid var(--warning-text); background: var(--meeting-soon-bg); }
        .meeting-info { flex: 1; min-width: 200px; }
        .meeting-info h4 { font-size: 1rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; }
        .meeting-info p { font-size: 0.85rem; color: var(--text-secondary); }
        .meeting-info .meeting-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.3rem; }
        .meeting-meta span { display: flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; color: var(--text-secondary); }
        .meeting-status { padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; }
        .meeting-status.live { background: var(--success-bg); color: var(--success-text); animation: pulse 2s infinite; }
        .meeting-status.upcoming { background: var(--warning-bg); color: var(--warning-text); }
        .meeting-status.past { background: var(--hover-bg); color: var(--text-secondary); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .meeting-join-btn { background: var(--success-text); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; white-space: nowrap; }
        .meeting-join-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .meeting-join-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .image-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 3000; cursor: pointer; }
        .image-popup-overlay.active { display: flex; }
        .image-popup-overlay img { max-width: 90%; max-height: 90%; border-radius: 1rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .image-popup-close { position: absolute; top: 2rem; right: 2rem; color: white; font-size: 2rem; cursor: pointer; z-index: 3001; transition: 0.2s; }
        .image-popup-close:hover { transform: scale(1.2); }
        .image-popup-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 2rem; cursor: pointer; z-index: 3001; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .image-popup-nav:hover { background: rgba(0,0,0,0.8); }
        .image-popup-nav.prev { left: 2rem; }
        .image-popup-nav.next { right: 2rem; }
        .image-popup-counter { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: white; font-size: 0.9rem; background: rgba(0,0,0,0.6); padding: 0.5rem 1.5rem; border-radius: 2rem; }

        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; display: block; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .empty-state p { font-size: 0.9rem; }

        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 5000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast { background: rgba(15,23,42,0.95); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem 1.5rem; min-width: 300px; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); display: flex; align-items: flex-start; gap: 0.8rem; animation: slideInRight 0.3s; pointer-events: auto; }
        .toast.removing { animation: slideOutRight 0.3s ease-in forwards; }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

        @media (max-width: 768px) {
            .main-container { padding: 1rem; }
            .top-nav { padding: 0.8rem 1rem; }
            .welcome-banner { padding: 1.5rem; }
            .welcome-banner h1 { font-size: 1.3rem; }
            .video-grid { grid-template-columns: 1fr; }
            .handwriting-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .meeting-card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Image Lightbox -->
    <div class="image-popup-overlay" id="imagePopupOverlay">
        <i class="fas fa-times image-popup-close" onclick="closeImagePopup()"></i>
        <div class="image-popup-nav prev" onclick="navigateImage(-1)"><i class="fas fa-chevron-left"></i></div>
        <img id="imagePopupImg" src="" alt="Visual note" onclick="event.stopPropagation()">
        <div class="image-popup-nav next" onclick="navigateImage(1)"><i class="fas fa-chevron-right"></i></div>
        <div class="image-popup-counter" id="imagePopupCounter">1 / 1</div>
    </div>

    <div class="top-nav">
        <div class="nav-left">
            <div class="nav-brand"><i class="fas fa-graduation-cap"></i> EduTop</div>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
            <div class="profile-dropdown">
                <div class="profile-trigger"><span class="profile-name" id="profileName">Student</span><div class="profile-pic" id="profilePic">S</div></div>
                <div class="dropdown-menu">
                    <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                    <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <div class="banner-decoration"><i class="fas fa-book-open"></i></div>
            <h1 id="welcomeGreeting">Welcome back!</h1>
            <p id="classInfo">Your learning resources are ready.</p>
        </div>

        <!-- Subject Tabs -->
        <div class="subject-tabs" id="subjectTabs"></div>

        <!-- Sub Navigation -->
        <div class="sub-tabs" id="subTabs">
            <div class="sub-tab active" data-tab="resources"><i class="fas fa-book-reader"></i> Study Resources <span class="count-badge" id="resourceCount">0</span></div>
            <div class="sub-tab" data-tab="videos"><i class="fas fa-play-circle"></i> Videos <span class="count-badge" id="videoCount">0</span></div>
            <div class="sub-tab" data-tab="images"><i class="fas fa-images"></i> Visual Notes <span class="count-badge" id="imageCount">0</span></div>
            <div class="sub-tab" data-tab="meetings"><i class="fas fa-video"></i> Meetings <span class="count-badge" id="meetingCount">0</span></div>
        </div>

        <!-- Week Selector -->
        <div class="week-selector" id="weekSelector"></div>

        <!-- Tab Content -->
        <div id="tabContent"></div>
    </div>

    <script type="module">
        // === FIREBASE INIT ===
        firebase.initializeApp({
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        });
        const auth = firebase.auth();
        const db = firebase.firestore();

        // === THEME ===
        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', s);
            document.getElementById('themeToggle').querySelector('span').textContent = s === 'dark' ? 'Light' : 'Dark';
            document.getElementById('themeToggle').addEventListener('click', () => {
                const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', n);
                localStorage.setItem('edutopscholars-theme', n);
                document.getElementById('themeToggle').querySelector('span').textContent = n === 'dark' ? 'Light' : 'Dark';
            });
        })();

        // === UTILITY ===
        function showToast(t, m, ty = 'info', d = 4000) {
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerHTML = `<i class="fas ${icons[ty]}" style="color:${ty==='success'?'#4ade80':ty==='error'?'#f87171':ty==='warning'?'#fbbf24':'#60a5fa'};margin-top:2px;"></i><div><strong>${t}</strong><br><span style="opacity:0.8;">${m}</span></div><button class="toast-close" onclick="this.parentElement.remove()" style="background:none;border:none;color:white;cursor:pointer;"><i class="fas fa-times"></i></button>`;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => { el.classList.add('removing'); setTimeout(() => el.remove(), 300); }, d);
        }
        function getVideoPlatform(url) { if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube'; if (url.includes('vimeo.com')) return 'vimeo'; return 'other'; }
        function getYouTubeId(url) { const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
        function getVimeoId(url) { const m = url.match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; }

        // === STATE ===
        let currentUser = null, userData = null, currentClass = null;
        let subjects = [], currentSubject = null, weeks = [], currentWeek = null;
        let resourcesMap = {}, currentTab = 'resources';
        let popupImages = [], popupIndex = 0;

        // === AUTH ===
        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            try {
                const d = await db.collection('users').doc(user.uid).get();
                if (!d.exists || d.data().role !== 'student') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = d.data();
                currentClass = userData.classEnrolled || userData.classId || null;
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || '');
                document.getElementById('profileName').textContent = userData.firstName || 'Student';
                document.getElementById('welcomeGreeting').textContent = `Welcome, ${userData.firstName || 'Student'}!`;
                document.getElementById('classInfo').textContent = currentClass ? `Class: ${currentClass} · Your learning hub` : 'Your learning hub';

                subjects = userData.subjects || [];
                if (!subjects.length && currentClass) {
                    const classDoc = await db.collection('classes').doc(currentClass).get();
                    if (classDoc.exists) subjects = classDoc.data().subjects || [];
                }
                renderSubjectTabs();
                await loadResources();
                await loadMeetings();

                // URL params
                const urlParams = new URLSearchParams(window.location.search);
                const subj = urlParams.get('subject'); const wk = urlParams.get('week');
                if (subj && subjects.includes(subj)) { switchSubject(subj); if (wk) setTimeout(() => selectWeek(parseInt(wk)), 400); }
                else if (subjects.length > 0) switchSubject(subjects[0]);
            } catch (e) { console.error('Auth error:', e); showToast('Error', e.message, 'error'); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
        document.getElementById('profileLink').addEventListener('click', () => window.location.href = 'student-profile.html');

        // === SUBJECT TABS ===
        function renderSubjectTabs() {
            const c = document.getElementById('subjectTabs');
            c.innerHTML = '';
            if (!subjects.length) { c.innerHTML = '<span style="padding:0.7rem 1rem;color:var(--text-secondary);">No subjects available yet.</span>'; return; }
            subjects.forEach(s => {
                const t = document.createElement('span');
                t.className = 'subject-tab';
                t.textContent = s;
                t.onclick = () => switchSubject(s, t);
                c.appendChild(t);
            });
        }
        async function switchSubject(subject, el) {
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            if (el) el.classList.add('active');
            else document.querySelectorAll('.subject-tab').forEach(t => { if (t.textContent === subject) t.classList.add('active'); });
            currentSubject = subject;
            await loadResources();
        }
        async function loadResources() {
            if (!currentSubject) return;
            try {
                const snap = await db.collection('lessonNotes')
                    .where('subject', '==', currentSubject)
                    .where('resourcePublished', '==', true)
                    .get();
                weeks = [];
                resourcesMap = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.week) { weeks.push(d.week); resourcesMap[d.week] = { id: doc.id, ...d }; }
                });
                // Also include videos published and handwriting published
                const snap2 = await db.collection('lessonNotes')
                    .where('subject', '==', currentSubject)
                    .where('videosPublished', '==', true)
                    .get();
                snap2.forEach(doc => {
                    const d = doc.data();
                    if (d.week && !resourcesMap[d.week]) { weeks.push(d.week); resourcesMap[d.week] = { id: doc.id, ...d }; }
                    else if (d.week) { resourcesMap[d.week] = { ...resourcesMap[d.week], videoLinks: d.videoLinks, videosPublished: true }; }
                });
                const snap3 = await db.collection('lessonNotes')
                    .where('subject', '==', currentSubject)
                    .where('handwritingImagesPublished', '==', true)
                    .get();
                snap3.forEach(doc => {
                    const d = doc.data();
                    if (d.week && !resourcesMap[d.week]) { weeks.push(d.week); resourcesMap[d.week] = { id: doc.id, ...d }; }
                    else if (d.week) { resourcesMap[d.week] = { ...resourcesMap[d.week], handwritingImages: d.handwritingImages, handwritingImagesPublished: true }; }
                });
                weeks = [...new Set(weeks)].sort((a, b) => a - b);
                renderWeekSelector();
                if (weeks.length > 0 && !currentWeek) selectWeek(weeks[0]);
                else if (currentWeek) selectWeek(currentWeek);
                else { currentWeek = null; renderTabContent(); }
            } catch (e) { console.error('Load error:', e); showToast('Error', 'Failed to load resources', 'error'); }
        }
        function renderWeekSelector() {
            const c = document.getElementById('weekSelector');
            c.innerHTML = weeks.map(w => `<div class="week-chip${w === currentWeek ? ' active' : ''}" onclick="selectWeek(${w})">Week ${w}</div>`).join('');
            if (!weeks.length) c.innerHTML = '<span style="color:var(--text-secondary);padding:0.5rem;">No published content yet.</span>';
        }
        window.selectWeek = week => {
            currentWeek = week;
            document.querySelectorAll('.week-chip').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.week-chip').forEach(c => { if (c.textContent.includes(`Week ${week}`)) c.classList.add('active'); });
            renderTabContent();
        };

        // === SUB TABS ===
        document.querySelectorAll('#subTabs .sub-tab').forEach(t => t.addEventListener('click', () => {
            document.querySelectorAll('#subTabs .sub-tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            currentTab = t.dataset.tab;
            renderTabContent();
        }));

        function renderTabContent() {
            const container = document.getElementById('tabContent');
            const note = currentWeek ? resourcesMap[currentWeek] : null;

            // Update counts
            const allNotes = Object.values(resourcesMap);
            document.getElementById('resourceCount').textContent = allNotes.filter(n => n.resourcePublished && n.studentResource).length;
            document.getElementById('videoCount').textContent = allNotes.filter(n => n.videosPublished && n.videoLinks?.length).reduce((sum, n) => sum + (n.videoLinks?.length || 0), 0);
            document.getElementById('imageCount').textContent = allNotes.filter(n => n.handwritingImagesPublished && n.handwritingImages?.length).reduce((sum, n) => sum + (n.handwritingImages?.length || 0), 0);

            if (!note) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><h3>No content yet</h3><p>Your teacher hasn't published any resources for this week. Check back later!</p></div>`;
                return;
            }

            switch (currentTab) {
                case 'resources': renderResourcesTab(container, note); break;
                case 'videos': renderVideosTab(container, note); break;
                case 'images': renderImagesTab(container, note); break;
                case 'meetings': renderMeetingsTabContent(container); break;
            }
        }

        // === RESOURCES TAB ===
        function renderResourcesTab(container, note) {
            if (!note.studentResource) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-book-reader"></i><h3>No study resources</h3><p>Textbook-style notes for this week haven't been published yet.</p></div>`;
                return;
            }
            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-book-reader"></i> ${currentSubject} — Week ${currentWeek} Study Notes</h3>
                        <span class="platform-badge" style="background:var(--success-bg);color:var(--success-text);padding:0.3rem 1rem;">📖 Published</span>
                    </div>
                    <div class="textbook-content">${note.studentResource.replace(/\n/g, '<br>')}</div>
                </div>
            `;
        }

        // === VIDEOS TAB ===
        function renderVideosTab(container, note) {
            if (!note.videoLinks?.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-play-circle"></i><h3>No videos</h3><p>No video links have been published for this week.</p></div>`;
                return;
            }
            const videosHtml = note.videoLinks.map((link, i) => {
                const platform = getVideoPlatform(link);
                let embedHtml = '';
                if (platform === 'youtube') {
                    const ytId = getYouTubeId(link);
                    if (ytId) embedHtml = `<div class="video-embed-wrapper"><iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="Video ${i + 1}"></iframe></div>`;
                } else if (platform === 'vimeo') {
                    const vId = getVimeoId(link);
                    if (vId) embedHtml = `<div class="video-embed-wrapper"><iframe src="https://player.vimeo.com/video/${vId}?quality=1080p" allow="autoplay; fullscreen" allowfullscreen title="Video ${i + 1}"></iframe></div>`;
                }
                const badge = platform === 'youtube' ? '<span class="platform-badge youtube">YouTube</span>' : platform === 'vimeo' ? '<span class="platform-badge vimeo">Vimeo</span>' : '<span class="platform-badge">External</span>';
                return `
                    <div class="video-card">
                        ${embedHtml || `<div class="video-embed-wrapper" style="display:flex;align-items:center;justify-content:center;background:var(--hover-bg);"><a href="${link}" target="_blank" class="btn btn-primary"><i class="fas fa-external-link-alt"></i> Open Video</a></div>`}
                        <div class="video-info">
                            <h4>${badge} Video ${i + 1}</h4>
                            <p>${platform === 'youtube' ? 'YouTube · HD Quality' : platform === 'vimeo' ? 'Vimeo · HD Quality' : 'External Link'}</p>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = `<div class="card"><div class="card-header"><h3><i class="fas fa-play-circle"></i> Video Resources — Week ${currentWeek}</h3></div><div class="video-grid">${videosHtml}</div></div>`;
        }

        // === IMAGES TAB ===
        function renderImagesTab(container, note) {
            if (!note.handwritingImages?.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-images"></i><h3>No visual notes</h3><p>No visual notes or diagrams have been published for this week.</p></div>`;
                return;
            }
            popupImages = note.handwritingImages;
            const imagesHtml = note.handwritingImages.map((img, i) => `
                <div class="handwriting-card" onclick="openImagePopup(${i})">
                    <img src="${img.url}" alt="Visual note ${i + 1}" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect fill=%22%23e0e0e0%22 width=%22300%22 height=%22200%22/><text fill=%22%23666%22 x=%22150%22 y=%22100%22 text-anchor=%22middle%22 font-size=%2214%22>Image unavailable</text></svg>';">
                    <div class="img-caption"><i class="fas fa-search-plus"></i> Visual Note ${i + 1} — Click to enlarge</div>
                </div>
            `).join('');
            container.innerHTML = `<div class="card"><div class="card-header"><h3><i class="fas fa-images"></i> Visual Notes — Week ${currentWeek}</h3><span style="font-size:0.85rem;color:var(--text-secondary);">${note.handwritingImages.length} image${note.handwritingImages.length > 1 ? 's' : ''} · Click to enlarge</span></div><div class="handwriting-grid">${imagesHtml}</div></div>`;
        }

        // === IMAGE LIGHTBOX ===
        window.openImagePopup = index => {
            popupIndex = index;
            document.getElementById('imagePopupImg').src = popupImages[index]?.url || '';
            document.getElementById('imagePopupCounter').textContent = `${index + 1} / ${popupImages.length}`;
            document.getElementById('imagePopupOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        window.closeImagePopup = () => {
            document.getElementById('imagePopupOverlay').classList.remove('active');
            document.body.style.overflow = '';
        };
        window.navigateImage = dir => {
            popupIndex = (popupIndex + dir + popupImages.length) % popupImages.length;
            document.getElementById('imagePopupImg').src = popupImages[popupIndex]?.url || '';
            document.getElementById('imagePopupCounter').textContent = `${popupIndex + 1} / ${popupImages.length}`;
        };

        // === MEETINGS ===
        async function loadMeetings() {
            if (!currentClass) return;
            try {
                const now = new Date();
                const snap = await db.collection('virtualClasses')
                    .where('classId', '==', currentClass)
                    .where('date', '>=', new Date().toISOString().split('T')[0])
                    .orderBy('date', 'asc')
                    .orderBy('time', 'asc')
                    .get();
                const meetings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('meetingCount').textContent = meetings.length;
                window._meetings = meetings;
                if (currentTab === 'meetings') renderMeetingsTabContent(document.getElementById('tabContent'));
            } catch (e) { console.warn('Meetings load error:', e); }
        }
        function renderMeetingsTabContent(container) {
            const meetings = window._meetings || [];
            if (!meetings.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-video"></i><h3>No meetings scheduled</h3><p>No upcoming virtual classes have been scheduled yet.</p></div>`;
                return;
            }
            const now = new Date();
            const meetingsHtml = meetings.map(m => {
                const meetingTime = new Date(`${m.date}T${m.time}`);
                const diffMs = meetingTime - now;
                const diffMins = Math.floor(diffMs / 60000);
                let status = 'upcoming', statusText = 'Upcoming', cardClass = '';
                if (diffMins <= 0 && diffMins > -60) { status = 'live'; statusText = '● Live Now'; cardClass = 'live'; }
                else if (diffMins <= 15 && diffMins > 0) { status = 'soon'; statusText = '● Starting Soon'; cardClass = 'soon'; }
                else if (diffMins < 0) { status = 'past'; statusText = 'Past'; cardClass = ''; }
                const disabled = status === 'past' ? 'disabled' : '';
                return `
                    <div class="meeting-card ${cardClass}">
                        <div class="meeting-info">
                            <h4><i class="fas fa-video" style="color:${status==='live'?'var(--success-text)':status==='soon'?'var(--warning-text)':'var(--accent)'};"></i> ${m.subject || 'Class'} — Week ${m.week || '?'}</h4>
                            <p>${m.platform || 'Online'} · Duration: ${m.duration || '?'} minutes</p>
                            <div class="meeting-meta">
                                <span><i class="fas fa-calendar"></i> ${m.date || 'N/A'}</span>
                                <span><i class="fas fa-clock"></i> ${m.time || 'N/A'}</span>
                                <span class="meeting-status ${status}">${statusText}</span>
                            </div>
                        </div>
                        <a href="${m.link || '#'}" target="_blank" class="meeting-join-btn" ${disabled}>
                            <i class="fas fa-sign-in-alt"></i> ${status === 'live' ? 'Join Now' : status === 'past' ? 'Ended' : 'Join Meeting'}
                        </a>
                    </div>
                `;
            }).join('');
            container.innerHTML = `<div class="card"><div class="card-header"><h3><i class="fas fa-video"></i> Scheduled Virtual Classes</h3><span style="font-size:0.85rem;color:var(--text-secondary);">${meetings.length} upcoming</span></div><div class="meetings-list">${meetingsHtml}</div></div>`;
        }

        // === KEYBOARD NAVIGATION ===
        document.addEventListener('keydown', e => {
            if (document.getElementById('imagePopupOverlay').classList.contains('active')) {
                if (e.key === 'ArrowLeft') navigateImage(-1);
                if (e.key === 'ArrowRight') navigateImage(1);
                if (e.key === 'Escape') closeImagePopup();
            }
        });
        document.getElementById('imagePopupOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('imagePopupOverlay')) closeImagePopup();
        });

        // === REFRESH MEETINGS PERIODICALLY ===
        setInterval(() => { if (currentTab === 'meetings') renderMeetingsTabContent(document.getElementById('tabContent')); }, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA · Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        /* Same base styles as before – keep consistent */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        :root[data-theme="light"] {
            --bg-primary:#f0f4fa; --bg-secondary:#ffffff; --text-primary:#1e293b; --text-secondary:#334155;
            --accent:#2563eb; --accent-hover:#1d4ed8; --border:rgba(0,0,0,0.1); --card-bg:rgba(255,255,255,0.7);
            --sidebar-bg:rgba(255,255,255,0.8); --shadow:0 10px 30px -10px rgba(0,0,0,0.2);
            --danger:#dc2626; --success:#16a34a; --warning:#ca8a04; --info:#2563eb;
        }
        :root[data-theme="dark"] {
            --bg-primary:#0b1120; --bg-secondary:#1e293b; --text-primary:#f1f5f9; --text-secondary:#cbd5e1;
            --accent:#38bdf8; --accent-hover:#7dd3fc; --border:rgba(255,255,255,0.08); --card-bg:rgba(15,23,42,0.8);
            --sidebar-bg:rgba(15,23,42,0.9); --shadow:0 10px 30px -10px rgba(0,0,0,0.5);
            --danger:#ef4444; --success:#22c55e; --warning:#eab308; --info:#38bdf8;
        }
        body {
            background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex;
            transition: background 0.3s, color 0.3s;
        }
        .sidebar {
            width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(16px);
            border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column;
            gap: 2rem; height: 100vh; position: sticky; top: 0; overflow-y: auto;
        }
        .logo-area { display: flex; align-items: center; gap: 0.8rem; padding: 0 1rem; }
        .logo-icon { font-size: 2rem; color: var(--accent); }
        .logo-text { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }
        .logo-small { font-size: 0.8rem; opacity: 0.6; }
        .nav { display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-radius: 1rem;
            color: var(--text-secondary); text-decoration: none; transition: 0.2s; cursor: pointer;
        }
        .nav-item i { width: 24px; font-size: 1.2rem; }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-item:hover:not(.active) { background: var(--card-bg); }
        .main { flex: 1; padding: 2rem; overflow-y: auto; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-title { font-size: 2rem; font-weight: 600; }
        .admin-info { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
        }
        .admin-profile {
            display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg);
            padding: 0.5rem 1rem; border-radius: 2rem;
        }
        .admin-profile img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .section {
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem;
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .section-title { font-weight: 600; font-size: 1.3rem; }
        .badge {
            background: var(--accent); color: white; padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.8rem;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 1.5rem; display: flex; align-items: center; gap: 1rem;
        }
        .stat-icon {
            width: 50px; height: 50px; border-radius: 1rem; background: var(--accent);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem;
        }
        .stat-info h3 { font-size: 1.8rem; font-weight: 700; }
        .stat-info p { color: var(--text-secondary); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.8rem 0.5rem; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 0.8rem 0.5rem; border-bottom: 1px solid var(--border); }
        .btn {
            background: transparent; border: 1px solid var(--border); padding: 0.4rem 1rem; border-radius: 2rem;
            color: var(--text-primary); cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-sm { padding: 0.2rem 0.8rem; font-size: 0.85rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index:1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary); padding: 2rem; border-radius: 2rem;
            width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto;
        }
        .modal-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); border-radius: 1rem;
            background: var(--input-bg, var(--bg-secondary)); color: var(--text-primary);
        }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .student-id-badge {
            background: var(--accent); color: white; padding: 0.3rem 1rem; border-radius: 2rem;
            font-size: 0.9rem; display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fas fa-user-graduate logo-icon"></i>
            <div><div class="logo-text">EDUMETA</div><div class="logo-small">Student Hub</div></div>
        </div>
        <nav class="nav">
            <div class="nav-item active" data-section="dashboard"><i class="fas fa-home"></i> Dashboard</div>
            <div class="nav-item" data-section="assignments"><i class="fas fa-tasks"></i> Assignments</div>
            <div class="nav-item" data-section="tests"><i class="fas fa-pencil-alt"></i> Tests & Exams</div>
            <div class="nav-item" data-section="cumulative"><i class="fas fa-chart-line"></i> Cumulative Record</div>
            <div class="nav-item" data-section="teacher"><i class="fas fa-chalkboard-teacher"></i> My Teacher</div>
            <div class="nav-item" data-section="report"><i class="fas fa-file-alt"></i> Report Card</div>
            <div class="nav-item" data-section="weekly"><i class="fas fa-calendar-week"></i> Weekly Stats</div>
            <div class="nav-item" data-section="profile"><i class="fas fa-id-card"></i> My Profile</div>
        </nav>
        <div style="margin-top: auto;"><div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
    </aside>

    <main class="main">
        <div class="top-bar">
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <div class="admin-info">
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i><span>Theme</span></div>
                <div class="admin-profile" id="student-profile">
                    <img src="https://ui-avatars.com/api/?name=Student&background=2563eb&color=fff" alt="Student">
                    <span id="student-name">Loading...</span>
                </div>
            </div>
        </div>
        <div id="section-content"><div style="text-align:center;padding:3rem"><i class="fas fa-spinner fa-pulse fa-3x"></i><p>Loading dashboard...</p></div></div>
    </main>

    <!-- Modal for viewing assignment/test details -->
    <div id="detailModal" class="modal"><div class="modal-content"><h2 id="modalTitle">Details</h2><div id="modalBody"></div><div class="modal-buttons"><button class="btn" onclick="closeModal()">Close</button></div></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8BCzF4xcTAMYu5Rt1ROMRuZLVYh5iwRQ",
            authDomain: "edumeta-c5588.firebaseapp.com",
            projectId: "edumeta-c5588",
            storageBucket: "edumeta-c5588.firebasestorage.app",
            messagingSenderId: "332853259697",
            appId: "1:332853259697:web:92e0c07e43d1c3bf432190",
            measurementId: "G-WY24HER46Q"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentSection = 'dashboard';
        let currentUser = null;
        let studentData = null;
        let unsubscribeFunctions = {};

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'student-auth.html'; return; }
            currentUser = user;
            const studentDoc = await db.collection('students').doc(user.uid).get();
            if (!studentDoc.exists) {
                alert('Student profile not found. Please contact admin.');
                auth.signOut(); return;
            }
            studentData = studentDoc.data();
            if (studentData.status !== 'approved') {
                alert('Your account is not yet approved. You cannot access the dashboard.');
                auth.signOut(); return;
            }
            document.getElementById('student-name').innerText = studentData.name || user.email.split('@')[0];
            if (studentData.photoURL) document.querySelector('.admin-profile img').src = studentData.photoURL;
            loadSection(currentSection);
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (item.classList.contains('active')) return;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                document.getElementById('page-title').innerText = item.innerText.trim();
                loadSection(currentSection);
            });
        });

        function loadSection(section) {
            Object.values(unsubscribeFunctions).forEach(unsub => unsub());
            unsubscribeFunctions = {};
            document.getElementById('section-content').innerHTML = '<div style="text-align:center;padding:3rem"><i class="fas fa-spinner fa-pulse fa-3x"></i><p>Loading...</p></div>';
            switch (section) {
                case 'dashboard': loadDashboard(); break;
                case 'assignments': loadAssignments(); break;
                case 'tests': loadTests(); break;
                case 'cumulative': loadCumulative(); break;
                case 'teacher': loadTeacher(); break;
                case 'report': loadReportCard(); break;
                case 'weekly': loadWeeklyStats(); break;
                case 'profile': loadProfile(); break;
                default: loadDashboard();
            }
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString();
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

        // ---------- DASHBOARD ----------
        function loadDashboard() {
            const html = `
                <div class="stats-grid" id="dashboard-stats">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Pending Assignments</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Upcoming Tests</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Average Score</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Rank</p></div></div>
                </div>
                <div class="section"><div class="section-header"><h2 class="section-title">Announcements</h2></div><div id="announcements">Loading...</div></div>
                <div class="section"><div class="section-header"><h2 class="section-title">Recent Activities</h2></div><div id="recent-activities">Loading...</div></div>
            `;
            document.getElementById('section-content').innerHTML = html;

            // Count pending assignments
            db.collection('assignments').where('class', '==', studentData.class).get().then(snap => {
                const total = snap.size;
                document.querySelector('#dashboard-stats').innerHTML = `
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-tasks"></i></div><div class="stat-info"><h3>${total}</h3><p>Assignments</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div><div class="stat-info"><h3>${Math.floor(Math.random()*3)}</h3><p>Upcoming Tests</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-simple"></i></div><div class="stat-info"><h3>${studentData.averageScore || 0}%</h3><p>Average</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-trophy"></i></div><div class="stat-info"><h3>#${studentData.rank || 'N/A'}</h3><p>Class Rank</p></div></div>
                `;
            });

            // Simulate announcements
            document.getElementById('announcements').innerHTML = '<p>No new announcements.</p>';
            // Recent activities from audit logs (by student email)
            unsubscribeFunctions.dashboardActivities = db.collection('auditLogs')
                .where('user', '==', currentUser.email).orderBy('timestamp','desc').limit(5)
                .onSnapshot(snap => {
                    let html = '<table><thead><tr><th>Action</th><th>Date</th></tr></thead><tbody>';
                    snap.forEach(d => { let a = d.data(); html += `<tr><td>${a.action}</td><td>${formatDate(a.timestamp)}</td></tr>`; });
                    html += '</tbody></table>';
                    document.getElementById('recent-activities').innerHTML = html || '<p>No recent activities.</p>';
                });
        }

        // ---------- ASSIGNMENTS ----------
        function loadAssignments() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">My Assignments</h2></div>
                <table><thead><tr><th>Title</th><th>Due Date</th><th>Status</th><th>Score</th><th>Actions</th></tr></thead>
                <tbody id="assignments-body">Loading...</tbody></table></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            unsubscribeFunctions.assignments = db.collection('assignments')
                .where('class', '==', studentData.class).orderBy('dueDate','desc')
                .onSnapshot(snap => {
                    let rows = '';
                    snap.forEach(doc => {
                        const a = doc.data();
                        // For demo, we assume a 'submissions' subcollection or a separate collection
                        // Simulate: check if student has submitted
                        const status = Math.random() > 0.5 ? 'Submitted' : 'Pending';
                        const score = status === 'Submitted' ? Math.floor(Math.random()*100) : '-';
                        rows += `<tr><td>${a.title}</td><td>${formatDate(a.dueDate)}</td><td>${status}</td><td>${score}</td>
                                 <td><button class="btn btn-sm" onclick="viewAssignment('${doc.id}')">View</button></td></tr>`;
                    });
                    document.getElementById('assignments-body').innerHTML = rows || '<tr><td colspan="5">No assignments.</td></tr>';
                });
        }

        window.viewAssignment = (id) => {
            document.getElementById('modalTitle').innerText = 'Assignment Details';
            document.getElementById('modalBody').innerHTML = '<p>Assignment details would appear here, including instructions and submission status.</p>';
            document.getElementById('detailModal').classList.add('active');
        };

        // ---------- TESTS & EXAMS ----------
        function loadTests() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">Tests & Mock Exams</h2></div>
                <table><thead><tr><th>Title</th><th>Date</th><th>Score</th><th>Actions</th></tr></thead>
                <tbody id="tests-body">Loading...</tbody></table></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            // For demo, generate mock tests
            let rows = '';
            for (let i=1; i<=3; i++) {
                rows += `<tr><td>Mathematics Test ${i}</td><td>2025-0${i}-15</td><td>${Math.floor(Math.random()*100)}%</td>
                         <td><button class="btn btn-sm" onclick="viewTest('test${i}')">View</button></td></tr>`;
            }
            document.getElementById('tests-body').innerHTML = rows;
        }

        window.viewTest = (id) => {
            document.getElementById('modalTitle').innerText = 'Test Details';
            document.getElementById('modalBody').innerHTML = '<p>Test questions and answers would be shown here.</p>';
            document.getElementById('detailModal').classList.add('active');
        };

        // ---------- CUMULATIVE RECORD ----------
        function loadCumulative() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">Cumulative Academic Record</h2></div>
                <table><thead><tr><th>Term</th><th>Average</th><th>Position</th><th>Actions</th></tr></thead>
                <tbody id="cumulative-body">Loading...</tbody></table></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            // Simulate terms
            const terms = ['Term 1', 'Term 2', 'Term 3'];
            let rows = '';
            terms.forEach((term, idx) => {
                rows += `<tr><td>${term}</td><td>${70+idx*5}%</td><td>${idx+3}</td>
                         <td><button class="btn btn-sm" onclick="viewTerm('${idx}')">View</button></td></tr>`;
            });
            document.getElementById('cumulative-body').innerHTML = rows;
        }

        window.viewTerm = (term) => {
            alert(`Detailed term report for term ${term}`);
        };

        // ---------- MY TEACHER ----------
        function loadTeacher() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">My Class Teacher</h2></div>
                <div id="teacher-info">Loading...</div></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            if (!studentData.classTeacherId) {
                document.getElementById('teacher-info').innerHTML = '<p>No teacher assigned yet.</p>';
                return;
            }
            unsubscribeFunctions.teacher = db.collection('users').doc(studentData.classTeacherId)
                .onSnapshot(doc => {
                    if (!doc.exists) { document.getElementById('teacher-info').innerHTML = '<p>Teacher not found.</p>'; return; }
                    const t = doc.data();
                    document.getElementById('teacher-info').innerHTML = `
                        <div style="display:flex; align-items:center; gap:2rem;">
                            <img src="${t.photoURL || 'https://ui-avatars.com/api/?name='+encodeURIComponent(t.name)}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">
                            <div><h3>${t.name} ${t.surname}</h3><p>${t.qualifications}</p><p>Email: ${t.email}</p><p>Phone: ${t.phone}</p></div>
                        </div>
                    `;
                });
        }

        // ---------- REPORT CARD ----------
        function loadReportCard() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">Latest Report Card</h2></div>
                <div id="report-card">Loading...</div></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            // Simulate report card
            document.getElementById('report-card').innerHTML = `
                <p><strong>Term:</strong> Term 2, 2025</p>
                <table><thead><tr><th>Subject</th><th>Score</th><th>Grade</th></tr></thead>
                <tbody>
                    <tr><td>Mathematics</td><td>85%</td><td>A</td></tr>
                    <tr><td>English</td><td>78%</td><td>B+</td></tr>
                    <tr><td>Science</td><td>92%</td><td>A</td></tr>
                    <tr><td>Social Studies</td><td>81%</td><td>B</td></tr>
                </tbody></table>
                <p><strong>Overall Average:</strong> 84%</p>
                <p><strong>Class Teacher's Comment:</strong> Excellent performance, keep it up!</p>
            `;
        }

        // ---------- WEEKLY STATS ----------
        function loadWeeklyStats() {
            const html = `
                <div class="section"><div class="section-header"><h2 class="section-title">Weekly Performance</h2></div>
                <canvas id="weeklyChart" style="width:100%; max-height:400px;"></canvas>
                <div id="weekly-stats">Loading...</div></div>
            `;
            document.getElementById('section-content').innerHTML = html;
            // Use Chart.js to display a simple line chart
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Average Score %',
                        data: [65, 75, 80, 85],
                        borderColor: 'var(--accent)',
                        backgroundColor: 'rgba(56,189,248,0.1)',
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // ---------- PROFILE ----------
        function loadProfile() {
            const html = `
                <div class="section">
                    <div class="section-header"><h2 class="section-title">My Profile</h2></div>
                    <p><strong>Student ID:</strong> <span class="student-id-badge">${studentData.studentId || currentUser.uid.slice(0,8)}</span></p>
                    <p><strong>Name:</strong> ${studentData.name}</p>
                    <p><strong>Class:</strong> ${studentData.class}</p>
                    <p><strong>Email:</strong> ${currentUser.email}</p>
                    <p><strong>Phone:</strong> ${studentData.phone || 'Not provided'}</p>
                    <p><strong>Address:</strong> ${studentData.address || 'Not provided'}</p>
                    <button class="btn btn-primary" onclick="editProfile()">Edit Profile</button>
                </div>
            `;
            document.getElementById('section-content').innerHTML = html;
        }

        window.editProfile = () => {
            alert('Edit profile functionality (upload photo, update info) can be added similarly to teacher profile.');
        };

        // ---------- LOGOUT & THEME ----------
        window.logout = () => auth.signOut().then(() => window.location.href = 'index.html');
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.querySelector('.theme-toggle i').className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }
        window.toggleTheme = toggleTheme;
        (function() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.querySelector('.theme-toggle i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        })();
    </script>
    <!-- Include Chart.js for weekly stats -->

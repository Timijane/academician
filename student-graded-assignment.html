<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Assignment Result | Student Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: rgba(255,255,255,0.95);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-glow: #60a5fa;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            --success-bg: #dcfce7;
            --success-text: #16a34a;
            --warning-bg: #fef9c3;
            --warning-text: #ca8a04;
            --danger-bg: #fee2e2;
            --danger-text: #dc2626;
            --info-bg: #dbeafe;
            --info-text: #2563eb;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: rgba(15,23,42,0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-glow: #60a5fa;
            --border: #1e293b;
            --card-bg: #1e293b;
            --hover-bg: #334155;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.2);
            --info-text: #60a5fa;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: all 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.1), transparent 70%);
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .orb-1 { top: -200px; right: -200px; background: radial-gradient(circle at 70% 30%, rgba(139,92,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -200px; background: radial-gradient(circle at 30% 70%, rgba(59,130,246,0.1), transparent 70%); animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .sidebar.collapsed { width: 90px; }

        .sidebar .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }

        .sidebar .logo-area i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar .logo-area h2 {
            font-size: 1.3rem;
            font-weight: 700;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar.collapsed .logo-area h2 { display: none; }

        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.2rem;
            border-radius: 1rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .sidebar .nav-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
            transform: translateX(5px);
            border-color: var(--border);
        }

        .sidebar .nav-item.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            box-shadow: 0 5px 15px -5px var(--accent);
        }

        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }

        .sidebar .toggle-btn {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            padding: 1rem 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s ease;
            position: relative;
            z-index: 5;
        }

        .main-content.expanded { margin-left: 90px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .page-title p { color: var(--text-secondary); font-size: 0.9rem; }

        .profile-area { display: flex; align-items: center; gap: 1rem; }

        .theme-toggle {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
        }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 2px 10px var(--accent);
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 55px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 200px;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow);
        }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item {
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.2s;
            cursor: pointer;
        }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        /* Result Card */
        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .result-header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 1.5rem;
            color: white;
        }

        .result-header h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .result-header p { font-size: 0.85rem; opacity: 0.9; }

        /* Score Section */
        .score-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--hover-bg);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-value { font-size: 2rem; font-weight: 800; color: var(--text-primary); }
        .score-max { font-size: 0.8rem; color: var(--text-secondary); }
        .percentage { font-size: 1.2rem; font-weight: 600; color: var(--success-text); }

        .grade-letter { text-align: center; }
        .grade-letter span { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grade-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }

        /* Feedback Section */
        .feedback-section, .corrections-section, .questions-review {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .feedback-section h3, .corrections-section h3, .questions-review h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feedback-content, .corrections-content {
            background: var(--hover-bg);
            padding: 1rem;
            border-radius: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Questions Review */
        .question-item {
            background: var(--hover-bg);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .question-number { font-weight: 700; color: var(--accent); }
        .question-points { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 1rem; background: var(--card-bg); }
        .question-text { margin-bottom: 0.75rem; font-weight: 500; }

        .answer-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .student-answer {
            background: var(--danger-bg);
            padding: 0.75rem;
            border-radius: 0.75rem;
        }

        .student-answer.correct { background: var(--success-bg); }
        .correct-answer { background: var(--success-bg); padding: 0.75rem; border-radius: 0.75rem; }
        .answer-label { font-size: 0.7rem; font-weight: 600; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
            background: var(--hover-bg);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .info-item i { width: 2rem; color: var(--accent); font-size: 1.2rem; }
        .info-item strong { display: block; font-size: 0.8rem; color: var(--text-secondary); }
        .info-item span { font-size: 0.9rem; font-weight: 500; }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            padding: 1.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
        }

        .empty-state i { font-size: 4rem; color: var(--text-secondary); margin-bottom: 1rem; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .loading-overlay.active { display: flex; }
        .loading-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
        }
        .loading-content i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .answer-comparison { grid-template-columns: 1fr; }
            .score-section { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-graduation-cap"></i><h2>EduTop</h2></div>
        <a href="student-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        <a href="student-assignments.html" class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="student-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="student-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="student-results.html" class="nav-item active"><i class="fas fa-chart-simple"></i><span>Results</span></a>
        <a href="student-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="student-profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Assignment Result</h1>
                <p>View your score, feedback, and corrections</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger"><span class="profile-name" id="profileName">Student</span><div class="profile-pic" id="profilePic">S</div></div>
                    <div class="dropdown-menu"><div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                </div>
            </div>
        </div>

        <div id="resultContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Loading your result...</h3>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>Loading...</h3>
            <p>Please wait</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });
        
        function updateThemeUI(theme) {
            const span = themeToggle.querySelector('span');
            span.textContent = theme === 'dark' ? 'Light' : 'Dark';
        }
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutop-theme', next);
            updateThemeUI(next);
        });
        
        let currentUser = null;
        let userData = null;
        let assignmentData = null;
        let submissionData = null;
        
        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getGradeInfo(percentage) {
            if (percentage >= 75) return { letter: 'A', description: 'Excellent', color: '#16a34a' };
            if (percentage >= 65) return { letter: 'B', description: 'Good', color: '#22c55e' };
            if (percentage >= 50) return { letter: 'C', description: 'Average', color: '#eab308' };
            if (percentage >= 40) return { letter: 'D', description: 'Pass', color: '#f97316' };
            return { letter: 'F', description: 'Fail', color: '#ef4444' };
        }
        
        function renderResult() {
            const container = document.getElementById('resultContainer');
            
            if (!submissionData || !assignmentData) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Result Not Available</h3>
                        <p>This assignment has not been graded yet or does not exist.</p>
                        <a href="student-assignments.html" class="btn btn-primary" style="margin-top: 1rem;">
                            <i class="fas fa-arrow-left"></i> Back to Assignments
                        </a>
                    </div>
                `;
                return;
            }
            
            const score = submissionData.score || 0;
            const totalPoints = assignmentData.totalPoints || 100;
            const percentage = (score / totalPoints) * 100;
            const gradeInfo = getGradeInfo(percentage);
            const percentageDeg = (percentage / 100) * 360;
            
            let questionsHtml = '';
            if (assignmentData.assignmentType === 'mcq' && assignmentData.questions && submissionData.answers) {
                const questions = assignmentData.questions;
                const answers = submissionData.answers;
                
                questionsHtml = answers.map((answer, idx) => {
                    const question = questions[answer.questionIndex];
                    if (!question) return '';
                    const isCorrect = answer.selectedAnswer === question.correct;
                    const studentOptionText = question.options?.[answer.selectedAnswer.charCodeAt(0) - 65] || 'N/A';
                    const correctOptionText = question.options?.[question.correct.charCodeAt(0) - 65] || 'N/A';
                    
                    return `
                        <div class="question-item">
                            <div class="question-header">
                                <span class="question-number">Question ${idx + 1}</span>
                                <span class="question-points">${isCorrect ? (question.points || 1) : 0}/${question.points || 1} pts</span>
                            </div>
                            <div class="question-text">${escapeHtml(question.question)}</div>
                            <div class="answer-comparison">
                                <div class="student-answer ${isCorrect ? 'correct' : ''}">
                                    <div class="answer-label">Your Answer</div>
                                    <strong>${answer.selectedAnswer}</strong>. ${escapeHtml(studentOptionText)}
                                </div>
                                ${!isCorrect ? `
                                    <div class="correct-answer">
                                        <div class="answer-label">Correct Answer</div>
                                        <strong>${question.correct}</strong>. ${escapeHtml(correctOptionText)}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            container.innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <h2>${escapeHtml(assignmentData.title)}</h2>
                        <p>${escapeHtml(assignmentData.subject)} • Week ${assignmentData.week} • ${escapeHtml(assignmentData.topic)}</p>
                    </div>
                    
                    <div class="score-section">
                        <div class="score-circle" style="background: conic-gradient(var(--success-text) ${percentageDeg}deg, var(--border) ${percentageDeg}deg); border-radius: 50%;">
                            <div class="score-inner">
                                <div class="score-value">${score}</div>
                                <div class="score-max">/${totalPoints}</div>
                            </div>
                        </div>
                        <div class="grade-letter">
                            <span>${gradeInfo.letter}</span>
                            <div class="grade-desc">${gradeInfo.description}</div>
                            <div class="percentage">${percentage.toFixed(1)}%</div>
                        </div>
                    </div>
                    
                    ${submissionData.feedback ? `
                        <div class="feedback-section">
                            <h3><i class="fas fa-comment-dots"></i> Teacher's Feedback</h3>
                            <div class="feedback-content">${escapeHtml(submissionData.feedback)}</div>
                        </div>
                    ` : ''}
                    
                    ${submissionData.corrections ? `
                        <div class="corrections-section">
                            <h3><i class="fas fa-edit"></i> Corrections & Notes</h3>
                            <div class="corrections-content">${submissionData.corrections}</div>
                        </div>
                    ` : ''}
                    
                    ${assignmentData.assignmentType === 'mcq' && questionsHtml ? `
                        <div class="questions-review">
                            <h3><i class="fas fa-question-circle"></i> Questions Review</h3>
                            ${questionsHtml}
                        </div>
                    ` : ''}
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <i class="fas fa-calendar-check"></i>
                            <div><strong>Submitted On</strong><span>${submissionData.submittedAt ? new Date(submissionData.submittedAt.toDate()).toLocaleString() : 'N/A'}</span></div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-chalkboard-user"></i>
                            <div><strong>Graded By</strong><span>${submissionData.gradedBy ? 'Teacher' : 'Not graded'}</span></div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-clock"></i>
                            <div><strong>Graded On</strong><span>${submissionData.gradedAt ? new Date(submissionData.gradedAt.toDate()).toLocaleString() : 'Pending'}</span></div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-tasks"></i>
                            <div><strong>Assignment Type</strong><span>${assignmentData.assignmentType === 'mcq' ? 'Multiple Choice' : 'Essay'}</span></div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="student-assignments.html" class="btn btn-outline">
                            <i class="fas fa-arrow-left"></i> Back to Assignments
                        </a>
                        <button class="btn btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i> Print Result
                        </button>
                    </div>
                </div>
            `;
        }
        
        async function loadResult() {
            const urlParams = new URLSearchParams(window.location.search);
            const assignmentId = urlParams.get('id');
            
            if (!assignmentId) {
                document.getElementById('resultContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>No Assignment Selected</h3>
                        <p>Please select an assignment from your assignments page.</p>
                        <a href="student-assignments.html" class="btn btn-primary" style="margin-top: 1rem;">Go to Assignments</a>
                    </div>
                `;
                return;
            }
            
            showLoading();
            try {
                const assignmentDoc = await db.collection('assignments').doc(assignmentId).get();
                if (!assignmentDoc.exists) throw new Error('Assignment not found');
                assignmentData = { id: assignmentDoc.id, ...assignmentDoc.data() };
                
                const submissionsSnap = await db.collection('submissions')
                    .where('assignmentId', '==', assignmentId)
                    .where('studentId', '==', currentUser.uid)
                    .get();
                
                if (submissionsSnap.empty) {
                    submissionData = null;
                } else {
                    submissionData = { id: submissionsSnap.docs[0].id, ...submissionsSnap.docs[0].data() };
                }
                
                renderResult();
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('resultContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Result</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 1rem;">Retry</button>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'student') {
                    await auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = user;
                userData = userDoc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || 'T');
                document.getElementById('profileName').textContent = `${userData.firstName || 'Student'} ${userData.surname || ''}`.trim();
                await loadResult();
            } catch (error) {
                console.error('Auth error:', error);
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('profileLink').addEventListener('click', () => window.location.href='student-profile.html');
    </script>
</body>
</html>

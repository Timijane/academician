<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Payment Upload</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] { --bg-primary: #f0f5fa; --bg-sidebar: rgba(255,255,255,0.75); --text-primary: #0b1e33; --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --success-bg: #dcfce7; --success-text: #16a34a; --warning-bg: #fef9c3; --warning-text: #ca8a04; --danger-bg: #fee2e2; --danger-text: #dc2626; --info-bg: #dbeafe; --info-text: #2563eb; --gradient-start: #1e3c72; --gradient-end: #2a5298; }
        :root[data-theme="dark"] { --bg-primary: #0a0f1e; --bg-sidebar: rgba(15,23,42,0.8); --text-primary: #f0f4fa; --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05); --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24; --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171; --info-bg: rgba(59,130,246,0.2); --info-text: #60a5fa; --gradient-start: #3b82f6; --gradient-end: #8b5cf6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; transition: width 0.3s; z-index: 100; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
        .sidebar .logo-area i { font-size: 2.2rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; white-space: nowrap; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.2rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.5rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); transform: translateX(5px); border-color: var(--border); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; box-shadow: 0 5px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s; }
        .main-content.expanded { margin-left: 90px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.3rem 0.3rem 0.3rem 1rem; }
        .profile-name { font-weight: 600; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem; min-width: 200px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        .dropdown-item { padding: 0.75rem 1rem; color: var(--text-primary); border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-weight: 500; }
        .form-control, .form-select { width: 100%; padding: 0.75rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-success { background: var(--success-text); color: white; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--hover-bg); font-weight: 600; }
        .badge { padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-pending { background: var(--warning-bg); color: var(--warning-text); }
        .badge-confirmed { background: var(--success-bg); color: var(--success-text); }
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .main-content { margin-left: 80px; padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-graduation-cap"></i><h2>EduTop</h2></div>
        <a href="student-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        <a href="student-payments.html" class="nav-item active"><i class="fas fa-credit-card"></i><span>Payments</span></a>
        <a href="student-profile.html" class="nav-item"><i class="fas fa-user-edit"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title"><h1>Payment Upload</h1><p>Submit payment receipt for verification</p></div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown"><div class="profile-trigger"><span class="profile-name" id="profileName">Student</span><div class="profile-pic" id="profilePic">ST</div></div><div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-upload"></i> New Payment Receipt</h3></div>
            <form id="paymentForm">
                <div class="form-group"><label>Payment For</label><select id="paymentType" class="form-control" required><option value="">Select</option><option value="Tuition">Tuition</option><option value="Exam Fee">Exam Fee</option><option value="Sports Fee">Sports Fee</option><option value="Library Fee">Library Fee</option><option value="Other">Other</option></select></div>
                <div class="form-group"><label>Amount (₦)</label><input type="number" id="amount" class="form-control" required></div>
                <div class="form-group"><label>Receipt/Reference Number</label><input type="text" id="reference" class="form-control" placeholder="e.g., Teller No, Transaction ID" required></div>
                <div class="form-group"><label>Upload Receipt Image</label><input type="file" id="receiptFile" accept="image/*" class="form-control" required></div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit for Verification</button>
            </form>
        </div>
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-history"></i> My Payment History</h3></div>
            <div class="table-responsive"><table><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Reference</th><th>Status</th><th>Admin Remark</th></tr></thead><tbody id="historyBody"><tr><td colspan="6">Loading...</td></tr></tbody></table></div>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0", authDomain: "triangle-6e6b7.firebaseapp.com", projectId: "triangle-6e6b7", storageBucket: "triangle-6e6b7.firebasestorage.app", messagingSenderId: "673937760480", appId: "1:673937760480:web:f03c06e1207232213ef085" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // UI
        const sidebar = document.getElementById('sidebar'), mainContent = document.getElementById('mainContent'), toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('collapsed'); mainContent.classList.toggle('expanded'); });
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => { const current = html.getAttribute('data-theme'); const next = current === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('edutop-theme', next); themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark'; });
        let currentUser = null, studentData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'student') { auth.signOut(); window.location.href = 'index.html'; return; }
            studentData = userDoc.data();
            document.getElementById('profileName').textContent = studentData.firstName || 'Student';
            document.getElementById('profilePic').textContent = (studentData.firstName?.[0] || 'S') + (studentData.surname?.[0] || 'T');
            loadPaymentHistory();
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const paymentType = document.getElementById('paymentType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const reference = document.getElementById('reference').value.trim();
            const file = document.getElementById('receiptFile').files[0];
            if (!paymentType || !amount || !reference || !file) { alert('Please fill all fields and select an image.'); return; }
            // Convert image to base64 for storage (demo; in production use Firebase Storage)
            const reader = new FileReader();
            reader.onloadend = async () => {
                try {
                    await db.collection('payments').add({
                        studentId: auth.currentUser.uid,
                        studentName: `${studentData.firstName || ''} ${studentData.surname || ''}`.trim(),
                        studentClass: studentData.class || 'N/A',
                        paymentType,
                        amount,
                        reference,
                        receiptImage: reader.result, // base64 (use Storage in production)
                        status: 'pending',
                        submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert('Receipt submitted for verification.');
                    document.getElementById('paymentForm').reset();
                    loadPaymentHistory();
                } catch(err) { alert('Error: '+err.message); }
            };
            reader.readAsDataURL(file);
        });
        async function loadPaymentHistory() {
            const snap = await db.collection('payments').where('studentId','==',auth.currentUser.uid).orderBy('submittedAt','desc').get();
            const tbody = document.getElementById('historyBody');
            if(snap.empty) { tbody.innerHTML = '<tr><td colspan="6">No payment records.</td></tr>'; return; }
            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                const date = p.submittedAt ? p.submittedAt.toDate().toLocaleString() : 'N/A';
                const statusBadge = p.status === 'confirmed' ? '<span class="badge badge-confirmed">Confirmed</span>' : '<span class="badge badge-pending">Pending</span>';
                html += `<tr><td>${date}</td><td>${p.paymentType}</td><td>₦${p.amount.toLocaleString()}</td><td>${p.reference}</td><td>${statusBadge}</td><td>${p.adminRemark || '—'}</td></tr>`;
            });
            tbody.innerHTML = html;
        }
    </script>
</body>
</html>

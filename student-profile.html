<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · My Profile</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same base styles – simplified for profile page */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title h1 { font-size: 2rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 2rem;
        }
        .name h2 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .name p {
            color: var(--text-secondary);
        }

        .info-row {
            display: flex;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }
        .info-label {
            width: 120px;
            color: var(--text-secondary);
        }
        .info-value {
            flex: 1;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            background: var(--success-bg);
            color: var(--success-text);
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: var(--accent);
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Profile</h1>
                <p>Your personal information</p>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
            </div>
        </div>

        <div class="card">
            <div class="profile-header">
                <div class="avatar" id="avatar">S</div>
                <div class="name">
                    <h2 id="fullName">Loading...</h2>
                    <p id="studentClass">Class: --</p>
                </div>
            </div>

            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="email">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Phone</span>
                <span class="info-value" id="phone">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Prefect Role</span>
                <span class="info-value" id="prefect">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-value" id="status">Active</span>
            </div>

            <div style="margin-top: 2rem; text-align: center;">
                <a href="student-dashboard.html" class="btn">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'student') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            const data = userDoc.data();
            const fullName = `${data.firstName || ''} ${data.surname || ''}`.trim() || 'Student';
            document.getElementById('fullName').textContent = fullName;
            document.getElementById('studentClass').textContent = `Class: ${data.class || 'Not assigned'}`;
            document.getElementById('email').textContent = data.email || '—';
            document.getElementById('phone').textContent = data.phone || '—';
            document.getElementById('prefect').textContent = data.prefect || 'None';
            document.getElementById('status').textContent = data.suspended ? 'Suspended' : 'Active';
            document.getElementById('avatar').textContent = (data.firstName?.[0] || 'S') + (data.surname?.[0] || '');
        });
    </script>
</body>
</html>

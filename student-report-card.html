<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Student Report Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: #ffffff;
            --success-bg: #dcfce7; --success-text: #16a34a; --warning-bg: #fef9c3;
            --danger-bg: #fee2e2; --danger-text: #dc2626;
        }
        
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.05); --card-bg: rgba(15,23,42,0.6);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2);
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        
        .report-card { max-width: 1200px; width: 100%; background: var(--card-bg); border-radius: 1rem; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .report-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 2rem; text-align: center; }
        .report-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .student-info { padding: 1.5rem; background: var(--card-bg); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .info-item { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
        .info-label { font-weight: 600; color: var(--text-secondary); font-size: 0.85rem; }
        .info-value { font-weight: 500; }
        
        .subject-table { width: 100%; border-collapse: collapse; }
        .subject-table th, .subject-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        .subject-table th { background: var(--hover-bg); font-weight: 600; }
        
        .grade-cell { font-weight: 600; }
        .grade-A { color: var(--success-text); } .grade-B { color: #3b82f6; } .grade-C { color: #f59e0b; } .grade-D { color: #f59e0b; } .grade-F { color: var(--danger-text); }
        
        .signature-section { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .signature-line { text-align: center; }
        .signature-line .line { width: 200px; border-top: 1px solid var(--border); margin-top: 2rem; padding-top: 0.5rem; }
        
        .pin-input { max-width: 400px; margin: 2rem auto; text-align: center; }
        .pin-input input { padding: 0.75rem; font-size: 1.2rem; text-align: center; letter-spacing: 2px; }
        
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 0.5rem; font-weight: 500; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }
        
        @media print {
            .no-print { display: none; }
            body { padding: 0; background: white; }
            .report-card { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="report-card" id="reportCardContainer">
        <div class="report-header">
            <h1>TRIANGLE INTERNATIONAL SCHOOL</h1>
            <p>...excellence in education</p>
            <h2 id="termTitle">FIRST TERM REPORT CARD</h2>
            <p id="sessionYear">2024/2025 ACADEMIC SESSION</p>
        </div>
        
        <div id="pinSection" class="pin-input no-print">
            <h3>Enter Access PIN to View Report Card</h3>
            <input type="text" id="accessPin" class="form-control" placeholder="Enter 10-digit PIN" maxlength="20" style="width: 100%; padding: 0.75rem; margin: 1rem 0;">
            <button class="btn btn-primary" onclick="verifyPin()">View Report Card</button>
            <p style="margin-top: 1rem; font-size: 0.8rem;">PIN can be purchased from the school administration</p>
        </div>
        
        <div id="reportContent" style="display: none;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentStudent = null;
        
        window.verifyPin = async () => {
            const pin = document.getElementById('accessPin').value.trim();
            if (!pin) { alert('Please enter your access PIN'); return; }
            
            try {
                // Verify PIN
                const pinDoc = await db.collection('reportPins').doc(pin).get();
                if (!pinDoc.exists) { alert('Invalid PIN. Please check and try again.'); return; }
                
                const pinData = pinDoc.data();
                if (pinData.isUsed) { alert('This PIN has already been used.'); return; }
                if (pinData.expiresAt && pinData.expiresAt.toDate() < new Date()) { alert('This PIN has expired.'); return; }
                
                // Get student data
                const studentDoc = await db.collection('users').doc(pinData.studentId).get();
                if (!studentDoc.exists) { alert('Student not found'); return; }
                currentStudent = { id: pinData.studentId, ...studentDoc.data() };
                
                // Get report card
                const reportSnap = await db.collection('reportCards')
                    .where('classId', '==', pinData.classId)
                    .where('session', '==', pinData.session)
                    .where('term', '==', pinData.term)
                    .where('status', '==', 'published')
                    .limit(1)
                    .get();
                
                if (reportSnap.empty) { alert('Report card not yet published'); return; }
                
                const reportData = reportSnap.docs[0].data();
                const studentResult = reportData.studentResults.find(s => s.studentId === pinData.studentId);
                
                if (!studentResult) { alert('Your results not found in this report'); return; }
                
                // Mark PIN as used
                await db.collection('reportPins').doc(pin).update({
                    isUsed: true,
                    usedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    usedBy: pinData.studentId
                });
                
                // Log access
                await db.collection('reportCardAccess').add({
                    studentId: pinData.studentId,
                    reportCardId: reportSnap.docs[0].id,
                    pinUsed: pin,
                    accessedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    ipAddress: ''
                });
                
                displayReportCard(reportData, studentResult);
                
                document.getElementById('pinSection').style.display = 'none';
                document.getElementById('reportContent').style.display = 'block';
                
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };
        
        function displayReportCard(reportData, studentResult) {
            const termNames = { first: 'FIRST TERM', second: 'SECOND TERM', third: 'THIRD TERM (CUMULATIVE)' };
            document.getElementById('termTitle').textContent = termNames[reportData.term] || 'REPORT CARD';
            document.getElementById('sessionYear').textContent = `${reportData.session} ACADEMIC SESSION`;
            
            const totalSubjects = studentResult.subjects.length;
            const totalPossible = totalSubjects * 100;
            const overallPercentage = (studentResult.totalScore / totalPossible) * 100;
            const overallGrade = getGrade(overallPercentage);
            const overallRemark = getGradeRemark(overallPercentage);
            
            let subjectsHtml = '';
            studentResult.subjects.forEach(sub => {
                const gradeClass = `grade-${sub.grade}`;
                subjectsHtml += `
                    <tr>
                        <td><strong>${sub.name}</strong></td>
                        <td>${sub.examScore || 0}%</td>
                        <td>${sub.testScore || 0}%</td>
                        <td>${sub.assignmentScore || 0}%</td>
                        <td><strong>${sub.totalScore}</strong></td>
                        <td class="grade-cell ${gradeClass}"><strong>${sub.grade}</strong></td>
                        <td>${sub.remark}</td>
                    </tr>
                `;
            });
            
            const html = `
                <div class="student-info">
                    <div class="info-item"><span class="info-label">Student Name:</span><span class="info-value">${studentResult.studentName}</span></div>
                    <div class="info-item"><span class="info-label">Admission No:</span><span class="info-value">${studentResult.admissionNo || 'N/A'}</span></div>
                    <div class="info-item"><span class="info-label">Gender:</span><span class="info-value">${studentResult.studentGender}</span></div>
                    <div class="info-item"><span class="info-label">Class:</span><span class="info-value">${reportData.className.toUpperCase()}</span></div>
                    <div class="info-item"><span class="info-label">Term:</span><span class="info-value">${reportData.term.toUpperCase()} Term</span></div>
                    <div class="info-item"><span class="info-label">Session:</span><span class="info-value">${reportData.session}</span></div>
                </div>
                
                <div style="padding: 1.5rem;">
                    <table class="subject-table">
                        <thead>
                            <tr>
                                <th>Subject</th><th>Exam (70%)</th><th>Test (20%)</th><th>Assignment (10%)</th><th>Total (100%)</th><th>Grade</th><th>Remark</th>
                            </tr>
                        </thead>
                        <tbody>${subjectsHtml}</tbody>
                        <tfoot>
                            <tr style="background: var(--hover-bg);">
                                <td colspan="4"><strong>TOTALS</strong></td>
                                <td><strong>${studentResult.totalScore} / ${totalPossible}</strong></td>
                                <td class="grade-cell grade-${overallGrade}"><strong>${overallGrade}</strong></td>
                                <td>${overallRemark}</td>
                            </tr>
                            <tr>
                                <td colspan="7"><strong>Percentage:</strong> ${overallPercentage.toFixed(1)}% &nbsp;|&nbsp;
                                <strong>Position:</strong> ${studentResult.position} out of ${studentResult.totalStudents} students &nbsp;|&nbsp;
                                <strong>Average:</strong> ${studentResult.averageScore}%</td>
                            </tr>
                        </tfoot>
                    </table>
                    
                    <div style="margin-top: 1.5rem; padding: 1rem; background: var(--hover-bg); border-radius: 0.5rem;">
                        <h4>Teacher's Remark</h4>
                        <p>${studentResult.teacherRemark || 'No remark provided'}</p>
                    </div>
                    
                    <div class="signature-section">
                        <div class="signature-line"><div class="line"></div><p>Class Teacher's Signature</p></div>
                        <div class="signature-line"><div class="line"></div><p>Principal's Signature</p></div>
                        <div class="signature-line"><div class="line"></div><p>Date</p></div>
                    </div>
                    
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.8rem;" class="no-print">
                        <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> Print Report Card</button>
                    </div>
                </div>
            `;
            
            document.getElementById('reportContent').innerHTML = html;
        }
        
        function getGrade(score) {
            if (score >= 70) return 'A';
            if (score >= 60) return 'B';
            if (score >= 50) return 'C';
            if (score >= 40) return 'D';
            if (score >= 30) return 'E';
            return 'F';
        }
        
        function getGradeRemark(score) {
            if (score >= 70) return 'Excellent';
            if (score >= 60) return 'Very Good';
            if (score >= 50) return 'Good';
            if (score >= 40) return 'Fair';
            if (score >= 30) return 'Poor';
            return 'Very Poor';
        }
    </script>
</body>
</html>

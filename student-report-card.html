<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · My Report Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.08); --card-bg: rgba(15,23,42,0.6);
            --success-text: #4ade80; --danger-text: #f87171; --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
        }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.8);
            --success-text: #16a34a; --danger-text: #dc2626; --gradient-start: #1e3c72; --gradient-end: #2a5298;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; transition: background 0.3s; }
        
        .pin-container { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 2rem; padding: 2.5rem 2rem; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .pin-container .icon { font-size: 3.5rem; color: var(--accent); margin-bottom: 1rem; display: block; }
        .pin-container h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .pin-container p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .pin-input-group { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
        .pin-input { width: 100%; padding: 0.8rem 1rem; background: rgba(255,255,255,0.05); border: 2px solid var(--border); border-radius: 1rem; color: var(--text-primary); font-size: 1.3rem; text-align: center; letter-spacing: 5px; font-family: 'Space Grotesk', monospace; font-weight: 600; text-transform: uppercase; }
        .pin-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
        .pin-input::placeholder { letter-spacing: 2px; font-size: 1rem; }
        .btn { padding: 0.75rem 2rem; border: none; border-radius: 2rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; width: 100%; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-msg { color: var(--danger-text); font-size: 0.8rem; margin-top: 0.5rem; display: none; }
        .error-msg.show { display: block; }
        .success-msg { color: var(--success-text); font-size: 0.8rem; margin-top: 0.5rem; display: none; }
        .success-msg.show { display: block; }

        .result-wrapper { max-width: 1000px; width: 100%; margin: 0 auto; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .top-nav h1 { font-size: 1.3rem; font-weight: 700; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 0.5rem 1.2rem; border-radius: 2rem; font-size: 0.85rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: 0.2s; font-family: inherit; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }

        .report-card { background: #ffffff; color: #000000; font-family: 'Georgia', 'Times New Roman', serif; max-width: 1000px; margin: 0 auto; border: 3px double #1a1a2e; font-size: 12px; line-height: 1.45; }
        .rc-header-bg { background: #1a1a2e; color: #ffffff; padding: 12px 20px; text-align: center; }
        .rc-header-bg h1 { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .rc-header-bg .motto { font-size: 10px; font-style: italic; margin-top: 2px; opacity: 0.9; }
        .rc-header-bg .address { font-size: 9px; margin-top: 2px; opacity: 0.8; }
        .rc-title-bar { background: #e8ecf1; color: #1a1a2e; text-align: center; padding: 6px; font-weight: bold; font-size: 12px; border-bottom: 2px solid #1a1a2e; text-transform: uppercase; letter-spacing: 1px; }
        .rc-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 15px; gap: 2px 15px; font-size: 10px; border-bottom: 1px solid #ccc; }
        .rc-table-wrap { padding: 8px 15px; }
        .rc-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .rc-table thead th { background: #1a1a2e; color: #ffffff; padding: 6px 4px; border: 1px solid #1a1a2e; text-align: center; font-size: 9px; font-weight: 600; }
        .rc-table thead th.sub-col { text-align: left; min-width: 120px; }
        .rc-table tbody td { padding: 5px 4px; border: 1px solid #ccc; text-align: center; }
        .rc-table tbody td.sub-col { text-align: left; font-weight: 600; }
        .rc-table tbody tr:nth-child(even) { background: #f8f9fa; }
        .rc-table tbody tr.total-row { background: #e8ecf1; font-weight: bold; }
        .no-data { color: #999; font-style: italic; }
        .rc-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin: 0 15px 8px; }
        .rc-summary-box { border: 1px solid #ccc; padding: 8px; font-size: 10px; }
        .rc-summary-box h5 { background: #e8ecf1; margin: -8px -8px 6px -8px; padding: 5px 8px; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .rc-signatures { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 20px 15px 12px; text-align: center; font-size: 10px; }
        .rc-sign-line { border-top: 1px solid #000; padding-top: 4px; margin-top: 35px; }
        .rc-footer { text-align: center; font-size: 9px; padding: 6px; background: #e8ecf1; border-top: 2px solid #1a1a2e; }
        .grade-A { color: #16a34a; font-weight: 700; }
        .grade-B { color: #2563eb; font-weight: 700; }
        .grade-C { color: #d97706; font-weight: 700; }
        .grade-D { color: #ea580c; font-weight: 700; }
        .grade-E { color: #dc2626; font-weight: 700; }
        .grade-F { color: #991b1b; font-weight: 700; }

        @media (max-width: 768px) {
            .rc-info-grid { grid-template-columns: 1fr 1fr; }
            .rc-signatures { grid-template-columns: 1fr; }
            .pin-container { padding: 1.5rem; }
        }
        @media print {
            body { background: white !important; }
            .top-nav, .btn-outline, .pin-container { display: none !important; }
            .report-card { border: 2px solid #000 !important; box-shadow: none !important; }
            @page { margin: 0.4cm; size: A4; }
        }
    </style>
</head>
<body>
    <!-- PIN ENTRY SCREEN -->
    <div id="pinScreen" class="pin-container">
        <i class="fas fa-lock icon"></i>
        <h2>Access Your Report Card</h2>
        <p>Enter the PIN provided by your school to view your published results.</p>
        <input type="text" id="pinInput" class="pin-input" placeholder="ENTER PIN" maxlength="10" autocomplete="off">
        <div class="error-msg" id="pinError">Invalid PIN. Please check and try again.</div>
        <div class="success-msg" id="pinSuccess">PIN verified! Loading your results...</div>
        <button class="btn btn-primary" id="verifyPinBtn"><i class="fas fa-key"></i> View My Results</button>
        <p style="margin-top:1rem;font-size:0.75rem;color:var(--text-secondary);">
            <i class="fas fa-question-circle"></i> Don't have a PIN? Contact your class teacher or school administrator.
        </p>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="resultScreen" class="result-wrapper" style="display:none;">
        <div class="top-nav">
            <h1><i class="fas fa-graduation-cap" style="color:var(--accent);"></i> My Report Card</h1>
            <div>
                <button class="btn-outline" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
                <a href="student-dashboard.html" class="btn-outline"><i class="fas fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
        <div id="reportContent"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getGrade(s) { if (s >= 70) return 'A'; if (s >= 60) return 'B'; if (s >= 50) return 'C'; if (s >= 45) return 'D'; if (s >= 40) return 'E'; return 'F'; }
        function getRemark(g) { const r = { A: 'Excellent performance', B: 'Very Good performance', C: 'Good performance', D: 'Fair performance', E: 'Below average', F: 'Needs improvement' }; return r[g] || ''; }
        function getOrdinal(n) { return n + ['th','st','nd','rd'][n % 10 < 4 && Math.floor(n / 10) !== 1 ? n % 10 : 0]; }
        function getTermName(t) { return { first: 'First', second: 'Second', third: 'Third' }[t] || t; }

        let currentUser = null, userData = null;

        document.getElementById('verifyPinBtn').addEventListener('click', async () => {
            const pin = document.getElementById('pinInput').value.trim().toUpperCase();
            const errorEl = document.getElementById('pinError');
            const successEl = document.getElementById('pinSuccess');
            const btn = document.getElementById('verifyPinBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!pin || pin.length < 6) {
                errorEl.textContent = 'Please enter a valid PIN (6-10 characters).';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                // Look up the PIN in reportPins collection
                const pinSnap = await db.collection('reportPins').where('pin', '==', pin).limit(1).get();
                
                if (pinSnap.empty) {
                    errorEl.textContent = 'Invalid PIN. Please check and try again.';
                    errorEl.classList.add('show');
                    resetBtn();
                    return;
                }

                const pinData = pinSnap.docs[0].data();

                // Verify this PIN belongs to the logged-in student
                if (pinData.studentId !== currentUser.uid) {
                    errorEl.textContent = 'This PIN belongs to a different student. Please use your own PIN.';
                    errorEl.classList.add('show');
                    resetBtn();
                    return;
                }

                // Mark PIN as used
                await db.collection('reportPins').doc(pinSnap.docs[0].id).update({
                    used: true,
                    usedAt: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(() => {});

                // Fetch the report card
                const rcSnap = await db.collection('reportCards').doc(pinData.reportCardId).get();
                if (!rcSnap.exists) {
                    errorEl.textContent = 'Report card not found. Please contact your school.';
                    errorEl.classList.add('show');
                    resetBtn();
                    return;
                }

                const rc = rcSnap.data();
                if (rc.status !== 'published') {
                    errorEl.textContent = 'This report card has not been published yet.';
                    errorEl.classList.add('show');
                    resetBtn();
                    return;
                }

                // Find student's result
                const myResult = (rc.studentResults || []).find(r => r.studentId === currentUser.uid);
                if (!myResult) {
                    errorEl.textContent = 'Your result was not found in this report card. Contact your teacher.';
                    errorEl.classList.add('show');
                    resetBtn();
                    return;
                }

                // Render the report card
                successEl.textContent = 'PIN verified! Loading your results...';
                successEl.classList.add('show');
                renderReportCard(rc, myResult);

                setTimeout(() => {
                    document.getElementById('pinScreen').style.display = 'none';
                    document.getElementById('resultScreen').style.display = 'block';
                }, 500);

            } catch (e) {
                console.error('PIN error:', e);
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.classList.add('show');
                resetBtn();
            }
        });

        function resetBtn() {
            const btn = document.getElementById('verifyPinBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-key"></i> View My Results';
        }

        function renderReportCard(rc, myResult) {
            const session = rc.session || '2025/2026';
            const term = rc.term || 'first';
            const termName = getTermName(term).toUpperCase();
            const schoolName = rc.schoolName || 'Triangle International School';
            const motto = rc.motto || 'Moulding Future Leaders with Excellence';
            const address = rc.address || '';
            const phone = rc.phone || '';
            const nextTerm = rc.nextTerm || 'To Be Announced';
            const useA = rc.useAssignments !== false;
            const w = rc.globalWeights || { a: 10, t: 30, e: 60 };
            const totalStudents = rc.totalStudents || 0;

            // Rankings
            const sorted = (rc.studentResults || []).sort((a, b) => (b.averageScore || 0) - (a.averageScore || 0));
            const rank = sorted.findIndex(r => r.studentId === currentUser.uid) + 1;
            const classAvg = sorted.length ? sorted.reduce((s, r) => s + (r.averageScore || 0), 0) / sorted.length : 0;

            // Subject rows
            let subjectRows = '', totalScored = 0, subjectCount = 0;
            const subjects = myResult.subjects || rc.subjects || [];
            subjects.forEach(s => {
                const sub = typeof s === 'string' ? { name: s, assignAvg: 0, testAvg: 0, examScore: 0, total: 0, grade: 'F' } : s;
                const hasAny = (sub.assignAvg > 0 || sub.testAvg > 0 || sub.examScore > 0);
                if (hasAny) {
                    totalScored += (sub.total || 0);
                    subjectCount++;
                    subjectRows += `<tr>
                        <td class="sub-col">${escapeHtml(sub.name)}</td>
                        ${useA ? `<td>${sub.assignAvg > 0 ? sub.assignAvg.toFixed(1) : '<span class="no-data">—</span>'}</td>` : ''}
                        <td>${sub.testAvg > 0 ? sub.testAvg.toFixed(1) : '<span class="no-data">—</span>'}</td>
                        <td>${sub.examScore > 0 ? sub.examScore.toFixed(1) : '<span class="no-data">—</span>'}</td>
                        <td><strong>${Math.round(sub.total || 0)}</strong></td>
                        <td><strong class="grade-${sub.grade || 'F'}">${sub.grade || 'F'}</strong></td>
                        <td>${getRemark(sub.grade || 'F')}</td>
                    </tr>`;
                } else {
                    subjectRows += `<tr>
                        <td class="sub-col">${escapeHtml(sub.name)}</td>
                        ${useA ? '<td><span class="no-data">—</span></td>' : ''}
                        <td><span class="no-data">—</span></td><td><span class="no-data">—</span></td>
                        <td><span class="no-data">—</span></td><td><span class="no-data">—</span></td><td><span class="no-data">—</span></td>
                    </tr>`;
                }
            });

            const average = myResult.averageScore || (subjectCount > 0 ? totalScored / subjectCount : 0);
            const overallGrade = getGrade(average);

            // Attendance
            const att = myResult.attendance || { total: 50, present: 45 };
            const attendanceHtml = `
                <p><strong>School Days:</strong> ${att.total || 50}</p>
                <p><strong>Days Present:</strong> ${att.present || 45}</p>
                <p><strong>Days Absent:</strong> ${(att.total || 50) - (att.present || 45)}</p>`;

            // Extracurricular
            const activities = myResult.activities || {};
            const traits = myResult.traits || {};
            const extraList = rc.extraActivities || ['Sports','Music','Arts','Clubs','Leadership','Public Speaking','ICT','Handwriting'];
            const traitList = rc.affectiveTraits || ['Punctuality','Neatness','Politeness','Cooperation','Attentiveness','Honesty','Self-Control','Organization'];

            let extraRows = extraList.map(act => `<tr><td>${act}</td><td>${activities[act] || '—'}</td></tr>`).join('');
            let traitRows = traitList.map(t => `<tr><td>${t}</td><td>${traits[t] || '4'}/5</td></tr>`).join('');

            document.getElementById('reportContent').innerHTML = `
                <div class="report-card">
                    <div class="rc-header-bg">
                        <h1>${escapeHtml(schoolName)}</h1>
                        <div class="motto">"${escapeHtml(motto)}"</div>
                        <div class="address">${escapeHtml(address)}${address && phone ? ' | ' : ''}${escapeHtml(phone)}</div>
                    </div>
                    <div class="rc-title-bar">Student Progress Report Card — ${termName} Term, ${session} Academic Session</div>
                    <div class="rc-info-grid">
                        <div><strong>Name:</strong> ${escapeHtml(myResult.studentName || 'Student')}</div>
                        <div><strong>Admission No:</strong> ${escapeHtml(myResult.admissionNo || 'N/A')}</div>
                        <div><strong>Class:</strong> ${escapeHtml((rc.className || '').toUpperCase())}</div>
                        <div><strong>Gender:</strong> ${escapeHtml(myResult.gender || 'N/A')}</div>
                        <div><strong>No. in Class:</strong> ${totalStudents}</div>
                        <div><strong>Position:</strong> ${subjectCount > 0 ? getOrdinal(rank) + ' out of ' + totalStudents : '—'}</div>
                        <div><strong>Term:</strong> ${termName}</div>
                        <div><strong>Session:</strong> ${session}</div>
                        <div><strong>Next Term:</strong> ${escapeHtml(nextTerm)}</div>
                    </div>
                    <div class="rc-table-wrap">
                        <table class="rc-table">
                            <thead><tr>
                                <th rowspan="2" class="sub-col">SUBJECTS</th>
                                ${useA ? `<th rowspan="2">Assign.<br>(${w.a}%)</th>` : ''}
                                <th rowspan="2">Test<br>(${w.t}%)</th>
                                <th rowspan="2">Exam<br>(${w.e}%)</th>
                                <th rowspan="2">TOTAL<br>(100%)</th>
                                <th rowspan="2">GRADE</th>
                                <th rowspan="2">REMARK</th>
                            </tr></thead>
                            <tbody>
                                ${subjectRows}
                                <tr class="total-row">
                                    <td class="sub-col"><strong>AGGREGATE</strong></td>
                                    ${useA ? '<td></td>' : ''}
                                    <td colspan="2"></td>
                                    <td><strong>${subjectCount > 0 ? Math.round(totalScored) : '—'}</strong></td>
                                    <td><strong class="grade-${overallGrade}">${overallGrade}</strong></td>
                                    <td>${subjectCount > 0 ? getRemark(overallGrade) : '—'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="rc-summary">
                        <div class="rc-summary-box">
                            <h5>📊 Academic Summary</h5>
                            <p><strong>Total Score:</strong> ${subjectCount > 0 ? Math.round(totalScored) + ' / ' + (subjectCount * 100) : '—'}</p>
                            <p><strong>Term Average:</strong> ${subjectCount > 0 ? average.toFixed(1) + '%' : '—'}</p>
                            <p><strong>Class Average:</strong> ${classAvg.toFixed(1)}%</p>
                            <p><strong>Overall Grade:</strong> <strong>${overallGrade} — ${getRemark(overallGrade)}</strong></p>
                        </div>
                        <div class="rc-summary-box">
                            <h5>📅 Attendance Record</h5>
                            ${attendanceHtml}
                            <p style="margin-top:4px;"><strong>Teacher's Comment:</strong></p>
                            <p style="font-style:italic;">${escapeHtml(myResult.teacherComment || 'No comment')}</p>
                        </div>
                    </div>
                    ${extraList.length ? `
                    <div style="margin:0 15px 8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div style="border:1px solid #ccc;padding:8px;font-size:10px;">
                            <h5 style="background:#e8ecf1;margin:-8px -8px 6px -8px;padding:5px 8px;font-size:9px;text-transform:uppercase;">🏅 Extracurricular Activities</h5>
                            <table style="width:100%;border-collapse:collapse;font-size:9px;"><tbody>${extraRows}</tbody></table>
                        </div>
                        <div style="border:1px solid #ccc;padding:8px;font-size:10px;">
                            <h5 style="background:#e8ecf1;margin:-8px -8px 6px -8px;padding:5px 8px;font-size:9px;text-transform:uppercase;">🧠 Affective Traits</h5>
                            <table style="width:100%;border-collapse:collapse;font-size:9px;"><tbody>${traitRows}</tbody></table>
                        </div>
                    </div>` : ''}
                    <div class="rc-signatures">
                        <div><div class="rc-sign-line">${escapeHtml(rc.teacherName || 'Class Teacher')}<br><small>Class Teacher</small></div></div>
                        <div><div class="rc-sign-line"><br><small>Principal</small></div></div>
                        <div><div class="rc-sign-line"><br><small>Parent/Guardian</small></div></div>
                    </div>
                    <div class="rc-footer">
                        <strong>Next Term Begins:</strong> ${escapeHtml(nextTerm)} | <strong>Resumption:</strong> 8:00 AM | This report card is computer-generated and valid without signature.
                    </div>
                </div>`;
        }

        // Enter key support
        document.getElementById('pinInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('verifyPinBtn').click();
        });

        // Auth
        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'student-login.html'; return; }
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || doc.data().role !== 'student') {
                    auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = user;
                userData = doc.data();

                // Auto-redirect if PIN is in URL
                const params = new URLSearchParams(window.location.search);
                const urlPin = params.get('pin');
                if (urlPin) {
                    document.getElementById('pinInput').value = urlPin;
                    document.getElementById('verifyPinBtn').click();
                }
            } catch (e) { console.error('Auth error:', e); }
        });
    </script>
</body>
</html>

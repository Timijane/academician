<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Report Card Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #b91c1c;
            --info-bg: rgba(59,130,246,0.1); --info-text: #1d4ed8;
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.15); --info-text: #60a5fa;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
            --input-bg: rgba(30,41,59,0.8);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s; position: relative; overflow-x: hidden; }
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; animation: float 25s infinite alternate; }
        .orb-1 { top: -150px; right: -150px; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -150px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.10), transparent 70%); width: 500px; height: 500px; animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.15); } }

        .top-nav { position: sticky; top: 0; z-index: 100; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 0.8rem; }
        .nav-btn { background: transparent; border: 1px solid var(--border); border-radius: 2rem; padding: 0.45rem 1rem; color: var(--text-primary); font-weight: 500; font-size: 0.82rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
        .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 3rem; padding: 0.25rem 0.25rem 0.25rem 0.7rem; }
        .profile-name { font-weight: 600; font-size: 0.8rem; }
        .profile-pic { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.85rem; }
        .dropdown-menu { position: absolute; right: 0; top: 48px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 0.8rem; color: var(--text-primary); border-radius: 0.6rem; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .main-container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 5; }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .settings-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
        .settings-row label { font-size: 0.7rem; color: var(--text-secondary); display: block; margin-bottom: 0.2rem; }
        .form-control { width: 100%; padding: 0.5rem 0.75rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text-primary); font-size: 0.82rem; font-family: inherit; }
        select.form-control { appearance: auto; }
        textarea.form-control { min-height: 60px; resize: vertical; }

        .two-col { display: grid; grid-template-columns: 320px 1fr; gap: 1rem; }
        .student-list-panel { max-height: 650px; overflow-y: auto; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.8rem; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; margin-bottom: 0.2rem; border: 1px solid transparent; background: var(--hover-bg); }
        .student-row:hover { border-color: var(--accent); }
        .student-row.active { background: var(--info-bg); border-color: var(--accent); }
        .student-row .name { font-weight: 500; font-size: 0.82rem; flex: 1; }
        .student-row .score { font-weight: 700; font-size: 0.82rem; }
        .student-row .pos { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 1rem; background: var(--accent); color: white; font-weight: 600; }

        .rc-scroll { max-height: 75vh; overflow-y: auto; }

        /* ===== PROFESSIONAL REPORT CARD ===== */
        .report-card {
            background: #ffffff;
            color: #000000;
            font-family: 'Georgia', 'Times New Roman', serif;
            max-width: 1000px;
            margin: 0 auto;
            border: 3px double #1a1a2e;
            padding: 0;
            font-size: 13px;
            line-height: 1.5;
        }
        .rc-header-bg { background: #1a1a2e; color: #ffffff; padding: 15px 20px; text-align: center; }
        .rc-header-bg h1 { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .rc-header-bg .motto { font-size: 11px; font-style: italic; margin-top: 3px; opacity: 0.9; }
        .rc-header-bg .address { font-size: 10px; margin-top: 2px; opacity: 0.8; }
        .rc-title-bar { background: #e8ecf1; color: #1a1a2e; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; border-bottom: 2px solid #1a1a2e; text-transform: uppercase; letter-spacing: 1px; }
        .rc-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 15px; gap: 2px 15px; font-size: 11px; border-bottom: 1px solid #ccc; }
        .rc-info-grid div { padding: 2px 0; }
        .rc-info-grid strong { display: inline-block; min-width: 80px; }
        .rc-table-wrap { padding: 10px 15px; }
        .rc-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
        .rc-table thead th { background: #1a1a2e; color: #ffffff; padding: 8px 5px; border: 1px solid #1a1a2e; text-align: center; font-size: 10px; font-weight: 600; }
        .rc-table thead th.sub-col { text-align: left; min-width: 130px; }
        .rc-table tbody td { padding: 6px 5px; border: 1px solid #ccc; text-align: center; }
        .rc-table tbody td.sub-col { text-align: left; font-weight: 600; }
        .rc-table tbody tr:nth-child(even) { background: #f8f9fa; }
        .rc-table tbody tr.total-row { background: #e8ecf1; font-weight: bold; }
        .rc-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin: 0 15px 10px; }
        .rc-summary-box { border: 1px solid #ccc; padding: 10px; font-size: 10.5px; }
        .rc-summary-box h5 { background: #e8ecf1; margin: -10px -10px 8px -10px; padding: 6px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .rc-summary-box p { margin: 2px 0; }
        .rc-extracurricular { margin: 0 15px 10px; }
        .rc-extracurricular h5 { background: #e8ecf1; padding: 6px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 0; border: 1px solid #ccc; border-bottom: none; }
        .rc-extra-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .rc-extra-table th { background: #f0f0f0; padding: 6px 8px; border: 1px solid #ccc; text-align: left; font-size: 9px; }
        .rc-extra-table td { padding: 5px 8px; border: 1px solid #ccc; }
        .rc-extra-table select { width: 100%; border: 1px solid #ccc; padding: 3px; font-size: 10px; font-family: inherit; }
        .rc-extra-table input { width: 100%; border: 1px solid #ccc; padding: 3px; font-size: 10px; font-family: inherit; }
        .rc-attendance { margin: 0 15px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .rc-signatures { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 25px 15px 15px; text-align: center; font-size: 11px; }
        .rc-sign-line { border-top: 1px solid #000; padding-top: 5px; margin-top: 40px; }
        .rc-footer { text-align: center; font-size: 10px; padding: 8px; background: #e8ecf1; border-top: 2px solid #1a1a2e; }
        .grade-A { color: #16a34a; font-weight: 700; }
        .grade-B { color: #2563eb; font-weight: 700; }
        .grade-C { color: #d97706; font-weight: 700; }
        .grade-D { color: #ea580c; font-weight: 700; }
        .grade-E { color: #dc2626; font-weight: 700; }
        .grade-F { color: #991b1b; font-weight: 700; }

        .btn { padding: 0.45rem 1rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.8rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.72rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }

        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            .rc-info-grid { grid-template-columns: 1fr 1fr; }
            .rc-signatures { grid-template-columns: 1fr; }
            .student-list-panel { max-height: 250px; }
        }
        @media print {
            body { background: white !important; }
            .orb, .top-nav, .card:not(.print-visible), .student-list-panel, .btn, .loading-overlay, .theme-toggle, .profile-dropdown, .settings-row, .two-col { display: none !important; }
            .main-container { padding: 0 !important; max-width: 100% !important; }
            .rc-scroll { max-height: none !important; overflow: visible !important; }
            .rc-scroll > div:first-child { display: none !important; }
            .report-card { border: 2px solid #000 !important; box-shadow: none !important; margin: 0 !important; }
            @page { margin: 0.5cm; size: A4; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div class="top-nav">
        <div class="nav-left">
            <a href="teacher-analysis.html" class="nav-btn"><i class="fas fa-chart-bar"></i> Analysis Hub</a>
            <a href="teacher-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
            <div class="profile-dropdown">
                <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                <div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- SETTINGS -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-cog"></i> Report Card Settings</h3>
                <button class="btn btn-primary btn-sm" id="loadDataBtn"><i class="fas fa-database"></i> Load Scores from Analysis Hub</button>
            </div>
            <div class="settings-row">
                <div><label>Session</label><input type="text" id="sessionInput" class="form-control" value="2025/2026"></div>
                <div><label>Term</label><select id="termSelect" class="form-control"><option value="first">First Term</option><option value="second">Second Term</option><option value="third">Third Term</option></select></div>
                <div><label>Next Term Begins</label><input type="text" id="nextTermInput" class="form-control" value="12th January 2026"></div>
                <div><label>School Name</label><input type="text" id="schoolNameInput" class="form-control" value="Triangle International School"></div>
                <div><label>School Motto</label><input type="text" id="schoolMotto" class="form-control" value="Moulding Future Leaders with Excellence"></div>
                <div><label>School Address</label><input type="text" id="schoolAddress" class="form-control" value="123 Education Avenue, Lagos State, Nigeria"></div>
                <div><label>School Phone</label><input type="text" id="schoolPhone" class="form-control" value="+234-800-000-0000"></div>
                <div><label>Teacher's Name (for signature)</label><input type="text" id="teacherSignName" class="form-control"></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="two-col">
            <!-- STUDENT LIST -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-users"></i> Students</h3>
                    <span id="studentCount" style="font-size:0.8rem;color:var(--text-secondary);"></span>
                </div>
                <div class="student-list-panel" id="studentList">
                    <p style="color:var(--text-secondary);text-align:center;padding:2rem;font-size:0.85rem;">
                        <i class="fas fa-arrow-up" style="font-size:2rem;display:block;margin-bottom:0.5rem;opacity:0.3;"></i>
                        Click <strong>"Load Scores from Analysis Hub"</strong> to begin.
                    </p>
                </div>
            </div>

            <!-- REPORT CARD -->
            <div class="card print-visible">
                <div class="card-header">
                    <h3><i class="fas fa-graduation-cap"></i> Report Card Preview</h3>
                    <div style="display:flex;gap:0.4rem;">
                        <button class="btn btn-sm btn-outline" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                        <button class="btn btn-sm btn-outline" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                        <button class="btn btn-sm btn-success" id="saveAllBtn"><i class="fas fa-save"></i> Save All</button>
                        <button class="btn btn-sm btn-warning" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit for Approval</button>
                        <button class="btn btn-sm btn-outline" id="printBtn"><i class="fas fa-print"></i> Print</button>
                    </div>
                </div>
                <div class="rc-scroll" id="reportCardContainer">
                    <p style="color:var(--text-secondary);text-align:center;padding:3rem;font-size:0.85rem;">
                        <i class="fas fa-user-graduate" style="font-size:3rem;display:block;margin-bottom:0.75rem;opacity:0.2;"></i>
                        Select a student from the list to preview their report card.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><i class="fas fa-spinner fa-spin fa-2x"></i><h3 style="margin-top:0.75rem;">Processing...</h3></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', s);
            const sp = document.getElementById('themeToggle').querySelector('span');
            sp.textContent = s === 'dark' ? 'Light' : 'Dark';
            document.getElementById('themeToggle').addEventListener('click', () => {
                const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', n);
                localStorage.setItem('edutopscholars-theme', n);
                sp.textContent = n === 'dark' ? 'Light' : 'Dark';
            });
        })();

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getGrade(s) { if (s >= 70) return 'A'; if (s >= 60) return 'B'; if (s >= 50) return 'C'; if (s >= 45) return 'D'; if (s >= 40) return 'E'; return 'F'; }
        function getRemark(g) { const r = { A: 'Excellent performance', B: 'Very Good performance', C: 'Good performance', D: 'Fair performance', E: 'Below average', F: 'Needs improvement' }; return r[g] || ''; }

        let currentUser = null, userData = null;
        let config = null, allStudents = [], studentScores = {}, currentIdx = 0;
        let extraActivities = ['Sports/PE','Music','Arts & Crafts','Clubs & Societies','Leadership','Public Speaking','ICT Skills','Handwriting'];
        let affectiveTraits = ['Punctuality','Neatness','Politeness','Cooperation with others','Attentiveness in class','Honesty','Self-control','Organizational skills'];
        let studentExtras = {}; // {studentId: {activities: {name: grade}, traits: {name: rating}}}

        // ===== LOAD DATA =====
        async function loadData() {
            showLoading();
            try {
                const classId = userData.classTeaching || 'jss2';

                // Load config
                const configDoc = await db.collection('reportCardConfig').doc(`${currentUser.uid}_${classId}`).get();
                if (!configDoc.exists) { alert('No scoring config found. Please go to Analysis Hub first to set up weights and select assignments/tests/exams.'); hideLoading(); return; }
                config = configDoc.data();

                // Load students
                const stuSnap = await db.collection('users').where('role','==','student').where('class','==',classId).where('approved','==',true).get();
                allStudents = [];
                stuSnap.forEach(d => {
                    const dd = d.data();
                    allStudents.push({
                        id: d.id,
                        name: `${dd.surname||''} ${dd.firstName||''}`.trim(),
                        firstName: dd.firstName||'',
                        surname: dd.surname||'',
                        gender: dd.gender||'N/A',
                        admissionNo: dd.admissionNo||'N/A',
                        class: classId
                    });
                    studentExtras[d.id] = { activities: {}, traits: {} };
                });
                allStudents.sort((a,b) => a.name.localeCompare(b.name));

                // Scores from config
                studentScores = config.studentScoreMap || {};

                // Load existing report card for extra data
                const session = document.getElementById('sessionInput').value;
                const term = document.getElementById('termSelect').value;
                const rcSnap = await db.collection('reportCards')
                    .where('teacherId','==',currentUser.uid)
                    .where('classId','==',classId)
                    .where('session','==',session)
                    .where('term','==',term)
                    .limit(1).get();
                if (!rcSnap.empty) {
                    const rcData = rcSnap.docs[0].data();
                    (rcData.studentExtras || []).forEach(se => {
                        if (studentExtras[se.studentId]) studentExtras[se.studentId] = se;
                    });
                }

                document.getElementById('teacherSignName').value = `${userData.firstName||''} ${userData.surname||''}`.trim();
                if (userData.schoolName) document.getElementById('schoolNameInput').value = userData.schoolName;
                document.getElementById('studentCount').textContent = `${allStudents.length} students`;

                renderStudentList();
                if (allStudents.length) selectStudent(0);
                hideLoading();
            } catch(e) { alert('Error: ' + e.message); console.error(e); hideLoading(); }
        }

        // ===== STUDENT LIST =====
        function renderStudentList() {
            const el = document.getElementById('studentList');
            const sorted = [...allStudents].sort((a,b) => {
                return (studentScores[b.id]?.total || 0) - (studentScores[a.id]?.total || 0);
            });
            el.innerHTML = sorted.map((s, i) => {
                const sc = studentScores[s.id];
                const avg = sc?.total || 0;
                const grade = sc?.grade || getGrade(avg);
                const pos = i + 1;
                return `<div class="student-row${allStudents.indexOf(s) === currentIdx ? ' active' : ''}" onclick="selectStudent(${allStudents.indexOf(s)})">
                    <span class="pos">#${pos}</span>
                    <span class="name">${escapeHtml(s.name)}</span>
                    <span class="score grade-${grade}">${Math.round(avg)}%</span>
                </div>`;
            }).join('');
        }

        window.selectStudent = idx => {
            currentIdx = idx;
            renderStudentList();
            if (allStudents[idx]) renderReportCard(allStudents[idx]);
        };

        // ===== RENDER REPORT CARD =====
        function renderReportCard(student) {
            if (!config || !student) return;
            const sc = studentScores[student.id] || {};
            const subjects = config.subjects || [];
            const session = document.getElementById('sessionInput').value;
            const term = document.getElementById('termSelect').value;
            const termName = { first: 'FIRST', second: 'SECOND', third: 'THIRD' }[term] || 'FIRST';
            const schoolName = document.getElementById('schoolNameInput').value;
            const motto = document.getElementById('schoolMotto').value;
            const address = document.getElementById('schoolAddress').value;
            const phone = document.getElementById('schoolPhone').value;
            const nextTerm = document.getElementById('nextTermInput').value;
            const teacherSign = document.getElementById('teacherSignName').value;
            const totalStudents = allStudents.length;

            // Rankings
            const sorted = [...allStudents].sort((a,b) => (studentScores[b.id]?.total||0) - (studentScores[a.id]?.total||0));
            const rank = sorted.findIndex(s => s.id === student.id) + 1;

            // Compute totals
            let totalScored = 0, subjectCount = 0;
            let subjectRows = '';
            subjects.forEach(sub => {
                const ss = studentScores[student.id];
                const assignAvg = (ss && typeof ss.assignAvg === 'number') ? ss.assignAvg : 0;
                const testAvg = (ss && typeof ss.testAvg === 'number') ? ss.testAvg : 0;
                const examScore = (ss && typeof ss.examScore === 'number') ? ss.examScore : 0;
                const total = (ss && typeof ss.total === 'number') ? Math.round(ss.total) : Math.round(assignAvg + testAvg + examScore);
                const grade = (ss && ss.grade) ? ss.grade : getGrade(total);
                const remark = getRemark(grade);

                if (total > 0 || assignAvg > 0 || testAvg > 0 || examScore > 0) {
                    totalScored += total;
                    subjectCount++;
                }

                subjectRows += `<tr>
                    <td class="sub-col">${escapeHtml(sub)}</td>
                    <td>${assignAvg > 0 ? assignAvg.toFixed(1) : '-'}</td>
                    <td>${testAvg > 0 ? testAvg.toFixed(1) : '-'}</td>
                    <td>${examScore > 0 ? examScore.toFixed(1) : '-'}</td>
                    <td><strong>${total > 0 ? total : '-'}</strong></td>
                    <td><strong class="grade-${grade}">${total > 0 ? grade : '-'}</strong></td>
                    <td>${total > 0 ? remark : ''}</td>
                </tr>`;
            });

            const average = subjectCount > 0 ? totalScored / subjectCount : 0;
            const overallGrade = getGrade(average);

            // Extracurricular activities
            const extras = studentExtras[student.id] || { activities: {}, traits: {} };
            let extraRows = '';
            extraActivities.forEach(act => {
                extraRows += `<tr><td>${act}</td><td>
                    <select onchange="updateExtra('${student.id}','activities','${act.replace(/'/g,"\\'")}',this.value)" style="width:100%;border:1px solid #ccc;padding:2px;font-size:9px;">
                        <option value="">--</option>
                        <option value="A" ${(extras.activities||{})[act]==='A'?'selected':''}>A - Excellent</option>
                        <option value="B" ${(extras.activities||{})[act]==='B'?'selected':''}>B - Very Good</option>
                        <option value="C" ${(extras.activities||{})[act]==='C'?'selected':''}>C - Good</option>
                        <option value="D" ${(extras.activities||{})[act]==='D'?'selected':''}>D - Fair</option>
                    </select></td></tr>`;
            });

            // Affective traits
            let traitRows = '';
            affectiveTraits.forEach(trait => {
                traitRows += `<tr><td>${trait}</td><td>
                    <select onchange="updateExtra('${student.id}','traits','${trait.replace(/'/g,"\\'")}',this.value)" style="width:100%;border:1px solid #ccc;padding:2px;font-size:9px;">
                        <option value="5">5</option><option value="4" selected>4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option>
                    </select></td></tr>`;
            });

            document.getElementById('reportCardContainer').innerHTML = `
                <div class="report-card">
                    <div class="rc-header-bg">
                        <h1>${escapeHtml(schoolName)}</h1>
                        <div class="motto">"${escapeHtml(motto)}"</div>
                        <div class="address">${escapeHtml(address)} | Tel: ${escapeHtml(phone)}</div>
                    </div>
                    <div class="rc-title-bar">Student Progress Report Card — ${termName} Term, ${session} Academic Session</div>

                    <div class="rc-info-grid">
                        <div><strong>Student Name:</strong> ${escapeHtml(student.surname)} ${escapeHtml(student.firstName)}</div>
                        <div><strong>Admission No:</strong> ${escapeHtml(student.admissionNo)}</div>
                        <div><strong>Class:</strong> ${(student.class||'').toUpperCase()}</div>
                        <div><strong>Gender:</strong> ${student.gender}</div>
                        <div><strong>No. in Class:</strong> ${totalStudents}</div>
                        <div><strong>Position:</strong> ${rank}${rank===1?'st':rank===2?'nd':rank===3?'rd':'th'} out of ${totalStudents}</div>
                        <div><strong>Term:</strong> ${termName} Term</div>
                        <div><strong>Session:</strong> ${session}</div>
                        <div><strong>Next Term Begins:</strong> ${escapeHtml(nextTerm)}</div>
                    </div>

                    <div class="rc-table-wrap">
                        <table class="rc-table">
                            <thead>
                                <tr>
                                    <th rowspan="2" class="sub-col">SUBJECTS</th>
                                    <th colspan="3">CONTINUOUS ASSESSMENT</th>
                                    <th rowspan="2">TOTAL<br>(100%)</th>
                                    <th rowspan="2">GRADE</th>
                                    <th rowspan="2">REMARK</th>
                                </tr>
                                <tr>
                                    <th>Assign.<br>(${config.weightAssign})</th>
                                    <th>Test<br>(${config.weightTest})</th>
                                    <th>Exam<br>(${config.weightExam})</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${subjectRows}
                                <tr class="total-row">
                                    <td class="sub-col"><strong>TOTAL</strong></td>
                                    <td colspan="3"></td>
                                    <td><strong>${Math.round(totalScored)}</strong></td>
                                    <td><strong class="grade-${overallGrade}">${overallGrade}</strong></td>
                                    <td>${getRemark(overallGrade)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="rc-summary">
                        <div class="rc-summary-box">
                            <h5>📊 Academic Summary</h5>
                            <p><strong>Total Score:</strong> ${Math.round(totalScored)} out of ${subjectCount * 100}</p>
                            <p><strong>Term Average:</strong> ${average.toFixed(1)}%</p>
                            <p><strong>Class Average:</strong> ${sorted.reduce((s,st)=>s+(studentScores[st.id]?.total||0),0) > 0 ? (sorted.reduce((s,st)=>s+(studentScores[st.id]?.total||0),0)/totalStudents).toFixed(1) : '0.0'}%</p>
                            <p><strong>Overall Grade:</strong> <strong class="grade-${overallGrade}">${overallGrade} — ${getRemark(overallGrade)}</strong></p>
                        </div>
                        <div class="rc-summary-box">
                            <h5>🎯 Grading System</h5>
                            <p>A: 70-100% — Excellent | B: 60-69% — Very Good</p>
                            <p>C: 50-59% — Good | D: 45-49% — Fair</p>
                            <p>E: 40-44% — Below Average | F: 0-39% — Needs Improvement</p>
                            <p style="margin-top:6px;"><strong>Teacher's Comment:</strong></p>
                            <textarea id="teacherComment_${student.id}" style="width:100%;border:1px solid #ccc;padding:6px;font-family:inherit;font-size:10px;min-height:50px;" onchange="updateComment('${student.id}',this.value)">${escapeHtml(sc?.teacherComment || '')}</textarea>
                        </div>
                    </div>

                    <div class="rc-extracurricular">
                        <h5>🏅 Extracurricular Activities</h5>
                        <table class="rc-extra-table">
                            <thead><tr><th style="width:60%;">Activity</th><th>Rating</th></tr></thead>
                            <tbody>${extraRows}</tbody>
                        </table>
                    </div>

                    <div class="rc-extracurricular" style="margin-top:10px;">
                        <h5>🧠 Affective Traits & Psychomotor Skills (5=Excellent, 1=Poor)</h5>
                        <table class="rc-extra-table">
                            <thead><tr><th style="width:60%;">Trait</th><th>Rating</th></tr></thead>
                            <tbody>${traitRows}</tbody>
                        </table>
                    </div>

                    <div class="rc-attendance">
                        <div class="rc-summary-box">
                            <h5>📅 Attendance Record</h5>
                            <p><strong>School Days:</strong> <input type="number" id="attTotal_${student.id}" value="${sc?.attTotal || 60}" style="width:60px;border:1px solid #ccc;padding:2px;font-size:10px;" onchange="updateAttendance('${student.id}')"> </p>
                            <p><strong>Days Present:</strong> <input type="number" id="attPresent_${student.id}" value="${sc?.attPresent || 55}" style="width:60px;border:1px solid #ccc;padding:2px;font-size:10px;" onchange="updateAttendance('${student.id}')"></p>
                            <p><strong>Days Absent:</strong> <span id="attAbsent_${student.id}">${(sc?.attTotal||60) - (sc?.attPresent||55)}</span></p>
                        </div>
                        <div class="rc-summary-box">
                            <h5>💬 Principal's Comment</h5>
                            <textarea id="principalComment_${student.id}" style="width:100%;border:1px solid #ccc;padding:6px;font-family:inherit;font-size:10px;min-height:50px;" onchange="updateComment('${student.id}_principal',this.value)">${escapeHtml(sc?.principalComment || '')}</textarea>
                        </div>
                    </div>

                    <div class="rc-signatures">
                        <div><div class="rc-sign-line">${escapeHtml(teacherSign)}<br><small>Class Teacher</small></div></div>
                        <div><div class="rc-sign-line"><br><small>Principal</small></div></div>
                        <div><div class="rc-sign-line"><br><small>Parent/Guardian</small></div></div>
                    </div>

                    <div class="rc-footer">
                        <strong>Next Term Begins:</strong> ${escapeHtml(nextTerm)} | <strong>Resumption Time:</strong> 8:00 AM Prompt | This report card is computer-generated and valid without signature.
                    </div>
                </div>`;
        }

        // ===== LIVE UPDATES =====
        window.updateExtra = (sid, category, name, value) => {
            if (!studentExtras[sid]) studentExtras[sid] = { activities: {}, traits: {} };
            studentExtras[sid][category][name] = value;
        };
        window.updateComment = (sid, value) => {
            if (sid.endsWith('_principal')) {
                const realSid = sid.replace('_principal','');
                if (!studentScores[realSid]) studentScores[realSid] = {};
                studentScores[realSid].principalComment = value;
            } else {
                if (!studentScores[sid]) studentScores[sid] = {};
                studentScores[sid].teacherComment = value;
            }
        };
        window.updateAttendance = sid => {
            const total = parseInt(document.getElementById(`attTotal_${sid}`)?.value) || 60;
            const present = parseInt(document.getElementById(`attPresent_${sid}`)?.value) || 0;
            const absentEl = document.getElementById(`attAbsent_${sid}`);
            if (absentEl) absentEl.textContent = total - present;
            if (!studentScores[sid]) studentScores[sid] = {};
            studentScores[sid].attTotal = total;
            studentScores[sid].attPresent = present;
        };

        // ===== SAVE =====
        async function saveAllCards(status = 'draft') {
            showLoading();
            try {
                const classId = userData.classTeaching || 'jss2';
                const session = document.getElementById('sessionInput').value;
                const term = document.getElementById('termSelect').value;
                const schoolName = document.getElementById('schoolNameInput').value;
                const motto = document.getElementById('schoolMotto').value;
                const address = document.getElementById('schoolAddress').value;
                const phone = document.getElementById('schoolPhone').value;
                const nextTerm = document.getElementById('nextTermInput').value;
                const teacherSign = document.getElementById('teacherSignName').value;
                const subjects = config.subjects || [];

                const studentResults = allStudents.map(stu => {
                    const sc = studentScores[stu.id] || {};
                    const extras = studentExtras[stu.id] || { activities: {}, traits: {} };
                    return {
                        studentId: stu.id,
                        studentName: stu.name,
                        admissionNo: stu.admissionNo,
                        gender: stu.gender,
                        subjects: subjects.map(sub => ({
                            name: sub,
                            assignAvg: sc.assignAvg || 0,
                            testAvg: sc.testAvg || 0,
                            examScore: sc.examScore || 0,
                            total: Math.round(sc.total || 0),
                            grade: sc.grade || getGrade(sc.total || 0)
                        })),
                        totalScore: subjects.reduce((s,sub) => s + Math.round(sc.total || 0), 0),
                        averageScore: subjects.length > 0 ? subjects.reduce((s,sub) => s + Math.round(sc.total || 0), 0) / subjects.length : 0,
                        teacherComment: sc.teacherComment || '',
                        principalComment: sc.principalComment || '',
                        attTotal: sc.attTotal || 60,
                        attPresent: sc.attPresent || 55,
                        activities: extras.activities,
                        traits: extras.traits
                    };
                });

                const data = {
                    teacherId: currentUser.uid,
                    teacherName: teacherSign,
                    classId, className: classId.toUpperCase(),
                    session, term, schoolName, motto, address, phone, nextTerm,
                    weightAssign: config.weightAssign,
                    weightTest: config.weightTest,
                    weightExam: config.weightExam,
                    subjects, studentResults, totalStudents: allStudents.length,
                    extraActivities, affectiveTraits, status,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (status === 'pending_approval') {
                    data.submittedForApprovalAt = firebase.firestore.FieldValue.serverTimestamp();
                }

                const existingSnap = await db.collection('reportCards')
                    .where('teacherId','==',currentUser.uid)
                    .where('classId','==',classId)
                    .where('session','==',session)
                    .where('term','==',term)
                    .limit(1).get();

                if (!existingSnap.empty) {
                    await db.collection('reportCards').doc(existingSnap.docs[0].id).update(data);
                } else {
                    await db.collection('reportCards').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }

                await db.collection('auditLogs').add({
                    userId: currentUser.uid, userName: teacherSign,
                    action: status === 'pending_approval' ? 'REPORT_CARD_SUBMITTED' : 'REPORT_CARD_SAVED',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { classId, session, term }
                }).catch(() => {});

                alert(`Report cards ${status === 'pending_approval' ? 'submitted for approval!' : 'saved successfully!'}`);
            } catch(e) { alert('Error: ' + e.message); console.error(e); }
            finally { hideLoading(); }
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('loadDataBtn').addEventListener('click', loadData);
        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIdx > 0) selectStudent(currentIdx - 1); });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIdx < allStudents.length - 1) selectStudent(currentIdx + 1); });
        document.getElementById('saveAllBtn').addEventListener('click', () => saveAllCards('draft'));
        document.getElementById('submitBtn').addEventListener('click', () => { if (confirm('Submit all report cards for admin approval? The admin will review before publishing to students.')) saveAllCards('pending_approval'); });
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        // ===== AUTH =====
        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || doc.data().role !== 'teacher') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = doc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0]||'T')+(userData.surname?.[0]||'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';
                if (userData.schoolName) document.getElementById('schoolNameInput').value = userData.schoolName;
            } catch(e) { console.error(e); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>

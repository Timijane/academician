<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Student Report Card</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --bg-sidebar: rgba(255,255,255,0.75);
            --glass-border: rgba(255,255,255,0.3);
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --bg-sidebar: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.4rem; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 1.2rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.4rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(5px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 8px 20px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.3rem; width: 1.8rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            z-index: 5;
        }
        .main-content.expanded { margin-left: 90px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .page-title h1 { font-size: 2.4rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.2rem; }
        .page-title p { color: var(--text-secondary); font-weight: 400; }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer; color: var(--text-secondary); font-weight: 500; transition: 0.2s; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.4rem 0.4rem 0.4rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.1rem; box-shadow: 0 5px 15px var(--accent); background-size: cover; background-position: center; }
        .dropdown-menu { position: absolute; right: 0; top: 60px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.5rem; min-width: 180px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.8rem 1.2rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem; transition: 0.2s; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h2 { font-size: 1.5rem; font-weight: 600; }
        .card-header h3 { font-size: 1.3rem; font-weight: 600; }

        .student-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .info-item {
            background: var(--hover-bg);
            border-radius: 1rem;
            padding: 0.8rem;
        }
        .info-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 1rem 0.8rem; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 1rem 0.8rem; border-bottom: 1px solid var(--border); }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); border-color: var(--accent); }

        .chart-container {
            max-width: 100%;
            height: 300px;
            margin: 1rem 0;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .sidebar { width: 90px; }
            .sidebar .logo-area h2 { display: none; }
            .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 90px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-user-graduate"></i><h2>Teacher Panel</h2></div>
        <a href="teacher-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="teacher-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="teacher-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="teacher-daily-report.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Daily Report</span></a>
        <a href="teacher-assignments.html" class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="teacher-cbt.html" class="nav-item"><i class="fas fa-laptop"></i><span>Test & Exam</span></a>
        <a href="teacher-my-class.html" class="nav-item"><i class="fas fa-users"></i><span>My Class</span></a>
        <a href="teacher-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="teacher-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="teacher-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="teacher-teach.html" class="nav-item"><i class="fas fa-chalkboard"></i><span>Teach</span></a>
        <a href="teacher-profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <a href="teacher-evaluation.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Evaluation</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Student Report Card</h1>
                <p>Detailed academic performance</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger">
                        <span class="profile-name" id="profileName">Teacher</span>
                        <div class="profile-pic" id="profilePic">T</div>
                    </div>
                    <div class="dropdown-menu">
                        <a href="teacher-profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportContainer">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading report...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar & theme
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Get student ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('studentId');
        if (!studentId) {
            alert('No student specified.');
            window.location.href = 'teacher-evaluation.html';
        }

        let currentUser = null;
        let student = null;
        let assignments = [];
        let submissionsMap = new Map(); // key: `${studentId}_${assignmentId}` -> submission
        let teacherClass = null;

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                currentUser = user;
                teacherClass = userDoc.data().classTeaching;
                if (!teacherClass) {
                    alert('You are not assigned to any class.');
                    window.location.href = 'teacher-dashboard.html';
                    return;
                }
                document.getElementById('profilePic').textContent = (userDoc.data().firstName?.[0] || 'T') + (userDoc.data().surname?.[0] || 'E');
                document.getElementById('profileName').textContent = userDoc.data().firstName || 'Teacher';

                await loadData();
            } catch (error) { console.error(error); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        async function loadData() {
            try {
                // Fetch student info
                const studentDoc = await db.collection('users').doc(studentId).get();
                if (!studentDoc.exists || studentDoc.data().role !== 'student') {
                    alert('Student not found.');
                    window.location.href = 'teacher-evaluation.html';
                    return;
                }
                student = studentDoc.data();
                student.name = `${student.firstName || ''} ${student.surname || ''}`.trim() || 'Unknown';

                // Fetch all assignments for this class
                const assignmentsSnap = await db.collection('assignments')
                    .where('classId', '==', teacherClass)
                    .where('status', '==', 'published')
                    .get();
                assignments = assignmentsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // Fetch submissions for this student
                const submissionsSnap = await db.collection('submissions')
                    .where('studentId', '==', studentId)
                    .get();
                submissionsMap.clear();
                submissionsSnap.forEach(doc => {
                    const sub = doc.data();
                    submissionsMap.set(sub.assignmentId, sub);
                });

                // Calculate attendance (if available)
                let attendance = null;
                try {
                    const attendanceSnap = await db.collection('attendance')
                        .where('studentId', '==', studentId)
                        .get();
                    let present = 0;
                    attendanceSnap.forEach(doc => {
                        if (doc.data().status === 'present') present++;
                    });
                    attendance = {
                        present,
                        total: attendanceSnap.size,
                        percentage: attendanceSnap.size ? ((present / attendanceSnap.size) * 100).toFixed(1) : 0
                    };
                } catch (e) { console.warn('Attendance not available', e); }

                renderReport(attendance);
            } catch (error) {
                console.error(error);
                document.getElementById('reportContainer').innerHTML = '<div class="loading-spinner">Error loading report.</div>';
            }
        }

        function renderReport(attendance) {
            // Calculate statistics
            let totalPoints = 0;
            let earnedPoints = 0;
            let gradedAssignments = [];
            let chartLabels = [];
            let chartScores = [];

            assignments.forEach(ass => {
                const sub = submissionsMap.get(ass.id);
                if (sub && sub.score !== undefined) {
                    totalPoints += (ass.points || 100);
                    earnedPoints += sub.score;
                    gradedAssignments.push({
                        title: ass.title,
                        score: sub.score,
                        maxPoints: ass.points || 100,
                        percentage: ((sub.score / (ass.points || 100)) * 100).toFixed(1)
                    });
                    chartLabels.push(ass.title);
                    chartScores.push(sub.score);
                }
            });
            const averagePercentage = totalPoints ? ((earnedPoints / totalPoints) * 100).toFixed(1) : 0;

            // Build HTML
            let html = `
                <div class="card">
                    <div class="card-header">
                        <h2>${student.name}</h2>
                        <a href="teacher-evaluation.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
                    </div>
                    <div class="student-info">
                        <div class="info-item"><div class="info-label">Class</div><div class="info-value">${teacherClass}</div></div>
                        <div class="info-item"><div class="info-label">Email</div><div class="info-value">${student.email || '—'}</div></div>
                        <div class="info-item"><div class="info-label">Student ID</div><div class="info-value">${studentId}</div></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${averagePercentage}%</div><div class="stat-label">Overall Average</div></div>
                    <div class="stat-card"><div class="stat-number">${earnedPoints}/${totalPoints}</div><div class="stat-label">Total Points</div></div>
                    <div class="stat-card"><div class="stat-number">${gradedAssignments.length}/${assignments.length}</div><div class="stat-label">Graded Assignments</div></div>
                    <div class="stat-card"><div class="stat-number">${attendance ? attendance.percentage + '%' : '—'}</div><div class="stat-label">Attendance</div></div>
                </div>
            `;

            if (gradedAssignments.length > 0) {
                // Chart
                html += `
                    <div class="card">
                        <div class="card-header"><h3>Performance Chart</h3></div>
                        <div class="chart-container">
                            <canvas id="scoreChart"></canvas>
                        </div>
                    </div>
                `;

                // Table
                html += `
                    <div class="card">
                        <div class="card-header"><h3>Assignment Breakdown</h3></div>
                        <div class="table-responsive">
                            <table>
                                <thead><tr><th>Assignment</th><th>Score</th><th>Out of</th><th>Percentage</th></tr></thead>
                                <tbody>
                `;
                gradedAssignments.forEach(ass => {
                    html += `
                        <tr>
                            <td>${ass.title}</td>
                            <td>${ass.score}</td>
                            <td>${ass.maxPoints}</td>
                            <td>${ass.percentage}%</td>
                        </tr>
                    `;
                });
                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;

                // After DOM is updated, draw chart
                setTimeout(() => {
                    const ctx = document.getElementById('scoreChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: chartLabels,
                            datasets: [{
                                label: 'Score',
                                data: chartScores,
                                backgroundColor: 'rgba(59,130,246,0.5)',
                                borderColor: '#3b82f6',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: { display: true, text: 'Score' }
                                }
                            }
                        }
                    });
                }, 100);
            } else {
                html += `<div class="card"><p>No graded assignments yet.</p></div>`;
            }

            document.getElementById('reportContainer').innerHTML = html;
        }
    </script>
</body>
</html>

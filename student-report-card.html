<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Report Card Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #b91c1c;
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
            --input-bg: rgba(30,41,59,0.8);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; animation: float 25s infinite alternate; }
        .orb-1 { top: -150px; right: -150px; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -150px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.10), transparent 70%); width: 500px; height: 500px; animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.15); } }

        .top-nav { position: sticky; top: 0; z-index: 100; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 0.8rem; }
        .nav-btn { background: transparent; border: 1px solid var(--border); border-radius: 2rem; padding: 0.45rem 1rem; color: var(--text-primary); font-weight: 500; font-size: 0.82rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
        .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 3rem; padding: 0.25rem 0.25rem 0.25rem 0.7rem; }
        .profile-name { font-weight: 600; font-size: 0.8rem; }
        .profile-pic { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.85rem; }
        .dropdown-menu { position: absolute; right: 0; top: 48px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 0.8rem; color: var(--text-primary); border-radius: 0.6rem; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .main-container { max-width: 1300px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 5; }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1rem; font-weight: 600; }

        .grid-2 { display: grid; grid-template-columns: 300px 1fr; gap: 1rem; }
        .student-list { max-height: 600px; overflow-y: auto; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.8rem; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; margin-bottom: 0.25rem; border: 1px solid transparent; }
        .student-row:hover { background: var(--hover-bg); }
        .student-row.active { background: var(--info-bg); border-color: var(--accent); }
        .student-row .name { font-weight: 500; font-size: 0.85rem; }
        .student-row .avg { font-weight: 600; font-size: 0.85rem; }

        /* Report Card Preview - Nigerian Format */
        .rc-preview { background: #ffffff; color: #000; border: 2px solid #1e3c72; padding: 1.5rem; font-family: 'Times New Roman', serif; font-size: 13px; max-width: 100%; overflow-x: auto; }
        .rc-preview h2 { text-align: center; font-size: 16px; text-transform: uppercase; margin-bottom: 2px; }
        .rc-preview h3 { text-align: center; font-size: 13px; margin-bottom: 2px; font-style: italic; }
        .rc-preview h4 { text-align: center; font-size: 14px; border-bottom: 2px solid #1e3c72; padding-bottom: 4px; margin: 8px 0; text-transform: uppercase; }
        .rc-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; font-size: 12px; margin: 8px 0; }
        .rc-info div { }
        .rc-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 11px; }
        .rc-table th { background: #e8ecf1; border: 1px solid #999; padding: 5px 4px; text-align: center; font-size: 10px; font-weight: 700; }
        .rc-table td { border: 1px solid #999; padding: 4px; text-align: center; }
        .rc-table .subj { text-align: left; font-weight: 600; }
        .rc-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; font-size: 11px; }
        .rc-box { border: 1px solid #999; padding: 6px; }
        .rc-box h5 { background: #e8ecf1; margin: -6px -6px 4px -6px; padding: 3px 6px; font-size: 10px; }
        .rc-sign { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; text-align: center; font-size: 11px; }
        .rc-sign-line { border-top: 1px solid #000; padding-top: 3px; margin-top: 30px; }
        .rc-btn-row { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .grade-A { color: #16a34a; font-weight: 700; }
        .grade-F { color: #dc2626; font-weight: 700; }

        .btn { padding: 0.45rem 1rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.8rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.7rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .form-control { width: 100%; padding: 0.5rem 0.75rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text-primary); font-size: 0.8rem; font-family: inherit; }
        select.form-control { appearance: auto; }
        textarea.form-control { min-height: 60px; resize: vertical; }

        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }
        .loading-content i { font-size: 2rem; color: var(--accent); }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .rc-info { grid-template-columns: 1fr 1fr; }
            .rc-sign { grid-template-columns: 1fr; }
            .student-list { max-height: 250px; }
        }
        @media print {
            body { background: white; }
            .orb, .top-nav, .card:not(.print-card), .student-list, .rc-btn-row, .loading-overlay, .btn, .theme-toggle, .profile-dropdown { display: none !important; }
            .main-container { padding: 0; max-width: 100%; }
            .rc-preview { border: 1px solid #000; box-shadow: none; }
            .grid-2 { display: block; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div class="top-nav">
        <div class="nav-left">
            <a href="teacher-analysis.html" class="nav-btn"><i class="fas fa-chart-bar"></i> Analysis Hub</a>
            <a href="teacher-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
            <div class="profile-dropdown">
                <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                <div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- CONFIG BAR -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-cog"></i> Report Card Settings</h3>
                <button class="btn btn-primary btn-sm" id="loadDataBtn"><i class="fas fa-sync-alt"></i> Load Scores</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem;">
                <div><label style="font-size:0.7rem;">Session</label><input type="text" id="sessionInput" class="form-control" value="2025/2026"></div>
                <div><label style="font-size:0.7rem;">Term</label><select id="termSelect" class="form-control"><option value="first">First Term</option><option value="second">Second Term</option><option value="third">Third Term</option></select></div>
                <div><label style="font-size:0.7rem;">Next Term Begins</label><input type="text" id="nextTermInput" class="form-control" value="12th January 2026"></div>
                <div><label style="font-size:0.7rem;">School Name</label><input type="text" id="schoolNameInput" class="form-control" value="Triangle International School"></div>
            </div>
        </div>

        <!-- STUDENT LIST + REPORT CARD -->
        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-users"></i> Students</h3></div>
                <div class="student-list" id="studentList"><p style="color:var(--text-secondary);padding:1rem;">Click "Load Scores" to begin.</p></div>
            </div>

            <div class="card print-card" style="max-height:80vh;overflow-y:auto;">
                <div class="card-header">
                    <h3><i class="fas fa-graduation-cap"></i> Report Card Preview</h3>
                    <div style="display:flex;gap:0.4rem;">
                        <button class="btn btn-sm btn-outline" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                        <button class="btn btn-sm btn-outline" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="reportCardContent"><p style="color:var(--text-secondary);text-align:center;padding:2rem;">Select a student to preview their report card.</p></div>
                <div class="rc-btn-row" id="actionButtons" style="display:none;">
                    <button class="btn btn-primary btn-sm" id="saveOneBtn"><i class="fas fa-save"></i> Save This Card</button>
                    <button class="btn btn-success btn-sm" id="saveAllBtn"><i class="fas fa-save"></i> Save All Cards</button>
                    <button class="btn btn-warning btn-sm" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit for Approval</button>
                    <button class="btn btn-outline btn-sm" id="printBtn"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><i class="fas fa-spinner fa-spin"></i><h3>Processing...</h3></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', s);
            const sp = document.getElementById('themeToggle').querySelector('span');
            sp.textContent = s === 'dark' ? 'Light' : 'Dark';
            document.getElementById('themeToggle').addEventListener('click', () => {
                const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', n);
                localStorage.setItem('edutopscholars-theme', n);
                sp.textContent = n === 'dark' ? 'Light' : 'Dark';
            });
        })();

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getGrade(s) { if (s >= 70) return 'A'; if (s >= 60) return 'B'; if (s >= 50) return 'C'; if (s >= 45) return 'D'; if (s >= 40) return 'E'; return 'F'; }
        function getRemark(g) { const r = { A: 'Excellent', B: 'Very Good', C: 'Good', D: 'Fair', E: 'Pass', F: 'Fail' }; return r[g] || ''; }

        let currentUser = null, userData = null;
        let config = null, allStudents = [], studentScores = {}, currentIdx = 0;

        async function loadData() {
            showLoading();
            try {
                const classId = userData.classTeaching || 'jss2';

                // Load config from analysis hub
                const configDoc = await db.collection('reportCardConfig').doc(`${currentUser.uid}_${classId}`).get();
                if (!configDoc.exists) { alert('No scoring config found. Go to Analysis Hub first to set up weights and select assignments/tests.'); hideLoading(); return; }
                config = configDoc.data();

                // Load students
                const stuSnap = await db.collection('users').where('role','==','student').where('class','==',classId).where('approved','==',true).get();
                allStudents = []; stuSnap.forEach(d => { const dd = d.data(); allStudents.push({ id: d.id, name: `${dd.surname||''} ${dd.firstName||''}`.trim(), firstName: dd.firstName||'', surname: dd.surname||'', gender: dd.gender||'N/A', admissionNo: dd.admissionNo||'N/A' }); });
                allStudents.sort((a,b) => a.name.localeCompare(b.name));

                // Use scores from config
                studentScores = config.studentScoreMap || {};

                renderStudentList();
                if (allStudents.length) { currentIdx = 0; renderReportCard(allStudents[0]); }
                document.getElementById('actionButtons').style.display = 'flex';
                alert(`Loaded ${allStudents.length} students with scores.`);
            } catch(e) { alert('Error: ' + e.message); console.error(e); }
            finally { hideLoading(); }
        }

        function renderStudentList() {
            const el = document.getElementById('studentList');
            const sorted = [...allStudents].sort((a,b) => {
                const sa = studentScores[a.id]?.total || 0;
                const sb = studentScores[b.id]?.total || 0;
                return sb - sa;
            });
            el.innerHTML = sorted.map((s, i) => {
                const sc = studentScores[s.id];
                const avg = sc ? sc.total : 0;
                const grade = sc ? sc.grade : 'F';
                return `<div class="student-row${i === currentIdx ? ' active' : ''}" onclick="selectStudent(${allStudents.indexOf(s)})">
                    <span class="name">${escapeHtml(s.name)}</span>
                    <span class="avg grade-${grade}">${avg}% (${grade})</span>
                </div>`;
            }).join('');
        }

        window.selectStudent = idx => {
            currentIdx = idx;
            renderStudentList();
            if (allStudents[idx]) renderReportCard(allStudents[idx]);
        };

        function renderReportCard(student) {
            if (!config || !student) return;
            const sc = studentScores[student.id] || {};
            const subjects = config.subjects || [];
            const session = document.getElementById('sessionInput').value;
            const term = document.getElementById('termSelect').value;
            const termName = { first: 'FIRST', second: 'SECOND', third: 'THIRD' }[term] || 'FIRST';
            const nextTerm = document.getElementById('nextTermInput').value;
            const schoolName = document.getElementById('schoolNameInput').value;
            const totalStudents = allStudents.length;

            // Rank
            const sorted = [...allStudents].sort((a,b) => (studentScores[b.id]?.total||0) - (studentScores[a.id]?.total||0));
            const rank = sorted.findIndex(s => s.id === student.id) + 1;
            const classAvg = sorted.reduce((s,st) => s + (studentScores[st.id]?.total||0), 0) / totalStudents;

            // Subject rows
            let subjectRows = '';
            let totalScore = 0;
            subjects.forEach(sub => {
                const ss = sc[sub] || sc;
                const total = (ss && typeof ss.total === 'number') ? (ss.total || 0) : 0;
                totalScore += total;
                const grade = getGrade(total);
                subjectRows += `<tr>
                    <td class="subj">${escapeHtml(sub)}</td>
                    <td>${ss?.assignAvg || 0}</td>
                    <td>${ss?.testAvg || 0}</td>
                    <td>${ss?.examScore || 0}</td>
                    <td><strong>${Math.round(total)}</strong></td>
                    <td class="grade-${grade}"><strong>${grade}</strong></td>
                    <td>${getRemark(grade)}</td>
                </tr>`;
            });

            const avg = subjects.length > 0 ? totalScore / subjects.length : 0;
            const overallGrade = getGrade(avg);

            document.getElementById('reportCardContent').innerHTML = `
                <div class="rc-preview">
                    <h2>${escapeHtml(schoolName)}</h2>
                    <h3>"Moulding Future Leaders with Excellence"</h3>
                    <p style="text-align:center;font-size:10px;">123 Education Avenue, Lagos | Tel: +234-800-000-0000</p>
                    <h4>Student Progress Report Card — ${termName} TERM ${session}</h4>
                    <div class="rc-info">
                        <div><strong>Name:</strong> ${escapeHtml(student.surname)} ${escapeHtml(student.firstName)}</div>
                        <div><strong>Admission No:</strong> ${student.admissionNo}</div>
                        <div><strong>Class:</strong> ${(userData.classTeaching||'JSS2').toUpperCase()}</div>
                        <div><strong>Gender:</strong> ${student.gender}</div>
                        <div><strong>Term:</strong> ${termName}</div>
                        <div><strong>Session:</strong> ${session}</div>
                        <div><strong>No. in Class:</strong> ${totalStudents}</div>
                        <div><strong>Position:</strong> ${rank}${rank===1?'st':rank===2?'nd':rank===3?'rd':'th'} out of ${totalStudents}</div>
                        <div><strong>Next Term:</strong> ${nextTerm}</div>
                    </div>
                    <table class="rc-table">
                        <thead><tr><th rowspan="2">Subject</th><th colspan="3">Continuous Assessment</th><th rowspan="2">Total</th><th rowspan="2">Grade</th><th rowspan="2">Remark</th></tr>
                        <tr><th>Assign (${config.weightAssign})</th><th>Test (${config.weightTest})</th><th>Exam (${config.weightExam})</th></tr></thead>
                        <tbody>${subjectRows}</tbody>
                    </table>
                    <div class="rc-summary">
                        <div class="rc-box"><h5>Academic Summary</h5>
                            <p><strong>Total Score:</strong> ${Math.round(totalScore)} / ${subjects.length * 100}</p>
                            <p><strong>Term Average:</strong> ${avg.toFixed(1)}%</p>
                            <p><strong>Class Average:</strong> ${classAvg.toFixed(1)}%</p>
                            <p><strong>Overall Grade:</strong> <span class="grade-${overallGrade}">${overallGrade}</span></p>
                        </div>
                        <div class="rc-box"><h5>Grading System</h5>
                            <p>A: 70-100% | B: 60-69% | C: 50-59%</p>
                            <p>D: 45-49% | E: 40-44% | F: 0-39%</p>
                            <p style="margin-top:4px;"><strong>Remark:</strong> ${getRemark(overallGrade)}</p>
                        </div>
                    </div>
                    <div class="rc-sign">
                        <div><div class="rc-sign-line">Class Teacher</div></div>
                        <div><div class="rc-sign-line">Principal</div></div>
                        <div><div class="rc-sign-line">Parent/Guardian</div></div>
                    </div>
                    <p style="text-align:center;font-size:10px;margin-top:8px;"><strong>Next Term Begins:</strong> ${nextTerm} | Resumption: 8:00 AM</p>
                </div>`;
        }

        async function saveAllCards(status = 'draft') {
            showLoading();
            try {
                const classId = userData.classTeaching || 'jss2';
                const session = document.getElementById('sessionInput').value;
                const term = document.getElementById('termSelect').value;
                const schoolName = document.getElementById('schoolNameInput').value;
                const nextTerm = document.getElementById('nextTermInput').value;
                const subjects = config.subjects || [];

                const studentResults = allStudents.map(stu => {
                    const sc = studentScores[stu.id] || {};
                    return {
                        studentId: stu.id,
                        studentName: stu.name,
                        admissionNo: stu.admissionNo,
                        gender: stu.gender,
                        subjects: subjects.map(sub => ({
                            name: sub,
                            assignAvg: sc?.assignAvg || 0,
                            testAvg: sc?.testAvg || 0,
                            examScore: sc?.examScore || 0,
                            total: Math.round(sc?.total || 0),
                            grade: getGrade(sc?.total || 0)
                        }))
                    };
                });

                const data = {
                    teacherId: currentUser.uid,
                    teacherName: `${userData.firstName||''} ${userData.surname||''}`.trim(),
                    classId, className: classId.toUpperCase(),
                    session, term, schoolName, nextTerm,
                    weightAssign: config.weightAssign,
                    weightTest: config.weightTest,
                    weightExam: config.weightExam,
                    subjects,
                    studentResults,
                    totalStudents: allStudents.length,
                    status,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (status === 'pending_approval') {
                    data.submittedForApprovalAt = firebase.firestore.FieldValue.serverTimestamp();
                }

                // Save to reportCards
                const existingSnap = await db.collection('reportCards')
                    .where('teacherId','==',currentUser.uid)
                    .where('classId','==',classId)
                    .where('session','==',session)
                    .where('term','==',term)
                    .limit(1).get();

                if (!existingSnap.empty) {
                    await db.collection('reportCards').doc(existingSnap.docs[0].id).update(data);
                } else {
                    await db.collection('reportCards').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }

                await db.collection('auditLogs').add({
                    userId: currentUser.uid,
                    userName: data.teacherName,
                    action: status === 'pending_approval' ? 'REPORT_CARD_SUBMITTED' : 'REPORT_CARD_SAVED',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { classId, session, term }
                }).catch(() => {});

                alert(`Report cards ${status === 'pending_approval' ? 'submitted for approval!' : 'saved!'}`);
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        }

        document.getElementById('loadDataBtn').addEventListener('click', loadData);
        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIdx > 0) selectStudent(currentIdx - 1); });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIdx < allStudents.length - 1) selectStudent(currentIdx + 1); });
        document.getElementById('saveOneBtn').addEventListener('click', () => saveAllCards('draft'));
        document.getElementById('saveAllBtn').addEventListener('click', () => saveAllCards('draft'));
        document.getElementById('submitBtn').addEventListener('click', () => { if (confirm('Submit all report cards for admin approval?')) saveAllCards('pending_approval'); });
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || doc.data().role !== 'teacher') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = doc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0]||'T')+(userData.surname?.[0]||'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';
                if (userData.schoolName) document.getElementById('schoolNameInput').value = userData.schoolName;
            } catch(e) { console.error(e); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>

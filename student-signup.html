<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA | Student Enrollment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --accent: #2563eb;
            --input-bg: #fff;
            --border: rgba(0,0,0,0.1);
        }
        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --input-bg: #1e293b;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .signup-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header i { font-size: 3rem; color: var(--accent); margin-bottom: 10px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }

        .input-box { position: relative; }
        .input-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }
        
        input, select {
            width: 100%; padding: 12px 15px 12px 45px;
            border-radius: 0.8rem; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text-main);
            box-sizing: border-box;
        }

        .toggle-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; }

        .btn-reg {
            width: 100%; padding: 15px; background: var(--accent); color: white;
            border: none; border-radius: 0.8rem; font-weight: 700; cursor: pointer;
            margin-top: 1rem; transition: 0.3s;
        }

        .btn-reg:hover { opacity: 0.9; transform: translateY(-2px); }

        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--glass-bg); border: 1px solid var(--border); padding: 12px; border-radius: 50%; cursor: pointer; color: var(--text-main); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

    <div class="signup-card">
        <div class="header">
            <i class="fas fa-user-graduate"></i>
            <h1>Student Hub</h1>
            <p>Create your academic profile</p>
        </div>

        <form>
            <div class="form-group">
                <label>First Name</label>
                <div class="input-box"><i class="fas fa-user"></i><input type="text" placeholder="Enter first name" required></div>
            </div>
            <div class="form-group">
                <label>Surname</label>
                <div class="input-box"><i class="fas fa-id-card"></i><input type="text" placeholder="Enter surname" required></div>
            </div>
            <div class="form-group">
                <label>Current Class</label>
                <div class="input-box">
                    <i class="fas fa-school"></i>
                    <select required style="padding-left: 45px;">
                        <option value="">Select Class</option>
                        <option>Creche</option>
                        <option>Nursery 1</option>
                        <option>Nursery 2</option>
                        <option>KG 1</option>
                        <option>KG 2</option>
                        <optgroup label="Primary">
                            <option>Basic 1</option><option>Basic 2</option><option>Basic 3</option>
                            <option>Basic 4</option><option>Basic 5</option><option>Basic 6</option>
                        </optgroup>
                        <optgroup label="Secondary">
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </optgroup>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Gmail Address</label>
                <div class="input-box"><i class="fas fa-envelope"></i><input type="email" placeholder="student@gmail.com" required></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="p1" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-btn" onclick="viewPass('p1')"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-box">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="p2" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-btn" onclick="viewPass('p2')"></i>
                </div>
            </div>

            <button type="submit" class="btn-reg">Request Classroom Access</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
        function viewPass(id) {
            const x = document.getElementById(id);
            x.type = x.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>

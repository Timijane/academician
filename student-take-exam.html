<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Take Exam | Student Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc; --text-primary: #0f172a; --text-secondary: #475569;
            --accent: #3b82f6; --border: #e2e8f0; --card-bg: #ffffff; --hover-bg: #f1f5f9;
            --success-bg: #dcfce7; --success-text: #16a34a; --warning-bg: #fef9c3;
            --warning-text: #ca8a04; --danger-bg: #fee2e2; --danger-text: #dc2626;
            --info-bg: #dbeafe; --info-text: #2563eb; --timer-bg: #f1f5f9;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6; --input-bg: #ffffff;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a; --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --accent: #3b82f6; --border: #1e293b; --card-bg: #1e293b; --hover-bg: #334155;
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24; --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.2); --info-text: #60a5fa; --timer-bg: #1e293b;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6; --input-bg: #334155;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        .timer-bar {
            position: fixed; top: 0; left: 0; right: 0; background: var(--timer-bg);
            border-bottom: 2px solid var(--accent); padding: 0.75rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; backdrop-filter: blur(10px); flex-wrap: wrap; gap: 0.5rem;
        }

        .timer-display { display: flex; align-items: center; gap: 1rem; }
        .timer-icon { font-size: 1.5rem; color: var(--accent); }
        .timer-clock {
            font-size: 2rem; font-weight: 700; font-family: monospace;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .exam-info { display: flex; gap: 1.5rem; font-size: 0.85rem; flex-wrap: wrap; }
        .exam-info span { color: var(--text-secondary); }
        .exam-info strong { color: var(--text-primary); margin-left: 0.5rem; }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 6rem 2rem 2rem; }

        .exam-header {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 1.5rem; margin-bottom: 2rem;
        }
        .exam-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .exam-meta { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
        .meta-item i { width: 1.2rem; color: var(--accent); }

        .two-column-layout { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; }
        .question-area {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 2rem;
        }
        .question-nav-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
            flex-wrap: wrap; gap: 1rem;
        }
        .question-counter { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
        .options-list { display: flex; flex-direction: column; gap: 1rem; }
        .option-item {
            display: flex; align-items: center; gap: 1rem; padding: 1rem;
            background: var(--hover-bg); border: 2px solid var(--border); border-radius: 1rem;
            cursor: pointer; transition: all 0.2s;
        }
        .option-item:hover { background: var(--info-bg); border-color: var(--accent); transform: translateX(5px); }
        .option-item.selected { background: var(--info-bg); border-color: var(--accent); }
        .option-letter {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            background: var(--bg-primary); border-radius: 50%; font-weight: 800; font-size: 1.2rem; color: var(--accent);
        }
        .option-text { flex: 1; font-size: 0.95rem; line-height: 1.5; }

        .theory-answer { width: 100%; padding: 1rem; background: var(--input-bg); border: 2px solid var(--border); border-radius: 1rem; color: var(--text-primary); font-size: 1rem; margin-top: 1rem; font-family: inherit; resize: vertical; }

        .nav-panel {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 1.5rem; position: sticky; top: 6rem;
        }
        .nav-panel h3 { font-size: 1rem; margin-bottom: 1rem; }
        .question-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
        .nav-question {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            background: var(--hover-bg); border: 1px solid var(--border); border-radius: 0.75rem;
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }
        .nav-question.answered { background: var(--success-bg); border-color: var(--success-text); color: var(--success-text); }
        .nav-question.current { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.1); }
        .nav-question.flagged { background: var(--warning-bg); border-color: var(--warning-text); position: relative; }
        .nav-question.flagged::after { content: "⚑"; position: absolute; top: -5px; right: -5px; font-size: 10px; color: var(--warning-text); }
        .nav-question.theory { background: var(--info-bg); border-color: var(--info-text); }

        .legend { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; }
        .legend-color { width: 16px; height: 16px; border-radius: 0.25rem; }

        .action-buttons { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-wrap: wrap; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 1rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; max-width: 500px; width: 90%; text-align: center; }
        .warning-banner { background: var(--danger-bg); border-left: 4px solid var(--danger-text); padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 0.75rem; display: none; align-items: center; gap: 0.75rem; }
        .warning-banner.show { display: flex; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }

        .debug-panel {
            background: var(--danger-bg);
            border: 1px solid var(--danger-text);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.7rem;
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .timer-bar { flex-direction: column; padding: 0.5rem 1rem; }
            .main-container { padding: 8rem 1rem 1rem; }
            .two-column-layout { grid-template-columns: 1fr; }
            .nav-panel { position: static; order: 2; }
            .question-grid { grid-template-columns: repeat(8, 1fr); }
            .timer-clock { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="timer-bar">
        <div class="timer-display">
            <i class="fas fa-hourglass-half timer-icon"></i>
            <span class="timer-clock" id="timerDisplay">00:00:00</span>
        </div>
        <div class="exam-info" id="examInfo"><span><i class="fas fa-book"></i> Loading...</span></div>
    </div>

    <div class="main-container">
        <div class="exam-header">
            <h1 class="exam-title" id="examTitle">Loading Exam...</h1>
            <div class="exam-meta" id="examMeta"></div>
        </div>
        <div class="warning-banner" id="warningBanner"><i class="fas fa-exclamation-triangle"></i><span id="warningMessage"></span></div>
        <div id="contentArea"></div>
        <div class="debug-panel" id="debugPanel">
            <strong><i class="fas fa-bug"></i> Debug Info:</strong><br>
            <span id="debugInfo">Initializing...</span>
        </div>
    </div>

    <div class="modal-overlay" id="submitModal">
        <div class="modal-content">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success-text); margin-bottom: 1rem;"></i>
            <h3>Submit Exam?</h3>
            <p>Are you sure you want to submit? You cannot change your answers after submission.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-outline" onclick="closeSubmitModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmSubmit()">Submit</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="autoSubmitModal">
        <div class="modal-content">
            <i class="fas fa-clock" style="font-size: 3rem; color: var(--warning-text); margin-bottom: 1rem;"></i>
            <h3>Time's Up!</h3>
            <p>Your time has expired. Your exam will be submitted automatically.</p>
            <button class="btn btn-primary" onclick="closeAutoSubmitModal()">OK</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><i class="fas fa-spinner fa-spin"></i><h3>Loading Exam...</h3><p>Please wait</p></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let examData = null;
        let userData = null;
        let studentAnswers = [];
        let currentQuestionIndex = 0;
        let flaggedQuestions = [];
        let timerInterval = null;
        let timeRemaining = 0;
        let isSubmitted = false;
        let tabSwitchCount = 0;
        let examId = null;

        function updateDebug(message, isError = false) {
            const debugEl = document.getElementById('debugInfo');
            if (debugEl) {
                const timestamp = new Date().toLocaleTimeString();
                const color = isError ? 'red' : '#888';
                debugEl.innerHTML = `<div style="color: ${color};">[${timestamp}] ${message}</div>` + debugEl.innerHTML;
                if (debugEl.innerHTML.split('<div').length > 30) {
                    const lines = debugEl.innerHTML.split('<div');
                    debugEl.innerHTML = lines.slice(0, 30).join('<div');
                }
            }
            console.log(message);
        }

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function showWarning(message) { 
            document.getElementById('warningMessage').textContent = message; 
            document.getElementById('warningBanner').classList.add('show'); 
            setTimeout(() => document.getElementById('warningBanner').classList.remove('show'), 5000); 
        }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

        function startTimer(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            timeRemaining = seconds;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    autoSubmit();
                } else {
                    timeRemaining--;
                    updateTimerDisplay();
                    if (timeRemaining === 60) showWarning(`⚠️ 1 minute remaining!`);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}:00`;
        }

        function autoSubmit() { 
            clearInterval(timerInterval); 
            document.getElementById('autoSubmitModal').classList.add('active'); 
            setTimeout(() => submitExam(), 2000); 
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !isSubmitted && examData) {
                tabSwitchCount++;
                document.getElementById('tabSwitchModal').classList.add('active');
                if (tabSwitchCount >= 3) { 
                    showWarning('⚠️ Multiple tab switches detected! Auto-submitting...'); 
                    setTimeout(() => submitExam(), 3000); 
                }
            }
        });

        function disableCopyPaste() {
            document.addEventListener('copy', (e) => { if (examData) { e.preventDefault(); showWarning('Copying is disabled'); } });
            document.addEventListener('paste', (e) => { if (examData) { e.preventDefault(); showWarning('Pasting is disabled'); } });
            document.addEventListener('contextmenu', (e) => { if (examData) { e.preventDefault(); } });
        }

        function renderExam() {
            const questions = examData.questions || [];
            const currentQuestion = questions[currentQuestionIndex];
            if (!currentQuestion) return;

            const existingAnswer = studentAnswers.find(a => a.questionIndex === currentQuestionIndex);
            const selectedAnswer = existingAnswer ? existingAnswer.answer : null;

            let optionsHtml = '';
            const letters = ['A', 'B', 'C', 'D'];
            
            if (currentQuestion.type === 'multiple' || currentQuestion.type === 'mcq') {
                const options = currentQuestion.options || [];
                optionsHtml = `<div class="options-list">${options.map((opt, idx) => `
                    <div class="option-item ${selectedAnswer === opt ? 'selected' : ''}" onclick="selectAnswer('${escapeHtml(opt).replace(/'/g, "\\'")}')">
                        <div class="option-letter">${letters[idx]}</div>
                        <div class="option-text">${escapeHtml(opt)}</div>
                    </div>
                `).join('')}</div>`;
            } else if (currentQuestion.type === 'boolean' || currentQuestion.type === 'truefalse') {
                optionsHtml = `
                    <div class="options-list">
                        <div class="option-item ${selectedAnswer === 'True' ? 'selected' : ''}" onclick="selectAnswer('True')"><div class="option-letter">T</div><div class="option-text">True</div></div>
                        <div class="option-item ${selectedAnswer === 'False' ? 'selected' : ''}" onclick="selectAnswer('False')"><div class="option-letter">F</div><div class="option-text">False</div></div>
                    </div>
                `;
            } else if (currentQuestion.type === 'text' || currentQuestion.type === 'fillblank') {
                optionsHtml = `<input type="text" class="fill-input" id="fillAnswer" placeholder="Type your answer..." value="${escapeHtml(selectedAnswer || '')}">`;
                setTimeout(() => {
                    const input = document.getElementById('fillAnswer');
                    if (input) input.addEventListener('input', (e) => selectAnswer(e.target.value));
                }, 100);
            } else if (currentQuestion.type === 'theory') {
                optionsHtml = `<textarea class="theory-answer" id="theoryAnswer" rows="6" placeholder="Write your answer here...">${escapeHtml(selectedAnswer || '')}</textarea>`;
                setTimeout(() => {
                    const input = document.getElementById('theoryAnswer');
                    if (input) input.addEventListener('input', (e) => selectAnswer(e.target.value));
                }, 100);
            }

            document.getElementById('contentArea').innerHTML = `
                <div class="two-column-layout">
                    <div class="question-area">
                        <div class="question-nav-header">
                            <div class="question-counter">Question ${currentQuestionIndex + 1} of ${questions.length}</div>
                            <div>
                                <button class="btn btn-outline" style="padding: 0.3rem 1rem;" onclick="toggleFlagQuestion()">
                                    <i class="fas fa-flag ${flaggedQuestions.includes(currentQuestionIndex) ? 'fa-solid' : 'fa-regular'}"></i>
                                    ${flaggedQuestions.includes(currentQuestionIndex) ? 'Flagged' : 'Flag'}
                                </button>
                            </div>
                        </div>
                        <div class="question-text">${escapeHtml(currentQuestion.question)}</div>
                        ${optionsHtml}
                    </div>
                    <div class="nav-panel">
                        <h3><i class="fas fa-th"></i> Question Palette</h3>
                        <div class="question-grid" id="questionGrid"></div>
                        <div class="legend">
                            <div class="legend-item"><div class="legend-color" style="background: var(--hover-bg);"></div> Not Visited</div>
                            <div class="legend-item"><div class="legend-color" style="background: var(--success-bg);"></div> Answered</div>
                            <div class="legend-item"><div class="legend-color" style="background: var(--warning-bg);"></div> Flagged</div>
                            <div class="legend-item"><div class="legend-color" style="background: var(--accent);"></div> Current</div>
                            <div class="legend-item"><div class="legend-color" style="background: var(--info-bg);"></div> Theory/Essay</div>
                        </div>
                    </div>
                </div>
                <div class="action-buttons">
                    <div>
                        <button class="btn btn-outline" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Previous</button>
                        <button class="btn btn-outline" onclick="nextQuestion()" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>
                    </div>
                    <button class="btn btn-primary" onclick="openSubmitModal()"><i class="fas fa-paper-plane"></i> Submit Exam</button>
                </div>
            `;
            renderQuestionGrid();
        }

        function renderQuestionGrid() {
            const questions = examData.questions || [];
            const grid = document.getElementById('questionGrid');
            if (!grid) return;
            let html = '';
            questions.forEach((q, idx) => {
                const isAnswered = studentAnswers.some(a => a.questionIndex === idx);
                const isFlagged = flaggedQuestions.includes(idx);
                const isCurrent = idx === currentQuestionIndex;
                let classes = 'nav-question';
                if (isAnswered) classes += ' answered';
                if (isFlagged) classes += ' flagged';
                if (isCurrent) classes += ' current';
                if (q.type === 'theory') classes += ' theory';
                html += `<div class="${classes}" onclick="goToQuestion(${idx})">${idx + 1}</div>`;
            });
            grid.innerHTML = html;
        }

        window.selectAnswer = (answer) => {
            const existingIndex = studentAnswers.findIndex(a => a.questionIndex === currentQuestionIndex);
            if (existingIndex !== -1) studentAnswers[existingIndex].answer = answer;
            else studentAnswers.push({ questionIndex: currentQuestionIndex, answer: answer });
            renderExam();
        };
        window.nextQuestion = () => { if (currentQuestionIndex < examData.questions.length - 1) { currentQuestionIndex++; renderExam(); } };
        window.previousQuestion = () => { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderExam(); } };
        window.goToQuestion = (index) => { currentQuestionIndex = index; renderExam(); };
        window.toggleFlagQuestion = () => {
            const idx = flaggedQuestions.indexOf(currentQuestionIndex);
            if (idx === -1) flaggedQuestions.push(currentQuestionIndex);
            else flaggedQuestions.splice(idx, 1);
            renderExam();
        };
        window.openSubmitModal = () => { document.getElementById('submitModal').classList.add('active'); };
        window.closeSubmitModal = () => { document.getElementById('submitModal').classList.remove('active'); };
        window.closeAutoSubmitModal = () => { document.getElementById('autoSubmitModal').classList.remove('active'); };
        window.closeTabSwitchModal = () => { document.getElementById('tabSwitchModal').classList.remove('active'); };

        function calculateScore() {
            let totalPoints = 0, correctCount = 0, wrongCount = 0, theoryCount = 0;
            
            examData.questions.forEach((q, idx) => {
                const answer = studentAnswers.find(a => a.questionIndex === idx);
                const studentAnswer = answer ? answer.answer : null;
                
                if (q.type === 'multiple' || q.type === 'mcq') {
                    const correctOptionText = q.options[q.correct];
                    if (studentAnswer && studentAnswer === correctOptionText) {
                        totalPoints += (q.points || 1);
                        correctCount++;
                    } else if (studentAnswer) {
                        wrongCount++;
                    } else {
                        wrongCount++;
                    }
                } else if (q.type === 'boolean' || q.type === 'truefalse') {
                    const correctAnswer = q.correct === 1 ? 'True' : 'False';
                    if (studentAnswer && studentAnswer === correctAnswer) {
                        totalPoints += (q.points || 1);
                        correctCount++;
                    } else if (studentAnswer) {
                        wrongCount++;
                    } else {
                        wrongCount++;
                    }
                } else if (q.type === 'text' || q.type === 'fillblank') {
                    if (studentAnswer && studentAnswer.toLowerCase().trim() === q.correct.toLowerCase().trim()) {
                        totalPoints += (q.points || 1);
                        correctCount++;
                    } else if (studentAnswer) {
                        wrongCount++;
                    } else {
                        wrongCount++;
                    }
                } else if (q.type === 'theory') {
                    theoryCount++;
                }
            });
            
            let finalScore = totalPoints;
            if (examData.negativeMarking) {
                finalScore = Math.max(0, totalPoints - (wrongCount * 0.25));
            }
            
            return { score: finalScore, correctCount, wrongCount, theoryCount, totalPoints: examData.totalPoints || 100 };
        }

        async function submitExam() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            showLoading();

            const { score, correctCount, wrongCount, theoryCount, totalPoints } = calculateScore();
            const percentage = (score / totalPoints) * 100;
            let grade = 'F';
            if (percentage >= 75) grade = 'A';
            else if (percentage >= 65) grade = 'B';
            else if (percentage >= 50) grade = 'C';
            else if (percentage >= 40) grade = 'D';

            const formattedAnswers = studentAnswers.map(a => {
                const question = examData.questions[a.questionIndex];
                let correctAnswer = '';
                
                if (question.type === 'multiple' || question.type === 'mcq') {
                    correctAnswer = question.options[question.correct];
                } else if (question.type === 'boolean' || question.type === 'truefalse') {
                    correctAnswer = question.correct === 1 ? 'True' : 'False';
                } else if (question.type === 'theory') {
                    correctAnswer = question.sampleAnswer || 'To be graded manually';
                } else {
                    correctAnswer = question.correct;
                }
                
                return {
                    questionIndex: a.questionIndex,
                    studentAnswer: a.answer,
                    correctAnswer: correctAnswer,
                    question: question.question,
                    points: question.points || 1,
                    type: question.type,
                    isCorrect: false
                };
            });

            const submissionData = {
                examId: examId,
                studentId: currentUser.uid,
                studentName: `${userData.firstName || ''} ${userData.surname || ''}`.trim(),
                studentEmail: userData.email || currentUser.email,
                examTitle: examData.title,
                subject: examData.subject,
                examType: examData.examType || 'standard',
                weeksCovered: examData.weeksCovered || [1],
                duration: examData.duration || 120,
                teacherId: examData.teacherId,
                classId: examData.classId,
                answers: formattedAnswers,
                score: score,
                totalPoints: totalPoints,
                percentage: percentage.toFixed(2),
                grade: grade,
                correctCount: correctCount,
                wrongCount: wrongCount,
                theoryCount: theoryCount,
                negativeMarking: examData.negativeMarking || false,
                autoReleaseGrades: examData.autoReleaseGrades || false,
                gradeReleased: examData.autoReleaseGrades || false,
                submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                tabSwitchCount: tabSwitchCount,
                status: 'submitted'
            };

            try {
                await db.collection('examSubmissions').add(submissionData);
                alert(`Exam submitted!\n\nScore: ${score}/${totalPoints} (${percentage.toFixed(1)}%)\nGrade: ${grade}`);
                window.location.href = 'student-dashboard.html';
            } catch (error) {
                console.error('Submit error:', error);
                alert('Error submitting exam: ' + error.message);
                isSubmitted = false;
            } finally { 
                hideLoading(); 
                closeSubmitModal(); 
            }
        }

        window.confirmSubmit = () => { closeSubmitModal(); submitExam(); };

        async function loadExam() {
            const urlParams = new URLSearchParams(window.location.search);
            examId = urlParams.get('id');
            
            updateDebug(`=== LOADING EXAM ===`);
            updateDebug(`Full URL: ${window.location.href}`);
            updateDebug(`Exam ID from URL parameter 'id': ${examId}`);
            
            if (!examId) { 
                updateDebug('❌ No exam ID found in URL!', true);
                alert('No exam specified. Please use the link provided by your teacher.'); 
                window.location.href = 'student-dashboard.html'; 
                return; 
            }

            showLoading();
            try {
                updateDebug(`Attempting to fetch exam from Firestore with ID: ${examId}`);
                const examDoc = await db.collection('exams').doc(examId).get();
                
                updateDebug(`Exam document exists: ${examDoc.exists}`);
                
                if (!examDoc.exists) { 
                    updateDebug(`❌ Exam document not found for ID: ${examId}`, true);
                    alert(`Exam not found. ID: ${examId}\n\nPlease check with your teacher for the correct link.`); 
                    window.location.href = 'student-dashboard.html'; 
                    return; 
                }

                const examDocData = examDoc.data();
                updateDebug(`Exam data retrieved:`);
                updateDebug(`  - Title: ${examDocData.title}`);
                updateDebug(`  - Status: ${examDocData.status}`);
                updateDebug(`  - Class: ${examDocData.classId}`);
                updateDebug(`  - Subject: ${examDocData.subject}`);
                updateDebug(`  - Questions: ${examDocData.questions?.length || 0}`);
                
                if (examDocData.status !== 'published') { 
                    updateDebug(`❌ Exam status is '${examDocData.status}', not 'published'`, true);
                    alert('This exam is not available yet. Please check with your teacher.'); 
                    window.location.href = 'student-dashboard.html'; 
                    return; 
                }
                
                updateDebug(`Student class: ${userData.class}`);
                if (examDocData.classId !== userData.class) { 
                    updateDebug(`❌ Class mismatch! Exam class: ${examDocData.classId}, Student class: ${userData.class}`, true);
                    alert(`You are not enrolled in this exam.\n\nYour class: ${userData.class}\nExam class: ${examDocData.classId}`); 
                    window.location.href = 'student-dashboard.html'; 
                    return; 
                }

                examData = { id: examDoc.id, ...examDocData };

                // Check if already taken
                updateDebug(`Checking if student has already taken this exam...`);
                const existingSub = await db.collection('examSubmissions')
                    .where('examId', '==', examId)
                    .where('studentId', '==', currentUser.uid)
                    .get();
                    
                if (!existingSub.empty) { 
                    updateDebug(`❌ Student has already taken this exam`, true);
                    alert('You have already taken this exam'); 
                    window.location.href = 'student-dashboard.html'; 
                    return; 
                }

                // Display exam header
                document.getElementById('examTitle').textContent = examData.title;
                const weeksText = (examData.weeksCovered || [1]).join(', ');
                const durationMins = examData.duration || 120;
                const examTypeNames = { midterm: 'Mid-Term', endterm: 'End of Term', mock: 'Mock', promotion: 'Promotion' };
                
                document.getElementById('examMeta').innerHTML = `
                    <div class="meta-item"><i class="fas fa-book"></i> Subject: <strong>${escapeHtml(examData.subject)}</strong></div>
                    <div class="meta-item"><i class="fas fa-calendar-week"></i> Weeks: <strong>${weeksText}</strong></div>
                    <div class="meta-item"><i class="fas fa-star"></i> Points: <strong>${examData.totalPoints || 100}</strong></div>
                    <div class="meta-item"><i class="fas fa-hourglass-half"></i> Time: <strong>${durationMins} mins</strong></div>
                    <div class="meta-item"><i class="fas fa-tag"></i> Type: <strong>${examTypeNames[examData.examType] || 'Standard'}</strong></div>
                    <div class="meta-item"><i class="fas fa-question-circle"></i> Questions: <strong>${(examData.questions || []).length}</strong></div>
                `;
                document.getElementById('examInfo').innerHTML = `<span><i class="fas fa-user"></i> ${escapeHtml(userData.firstName || 'Student')} ${escapeHtml(userData.surname || '')}</span>`;

                updateDebug(`✅ Exam loaded successfully!`);

                // Randomize questions if enabled
                let questions = [...(examData.questions || [])];
                if (examData.randomizeQuestions) questions = shuffleArray(questions);
                if (examData.randomizeOptions) {
                    questions = questions.map(q => {
                        if ((q.type === 'multiple' || q.type === 'mcq') && q.options) {
                            const originalOptions = [...q.options];
                            const shuffled = shuffleArray([...originalOptions]);
                            const correctOptionText = originalOptions[q.correct];
                            const newCorrectIndex = shuffled.findIndex(opt => opt === correctOptionText);
                            return { ...q, options: shuffled, correct: newCorrectIndex };
                        }
                        return q;
                    });
                }
                examData.questions = questions;

                studentAnswers = [];
                flaggedQuestions = [];
                startTimer(durationMins * 60);
                disableCopyPaste();
                renderExam();

            } catch (error) {
                updateDebug(`❌ ERROR loading exam: ${error.message}`, true);
                console.error('Load error:', error);
                alert('Error loading exam: ' + error.message);
            } finally { 
                hideLoading(); 
            }
        }

        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        auth.onAuthStateChanged(async (user) => {
            updateDebug(`=== AUTHENTICATION ===`);
            if (!user) { 
                updateDebug(`No user logged in, redirecting to login...`, true);
                window.location.href = 'student-login.html'; 
                return; 
            }
            updateDebug(`User logged in: ${user.uid}`);
            currentUser = user;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'student') { 
                    updateDebug(`User is not a student! Role: ${userDoc.data()?.role}`, true);
                    await auth.signOut(); 
                    window.location.href = 'index.html'; 
                    return; 
                }
                userData = userDoc.data();
                updateDebug(`Student data loaded:`);
                updateDebug(`  - Name: ${userData.firstName} ${userData.surname}`);
                updateDebug(`  - Class: ${userData.class}`);
                updateDebug(`  - Approved: ${userData.approved}`);
                await loadExam();
            } catch (error) { 
                updateDebug(`❌ Auth error: ${error.message}`, true);
                console.error('Auth error:', error);
                alert('Authentication error: ' + error.message);
            }
        });
    </script>
</body>
</html>

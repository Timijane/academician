<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · CBT Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a; --warning-bg: rgba(245,158,11,0.2); --danger-bg: rgba(239,68,68,0.2);
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6); --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2); --input-bg: rgba(30,41,59,0.8);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .test-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .timer { font-size: 2rem; font-weight: bold; font-family: monospace; background: var(--accent); padding: 0.5rem 1rem; border-radius: 1rem; color: white; }
        .question-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
        .options { display: flex; flex-direction: column; gap: 0.8rem; }
        .option { display: flex; align-items: center; gap: 1rem; padding: 0.8rem; border-radius: 0.5rem; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); }
        .option:hover { background: var(--hover-bg); border-color: var(--accent); }
        .option.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .option input { width: 20px; height: 20px; cursor: pointer; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 1.5rem; }
        .btn { padding: 0.6rem 1.5rem; border: none; border-radius: 0.5rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .question-nav { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 60px)); gap: 0.5rem; margin-bottom: 1.5rem; }
        .nav-question { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: 0.2s; background: var(--hover-bg); border: 1px solid var(--border); }
        .nav-question.answered { background: var(--success-text); color: white; }
        .nav-question.current { border: 2px solid var(--accent); transform: scale(1.05); }
        .warning { background: var(--warning-bg); color: var(--warning-text); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; max-width: 500px; text-align: center; }
        @media (max-width: 768px) { .test-container { padding: 1rem; } .question-nav { grid-template-columns: repeat(auto-fill, minmax(45px, 50px)); } .nav-question { width: 45px; height: 45px; } }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="header">
            <div>
                <h2 id="testTitle">Loading Test...</h2>
                <p id="testInfo"></p>
            </div>
            <div class="timer" id="timer">00:00:00</div>
        </div>

        <div class="question-nav" id="questionNav"></div>

        <div class="question-panel" id="questionPanel">
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()"><i class="fas fa-arrow-left"></i> Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
            <button class="btn btn-outline" onclick="submitTest()"><i class="fas fa-save"></i> Submit Test</button>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--warning-text); margin-bottom: 1rem;"></i>
            <h3>Submit Test?</h3>
            <p>Are you sure you want to submit? You cannot change your answers after submission.</p>
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                <button class="btn btn-outline" onclick="closeConfirmModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmSubmit()">Submit</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="autoSubmitModal">
        <div class="modal-content">
            <i class="fas fa-hourglass-end" style="font-size: 3rem; color: var(--danger-text); margin-bottom: 1rem;"></i>
            <h3>Time's Up!</h3>
            <p>Your test time has expired. Your answers will be submitted automatically.</p>
            <button class="btn btn-primary" onclick="autoSubmit()">OK</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        let testData = null;
        let testId = null;
        let questions = [];
        let userAnswers = [];
        let currentIndex = 0;
        let timerInterval = null;
        let timeRemaining = 0;
        let testSubmitted = false;
        
        // Get test ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        testId = urlParams.get('id');
        
        if (!testId) {
            alert('No test specified');
            window.location.href = 'student-tests.html';
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            currentUser = user;
            
            // Check if student already submitted this test
            const existingSubmission = await db.collection('testSubmissions')
                .where('testId', '==', testId)
                .where('studentId', '==', currentUser.uid)
                .get();
            
            if (!existingSubmission.empty && existingSubmission.docs[0].data().submitted) {
                alert('You have already taken this test.');
                window.location.href = 'student-tests.html';
                return;
            }
            
            loadTest();
        });
        
        async function loadTest() {
            try {
                const testDoc = await db.collection('assessments').doc(testId).get();
                if (!testDoc.exists) {
                    alert('Test not found');
                    window.location.href = 'student-tests.html';
                    return;
                }
                
                testData = testDoc.data();
                document.getElementById('testTitle').textContent = testData.title;
                document.getElementById('testInfo').textContent = `${testData.subject} • ${testData.totalPoints} points • Duration: ${testData.duration} minutes`;
                
                questions = testData.questions || [];
                userAnswers = new Array(questions.length).fill(null);
                
                // Set timer
                const durationMinutes = parseInt(testData.duration) || 30;
                timeRemaining = durationMinutes * 60;
                startTimer();
                
                renderQuestionNav();
                renderQuestion(0);
                
                // Anti-cheat: disable copy-paste
                document.addEventListener('copy', (e) => { e.preventDefault(); alert('Copying is disabled during test.'); });
                document.addEventListener('paste', (e) => { e.preventDefault(); alert('Pasting is disabled during test.'); });
                document.addEventListener('contextmenu', (e) => { e.preventDefault(); });
                
                // Tab switch detection
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && !testSubmitted) {
                        alert('Warning: Switching tabs during test is not allowed. Your attempt has been logged.');
                        // Log tab switch attempt
                        logCheatAttempt('tab_switch');
                    }
                });
                
            } catch(e) {
                console.error('Error loading test:', e);
                alert('Error loading test: ' + e.message);
            }
        }
        
        async function logCheatAttempt(type) {
            if (!testId || !currentUser) return;
            try {
                await db.collection('cheatLogs').add({
                    testId: testId,
                    studentId: currentUser.uid,
                    type: type,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.error('Cheat log error:', e); }
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                if (testSubmitted) return;
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('autoSubmitModal').classList.add('active');
                } else {
                    timeRemaining--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const hours = Math.floor(timeRemaining / 3600);
            const minutes = Math.floor((timeRemaining % 3600) / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timer').textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Warning when 5 minutes left
            if (timeRemaining === 300) {
                alert('5 minutes remaining!');
            }
        }
        
        function renderQuestionNav() {
            const container = document.getElementById('questionNav');
            let html = '';
            questions.forEach((_, idx) => {
                const answeredClass = userAnswers[idx] !== null ? 'answered' : '';
                const currentClass = idx === currentIndex ? 'current' : '';
                html += `<div class="nav-question ${answeredClass} ${currentClass}" onclick="goToQuestion(${idx})">${idx + 1}</div>`;
            });
            container.innerHTML = html;
        }
        
        function renderQuestion(index) {
            if (!questions[index]) return;
            
            const q = questions[index];
            document.getElementById('questionText').innerHTML = `<span style="color: var(--accent);">Q${index + 1}.</span> ${q.question}`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            let optionsHtml = '';
            
            // Shuffle options if test has randomizeOptions flag
            let options = [...q.options];
            if (testData.randomizeOptions) {
                options = shuffleArray(options);
            }
            
            options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65 + optIdx);
                const isSelected = userAnswers[index] === opt;
                optionsHtml += `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index}, '${opt.replace(/'/g, "\\'")}')">
                        <input type="radio" name="question" value="${opt}" ${isSelected ? 'checked' : ''}>
                        <span><strong>${letter}.</strong> ${opt}</span>
                    </div>
                `;
            });
            
            optionsContainer.innerHTML = optionsHtml;
            updateNavButtons();
        }
        
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        window.selectOption = (index, value) => {
            userAnswers[index] = value;
            renderQuestionNav();
            renderQuestion(currentIndex);
        };
        
        window.goToQuestion = (index) => {
            currentIndex = index;
            renderQuestion(currentIndex);
        };
        
        window.prevQuestion = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        };
        
        window.nextQuestion = () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion(currentIndex);
            }
        };
        
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').textContent = currentIndex === questions.length - 1 ? 'Finish' : 'Next';
            if (currentIndex === questions.length - 1) {
                document.getElementById('nextBtn').innerHTML = 'Finish <i class="fas fa-check"></i>';
            } else {
                document.getElementById('nextBtn').innerHTML = 'Next <i class="fas fa-arrow-right"></i>';
            }
        }
        
        window.submitTest = () => {
            // Check if all questions answered
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (!confirm(`You have ${unanswered} unanswered question(s). Are you sure you want to submit?`)) {
                    return;
                }
            }
            document.getElementById('confirmModal').classList.add('active');
        };
        
        window.closeConfirmModal = () => {
            document.getElementById('confirmModal').classList.remove('active');
        };
        
        window.confirmSubmit = async () => {
            document.getElementById('confirmModal').classList.remove('active');
            await saveSubmission();
        };
        
        window.autoSubmit = async () => {
            document.getElementById('autoSubmitModal').classList.remove('active');
            await saveSubmission();
        };
        
        async function saveSubmission() {
            if (testSubmitted) return;
            testSubmitted = true;
            clearInterval(timerInterval);
            
            // Calculate score
            let score = 0;
            const answersDetail = [];
            
            questions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                const isCorrect = userAnswer === q.correct;
                if (isCorrect) {
                    score += q.points || 1;
                }
                answersDetail.push({
                    questionId: idx,
                    question: q.question,
                    userAnswer: userAnswer || null,
                    correctAnswer: q.correct,
                    isCorrect: isCorrect,
                    points: q.points || 1,
                    pointsEarned: isCorrect ? (q.points || 1) : 0
                });
            });
            
            const submissionData = {
                testId: testId,
                studentId: currentUser.uid,
                studentName: currentUser.displayName || 'Student',
                testTitle: testData.title,
                subject: testData.subject,
                week: testData.week || 1, // Ensure week has a default value
                term: testData.term || 1,
                session: testData.session || new Date().getFullYear().toString(),
                totalPoints: testData.totalPoints,
                score: score,
                percentage: (score / testData.totalPoints) * 100,
                answers: answersDetail,
                submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                submitted: true,
                graded: true // Auto-graded for MCQ
            };
            
            // Calculate grade
            const percentage = (score / testData.totalPoints) * 100;
            if (percentage >= 75) submissionData.grade = 'A';
            else if (percentage >= 65) submissionData.grade = 'B';
            else if (percentage >= 50) submissionData.grade = 'C';
            else if (percentage >= 40) submissionData.grade = 'D';
            else submissionData.grade = 'F';
            
            submissionData.remark = getAutoRemark(percentage);
            
            try {
                await db.collection('testSubmissions').add(submissionData);
                alert(`Test submitted successfully!\nYour score: ${score}/${testData.totalPoints}\nGrade: ${submissionData.grade}\n${submissionData.remark}`);
                window.location.href = 'student-results.html';
            } catch(e) {
                console.error('Error submitting test:', e);
                alert('Error submitting test: ' + e.message);
                testSubmitted = false;
            }
        }
        
        function getAutoRemark(percentage) {
            if (percentage >= 75) return 'Excellent performance! Keep it up!';
            if (percentage >= 65) return 'Good work! You have a solid understanding.';
            if (percentage >= 50) return 'Satisfactory. Keep practicing to improve.';
            if (percentage >= 40) return 'Fair attempt. More study is recommended.';
            return 'Needs improvement. Please review the material and try again.';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · My Timetables</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --bg-sidebar: rgba(255,255,255,0.75);
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --danger-bg: #ef444420;
            --danger-text: #b91c1c;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --bg-sidebar: rgba(15, 23, 42, 0.8);
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title h1 {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }
        .page-title p {
            color: var(--text-secondary);
            font-weight: 400;
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.4rem 0.4rem 0.4rem 1rem;
        }
        .profile-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .profile-pic {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px var(--accent);
            background-size: cover;
            background-position: center;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 60px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 0.5rem;
            min-width: 180px;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow);
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            padding: 0.8rem 1.2rem;
            color: var(--text-primary);
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: 0.2s;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px var(--accent);
            border-color: var(--accent);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .type-badge {
            background: var(--accent);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th {
            background: var(--hover-bg);
            padding: 1rem 0.8rem;
            text-align: left;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 1rem 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .error-message {
            background: var(--danger-bg);
            color: var(--danger-text);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--danger-text);
        }
        .error-message a {
            color: var(--accent);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .top-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Timetables</h1>
                <p>Your class schedules</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-trigger">
                        <span class="profile-name" id="profileName">Student</span>
                        <div class="profile-pic" id="profilePic">S</div>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Class: <span id="className">Loading...</span></h2>
            </div>
            <div id="timetablesContainer">
                <!-- Dynamically populated -->
                <p class="empty-state">Loading timetables...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        auth.onAuthStateChanged(async (user) => {
            console.log('Auth state changed, user:', user ? user.uid : 'none');
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            try {
                console.log('Fetching user document for:', user.uid);
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    console.error('User document not found');
                    await auth.signOut();
                    window.location.href = 'student-login.html';
                    return;
                }
                const userData = userDoc.data();
                console.log('User data:', userData);

                if (userData.role !== 'student') {
                    console.error('Role is not student:', userData.role);
                    await auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }

                const isApproved = userData.approved === true || userData.status === 'approved';
                if (!isApproved) {
                    console.error('Student not approved');
                    alert('Your account is pending approval.');
                    await auth.signOut();
                    window.location.href = 'student-login.html';
                    return;
                }

                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || 'T');
                document.getElementById('profileName').textContent = userData.firstName || 'Student';
                const studentClass = userData.class;
                document.getElementById('className').textContent = studentClass || 'Not assigned';
                if (studentClass) {
                    await loadPublishedTimetables(studentClass);
                } else {
                    document.getElementById('timetablesContainer').innerHTML = '<p class="empty-state">You are not assigned to any class.</p>';
                }
            } catch (error) {
                console.error('Auth error:', error);
                document.getElementById('timetablesContainer').innerHTML = `<p class="error-message">Error loading: ${error.message}</p>`;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        function getHeaders(type) {
            switch(type) {
                case 'academic': return ['Time', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
                case 'hairstyle': return ['Week', 'Hairstyle', 'Description'];
                case 'test': case 'exam': return ['Date', 'Time', 'Subject', 'Venue', 'Duration'];
                default: return [];
            }
        }

        function periodToRow(p, type) {
            switch(type) {
                case 'academic':
                    return [`${p.startTime} – ${p.endTime}`, p.monday||'—', p.tuesday||'—', p.wednesday||'—', p.thursday||'—', p.friday||'—'];
                case 'hairstyle':
                    return [p.startTime||'—', p.monday||'—', p.tuesday||'—'];
                case 'test': case 'exam':
                    return [p.startTime||'—', p.endTime||'—', p.monday||'—', p.tuesday||'—', p.wednesday||'—'];
                default: return [];
            }
        }

        async function loadPublishedTimetables(classId) {
            const container = document.getElementById('timetablesContainer');
            try {
                // Query only published timetables for this class
                const snapshot = await db.collection('timetables')
                    .where('classId', '==', classId)
                    .where('published', '==', true)
                    .get();
                console.log('Published timetables query returned:', snapshot.size, 'documents');
                
                if (snapshot.empty) {
                    container.innerHTML = '<p class="empty-state">No published timetables for your class yet.</p>';
                    return;
                }

                const timetables = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    // Determine type (from field or document ID)
                    const type = data.type || (doc.id.includes('_') ? doc.id.split('_')[1] : 'academic');
                    timetables.push({ type, data, id: doc.id });
                });

                // Sort by type (e.g., academic, hairstyle, test, exam)
                timetables.sort((a,b) => a.type.localeCompare(b.type));

                let html = '';
                timetables.forEach(tt => {
                    const type = tt.type;
                    const periods = tt.data.periods || [];
                    periods.sort((a,b) => (a.startTime || '').localeCompare(b.startTime || ''));
                    const headers = getHeaders(type);
                    let rows = '';
                    periods.forEach(p => {
                        const cells = periodToRow(p, type);
                        rows += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
                    });
                    const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
                    html += `
                        <div class="card" style="margin-top:1.5rem;">
                            <div class="card-header">
                                <h3>${typeLabel} Timetable</h3>
                                <span class="type-badge">${typeLabel}</span>
                            </div>
                            <div class="table-responsive">
                                <table>
                                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                                    <tbody>${rows || '<tr><td colspan="100" class="empty-state">No entries.</td></tr>'}</tbody>
                                </table>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading timetables:', error);
                container.innerHTML = `<p class="error-message">Error loading timetables: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>

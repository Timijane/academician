<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · My Timetables</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
        }
        .page-title p {
            color: var(--text-secondary);
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            border-radius: 0.5rem;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .card-header .type-badge {
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            background: var(--accent);
            color: white;
            font-size: 0.9rem;
        }

        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.8rem;
            text-align: left;
        }
        th {
            background: var(--hover-bg);
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
        }

        .timetables-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Timetables</h1>
                <p>Your class schedules</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">S</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Class: <span id="className">Loading...</span></h2>
            </div>
            <div id="timetablesContainer" class="timetables-grid">
                <!-- Dynamically populated -->
                <p>Loading timetables...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        let currentUser = null;
        let userData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'student-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'student') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (userData.firstName?.[0] || 'S') + (userData.surname?.[0] || 'T');
            document.querySelector('.page-title p').textContent = `Welcome back, ${userData.firstName || 'Student'}`;
            const studentClass = userData.studentClass || userData.class; // fallback
            document.getElementById('className').textContent = studentClass || 'Not assigned';

            if (studentClass) {
                loadAllTimetables(studentClass);
            } else {
                document.getElementById('timetablesContainer').innerHTML = '<p class="empty-state">You are not assigned to any class.</p>';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        // Helper to get table headers based on type
        function getHeaders(type) {
            switch(type) {
                case 'academic':
                    return ['Time', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
                case 'hairstyle':
                    return ['Week', 'Hairstyle', 'Description'];
                case 'test':
                case 'exam':
                    return ['Date', 'Time', 'Subject', 'Venue', 'Duration'];
                default:
                    return [];
            }
        }

        // Helper to map period to row cells based on type
        function periodToRow(p, type) {
            switch(type) {
                case 'academic':
                    return [`${p.startTime} – ${p.endTime}`, p.monday || '—', p.tuesday || '—', p.wednesday || '—', p.thursday || '—', p.friday || '—'];
                case 'hairstyle':
                    return [p.startTime || '—', p.monday || '—', p.tuesday || '—'];
                case 'test':
                case 'exam':
                    return [p.startTime || '—', p.endTime || '—', p.monday || '—', p.tuesday || '—', p.wednesday || '—'];
                default:
                    return [];
            }
        }

        async function loadAllTimetables(classId) {
            // Since we store each type as a separate document in timetables collection with classId as doc id,
            // we cannot have multiple documents with same id. We need a different approach: store each type under a subcollection or different doc ids.
            // Simpler: We'll query timetables collection for documents where classId == classId and published == true.
            // But we used doc(classId) before. To support multiple types, we need to use a different document id, like `${classId}_${type}`.
            // For backward compatibility, we can keep the academic one at classId, and for others use `${classId}_hairstyle`, etc.
            // In the teacher page, when saving approved timetable, we need to save to doc id based on type.
            // Let's adjust: In teacher page, when approving, we save to `timetables/${classId}_${type}`.
            // The student page then queries all timetables where id starts with classId.
            // We'll modify teacher page accordingly (minor change in approve function).
            // But to keep this answer focused, I'll implement that in the teacher page as well.

            // For now, we'll implement student page to fetch all timetables for the class by prefix.
            const prefix = classId + '_';
            const timetables = [];
            try {
                // Get all documents with id starting with classId
                const snapshot = await db.collection('timetables').get();
                snapshot.forEach(doc => {
                    if (doc.id === classId || doc.id.startsWith(prefix)) {
                        const data = doc.data();
                        if (data.published) {
                            timetables.push({ id: doc.id, ...data });
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading timetables:', error);
            }

            const container = document.getElementById('timetablesContainer');
            if (timetables.length === 0) {
                container.innerHTML = '<p class="empty-state">No published timetables for your class yet.</p>';
                return;
            }

            let html = '';
            timetables.forEach(tt => {
                const type = tt.type || 'academic';
                const periods = tt.periods || [];
                periods.sort((a,b) => (a.startTime || '').localeCompare(b.startTime || ''));

                const headers = getHeaders(type);
                let tableRows = '';
                periods.forEach(p => {
                    const cells = periodToRow(p, type);
                    tableRows += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
                });

                const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
                html += `
                    <div class="card">
                        <div class="card-header">
                            <h3>${typeLabel} Timetable</h3>
                            <span class="type-badge">${typeLabel}</span>
                        </div>
                        <div class="table-responsive">
                            <table>
                                <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                                <tbody>${tableRows || '<tr><td colspan="100" class="empty-state">No entries.</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>

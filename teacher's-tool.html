<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>EduTop · Teacher Workspace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js">
  </script>
  <script type="importmap">
    { "imports": { "groq-sdk": "https://esm.run/groq-sdk" } }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root[data-theme="light"] {
      --bg-primary: #f5f9ff;
      --bg-surface: rgba(255, 255, 255, 0.8);
      --text-primary: #0b1e33;
      --text-secondary: #2c3e50;
      --accent: #1e3c72;
      --accent-glow: #2a5298;
      --accent-light: rgba(30, 60, 114, 0.08);
      --border: rgba(0, 0, 0, 0.07);
      --card-bg: rgba(255, 255, 255, 0.75);
      --hover-bg: rgba(255, 255, 255, 0.92);
      --shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 5px 15px -5px rgba(0, 0, 0, 0.04);
      --success-bg: rgba(34, 197, 94, 0.15);
      --success-text: #16a34a;
      --warning-bg: rgba(245, 158, 11, 0.15);
      --warning-text: #b45309;
      --danger-bg: rgba(239, 68, 68, 0.15);
      --danger-text: #b91c1c;
      --info-bg: rgba(59, 130, 246, 0.1);
      --info-text: #1d4ed8;
      --input-bg: rgba(255, 255, 255, 0.9);
      --toolbar-bg: #f8fafc;
      --gradient-start: #1e3c72;
      --gradient-end: #2a5298;
      --toast-bg: rgba(15, 23, 42, 0.95);
      --unsaved-dot: #f59e0b;
      --locked-bg: #f9fafb;
    }

    :root[data-theme="dark"] {
      --bg-primary: #080d18;
      --bg-surface: rgba(12, 20, 35, 0.85);
      --text-primary: #f0f4fa;
      --text-secondary: #a0b3d9;
      --accent: #3b82f6;
      --accent-glow: #60a5fa;
      --accent-light: rgba(59, 130, 246, 0.1);
      --border: rgba(255, 255, 255, 0.06);
      --card-bg: rgba(15, 23, 42, 0.65);
      --hover-bg: rgba(25, 35, 55, 0.85);
      --shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.6);
      --shadow-sm: 0 5px 15px -5px rgba(0, 0, 0, 0.4);
      --success-bg: rgba(34, 197, 94, 0.2);
      --success-text: #4ade80;
      --warning-bg: rgba(245, 158, 11, 0.2);
      --warning-text: #fbbf24;
      --danger-bg: rgba(239, 68, 68, 0.2);
      --danger-text: #f87171;
      --info-bg: rgba(59, 130, 246, 0.15);
      --info-text: #60a5fa;
      --input-bg: rgba(25, 35, 55, 0.85);
      --toolbar-bg: #1a2332;
      --gradient-start: #3b82f6;
      --gradient-end: #8b5cf6;
      --toast-bg: rgba(10, 16, 28, 0.95);
      --unsaved-dot: #fbbf24;
      --locked-bg: #0f172a;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 450px;
      height: 450px;
      top: -180px;
      right: -180px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 70%);
      animation: float 22s infinite alternate;
    }

    .orb-2 {
      width: 550px;
      height: 550px;
      bottom: -220px;
      left: -220px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12), transparent 70%);
      animation: float 28s infinite alternate;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(60px, 40px) scale(1.15);
      }
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    .profile-dropdown {
      position: relative;
    }

    .profile-trigger {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3rem;
      padding: 0.3rem 0.3rem 0.3rem 0.8rem;
      cursor: pointer;
    }

    .profile-name {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .profile-pic {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .dropdown-menu {
      position: absolute;
      right: 0;
      top: 50px;
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.4rem;
      min-width: 170px;
      display: none;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .profile-dropdown:hover .dropdown-menu {
      display: block;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dropdown-item {
      padding: 0.7rem 1rem;
      border-radius: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .dropdown-item:hover {
      background: var(--hover-bg);
      color: var(--accent);
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .main-container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 1.2rem 1.5rem 2.5rem;
      position: relative;
      z-index: 5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.9rem;
      margin-bottom: 1.4rem;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .stat-icon.blue {
      background: var(--info-bg);
      color: var(--info-text);
    }

    .stat-icon.green {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .stat-icon.yellow {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .stat-icon.purple {
      background: rgba(139, 92, 246, 0.15);
      color: #8b5cf6;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .workspace-tabs {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1.4rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3rem;
      padding: 0.3rem;
      width: fit-content;
      flex-wrap: wrap;
    }

    .workspace-tab {
      padding: 0.65rem 1.8rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-secondary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      position: relative;
    }

    .workspace-tab.active {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: white;
      box-shadow: 0 5px 18px -4px var(--accent);
    }

    .unsaved-dot {
      display: none;
      position: absolute;
      top: 5px;
      right: 10px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--unsaved-dot);
    }

    .workspace-tab.dirty .unsaved-dot {
      display: block;
    }

    .workspace-panel {
      display: none;
    }

    .workspace-panel.active {
      display: block;
      animation: fadeIn 0.25s;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 1.3rem;
      padding: 1.3rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.3rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.8rem;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 2rem;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: white;
      border: none;
    }

    .btn-success {
      background: var(--success-text);
      color: white;
      border: none;
    }

    .btn-danger {
      background: var(--danger-text);
      color: white;
      border: none;
    }

    .btn-warning {
      background: var(--warning-text);
      color: white;
      border: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
    }

    .btn-edit-unlock {
      background: var(--warning-text);
      color: white;
      font-weight: 600;
      border: none;
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .error-message {
      background: var(--danger-bg);
      color: var(--danger-text);
      padding: 0.9rem;
      border-radius: 0.9rem;
      margin-bottom: 0.9rem;
      border-left: 4px solid var(--danger-text);
      display: none;
    }

    .status-badge {
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.75rem;
    }

    .status-approved {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .status-pending {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .status-draft {
      background: var(--hover-bg);
      color: var(--text-secondary);
    }

    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.6rem;
      font-size: 0.8rem;
    }

    th {
      background: var(--hover-bg);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 0.7rem;
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.85rem;
      font-family: inherit;
    }

    .delete-row {
      color: var(--danger-text);
      cursor: pointer;
      text-align: center;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.8rem;
    }

    .subject-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem;
      cursor: pointer;
      position: relative;
    }

    .subject-card.active {
      border: 2px solid var(--accent);
    }

    .week-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .week-tab {
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      cursor: pointer;
      background: var(--card-bg);
      border: 1px solid var(--border);
    }

    .week-tab.active {
      background: var(--accent);
      color: white;
    }

    .editor-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.3rem;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .ql-container {
      min-height: 350px;
      font-size: 15px;
    }

    .ql-editor {
      min-height: 350px;
      color: var(--text-primary);
    }

    .ql-toolbar {
      border: none !important;
      border-bottom: 1px solid var(--border) !important;
      background: var(--toolbar-bg);
    }

    .card.locked {
      opacity: 0.6;
      pointer-events: none;
      position: relative;
      background: var(--locked-bg);
    }

    .card.locked::after {
      content: "✓ Published / Moved";
      position: absolute;
      top: 10px;
      right: 15px;
      background: var(--success-text);
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 600;
      z-index: 10;
      pointer-events: auto;
    }

    .card.locked .btn-edit-unlock {
      pointer-events: auto;
      position: relative;
      z-index: 11;
    }

    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 6000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: var(--toast-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.9rem 1.3rem;
      min-width: 280px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 0.8rem;
      }
      .top-nav {
        padding: 0.6rem 0.8rem;
      }
      .workspace-tab {
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="top-nav">
    <div class="nav-left">
      <a href="teacher-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <button class="nav-btn" onclick="openTemplatesModal()"><i class="fas fa-layer-group"></i> Templates</button>
      <button class="nav-btn" onclick="printLessonNote()"><i class="fas fa-print"></i> Print</button>
    </div>
    <div class="nav-right">
      <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
      <div class="profile-dropdown">
        <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
        <div class="dropdown-menu">
          <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
          <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div id="errorMessage" class="error-message"></div>
    <div class="stats-grid" id="weeklyStats">
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-book"></i></div><div class="stat-info"><div class="stat-value" id="statLessons">0</div><div class="stat-label">Lessons</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-info"><div class="stat-value" id="statApproved">0</div><div class="stat-label">Approved</div></div></div>
    </div>

    <div class="workspace-tabs" id="workspaceTabs">
      <div class="workspace-tab active" data-panel="timetable"><i class="fas fa-calendar-alt"></i> Timetable</div>
      <div class="workspace-tab" data-panel="lessonNotes"><i class="fas fa-book-open"></i> Lesson Notes</div>
      <div class="workspace-tab" data-panel="dailyReport"><i class="fas fa-journal-whills"></i> Report</div>
    </div>

    <div class="workspace-panel active" id="panel-timetable">
      <div class="card">
        <div class="card-header"><h3>Timetable Draft</h3></div>
        <div class="table-responsive">
          <table>
            <thead id="draftTableHeader"></thead>
            <tbody id="draftBody"></tbody>
          </table>
        </div>
        <div class="actions" style="margin-top:1rem;display:flex;gap:0.5rem;">
          <button class="btn btn-outline btn-sm" id="addTimetableRowBtn">+ Row</button>
          <button class="btn btn-primary btn-sm" id="saveDraftBtn">Save Draft</button>
          <button class="btn btn-success btn-sm" id="submitTimetableBtn">Submit</button>
        </div>
      </div>
    </div>

    <div class="workspace-panel" id="panel-lessonNotes">
      <div class="sub-tabs" style="display:flex;gap:0.3rem;margin-bottom:1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:3rem;padding:0.3rem;width:fit-content;">
        <div class="sub-tab active" data-ln="syllabus">📋 Syllabus</div>
        <div class="sub-tab" data-ln="notebook">📓 Notebook</div>
        <div class="sub-tab" data-ln="saved">💾 Published</div>
      </div>
      <div id="ln-syllabus">
        <div class="subject-grid" id="subjectGrid"></div>
        <button class="btn btn-outline btn-sm" id="addSubjectBtn">+ Subject</button>
        <div id="syllabusSection" style="display:none;margin-top:1rem;">
          <div class="card">
            <div class="card-header"><h3 id="currentSubjectTitle"></h3></div>
            <div class="table-responsive">
              <table>
                <thead><tr><th>Week</th><th>Topic</th><th>Objectives</th><th></th></tr></thead>
                <tbody id="syllabusBody"></tbody>
              </table>
            </div>
            <div class="actions" style="margin-top:0.5rem;">
              <button class="btn btn-outline btn-sm" id="addWeekBtn">+ Week</button>
              <button class="btn btn-primary btn-sm" id="saveSyllabusBtn">Save</button>
              <button class="btn btn-success btn-sm" id="submitSyllabusBtn">Submit</button>
            </div>
          </div>
        </div>
      </div>
      <div id="ln-notebook" style="display:none;">
        <div class="week-tabs" id="weekTabs"></div>
        <div id="editorSection" style="display:none;">
          <div class="card">
            <div class="card-header">
              <h3>Lesson Note Editor</h3>
              <button class="btn btn-primary btn-sm" id="aiGenerateFullLessonBtn"><i class="fas fa-robot"></i> AI Full Lesson Note</button>
            </div>
            <div class="editor-container"><div id="editor"></div></div>
            <div class="actions" style="margin-top:0.8rem;">
              <button class="btn btn-primary btn-sm" id="saveEditorBtn">Save Draft</button>
              <button class="btn btn-success btn-sm" id="submitEditorBtn">Submit</button>
            </div>
          </div>
        </div>
      </div>
      <div id="ln-saved" style="display:none;">
        <div class="card">
          <h3>Published & Moved Items</h3>
          <div id="savedCollectionList"></div>
        </div>
      </div>
    </div>

    <div class="workspace-panel" id="panel-dailyReport">
      <div class="card">
        <div class="card-header"><h3>Today's Report</h3></div>
        <input type="date" id="reportDate" style="margin-bottom:0.5rem;">
        <textarea id="reportContent" placeholder="Activities..." rows="4"></textarea>
        <button class="btn btn-primary btn-sm" id="submitReportBtn" style="margin-top:0.5rem;">Submit</button>
      </div>
    </div>
  </div>

  <script type="module">
    import Groq from "groq-sdk";

    // Initialize Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
      authDomain: "triangle-6e6b7.firebaseapp.com",
      projectId: "triangle-6e6b7",
      storageBucket: "triangle-6e6b7.appspot.com",
      messagingSenderId: "673937760480",
      appId: "1:673937760480:web:f03c06e1207232213ef085"
    });

    const auth = firebase.auth();
    const db = firebase.firestore();

    const NIGERIAN_PROMPT = `You are a senior Nigerian teacher. Write comprehensive LESSON NOTE in full NERDC/UBEC standard. Use Nigerian English, local names, ₦, markets. Include: TOPIC, CLASS, SUBJECT, DURATION, OBJECTIVES, MATERIALS, PREVIOUS KNOWLEDGE, INTRODUCTION, PRESENTATION (Step 1,2,3 with Teacher/Pupils activities), EVALUATION, CONCLUSION, ASSIGNMENT. Reference Nigerian textbooks (e.g., New Concept Mathematics by J.A. Adegboye, Comprehensive English by M.A. Oluikpe). Output ONLY the lesson note in HTML.`;

    // Global state variables
    let currentUser = null;
    let userData = null;
    let currentClass = null;
    let subjects = [];
    let currentSubject = null;
    let currentWeek = null;
    let syllabusMap = {};
    let lessonNotesMap = {};
    let quill = null;
    let groq = null;
    let draftData = [{
      start: '08:00',
      end: '08:40',
      monday: '',
      tuesday: '',
      wednesday: '',
      thursday: '',
      friday: ''
    }];

    // Utility functions
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast';
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
      el.innerHTML = `<i class="fas fa-${icon}"></i> ${msg}`;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function showError(m) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = m;
      errorEl.style.display = 'block';
      setTimeout(() => errorEl.style.display = 'none', 5000);
    }

    // Theme toggle
    (() => {
      const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeToggle').querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
      document.getElementById('themeToggle').addEventListener('click', () => {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('edutop-theme', newTheme);
        document.getElementById('themeToggle').querySelector('span').textContent = newTheme === 'dark' ? 'Light' : 'Dark';
      });
    })();

    // Panel switching
    document.querySelectorAll('#workspaceTabs .workspace-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#workspaceTabs .workspace-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.workspace-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + t.dataset.panel).classList.add('active');
      });
    });

    // Lesson notes sub-tabs
    document.querySelectorAll('#panel-lessonNotes .sub-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#panel-lessonNotes .sub-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        ['syllabus', 'notebook', 'saved'].forEach(k => {
          document.getElementById('ln-' + k).style.display = k === t.dataset.ln ? 'block' : 'none';
        });
        if (t.dataset.ln === 'saved') renderSavedCollection();
      });
    });

    // Timetable functions
    function renderDraftTimetable() {
      document.getElementById('draftTableHeader').innerHTML =
        '<tr><th>Start</th><th>End</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th></th></tr>';
      let h = '';
      draftData.forEach((p, i) => {
        h += `<tr>
          <td><input value="${p.start}" data-i="${i}" data-f="start"></td>
          <td><input value="${p.end}" data-i="${i}" data-f="end"></td>
          <td><input value="${p.monday||''}" data-i="${i}" data-f="monday"></td>
          <td><input value="${p.tuesday||''}" data-i="${i}" data-f="tuesday"></td>
          <td><input value="${p.wednesday||''}" data-i="${i}" data-f="wednesday"></td>
          <td><input value="${p.thursday||''}" data-i="${i}" data-f="thursday"></td>
          <td><input value="${p.friday||''}" data-i="${i}" data-f="friday"></td>
          <td class="delete-row" onclick="window.deleteTTRow(${i})"><i class="fas fa-trash"></i></td>
        </tr>`;
      });
      document.getElementById('draftBody').innerHTML = h;
      document.querySelectorAll('#draftBody input').forEach(inp => {
        inp.addEventListener('input', function() {
          const i = parseInt(this.dataset.i);
          draftData[i][this.dataset.f] = this.value;
        });
      });
    }

    window.deleteTTRow = (i) => {
      draftData.splice(i, 1);
      renderDraftTimetable();
    };

    document.getElementById('addTimetableRowBtn').addEventListener('click', () => {
      draftData.push({
        start: '',
        end: '',
        monday: '',
        tuesday: '',
        wednesday: '',
        thursday: '',
        friday: ''
      });
      renderDraftTimetable();
    });

    document.getElementById('saveDraftBtn').addEventListener('click', async () => {
      try {
        await db.collection('timetableDrafts').doc(currentUser.uid).set({
          periods: draftData,
          class: currentClass,
          updatedAt: new Date()
        });
        showToast('Draft saved', 'success');
      } catch (e) {
        showError(e.message);
      }
    });

    document.getElementById('submitTimetableBtn').addEventListener('click', async () => {
      try {
        await db.collection('timetableProposals').add({
          teacherId: currentUser.uid,
          periods: draftData,
          class: currentClass,
          status: 'pending',
          submittedAt: new Date()
        });
        showToast('Submitted for approval', 'success');
      } catch (e) {
        showError(e.message);
      }
    });

    // Subject functions
    function renderSubjectGrid() {
      const grid = document.getElementById('subjectGrid');
      grid.innerHTML = '';
      subjects.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `<h4>${sub}</h4>`;
        card.onclick = () => selectSubject(sub);
        grid.appendChild(card);
      });
    }

    document.getElementById('addSubjectBtn').addEventListener('click', async () => {
      const name = prompt('Subject name:');
      if (!name || !name.trim()) return;
      const trimmedName = name.trim();
      if (subjects.includes(trimmedName)) {
        showToast('Subject already exists', 'warning');
        return;
      }
      subjects.push(trimmedName);
      try {
        await db.collection('users').doc(currentUser.uid).update({
          subjects: subjects
        });
        renderSubjectGrid();
        showToast('Subject added', 'success');
      } catch (e) {
        subjects.pop();
        showError(e.message);
      }
    });

    async function loadSyllabusData() {
      try {
        const snap = await db.collection('syllabus')
          .where('teacherId', '==', currentUser.uid)
          .get();
        syllabusMap = {};
        snap.forEach(d => {
          const data = d.data();
          syllabusMap[data.subject] = {
            id: d.id,
            ...data
          };
        });
      } catch (e) {
        console.warn('Syllabus load error:', e);
      }
    }

    async function selectSubject(sub) {
      currentSubject = sub;
      document.getElementById('syllabusSection').style.display = 'block';
      document.getElementById('currentSubjectTitle').textContent = sub + ' Syllabus';

      const sy = syllabusMap[sub] || { weeks: [] };
      renderSyllabusTable(sy.weeks || []);

      try {
        const snap = await db.collection('lessonNotes')
          .where('teacherId', '==', currentUser.uid)
          .where('subject', '==', sub)
          .get();
        lessonNotesMap = {};
        snap.forEach(d => {
          const data = d.data();
          lessonNotesMap[data.week] = {
            id: d.id,
            ...data
          };
        });
        renderWeekTabs();
      } catch (e) {
        console.warn('Lesson notes load error:', e);
      }
    }

    function renderSyllabusTable(weeks) {
      let h = '';
      weeks.forEach((w, i) => {
        h += `<tr>
          <td><input value="${w.week||''}" data-i="${i}" data-f="week"></td>
          <td><input value="${w.topic||''}" data-i="${i}" data-f="topic"></td>
          <td><input value="${w.objectives||''}" data-i="${i}" data-f="objectives"></td>
          <td class="delete-row" onclick="window.deleteSW(${i})"><i class="fas fa-trash"></i></td>
        </tr>`;
      });
      document.getElementById('syllabusBody').innerHTML = h;
      document.querySelectorAll('#syllabusBody input').forEach(inp => {
        inp.addEventListener('input', function() {
          const i = parseInt(this.dataset.i);
          if (!syllabusMap[currentSubject]) syllabusMap[currentSubject] = { weeks: [] };
          if (!syllabusMap[currentSubject].weeks[i]) syllabusMap[currentSubject].weeks[i] = {};
          syllabusMap[currentSubject].weeks[i][this.dataset.f] = this.value;
        });
      });
    }

    window.deleteSW = (i) => {
      if (!syllabusMap[currentSubject]) return;
      syllabusMap[currentSubject].weeks.splice(i, 1);
      renderSyllabusTable(syllabusMap[currentSubject].weeks);
    };

    document.getElementById('addWeekBtn').addEventListener('click', () => {
      if (!syllabusMap[currentSubject]) syllabusMap[currentSubject] = { weeks: [] };
      const len = syllabusMap[currentSubject].weeks.length;
      syllabusMap[currentSubject].weeks.push({
        week: len + 1,
        topic: '',
        objectives: ''
      });
      renderSyllabusTable(syllabusMap[currentSubject].weeks);
    });

    document.getElementById('saveSyllabusBtn').addEventListener('click', async () => {
      if (!currentSubject) return;
      const weeks = syllabusMap[currentSubject]?.weeks || [];
      if (!weeks.length) {
        showToast('Add at least one week', 'warning');
        return;
      }
      try {
        if (syllabusMap[currentSubject]?.id) {
          await db.collection('syllabus').doc(syllabusMap[currentSubject].id).update({
            weeks: weeks,
            updatedAt: new Date()
          });
        } else {
          const ref = await db.collection('syllabus').add({
            teacherId: currentUser.uid,
            subject: currentSubject,
            weeks: weeks,
            status: 'draft',
            createdAt: new Date()
          });
          syllabusMap[currentSubject] = { ...syllabusMap[currentSubject], id: ref.id };
        }
        showToast('Syllabus saved', 'success');
      } catch (e) {
        showError(e.message);
      }
    });

    document.getElementById('submitSyllabusBtn').addEventListener('click', async () => {
      if (!currentSubject) return;
      const weeks = syllabusMap[currentSubject]?.weeks || [];
      if (!weeks.length) {
        showToast('Add at least one week', 'warning');
        return;
      }
      try {
        if (syllabusMap[currentSubject]?.id) {
          await db.collection('syllabus').doc(syllabusMap[currentSubject].id).update({
            weeks: weeks,
            status: 'pending',
            submittedAt: new Date()
          });
        } else {
          const ref = await db.collection('syllabus').add({
            teacherId: currentUser.uid,
            subject: currentSubject,
            weeks: weeks,
            status: 'pending',
            submittedAt: new Date()
          });
          syllabusMap[currentSubject] = { ...syllabusMap[currentSubject], id: ref.id };
        }
        showToast('Syllabus submitted for approval', 'success');
      } catch (e) {
        showError(e.message);
      }
    });

    function renderWeekTabs() {
      const weeks = syllabusMap[currentSubject]?.weeks || [];
      const container = document.getElementById('weekTabs');
      container.innerHTML = '';
      weeks.forEach(w => {
        const tab = document.createElement('div');
        tab.className = 'week-tab';
        tab.textContent = `Wk ${w.week}`;
        tab.onclick = () => selectWeek(w.week);
        container.appendChild(tab);
      });
    }

    function selectWeek(week) {
      currentWeek = week;
      document.getElementById('editorSection').style.display = 'block';
      const note = lessonNotesMap[week] || {};
      if (quill) {
        quill.setText(note.lessonNote || '');
      }
    }

    // AI Generate Full Lesson Note
    document.getElementById('aiGenerateFullLessonBtn').addEventListener('click', async () => {
      if (!groq) {
        showToast('AI not configured yet', 'error');
        return;
      }
      if (!currentSubject || !currentWeek) {
        showToast('Select a subject and week first', 'warning');
        return;
      }
      const topic = syllabusMap[currentSubject]?.weeks?.find(w => w.week == currentWeek)?.topic || 'General Topic';
      const btn = document.getElementById('aiGenerateFullLessonBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
      try {
        const completion = await groq.chat.completions.create({
          messages: [
            { role: 'system', content: NIGERIAN_PROMPT },
            { role: 'user', content: `Write full lesson note for ${currentSubject}, Week ${currentWeek}, Topic: ${topic}. Class: ${currentClass || 'JSS1'}.` }
          ],
          model: 'llama-3.3-70b-versatile',
          temperature: 0.4,
          max_tokens: 4096
        });
        let html = completion.choices[0].message.content;
        html = html.replace(/```html\n?/g, '').replace(/```/g, '').trim();
        if (quill) {
          quill.root.innerHTML = html;
        }
        showToast('AI lesson note generated successfully!', 'success');
      } catch (e) {
        showError('AI generation failed: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-robot"></i> AI Full Lesson Note';
      }
    });

    // Save and Submit Lesson Note
    document.getElementById('saveEditorBtn').addEventListener('click', async () => {
      if (!currentSubject || !currentWeek) {
        showToast('Select subject and week', 'warning');
        return;
      }
      const ln = quill ? quill.getText() : '';
      if (!ln.trim()) {
        showToast('Lesson note is empty', 'warning');
        return;
      }
      try {
        const existingNote = lessonNotesMap[currentWeek];
        const topic = syllabusMap[currentSubject]?.weeks?.find(w => w.week == currentWeek)?.topic || '';
        const data = {
          teacherId: currentUser.uid,
          subject: currentSubject,
          week: currentWeek,
          topic: topic,
          lessonNote: ln,
          status: 'draft',
          class: currentClass,
          updatedAt: new Date()
        };
        if (existingNote?.id) {
          await db.collection('lessonNotes').doc(existingNote.id).update(data);
        } else {
          const ref = await db.collection('lessonNotes').add({
            ...data,
            createdAt: new Date()
          });
          lessonNotesMap[currentWeek] = { id: ref.id, ...data };
        }
        showToast('Draft saved successfully', 'success');
      } catch (e) {
        showError('Save failed: ' + e.message);
      }
    });

    document.getElementById('submitEditorBtn').addEventListener('click', async () => {
      if (!currentSubject || !currentWeek) {
        showToast('Select subject and week', 'warning');
        return;
      }
      const existingNote = lessonNotesMap[currentWeek];
      if (!existingNote?.id) {
        showToast('Please save the draft first', 'warning');
        return;
      }
      try {
        await db.collection('lessonNotes').doc(existingNote.id).update({
          status: 'pending',
          submittedAt: new Date()
        });
        lessonNotesMap[currentWeek].status = 'pending';
        showToast('Submitted for approval', 'success');
      } catch (e) {
        showError('Submit failed: ' + e.message);
      }
    });

    // Saved Collection
    function renderSavedCollection() {
      const container = document.getElementById('savedCollectionList');
      if (!currentSubject || !currentWeek) {
        container.innerHTML = '<p style="color:var(--text-secondary);">Select a subject and week to see published items.</p>';
        return;
      }
      const note = lessonNotesMap[currentWeek] || {};
      const items = [];
      if (note.teachingProcessReady) items.push({ title: 'Teaching Process', type: 'teachingProcess' });
      if (note.resourcePublished) items.push({ title: 'Student Resources', type: 'resource' });
      if (note.handwritingReady) items.push({ title: 'Handwriting & Visual Notes', type: 'handwriting' });
      if (note.videosReady || note.videosPublished) items.push({ title: 'Video Links', type: 'videos' });

      if (!items.length) {
        container.innerHTML = '<p style="color:var(--text-secondary);">No published or moved items for this week yet.</p>';
        return;
      }
      container.innerHTML = items.map(item => `
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:1rem;">
          <span><i class="fas fa-check-circle" style="color:var(--success-text);"></i> ${item.title}</span>
          <button class="btn btn-edit-unlock btn-sm" onclick="window.unlockItem('${item.type}')"><i class="fas fa-edit"></i> Edit (Unlock)</button>
        </div>
      `).join('');
    }

    window.unlockItem = async (type) => {
      if (!currentSubject || !currentWeek) return;
      const existingNote = lessonNotesMap[currentWeek];
      if (!existingNote?.id) {
        showToast('No data found', 'error');
        return;
      }
      const updates = {};
      if (type === 'teachingProcess') updates.teachingProcessReady = false;
      if (type === 'resource') updates.resourcePublished = false;
      if (type === 'handwriting') updates.handwritingReady = false;
      if (type === 'videos') { updates.videosReady = false;
        updates.videosPublished = false; }

      try {
        await db.collection('lessonNotes').doc(existingNote.id).update({
          ...updates,
          updatedAt: new Date()
        });
        // Update local state
        Object.keys(updates).forEach(key => {
          lessonNotesMap[currentWeek][key] = updates[key];
        });
        renderSavedCollection();
        showToast('Item unlocked for editing', 'success');
      } catch (e) {
        showError('Unlock failed: ' + e.message);
      }
    };

    // Daily Report
    document.getElementById('submitReportBtn').addEventListener('click', async () => {
      const date = document.getElementById('reportDate').value;
      const content = document.getElementById('reportContent').value.trim();
      if (!date || !content) {
        showToast('Please fill in all fields', 'warning');
        return;
      }
      try {
        await db.collection('dailyReports').add({
          teacherId: currentUser.uid,
          date: date,
          content: content,
          status: 'pending',
          createdAt: new Date()
        });
        document.getElementById('reportContent').value = '';
        showToast('Report submitted successfully', 'success');
      } catch (e) {
        showError('Report submission failed: ' + e.message);
      }
    });

    // Print function
    window.printLessonNote = () => {
      if (!quill || !quill.getText().trim()) {
        showToast('No lesson note to print', 'warning');
        return;
      }
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
          <head><title>Lesson Note</title>
            <style>body{font-family:Inter,sans-serif;padding:2rem;line-height:1.6;}@media print{body{padding:1cm;}}</style>
          </head>
          <body>${quill.root.innerHTML}</body>
        </html>
      `);
      printWindow.document.close();
      printWindow.print();
    };

    // Templates modal placeholder
    window.openTemplatesModal = () => {
      showToast('Templates feature coming soon', 'info');
    };

    // Auth state observer
    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location.href = 'teacher-login.html';
        return;
      }
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists || userDoc.data().role !== 'teacher') {
          await auth.signOut();
          window.location.href = 'index.html';
          return;
        }
        currentUser = user;
        userData = userDoc.data();
        currentClass = userData.classTeaching || 'JSS1';
        subjects = userData.subjects || ['Mathematics', 'English'];

        document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'T');
        document.getElementById('profileName').textContent = userData.firstName || 'Teacher';

        // Try to get Groq API key
        try {
          const response = await fetch(
            'https://firebaseremoteconfig.googleapis.com/v1/projects/triangle-6e6b7/namespaces/io.customer/remote_config?key=AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0'
          );
          const config = await response.json();
          const apiKey = config.parameters?.groq_api_key?.defaultValue?.value;
          if (apiKey) {
            groq = new Groq({ apiKey, dangerouslyAllowBrowser: true });
          }
        } catch (e) {
          console.warn('Remote config fetch failed:', e);
        }

        // Initialize Quill editor
        quill = new Quill('#editor', {
          theme: 'snow',
          placeholder: 'Write your lesson note here...',
          modules: {
            toolbar: [
              ['bold', 'italic', 'underline'],
              [{ 'header': [1, 2, 3, false] }],
              [{ 'list': 'ordered' }, { 'list': 'bullet' }],
              ['clean']
            ]
          }
        });

        // Load initial data
        await loadSyllabusData();
        renderSubjectGrid();
        renderDraftTimetable();

        // Set today's date for report
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('reportDate').value = today;

        // Update stats
        updateStats();
      } catch (e) {
        console.error('Initialization error:', e);
        showError('Failed to initialize: ' + e.message);
      }
    });

    // Stats update
    async function updateStats() {
      try {
        const allNotes = Object.values(lessonNotesMap);
        document.getElementById('statLessons').textContent = allNotes.length;
        document.getElementById('statPending').textContent = allNotes.filter(n => n.status === 'pending').length;
        document.getElementById('statApproved').textContent = allNotes.filter(n => n.status === 'approved').length;
      } catch (e) {
        console.warn('Stats update error:', e);
      }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await auth.signOut();
        window.location.href = 'index.html';
      } catch (e) {
        showError('Logout failed: ' + e.message);
      }
    });

    // Profile link
    document.getElementById('profileLink').addEventListener('click', () => {
      window.location.href = 'teacher-profile.html';
    });

    console.log('✅ EduTop Teacher Workspace initialized successfully');
  </script>
</body>
</html>

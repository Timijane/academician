<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Daily Report</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same base styles as previous pages */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar .logo-area {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2.5rem; padding: 0 0.5rem;
        }
        .sidebar .logo-area i { font-size: 2rem; color: var(--accent); }
        .sidebar .logo-area h2 { font-size: 1.2rem; font-weight: 600; white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem;
            border-radius: 0.75rem; color: var(--text-secondary); transition: 0.2s;
            cursor: pointer; margin-bottom: 0.3rem; white-space: nowrap; text-decoration: none;
        }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); }
        .sidebar .nav-item.active { background: var(--accent); color: white; }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.5rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded { margin-left: 80px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }
        .page-title h1 { font-size: 2rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-icon {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem;
            min-width: 150px; display: none; z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 1rem; color: var(--text-primary); border-radius: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-sm { padding: 0.25rem 0.8rem; font-size: 0.85rem; }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .status-approved { background: var(--success-bg); color: var(--success-text); }
        .status-pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-rejected { background: var(--danger-bg); color: var(--danger-text); }
        .status-draft { background: var(--hover-bg); color: var(--text-secondary); }

        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-primary);
        }
        textarea.form-control {
            min-height: 200px;
            resize: vertical;
        }

        .reports-list {
            margin-top: 2rem;
        }
        .report-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .report-date {
            font-weight: 500;
        }
        .report-status {
            font-size: 0.9rem;
        }
        .report-content {
            color: var(--text-secondary);
            margin: 0.5rem 0;
            white-space: pre-wrap;
        }
        .report-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-chalkboard-teacher"></i>
            <h2>Teacher Panel</h2>
        </div>
        <a href="teacher-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="teacher-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="teacher-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="teacher-daily-report.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Daily Report</span></a>
        <a href="teacher-assignments.html" class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="teacher-my-class.html" class="nav-item"><i class="fas fa-users"></i><span>My Class</span></a>
        <a href="teacher-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="teacher-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="teacher-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="teacher-teach.html" class="nav-item"><i class="fas fa-chalkboard"></i><span>Teach</span></a>
        <a href="teacher-profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Daily Report</h1>
                <p>Write and submit your daily class report</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">T</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- New Report Form -->
        <div class="card">
            <div class="card-header">
                <h3>New Report</h3>
            </div>
            <form id="reportForm">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="reportDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Report (notebook style)</label>
                    <textarea id="reportContent" class="form-control" placeholder="Write your daily report here..." required></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Submit Report</button>
                    <button type="button" class="btn btn-outline" id="saveDraftBtn">Save Draft</button>
                </div>
            </form>
        </div>

        <!-- Previous Reports -->
        <div class="card">
            <div class="card-header">
                <h3>Previous Reports</h3>
            </div>
            <div id="reportsContainer" class="reports-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        let currentUser = null;
        let userData = null;
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
            document.querySelector('.page-title p').textContent = `Welcome back, ${userData.firstName || 'Teacher'}`;

            // Set default date to today
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

            // Load reports
            loadReports();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        // Load reports
        async function loadReports() {
            const snapshot = await db.collection('dailyReports')
                .where('teacherId', '==', currentUser.uid)
                .orderBy('date', 'desc')
                .get();
            const container = document.getElementById('reportsContainer');
            if (snapshot.empty) {
                container.innerHTML = '<p>No previous reports.</p>';
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                const r = doc.data();
                const statusClass = r.status === 'approved' ? 'status-approved' : (r.status === 'rejected' ? 'status-rejected' : 'status-pending');
                html += `
                <div class="report-item">
                    <div class="report-header">
                        <span class="report-date">${r.date}</span>
                        <span class="status-badge ${statusClass}">${r.status}</span>
                    </div>
                    <div class="report-content">${r.content}</div>
                    <div class="report-actions">
                        ${r.status === 'rejected' ? '<button class="btn btn-outline btn-sm" onclick="editReport(\'' + doc.id + '\', \'' + r.content.replace(/'/g, "\\'") + '\')">Edit</button>' : ''}
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        // Submit report
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('reportDate').value;
            const content = document.getElementById('reportContent').value.trim();
            if (!date || !content) return;

            try {
                await db.collection('dailyReports').add({
                    teacherId: currentUser.uid,
                    teacherName: userData.firstName + ' ' + userData.surname,
                    date,
                    content,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('Report submitted for approval.');
                document.getElementById('reportContent').value = '';
                loadReports();
            } catch (error) {
                console.error('Error submitting report:', error);
                alert('Error: ' + error.message);
            }
        });

        // Save draft (optional – we can just use localStorage or a separate collection)
        document.getElementById('saveDraftBtn').addEventListener('click', () => {
            const content = document.getElementById('reportContent').value;
            if (!content) return;
            localStorage.setItem('dailyReportDraft', content);
            alert('Draft saved locally.');
        });

        // Edit rejected report (simplified: load into form)
        window.editReport = (id, content) => {
            document.getElementById('reportContent').value = content;
            // Optionally scroll to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Teacher Daily Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] { --bg-primary: #f0f5fa; --bg-sidebar: rgba(255,255,255,0.75); --text-primary: #0b1e33; --text-secondary: #2c3e50; --accent: #1e3c72; --accent-glow: #2a5298; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --success-bg: #dcfce7; --success-text: #16a34a; --warning-bg: #fef9c3; --warning-text: #ca8a04; --danger-bg: #fee2e2; --danger-text: #dc2626; --info-bg: #dbeafe; --info-text: #2563eb; --gradient-start: #1e3c72; --gradient-end: #2a5298; }
        :root[data-theme="dark"] { --bg-primary: #0a0f1e; --bg-sidebar: rgba(15,23,42,0.8); --text-primary: #f0f4fa; --text-secondary: #a0b3d9; --accent: #3b82f6; --accent-glow: #60a5fa; --border: rgba(255,255,255,0.05); --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80; --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24; --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171; --info-bg: rgba(59,130,246,0.2); --info-text: #60a5fa; --gradient-start: #3b82f6; --gradient-end: #8b5cf6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; transition: all 0.3s; position: relative; overflow-x: hidden; }
        .orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.1), transparent 70%); filter: blur(100px); z-index: 0; animation: float 20s infinite alternate; pointer-events: none; }
        .orb-1 { top: -200px; right: -200px; } .orb-2 { bottom: -200px; left: -200px; animation-duration: 25s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.1); } }
        .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; transition: width 0.3s; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.2rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.2rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.5rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); transform: translateX(5px); border-color: var(--border); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; box-shadow: 0 5px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s; position: relative; z-index: 5; }
        .main-content.expanded { margin-left: 90px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem; }
        .page-title p { color: var(--text-secondary); font-size: 0.9rem; }
        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.3rem 0.3rem 0.3rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1rem; box-shadow: 0 2px 10px var(--accent); }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem; min-width: 200px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.75rem 1rem; color: var(--text-primary); border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); font-size: 0.95rem; }
        textarea.form-control { min-height: 200px; resize: vertical; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .badge { padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-pending { background: var(--warning-bg); color: var(--warning-text); }
        .badge-acknowledged { background: var(--success-bg); color: var(--success-text); }
        .report-item { background: var(--hover-bg); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .report-date { font-weight: 700; color: var(--accent); }
        .question-box { background: var(--info-bg); border-left: 3px solid var(--accent); padding: 0.75rem; margin-top: 0.5rem; border-radius: 0.5rem; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding:2rem; border-radius:1.5rem; text-align:center; }
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-chalkboard-teacher"></i><h2>EduTop</h2></div>
        <a href="teacher-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        <a href="teacher-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="teacher-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="teacher-assignments.html" class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="teacher-tests.html" class="nav-item"><i class="fas fa-file-alt"></i><span>CBT Tests</span></a>
        <a href="teacher-report-card.html" class="nav-item"><i class="fas fa-graduation-cap"></i><span>Report Card</span></a>
        <a href="teacher-daily-report.html" class="nav-item active"><i class="fas fa-journal-whills"></i><span>Daily Report</span></a>
        <a href="teacher-profile.html" class="nav-item"><i class="fas fa-user-edit"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title"><h1>Daily Report</h1><p>Record school activities from opening to closing hours</p></div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown"><div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div><div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div></div>
            </div>
        </div>
        <!-- Create / Edit Today's Report -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-pen-alt"></i> Write Today's Report</h3></div>
            <div class="form-group"><label>Date</label><input type="date" id="reportDate" class="form-control"></div>
            <div class="form-group"><label>Opening Time (e.g., 8:00 AM)</label><input type="text" id="openingTime" class="form-control" placeholder="8:00 AM"></div>
            <div class="form-group"><label>Closing Time</label><input type="text" id="closingTime" class="form-control" placeholder="2:30 PM"></div>
            <div class="form-group"><label>Activities / Events / Observations</label><textarea id="reportContent" class="form-control" placeholder="Describe what happened today..."></textarea></div>
            <button class="btn btn-primary" id="submitReportBtn"><i class="fas fa-paper-plane"></i> Submit Report</button>
        </div>
        <!-- Previous Reports -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-history"></i> My Reports</h3></div>
            <div id="reportsList">Loading...</div>
        </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-content"><i class="fas fa-spinner fa-spin"></i><h3>Processing...</h3></div></div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0", authDomain: "triangle-6e6b7.firebaseapp.com", projectId: "triangle-6e6b7", storageBucket: "triangle-6e6b7.firebasestorage.app", messagingSenderId: "673937760480", appId: "1:673937760480:web:f03c06e1207232213ef085" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // UI elements
        const sidebar = document.getElementById('sidebar'), mainContent = document.getElementById('mainContent'), toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('collapsed'); mainContent.classList.toggle('expanded'); });
        const themeToggle = document.getElementById('themeToggle'); const html = document.documentElement; const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme); themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => { const current = html.getAttribute('data-theme'); const next = current === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('edutop-theme', next); themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark'; });
        
        let currentUser = null, userData = null;
        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        
        async function loadTeacherInfo() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if(doc.exists) userData = doc.data();
            document.getElementById('profilePic').textContent = (userData?.firstName?.[0] || 'T') + (userData?.surname?.[0] || 'E');
            document.getElementById('profileName').textContent = userData?.firstName || 'Teacher';
        }
        
        async function submitReport() {
            const date = document.getElementById('reportDate').value;
            const openingTime = document.getElementById('openingTime').value;
            const closingTime = document.getElementById('closingTime').value;
            const content = document.getElementById('reportContent').value;
            if(!date || !content) { alert('Please fill date and content'); return; }
            showLoading();
            try {
                const existing = await db.collection('dailyReports').where('teacherId','==',currentUser.uid).where('date','==',date).get();
                const reportData = {
                    teacherId: currentUser.uid,
                    teacherName: `${userData?.firstName || ''} ${userData?.surname || ''}`.trim(),
                    teacherClass: userData?.classTeaching || 'Not assigned',
                    date: date,
                    openingTime: openingTime,
                    closingTime: closingTime,
                    content: content,
                    status: 'pending', // pending, acknowledged
                    adminAcknowledged: false,
                    acknowledgedAt: null,
                    adminRemark: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                if(!existing.empty) {
                    await db.collection('dailyReports').doc(existing.docs[0].id).update(reportData);
                    alert('Report updated successfully!');
                } else {
                    await db.collection('dailyReports').add(reportData);
                    alert('Report submitted successfully!');
                }
                loadMyReports();
                // Clear form
                document.getElementById('openingTime').value = '';
                document.getElementById('closingTime').value = '';
                document.getElementById('reportContent').value = '';
            } catch(e) { alert('Error: '+e.message); } finally { hideLoading(); }
        }
        
        async function loadMyReports() {
            if(!currentUser) return;
            const snap = await db.collection('dailyReports').where('teacherId','==',currentUser.uid).orderBy('date','desc').get();
            const container = document.getElementById('reportsList');
            if(snap.empty) { container.innerHTML = '<div class="report-item">No reports yet.</div>'; return; }
            let html = '';
            for(const doc of snap.docs) {
                const r = doc.data();
                const statusBadge = r.status === 'acknowledged' ? '<span class="badge badge-acknowledged">Acknowledged</span>' : '<span class="badge badge-pending">Pending</span>';
                html += `<div class="report-item">
                    <div class="report-date">📅 ${r.date} | ${r.openingTime || '?'} - ${r.closingTime || '?'} ${statusBadge}</div>
                    <div style="white-space: pre-wrap; margin: 0.5rem 0;">${escapeHtml(r.content)}</div>`;
                // Admin acknowledgement remark
                if(r.adminRemark) html += `<div class="question-box"><i class="fas fa-check-circle"></i> <strong>Admin Acknowledgement:</strong> ${escapeHtml(r.adminRemark)}</div>`;
                // Questions and replies
                if(r.questions && r.questions.length) {
                    html += `<div style="margin-top:0.5rem;"><strong><i class="fas fa-question-circle"></i> Questions from Admin:</strong></div>`;
                    r.questions.forEach((q, idx) => {
                        html += `<div class="question-box" style="margin-left:1rem;">
                            <div><strong>Q${idx+1}:</strong> ${escapeHtml(q.question)}</div>
                            ${q.reply ? `<div><strong>Your Reply:</strong> ${escapeHtml(q.reply)}</div>` : `<textarea id="reply_${doc.id}_${idx}" class="form-control" style="margin-top:0.5rem;" rows="2" placeholder="Write your reply..."></textarea>
                            <button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="postReply('${doc.id}', ${idx})">Post Reply</button>`}
                        </div>`;
                    });
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }
        
        window.postReply = async (reportId, qIndex) => {
            const replyText = document.getElementById(`reply_${reportId}_${qIndex}`).value;
            if(!replyText.trim()) { alert('Please write a reply'); return; }
            showLoading();
            try {
                const reportRef = db.collection('dailyReports').doc(reportId);
                const doc = await reportRef.get();
                const questions = doc.data().questions || [];
                if(questions[qIndex]) {
                    questions[qIndex].reply = replyText;
                    questions[qIndex].repliedAt = firebase.firestore.FieldValue.serverTimestamp();
                    await reportRef.update({ questions: questions });
                    alert('Reply sent to admin.');
                    loadMyReports();
                }
            } catch(e) { alert('Error: '+e.message); } finally { hideLoading(); }
        };
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        document.getElementById('submitReportBtn').addEventListener('click', submitReport);
        document.getElementById('reportDate').valueAsDate = new Date();
        
        auth.onAuthStateChanged(async (user) => {
            if(!user) { window.location.href = 'teacher-login.html'; return; }
            currentUser = user;
            await loadTeacherInfo();
            loadMyReports();
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(()=>window.location.href='index.html'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA · Teacher Dashboard</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        /* Same base styles as admin dashboard – keep consistent */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root[data-theme="light"] {
            --bg-primary: #f0f4fa;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.7);
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.2);
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #ca8a04;
            --info: #2563eb;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0b1120;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(15, 23, 42, 0.8);
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #eab308;
            --info: #38bdf8;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0 1rem;
        }
        .logo-icon {
            font-size: 2rem;
            color: var(--accent);
        }
        .logo-text {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .logo-small {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .nav-item.active {
            background: var(--accent);
            color: white;
        }
        .nav-item:hover:not(.active) {
            background: var(--card-bg);
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 600;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .admin-profile {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }
        .admin-profile img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Cards & sections */
        .section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-weight: 600;
            font-size: 1.3rem;
        }
        .badge {
            background: var(--accent);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 1rem;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .stat-info p {
            color: var(--text-secondary);
        }

        .alert-banner {
            background: var(--warning);
            color: black;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.8rem 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }
        .btn-sm {
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--input-bg, var(--bg-secondary));
            color: var(--text-primary);
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fas fa-chalkboard-user logo-icon"></i>
            <div>
                <div class="logo-text">EDUMETA</div>
                <div class="logo-small">Teacher Portal</div>
            </div>
        </div>
        <nav class="nav">
            <div class="nav-item active" data-section="dashboard"><i class="fas fa-home"></i> Dashboard</div>
            <div class="nav-item" data-section="lessonNotes"><i class="fas fa-book-open"></i> Lesson Notes</div>
            <div class="nav-item" data-section="timetable"><i class="fas fa-calendar-alt"></i> Timetable</div>
            <div class="nav-item" data-section="dailyReport"><i class="fas fa-file-alt"></i> Daily Report</div>
            <div class="nav-item" data-section="students"><i class="fas fa-user-graduate"></i> My Students</div>
            <div class="nav-item" data-section="assignments"><i class="fas fa-tasks"></i> Assignments</div>
            <div class="nav-item" data-section="profile"><i class="fas fa-user-cog"></i> Profile</div>
        </nav>
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main">
        <div class="top-bar">
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <div class="admin-info">
                <div class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                    <span>Theme</span>
                </div>
                <div class="admin-profile" id="teacher-profile">
                    <img src="https://ui-avatars.com/api/?name=Teacher&background=2563eb&color=fff" alt="Teacher">
                    <span id="teacher-name">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Dynamic content -->
        <div id="section-content">
            <div style="text-align: center; padding: 3rem;"><i class="fas fa-spinner fa-pulse fa-3x"></i><p>Loading dashboard...</p></div>
        </div>
    </main>

    <!-- Modal for lesson note viewing/editing -->
    <div id="lessonNoteModal" class="modal">
        <div class="modal-content">
            <h2 id="lessonNoteModalTitle">Lesson Note</h2>
            <div id="lessonNoteContent"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeLessonNoteModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Modal for creating lesson note -->
    <div id="createLessonModal" class="modal">
        <div class="modal-content">
            <h2>Create Lesson Note</h2>
            <div class="form-group">
                <label>Topic</label>
                <input type="text" id="lessonTopic" required>
            </div>
            <div class="form-group">
                <label>Class</label>
                <select id="lessonClass" required>
                    <option value="">Select class</option>
                    <option value="JSS1">JSS1</option>
                    <option value="JSS2">JSS2</option>
                    <option value="JSS3">JSS3</option>
                    <option value="SSS1">SSS1</option>
                    <option value="SSS2">SSS2</option>
                    <option value="SSS3">SSS3</option>
                </select>
            </div>
            <div class="form-group">
                <label>Start Time</label>
                <input type="datetime-local" id="lessonStartTime" required>
            </div>
            <div class="form-group">
                <label>End Time</label>
                <input type="datetime-local" id="lessonEndTime" required>
            </div>
            <div class="form-group">
                <label>Content (supports Markdown)</label>
                <textarea id="lessonContent" rows="10" placeholder="Write your lesson note here..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeCreateLessonModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitLessonNote()">Submit for Approval</button>
            </div>
        </div>
    </div>

    <!-- Modal for daily report -->
    <div id="dailyReportModal" class="modal">
        <div class="modal-content">
            <h2>Daily Class Report</h2>
            <div class="form-group">
                <label>Session</label>
                <select id="reportSession">
                    <option value="morning">Morning Session</option>
                    <option value="afternoon">Afternoon Session</option>
                </select>
            </div>
            <div class="form-group">
                <label>Report</label>
                <textarea id="reportContent" rows="8" placeholder="Write your report..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeDailyReportModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitDailyReport()">Submit Report</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // FIREBASE INIT
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA8BCzF4xcTAMYu5Rt1ROMRuZLVYh5iwRQ",
            authDomain: "edumeta-c5588.firebaseapp.com",
            projectId: "edumeta-c5588",
            storageBucket: "edumeta-c5588.firebasestorage.app",
            messagingSenderId: "332853259697",
            appId: "1:332853259697:web:92e0c07e43d1c3bf432190",
            measurementId: "G-WY24HER46Q"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ========================================================
        // GLOBAL STATE
        // ========================================================
        let currentSection = 'dashboard';
        let currentUser = null;
        let teacherData = null;
        let unsubscribeFunctions = {};

        // ========================================================
        // AUTH STATE OBSERVER
        // ========================================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher-auth.html';
                return;
            }
            currentUser = user;

            // Fetch teacher's full profile from 'users' collection
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists) {
                alert('Teacher profile not found. Please contact admin.');
                auth.signOut();
                return;
            }
            teacherData = userDoc.data();

            // Check if approved
            if (teacherData.status !== 'approved') {
                alert('Your account is not yet approved by admin. You cannot access the dashboard.');
                auth.signOut();
                return;
            }

            // Update UI with teacher info
            document.getElementById('teacher-name').innerText = teacherData.name || teacherData.email.split('@')[0];
            if (teacherData.photoURL) {
                document.querySelector('.admin-profile img').src = teacherData.photoURL;
            }

            // Load initial section
            loadSection(currentSection);
        });

        // ========================================================
        // NAVIGATION
        // ========================================================
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (item.classList.contains('active')) return;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                document.getElementById('page-title').innerText = item.innerText.trim();
                loadSection(currentSection);
            });
        });

        function loadSection(section) {
            // Unsubscribe from previous listeners
            Object.values(unsubscribeFunctions).forEach(unsub => unsub());
            unsubscribeFunctions = {};

            // Show loading
            document.getElementById('section-content').innerHTML = '<div style="text-align: center; padding: 3rem;"><i class="fas fa-spinner fa-pulse fa-3x"></i><p>Loading...</p></div>';

            switch (section) {
                case 'dashboard': loadDashboard(); break;
                case 'lessonNotes': loadLessonNotes(); break;
                case 'timetable': loadTimetable(); break;
                case 'dailyReport': loadDailyReport(); break;
                case 'students': loadStudents(); break;
                case 'assignments': loadAssignments(); break;
                case 'profile': loadProfile(); break;
                default: loadDashboard();
            }
        }

        // Helper functions
        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleString();
        }

        // ========================================================
        // DASHBOARD
        // ========================================================
        function loadDashboard() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="stats-grid" id="dashboard-stats">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Pending Lessons</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Upcoming Today</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Students</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-info"><h3>...</h3><p>Reports</p></div></div>
                </div>
                <div class="section">
                    <div class="section-header"><h2 class="section-title">Today's Schedule</h2></div>
                    <div id="today-schedule">Loading...</div>
                </div>
                <div class="section">
                    <div class="section-header"><h2 class="section-title">Recent Activities</h2></div>
                    <div id="recent-activities">Loading...</div>
                </div>
            `;

            // Fetch counts
            const pendingLessons = db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'pending')
                .get().then(snap => snap.size);

            const today = new Date().toISOString().split('T')[0];
            const upcomingToday = db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'approved')
                .where('date', '==', today)
                .get().then(snap => snap.size);

            const studentsCount = db.collection('students')
                .where('class', '==', teacherData.class)
                .get().then(snap => snap.size);

            const reportsToday = db.collection('dailyReports')
                .where('teacherId', '==', currentUser.uid)
                .where('date', '==', today)
                .get().then(snap => snap.size);

            Promise.all([pendingLessons, upcomingToday, studentsCount, reportsToday])
                .then(([pending, upcoming, students, reports]) => {
                    document.getElementById('dashboard-stats').innerHTML = `
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-book"></i></div><div class="stat-info"><h3>${pending}</h3><p>Pending Lessons</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>${upcoming}</h3><p>Upcoming Today</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>${students}</h3><p>Students</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-alt"></i></div><div class="stat-info"><h3>${reports}</h3><p>Reports Today</p></div></div>
                    `;
                });

            // Today's schedule (from lesson notes)
            unsubscribeFunctions.dashboardSchedule = db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'approved')
                .where('date', '==', today)
                .orderBy('startTime')
                .onSnapshot(snapshot => {
                    let html = '<table><thead><tr><th>Topic</th><th>Class</th><th>Time</th><th>Status</th></tr></thead><tbody>';
                    snapshot.forEach(doc => {
                        const note = doc.data();
                        const now = new Date();
                        const start = note.startTime.toDate();
                        const end = note.endTime.toDate();
                        let status = '';
                        if (now < start) status = '<span class="badge" style="background:var(--info)">Upcoming</span>';
                        else if (now > end) status = '<span class="badge" style="background:var(--success)">Completed</span>';
                        else status = '<span class="badge" style="background:var(--warning)">Ongoing</span>';
                        html += `<tr><td>${note.topic}</td><td>${note.class}</td><td>${start.toLocaleTimeString()} - ${end.toLocaleTimeString()}</td><td>${status}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('today-schedule').innerHTML = html || '<p>No lessons scheduled today.</p>';
                });

            // Recent activities (from teacher's actions logged in audit logs)
            unsubscribeFunctions.dashboardActivities = db.collection('auditLogs')
                .where('user', '==', currentUser.email)
                .orderBy('timestamp', 'desc')
                .limit(5)
                .onSnapshot(snapshot => {
                    let html = '<table><thead><tr><th>Action</th><th>Time</th></tr></thead><tbody>';
                    snapshot.forEach(doc => {
                        const log = doc.data();
                        html += `<tr><td>${log.action}</td><td>${formatDate(log.timestamp)}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('recent-activities').innerHTML = html || '<p>No recent activities.</p>';
                });
        }

        // ========================================================
        // LESSON NOTES
        // ========================================================
        function loadLessonNotes() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">My Lesson Notes</h2>
                        <button class="btn btn-primary" onclick="openCreateLessonModal()">+ New Lesson Note</button>
                    </div>
                    <table>
                        <thead><tr><th>Topic</th><th>Class</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="lesson-notes-body"><tr><td colspan="5">Loading...</td></tr></tbody>
                    </table>
                </div>
            `;

            unsubscribeFunctions.lessonNotes = db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .orderBy('submitted', 'desc')
                .onSnapshot(snapshot => {
                    let html = '';
                    snapshot.forEach(doc => {
                        const note = { id: doc.id, ...doc.data() };
                        const start = note.startTime ? note.startTime.toDate() : null;
                        const end = note.endTime ? note.endTime.toDate() : null;
                        const now = new Date();
                        const canOpen = note.status === 'approved' && start && end && now >= start && now <= end;
                        const openBtn = canOpen ? `<button class="btn btn-sm btn-primary" onclick="openLessonNote('${doc.id}')">Open</button>` : 
                                        (note.status === 'approved' ? `<button class="btn btn-sm" disabled>Locked</button>` : '');
                        html += `<tr>
                            <td>${note.topic}</td>
                            <td>${note.class}</td>
                            <td>${note.date || ''}</td>
                            <td><span class="badge" style="background:${note.status === 'approved' ? 'var(--success)' : 'var(--warning)'}">${note.status}</span></td>
                            <td>${openBtn} <button class="btn btn-sm" onclick="viewLessonDetails('${doc.id}')">Details</button></td>
                        </tr>`;
                    });
                    document.getElementById('lesson-notes-body').innerHTML = html || '<tr><td colspan="5">No lesson notes found.</td></tr>';
                });
        }

        window.openCreateLessonModal = () => {
            document.getElementById('createLessonModal').classList.add('active');
        };
        window.closeCreateLessonModal = () => {
            document.getElementById('createLessonModal').classList.remove('active');
        };
        window.submitLessonNote = async () => {
            const topic = document.getElementById('lessonTopic').value;
            const className = document.getElementById('lessonClass').value;
            const startTime = document.getElementById('lessonStartTime').value;
            const endTime = document.getElementById('lessonEndTime').value;
            const content = document.getElementById('lessonContent').value;
            if (!topic || !className || !startTime || !endTime || !content) {
                alert('All fields are required.');
                return;
            }
            const start = new Date(startTime);
            const end = new Date(endTime);
            if (start >= end) {
                alert('End time must be after start time.');
                return;
            }

            const lessonNote = {
                teacherId: currentUser.uid,
                teacherName: teacherData.name || currentUser.email,
                topic,
                class: className,
                startTime: firebase.firestore.Timestamp.fromDate(start),
                endTime: firebase.firestore.Timestamp.fromDate(end),
                date: start.toISOString().split('T')[0],
                content,
                status: 'pending',
                submitted: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection('lessonNotes').add(lessonNote);
            // Log audit
            await db.collection('auditLogs').add({
                user: currentUser.email,
                action: `Created lesson note: ${topic}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeCreateLessonModal();
            // Clear form
            document.getElementById('lessonTopic').value = '';
            document.getElementById('lessonClass').value = '';
            document.getElementById('lessonStartTime').value = '';
            document.getElementById('lessonEndTime').value = '';
            document.getElementById('lessonContent').value = '';
        };

        window.openLessonNote = async (id) => {
            const doc = await db.collection('lessonNotes').doc(id).get();
            const note = doc.data();
            const modal = document.getElementById('lessonNoteModal');
            document.getElementById('lessonNoteModalTitle').innerText = note.topic;
            document.getElementById('lessonNoteContent').innerHTML = `<p>${note.content.replace(/\n/g, '<br>')}</p>`;
            modal.classList.add('active');

            // Record open time
            const openTime = new Date();
            const start = note.startTime.toDate();
            const late = openTime > start;
            await db.collection('lessonNoteLogs').add({
                lessonNoteId: id,
                teacherId: currentUser.uid,
                openTime: firebase.firestore.Timestamp.fromDate(openTime),
                late: late,
                date: openTime.toISOString().split('T')[0]
            });
            if (late) {
                alert('Warning: You opened this lesson note late.');
                // Admin will see this via logs
            }
        };

        window.closeLessonNoteModal = () => {
            document.getElementById('lessonNoteModal').classList.remove('active');
            // Record close time? We could but need to know which note was opened.
        };

        window.viewLessonDetails = (id) => {
            alert(`Details for lesson note ${id} (simulated)`);
        };

        // ========================================================
        // TIMETABLE (placeholder - can be expanded)
        // ========================================================
        function loadTimetable() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header"><h2 class="section-title">My Timetable</h2></div>
                    <p>Timetable management will be implemented here. For now, view your approved lesson notes as schedule.</p>
                    <div id="timetable-list"></div>
                </div>
            `;
            // Show future approved lessons grouped by day
            unsubscribeFunctions.timetable = db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'approved')
                .orderBy('startTime')
                .onSnapshot(snapshot => {
                    let html = '<table><thead><tr><th>Day</th><th>Topic</th><th>Class</th><th>Time</th></tr></thead><tbody>';
                    snapshot.forEach(doc => {
                        const note = doc.data();
                        const start = note.startTime.toDate();
                        const day = start.toLocaleDateString();
                        html += `<tr><td>${day}</td><td>${note.topic}</td><td>${note.class}</td><td>${start.toLocaleTimeString()} - ${note.endTime.toDate().toLocaleTimeString()}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('timetable-list').innerHTML = html || '<p>No scheduled lessons.</p>';
                });
        }

        // ========================================================
        // DAILY REPORT
        // ========================================================
        function loadDailyReport() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header"><h2 class="section-title">Daily Class Report</h2></div>
                    <p>Submit reports after each session. Reports can only be submitted within one hour after session end.</p>
                    <button class="btn btn-primary" onclick="openDailyReportModal()">Write New Report</button>
                    <div style="margin-top:2rem;">
                        <h3>Previous Reports</h3>
                        <div id="reports-list">Loading...</div>
                    </div>
                </div>
            `;

            unsubscribeFunctions.dailyReports = db.collection('dailyReports')
                .where('teacherId', '==', currentUser.uid)
                .orderBy('date', 'desc')
                .limit(10)
                .onSnapshot(snapshot => {
                    let html = '<table><thead><tr><th>Date</th><th>Session</th><th>Report</th></tr></thead><tbody>';
                    snapshot.forEach(doc => {
                        const r = doc.data();
                        html += `<tr><td>${r.date}</td><td>${r.session}</td><td>${r.content.substring(0,50)}...</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('reports-list').innerHTML = html || '<p>No reports yet.</p>';
                });
        }

        window.openDailyReportModal = () => {
            document.getElementById('dailyReportModal').classList.add('active');
        };
        window.closeDailyReportModal = () => {
            document.getElementById('dailyReportModal').classList.remove('active');
        };
        window.submitDailyReport = async () => {
            const session = document.getElementById('reportSession').value;
            const content = document.getElementById('reportContent').value;
            if (!content) {
                alert('Please write a report.');
                return;
            }
            const now = new Date();
            const today = now.toISOString().split('T')[0];

            // Check time window: morning session (e.g., 8am-1pm) report allowed 1-2pm; afternoon (2pm-5pm) report allowed 5-6pm.
            // For simplicity, we'll allow submission anytime but real logic can be added.
            // We'll just store.

            await db.collection('dailyReports').add({
                teacherId: currentUser.uid,
                teacherName: teacherData.name || currentUser.email,
                session,
                content,
                date: today,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection('auditLogs').add({
                user: currentUser.email,
                action: `Submitted daily report for ${session} session`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            closeDailyReportModal();
            document.getElementById('reportContent').value = '';
        };

        // ========================================================
        // MY STUDENTS
        // ========================================================
        function loadStudents() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header"><h2 class="section-title">Students in My Class (${teacherData.class || 'Not assigned'})</h2></div>
                    <table>
                        <thead><tr><th>ID</th><th>Name</th><th>Performance</th><th>Actions</th></tr></thead>
                        <tbody id="students-body">Loading...</tbody>
                    </table>
                </div>
            `;

            if (!teacherData.class) {
                document.getElementById('students-body').innerHTML = '<tr><td colspan="4">No class assigned.</td></tr>';
                return;
            }

            unsubscribeFunctions.students = db.collection('students')
                .where('class', '==', teacherData.class)
                .onSnapshot(snapshot => {
                    let html = '';
                    snapshot.forEach(doc => {
                        const s = doc.data();
                        html += `<tr>
                            <td>${s.studentId || doc.id}</td>
                            <td>${s.name}</td>
                            <td>${s.performance || 0}%</td>
                            <td><button class="btn btn-sm" onclick="viewStudent('${doc.id}')">View</button></td>
                        </tr>`;
                    });
                    document.getElementById('students-body').innerHTML = html || '<tr><td colspan="4">No students found.</td></tr>';
                });
        }

        window.viewStudent = (id) => {
            alert(`View student ${id} details (simulated)`);
        };

        // ========================================================
        // ASSIGNMENTS
        // ========================================================
        function loadAssignments() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">Assignments</h2>
                        <button class="btn btn-primary" onclick="openCreateAssignmentModal()">+ New Assignment</button>
                    </div>
                    <table>
                        <thead><tr><th>Title</th><th>Class</th><th>Due Date</th><th>Submissions</th><th>Actions</th></tr></thead>
                        <tbody id="assignments-body">Loading...</tbody>
                    </table>
                </div>
            `;

            unsubscribeFunctions.assignments = db.collection('assignments')
                .where('teacherId', '==', currentUser.uid)
                .orderBy('dueDate', 'desc')
                .onSnapshot(snapshot => {
                    let html = '';
                    snapshot.forEach(doc => {
                        const a = doc.data();
                        html += `<tr>
                            <td>${a.title}</td>
                            <td>${a.class}</td>
                            <td>${formatDate(a.dueDate)}</td>
                            <td>${a.submissionCount || 0}</td>
                            <td><button class="btn btn-sm" onclick="viewAssignment('${doc.id}')">View</button></td>
                        </tr>`;
                    });
                    document.getElementById('assignments-body').innerHTML = html || '<tr><td colspan="5">No assignments.</td></tr>';
                });
        }

        window.openCreateAssignmentModal = () => {
            // Simple prompt for demo – in production use a modal
            const title = prompt('Assignment title:');
            if (!title) return;
            const dueDate = prompt('Due date (YYYY-MM-DD):');
            if (!dueDate) return;
            // Create assignment
            db.collection('assignments').add({
                teacherId: currentUser.uid,
                teacherName: teacherData.name,
                title,
                class: teacherData.class,
                dueDate: new Date(dueDate),
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                submissionCount: 0
            });
        };

        window.viewAssignment = (id) => {
            alert(`View assignment ${id} (simulated)`);
        };

        // ========================================================
        // PROFILE
        // ========================================================
        function loadProfile() {
            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section">
                    <div class="section-header"><h2 class="section-title">My Profile</h2></div>
                    <form id="profile-form">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="profile-name" value="${teacherData.name || ''}">
                        </div>
                        <div class="form-group">
                            <label>Surname</label>
                            <input type="text" id="profile-surname" value="${teacherData.surname || ''}">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profile-email" value="${currentUser.email}" disabled>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="profile-phone" value="${teacherData.phone || ''}">
                        </div>
                        <div class="form-group">
                            <label>Qualifications</label>
                            <textarea id="profile-qualifications">${teacherData.qualifications || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Schools Attended</label>
                            <textarea id="profile-schools">${teacherData.schools || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Class Teaching</label>
                            <input type="text" id="profile-class" value="${teacherData.class || ''}" disabled>
                        </div>
                        <div class="form-group">
                            <label>Profile Picture</label>
                            <input type="file" id="profile-photo" accept="image/*">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="updateProfile()">Update Profile</button>
                    </form>
                </div>
            `;
        }

        window.updateProfile = async () => {
            const updates = {
                name: document.getElementById('profile-name').value,
                surname: document.getElementById('profile-surname').value,
                phone: document.getElementById('profile-phone').value,
                qualifications: document.getElementById('profile-qualifications').value,
                schools: document.getElementById('profile-schools').value
            };
            const photoFile = document.getElementById('profile-photo').files[0];
            if (photoFile) {
                const storageRef = storage.ref(`profilePictures/${currentUser.uid}`);
                await storageRef.put(photoFile);
                updates.photoURL = await storageRef.getDownloadURL();
            }
            await db.collection('users').doc(currentUser.uid).update(updates);
            alert('Profile updated successfully.');
        };

        // ========================================================
        // LOGOUT & THEME
        // ========================================================
        window.logout = () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        };

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.querySelector('.theme-toggle i').className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }
        window.toggleTheme = toggleTheme;

        (function() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.querySelector('.theme-toggle i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        })();
    </script>
</body>
</html>

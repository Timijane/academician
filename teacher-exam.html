<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Exams</title>
    <!-- same head as assignments -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style> /* same styles */ </style>
</head>
<body>
    <!-- same sidebar, just active link is "Exam" -->
    <div class="sidebar" id="sidebar">...</div>
    <div class="main-content">
        <div class="top-bar">...</div>

        <div class="card">
            <div class="card-header">
                <h3>Create New Exam</h3>
            </div>
            <form id="examForm">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" class="form-control" required></textarea>
                </div>
                <div class="form-group">
                    <label>Exam Date</label>
                    <input type="date" id="examDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="duration" class="form-control" value="60" required>
                </div>
                <div class="form-group">
                    <label>Total Points</label>
                    <input type="number" id="points" class="form-control" value="100" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Exam</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Upcoming Exams</h3>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Duration</th>
                            <th>Points</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="examsList">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // same Firebase config
        // Auth check similar

        // Create exam
        document.getElementById('examForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!userData.classTeaching) return;
            const data = {
                teacherId: currentUser.uid,
                classId: userData.classTeaching,
                subject: document.getElementById('subject').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                examDate: document.getElementById('examDate').value,
                duration: parseInt(document.getElementById('duration').value),
                points: parseInt(document.getElementById('points').value),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('exams').add(data);
            alert('Exam created.');
            e.target.reset();
            loadExams();
        });

        async function loadExams() {
            if (!userData.classTeaching) return;
            const snapshot = await db.collection('exams')
                .where('classId', '==', userData.classTeaching)
                .orderBy('examDate', 'asc')
                .get();
            const tbody = document.getElementById('examsList');
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="6">No exams scheduled.</td></tr>';
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                const e = doc.data();
                html += `
                <tr>
                    <td>${e.subject}</td>
                    <td>${e.title}</td>
                    <td>${e.examDate}</td>
                    <td>${e.duration} min</td>
                    <td>${e.points}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="editExam('${doc.id}')">Edit</button>
                        <button class="btn btn-outline btn-sm" onclick="deleteExam('${doc.id}')">Delete</button>
                    </td>
                </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        window.deleteExam = async (id) => {
            if (!confirm('Delete this exam?')) return;
            await db.collection('exams').doc(id).delete();
            loadExams();
        };
    </script>
</body>
</html>

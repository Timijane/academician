<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Grade Tests | Teacher Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: rgba(255,255,255,0.95);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            --success-bg: #dcfce7;
            --success-text: #16a34a;
            --warning-bg: #fef9c3;
            --warning-text: #ca8a04;
            --danger-bg: #fee2e2;
            --danger-text: #dc2626;
            --info-bg: #dbeafe;
            --info-text: #2563eb;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: rgba(15,23,42,0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: #1e293b;
            --card-bg: #1e293b;
            --hover-bg: #334155;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.2);
            --info-text: #60a5fa;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: all 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.1), transparent 70%);
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite alternate;
            pointer-events: none;
        }

        .orb-1 { top: -200px; right: -200px; background: radial-gradient(circle at 70% 30%, rgba(139,92,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -200px; animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .sidebar.collapsed { width: 90px; }

        .sidebar .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
        }

        .sidebar .logo-area i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar .logo-area h2 {
            font-size: 1.3rem;
            font-weight: 700;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar.collapsed .logo-area h2 { display: none; }

        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.2rem;
            border-radius: 1rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .sidebar .nav-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
            transform: translateX(5px);
            border-color: var(--border);
        }

        .sidebar .nav-item.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            box-shadow: 0 5px 15px -5px var(--accent);
        }

        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }

        .sidebar .toggle-btn {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            padding: 1rem 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s;
            position: relative;
            z-index: 5;
        }

        .main-content.expanded { margin-left: 90px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .page-title p { color: var(--text-secondary); font-size: 0.9rem; }

        .profile-area { display: flex; align-items: center; gap: 1rem; }

        .theme-toggle {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
        }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 2px 10px var(--accent);
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 55px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 200px;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow);
        }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item {
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.2s;
            cursor: pointer;
        }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        /* Test Info Card */
        .test-info-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .test-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .test-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        /* Students List */
        .students-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
        }

        .student-card:hover {
            box-shadow: var(--shadow);
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            background: var(--hover-bg);
            cursor: pointer;
            transition: 0.2s;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .student-header:hover {
            background: var(--info-bg);
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .student-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .student-details h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .student-details p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .student-status {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .score-display {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .expand-icon {
            transition: transform 0.3s;
        }

        .student-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .student-content {
            display: none;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .student-card.expanded .student-content {
            display: block;
        }

        /* Question Review */
        .question-review {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .question-review:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .question-review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .question-number {
            font-weight: 700;
            color: var(--accent);
        }

        .student-answer {
            background: var(--hover-bg);
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin: 0.5rem 0;
        }

        .correct-answer {
            background: var(--success-bg);
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin: 0.5rem 0;
            color: var(--success-text);
        }

        .answer-wrong {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .answer-correct {
            background: var(--success-bg);
            color: var(--success-text);
        }

        /* Grading Form */
        .grading-form {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
        }

        .score-input {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .score-input label {
            font-weight: 600;
        }

        .score-input input {
            width: 100px;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            text-align: center;
        }

        .feedback-input {
            margin-bottom: 1rem;
        }

        .feedback-input label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .feedback-input textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
        }

        .grade-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }

        .btn-success {
            background: var(--success-text);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .loading-overlay.active { display: flex; }
        .loading-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
        }
        .loading-content i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .student-header { flex-direction: column; align-items: flex-start; }
            .student-status { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-graduation-cap"></i><h2>EduTop</h2></div>

        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Grade Tests</h1>
                <p>Review auto-graded test results and provide feedback</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                    <div class="dropdown-menu"><div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                </div>
            </div>
        </div>

        <!-- Test Selector -->
        <div class="test-info-card" id="testSelector">
            <select id="testSelect" class="form-control" style="width: 100%; padding: 0.75rem;">
                <option value="">-- Select a test to grade --</option>
            </select>
        </div>

        <div id="mainContentArea">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Loading tests...</h3>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loading-content"><i class="fas fa-spinner fa-spin"></i><h3>Processing...</h3></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('collapsed'); mainContent.classList.toggle('expanded'); });
        
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutop-theme', next);
            themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark';
        });
        
        let currentUser = null;
        let userData = null;
        let allTests = [];
        let selectedTest = null;
        let submissions = [];
        let studentNames = {};
        
        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadTests() {
            showLoading();
            try {
                const testsSnap = await db.collection('tests')
                    .where('teacherId', '==', currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .get();
                
                allTests = [];
                testsSnap.forEach(doc => {
                    allTests.push({ id: doc.id, ...doc.data() });
                });
                
                const select = document.getElementById('testSelect');
                select.innerHTML = '<option value="">-- Select a test to grade --</option>';
                allTests.forEach(test => {
                    const option = document.createElement('option');
                    option.value = test.id;
                    option.textContent = `${test.title} (${test.subject}, Week ${test.week})`;
                    select.appendChild(option);
                });
                
                document.getElementById('mainContentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chalkboard"></i>
                        <h3>Select a test to view submissions</h3>
                        <p>Choose a test from the dropdown above to see student results</p>
                    </div>
                `;
            } catch(e) {
                console.error('Error loading tests:', e);
            } finally {
                hideLoading();
            }
        }
        
        async function loadSubmissions(testId) {
            showLoading();
            try {
                const testDoc = await db.collection('tests').doc(testId).get();
                if (!testDoc.exists) throw new Error('Test not found');
                selectedTest = { id: testDoc.id, ...testDoc.data() };
                
                const subsSnap = await db.collection('testSubmissions')
                    .where('testId', '==', testId)
                    .get();
                
                submissions = [];
                subsSnap.forEach(doc => {
                    submissions.push({ id: doc.id, ...doc.data() });
                });
                
                // Get student names
                const studentIds = [...new Set(submissions.map(s => s.studentId))];
                for (const id of studentIds) {
                    const userDoc = await db.collection('users').doc(id).get();
                    if (userDoc.exists) {
                        const data = userDoc.data();
                        studentNames[id] = `${data.firstName || ''} ${data.surname || ''}`.trim() || 'Unknown';
                    }
                }
                
                renderGradeInterface();
            } catch(e) {
                console.error('Error loading submissions:', e);
                document.getElementById('mainContentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Submissions</h3>
                        <p>${e.message}</p>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }
        
        function renderGradeInterface() {
            const container = document.getElementById('mainContentArea');
            const totalSubmissions = submissions.length;
            const avgScore = submissions.length ? (submissions.reduce((sum, s) => sum + (s.score || 0), 0) / submissions.length).toFixed(1) : 0;
            
            container.innerHTML = `
                <div class="test-info-card">
                    <h2 class="test-title">${escapeHtml(selectedTest.title)}</h2>
                    <div class="test-stats">
                        <div class="stat-badge"><i class="fas fa-book"></i> ${escapeHtml(selectedTest.subject)}</div>
                        <div class="stat-badge"><i class="fas fa-calendar-week"></i> Week ${selectedTest.week}</div>
                        <div class="stat-badge"><i class="fas fa-star"></i> Total Points: ${selectedTest.totalPoints}</div>
                        <div class="stat-badge"><i class="fas fa-users"></i> Submissions: ${totalSubmissions}</div>
                        <div class="stat-badge"><i class="fas fa-chart-line"></i> Avg Score: ${avgScore}/${selectedTest.totalPoints}</div>
                        ${selectedTest.negativeMarking ? '<div class="stat-badge"><i class="fas fa-ban"></i> Negative Marking: -0.25/wrong</div>' : ''}
                    </div>
                </div>
                <div class="students-list" id="studentsList"></div>
            `;
            
            if (submissions.length === 0) {
                document.getElementById('studentsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Submissions Yet</h3>
                        <p>No students have taken this test yet.</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('studentsList').innerHTML = submissions.map((sub, idx) => renderStudentCard(sub, idx)).join('');
        }
        
        function renderStudentCard(submission, index) {
            const studentName = studentNames[submission.studentId] || 'Unknown Student';
            const initials = studentName.split(' ').map(n => n[0]).join('').toUpperCase() || 'S';
            const percentage = (submission.score / selectedTest.totalPoints) * 100;
            
            let gradeLetter = '';
            if (percentage >= 75) gradeLetter = 'A (Excellent)';
            else if (percentage >= 65) gradeLetter = 'B (Good)';
            else if (percentage >= 50) gradeLetter = 'C (Average)';
            else if (percentage >= 40) gradeLetter = 'D (Pass)';
            else gradeLetter = 'F (Fail)';
            
            // Build answers review HTML
            let answersHtml = '';
            if (selectedTest.questions && submission.answers) {
                answersHtml = submission.answers.map((answer, idx) => {
                    const question = selectedTest.questions[answer.questionIndex];
                    if (!question) return '';
                    
                    let isCorrect = false;
                    let studentAnswerDisplay = answer.answer;
                    let correctAnswerDisplay = question.correct;
                    
                    if (question.type === 'mcq' || question.type === 'truefalse') {
                        isCorrect = answer.answer === question.correct;
                        if (question.type === 'mcq' && question.options) {
                            const studentOptIdx = answer.answer.charCodeAt(0) - 65;
                            const correctOptIdx = question.correct.charCodeAt(0) - 65;
                            studentAnswerDisplay = `${answer.answer}. ${question.options[studentOptIdx] || 'N/A'}`;
                            correctAnswerDisplay = `${question.correct}. ${question.options[correctOptIdx] || 'N/A'}`;
                        }
                    } else if (question.type === 'fillblank') {
                        isCorrect = answer.answer?.toLowerCase().trim() === question.correct?.toLowerCase().trim();
                    }
                    
                    const pointsEarned = isCorrect ? (question.points || 1) : 0;
                    
                    return `
                        <div class="question-review">
                            <div class="question-review-header">
                                <span class="question-number">Question ${idx + 1}</span>
                                <span>${pointsEarned}/${question.points || 1} pts</span>
                            </div>
                            <div><strong>Question:</strong> ${escapeHtml(question.question)}</div>
                            <div class="student-answer ${isCorrect ? 'answer-correct' : 'answer-wrong'}">
                                <strong>Student's Answer:</strong> ${escapeHtml(studentAnswerDisplay)}
                            </div>
                            ${!isCorrect ? `
                                <div class="correct-answer">
                                    <strong>Correct Answer:</strong> ${escapeHtml(correctAnswerDisplay)}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            return `
                <div class="student-card" id="studentCard_${submission.id}">
                    <div class="student-header" onclick="window.toggleStudentCard('${submission.id}')">
                        <div class="student-info">
                            <div class="student-avatar">${initials}</div>
                            <div class="student-details">
                                <h4>${escapeHtml(studentName)}</h4>
                                <p>Submitted: ${submission.submittedAt ? new Date(submission.submittedAt.toDate()).toLocaleString() : 'Unknown'}</p>
                                <p><i class="fas fa-chart-line"></i> ${submission.correctCount || 0} correct / ${submission.wrongCount || 0} wrong</p>
                                ${submission.tabSwitchCount ? `<p><i class="fas fa-exclamation-triangle"></i> Tab switches: ${submission.tabSwitchCount}</p>` : ''}
                            </div>
                        </div>
                        <div class="student-status">
                            <span class="score-display">${submission.score}/${selectedTest.totalPoints} (${percentage.toFixed(0)}% - ${gradeLetter})</span>
                            <i class="fas fa-chevron-down expand-icon"></i>
                        </div>
                    </div>
                    <div class="student-content">
                        <h4 style="margin-bottom: 1rem;"><i class="fas fa-question-circle"></i> Answers Review</h4>
                        ${answersHtml}
                        <div class="grading-form">
                            <h4 style="margin-bottom: 1rem;"><i class="fas fa-graduation-cap"></i> Feedback (Optional)</h4>
                            <div class="feedback-input">
                                <textarea id="feedback_${submission.id}" rows="3" placeholder="Add feedback for the student...">${escapeHtml(submission.feedback || '')}</textarea>
                            </div>
                            <div class="grade-actions">
                                <button class="btn btn-success" onclick="window.saveFeedback('${submission.id}')">
                                    <i class="fas fa-save"></i> Save Feedback
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        window.toggleStudentCard = (id) => {
            document.getElementById(`studentCard_${id}`).classList.toggle('expanded');
        };
        
        window.saveFeedback = async (submissionId) => {
            const feedback = document.getElementById(`feedback_${submissionId}`).value;
            showLoading();
            try {
                await db.collection('testSubmissions').doc(submissionId).update({
                    feedback: feedback,
                    feedbackGivenAt: firebase.firestore.FieldValue.serverTimestamp(),
                    feedbackGivenBy: currentUser.uid
                });
                alert('Feedback saved successfully!');
            } catch(e) {
                alert('Error saving feedback: ' + e.message);
            } finally {
                hideLoading();
            }
        };
        
        document.getElementById('testSelect').addEventListener('change', (e) => {
            const testId = e.target.value;
            if (testId) {
                loadSubmissions(testId);
            } else {
                document.getElementById('mainContentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chalkboard"></i>
                        <h3>Select a test to view submissions</h3>
                        <p>Choose a test from the dropdown above to see student results</p>
                    </div>
                `;
            }
        });
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'teacher') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = userDoc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';
                await loadTests();
            } catch(e) { console.error(e); }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('profileLink').addEventListener('click', () => window.location.href='teacher-profile.html');
        
        window.toggleStudentCard = toggleStudentCard;
        window.saveFeedback = saveFeedback;
    </script>
</body>
</html>

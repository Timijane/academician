    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc; --bg-sidebar: rgba(255,255,255,0.95); --text-primary: #0f172a; --text-secondary: #475569;
            --accent: #3b82f6; --accent-glow: #60a5fa; --border: #e2e8f0; --card-bg: #ffffff; --hover-bg: #f1f5f9;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.05); --success-bg: #dcfce7; --success-text: #16a34a;
            --warning-bg: #fef9c3; --warning-text: #ca8a04; --danger-bg: #fee2e2; --danger-text: #dc2626;
            --info-bg: #dbeafe; --info-text: #2563eb; --input-bg: #ffffff; --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0f172a; --bg-sidebar: rgba(15,23,42,0.95); --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --accent: #3b82f6; --accent-glow: #60a5fa; --border: #1e293b; --card-bg: #1e293b; --hover-bg: #334155;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.2); --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24; --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(59,130,246,0.2); --info-text: #60a5fa; --input-bg: #334155; --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; transition: all 0.3s; position: relative; overflow-x: hidden; }
        .orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.1), transparent 70%); filter: blur(100px); z-index: 0; animation: float 20s infinite alternate; pointer-events: none; }
        .orb-1 { top: -200px; right: -200px; background: radial-gradient(circle at 70% 30%, rgba(139,92,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -200px; animation-duration: 25s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.1); } }

        .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; transition: width 0.3s; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.2rem; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.2rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.5rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); transform: translateX(5px); border-color: var(--border); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; box-shadow: 0 5px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }

        .main-content { flex: 1; margin-left: 280px; padding: 2rem; transition: margin-left 0.3s; position: relative; z-index: 5; }
        .main-content.expanded { margin-left: 90px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem; }
        .page-title p { color: var(--text-secondary); font-size: 0.9rem; }
        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.3rem 0.3rem 0.3rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1rem; box-shadow: 0 2px 10px var(--accent); }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem; min-width: 200px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.75rem 1rem; color: var(--text-primary); border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .assignment-info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow); }
        .assignment-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .assignment-stats { display: flex; gap: 2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .stat-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }

        .students-list { display: flex; flex-direction: column; gap: 1rem; }
        .student-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; transition: all 0.3s; }
        .student-card:hover { box-shadow: var(--shadow); }
        .student-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; background: var(--hover-bg); cursor: pointer; transition: 0.2s; flex-wrap: wrap; gap: 1rem; }
        .student-header:hover { background: var(--info-bg); }
        .student-info { display: flex; align-items: center; gap: 1rem; }
        .student-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: white; }
        .student-details h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .student-details p { font-size: 0.8rem; color: var(--text-secondary); }
        .student-status { display: flex; align-items: center; gap: 1.5rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-graded { background: var(--success-bg); color: var(--success-text); }
        .score-display { font-weight: 700; font-size: 1.1rem; }
        .expand-icon { transition: transform 0.3s; }
        .student-card.expanded .expand-icon { transform: rotate(180deg); }
        .student-content { display: none; padding: 1.5rem; border-top: 1px solid var(--border); }
        .student-card.expanded .student-content { display: block; }

        .question-review { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .question-review:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .question-review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
        .question-number { font-weight: 700; color: var(--accent); }
        .student-answer { background: var(--hover-bg); padding: 0.75rem; border-radius: 0.75rem; margin: 0.5rem 0; }
        .correct-answer { background: var(--success-bg); padding: 0.75rem; border-radius: 0.75rem; margin: 0.5rem 0; color: var(--success-text); }
        .answer-wrong { background: var(--danger-bg); color: var(--danger-text); }
        .answer-correct { background: var(--success-bg); color: var(--success-text); }

        .grading-form { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid var(--border); }
        .score-input { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .score-input label { font-weight: 600; }
        .score-input input { width: 100px; padding: 0.5rem; border-radius: 0.5rem; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary); text-align: center; }
        .feedback-input { margin-bottom: 1rem; }
        .feedback-input label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .feedback-input textarea { width: 100%; padding: 0.75rem; border-radius: 0.75rem; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary); resize: vertical; font-family: inherit; }
        .corrections-area { margin-bottom: 1rem; }
        .corrections-area label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        #correctionsEditor { height: 150px; background: var(--input-bg); }
        .grade-actions { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }

        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.3); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); border-color: var(--accent); }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

        .ai-suggestion { background: var(--info-bg); border-radius: 0.75rem; padding: 0.75rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .empty-state { text-align: center; padding: 4rem; background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border); }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }
        .loading-content i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; }

        @media (max-width: 768px) { .sidebar { width: 80px; } .sidebar .logo-area h2, .sidebar .nav-item span { display: none; } .main-content { margin-left: 80px; padding: 1rem; } .student-header { flex-direction: column; align-items: flex-start; } .student-status { width: 100%; justify-content: space-between; } }
    </style>
</head>
<body>

        <div class="logo-area"><i class="fas fa-graduation-cap"></i><h2>EduTop</h2></div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Grade Assignment</h1>
                <p>Review and grade student submissions with feedback and corrections</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                    <div class="dropdown-menu"><div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                </div>
            </div>
        </div>

        <div id="mainContentArea">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Loading assignment...</h3>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loading-content"><i class="fas fa-spinner fa-spin"></i><h3>Processing...</h3></div></div>

    <script type="module">
        import Groq from "groq-sdk";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings.minimumFetchIntervalMillis = 0;
        
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('collapsed'); mainContent.classList.toggle('expanded'); });
        
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('edutop-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.querySelector('span').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutop-theme', next);
            themeToggle.querySelector('span').textContent = next === 'dark' ? 'Light' : 'Dark';
        });
        
        let currentUser = null, userData = null, assignmentData = null, submissions = [], groq = null, quills = {};
        
        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        async function initGroq() {
            try { await remoteConfig.fetchAndActivate(); const key = remoteConfig.getString('groq_api_key'); if (key) groq = new Groq({ apiKey: key, dangerouslyAllowBrowser: true }); } catch(e) { console.warn(e); }
        }
        
        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const assignmentId = urlParams.get('assignmentId');
            
            if (!assignmentId) {
                document.getElementById('mainContentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>No Assignment Selected</h3>
                        <p>Please select an assignment from the assignments page to grade.</p>
                        <a href="teacher-assignments.html" class="btn btn-primary" style="margin-top: 1rem;"><i class="fas fa-arrow-left"></i> Go to Assignments</a>
                    </div>
                `;
                return;
            }
            
            showLoading();
            try {
                const assignmentDoc = await db.collection('assignments').doc(assignmentId).get();
                if (!assignmentDoc.exists) { throw new Error('Assignment not found'); }
                assignmentData = { id: assignmentDoc.id, ...assignmentDoc.data() };
                
                const submissionsSnap = await db.collection('submissions').where('assignmentId', '==', assignmentId).get();
                submissions = [];
                submissionsSnap.forEach(doc => { submissions.push({ id: doc.id, ...doc.data() }); });
                
                const studentIds = [...new Set(submissions.map(s => s.studentId))];
                const studentDocs = await Promise.all(studentIds.map(id => db.collection('users').doc(id).get()));
                const studentMap = {};
                studentDocs.forEach(doc => { if (doc.exists) studentMap[doc.id] = doc.data(); });
                
                submissions = submissions.map(sub => ({ ...sub, studentData: studentMap[sub.studentId] || { firstName: 'Unknown', surname: 'Student' } }));
                
                renderGradeInterface();
            } catch(e) { console.error(e); document.getElementById('mainContentArea').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error: ${e.message}</h3><a href="teacher-assignments.html" class="btn btn-primary">Back to Assignments</a></div>`; }
            finally { hideLoading(); }
        }
        
        function renderGradeInterface() {
            const container = document.getElementById('mainContentArea');
            const totalSubmissions = submissions.length;
            const gradedCount = submissions.filter(s => s.graded).length;
            const pendingCount = totalSubmissions - gradedCount;
            const avgScore = submissions.filter(s => s.graded).reduce((sum, s) => sum + (s.score || 0), 0) / (gradedCount || 1);
            
            container.innerHTML = `
                <div class="assignment-info-card">
                    <h2 class="assignment-title">${escapeHtml(assignmentData.title)}</h2>
                    <div class="assignment-stats">
                        <div class="stat-badge"><i class="fas fa-book"></i> ${escapeHtml(assignmentData.subject)}</div>
                        <div class="stat-badge"><i class="fas fa-calendar-week"></i> Week ${assignmentData.week}</div>
                        <div class="stat-badge"><i class="fas fa-tag"></i> ${escapeHtml(assignmentData.topic || 'No topic')}</div>
                        <div class="stat-badge"><i class="fas fa-star"></i> Total Points: ${assignmentData.totalPoints}</div>
                        <div class="stat-badge"><i class="fas fa-tasks"></i> Type: ${assignmentData.assignmentType === 'mcq' ? 'Multiple Choice' : 'Essay'}</div>
                        <div class="stat-badge"><i class="fas fa-users"></i> Submissions: ${totalSubmissions}</div>
                        <div class="stat-badge"><i class="fas fa-check-circle"></i> Graded: ${gradedCount}</div>
                        <div class="stat-badge"><i class="fas fa-chart-line"></i> Avg Score: ${avgScore.toFixed(1)}/${assignmentData.totalPoints}</div>
                    </div>
                </div>
                <div class="students-list" id="studentsList"></div>
            `;
            
            if (submissions.length === 0) {
                document.getElementById('studentsList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No Submissions Yet</h3><p>No students have submitted this assignment.</p></div>`;
                return;
            }
            
            document.getElementById('studentsList').innerHTML = submissions.map((sub, idx) => renderStudentCard(sub, idx)).join('');
            
            submissions.forEach((sub, idx) => {
                if (assignmentData.assignmentType === 'essay') {
                    const editorId = `correctionsEditor_${sub.id}`;
                    const editorEl = document.getElementById(editorId);
                    if (editorEl && !quills[sub.id]) {
                        quills[sub.id] = new Quill(`#${editorId}`, { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], ['clean']] }, placeholder: 'Add corrections or feedback here...' });
                        if (sub.corrections) quills[sub.id].root.innerHTML = sub.corrections;
                    }
                }
            });
        }
        
        function renderStudentCard(submission, index) {
            const isGraded = submission.graded;
            const score = submission.score || 0;
            const percentage = assignmentData.totalPoints ? (score / assignmentData.totalPoints) * 100 : 0;
            const studentName = `${submission.studentData?.firstName || ''} ${submission.studentData?.surname || ''}`.trim() || 'Unknown Student';
            const initials = studentName.split(' ').map(n => n[0]).join('').toUpperCase() || 'S';
            
            let answersHtml = '';
            if (assignmentData.assignmentType === 'mcq') {
                const questions = assignmentData.questions || [];
                answersHtml = (submission.answers || []).map((answer, qIdx) => {
                    const question = questions[answer.questionIndex];
                    if (!question) return '';
                    const isCorrect = answer.selectedAnswer === question.correct;
                    const pointsEarned = isCorrect ? (question.points || 1) : 0;
                    const studentOptText = question.options?.[answer.selectedAnswer.charCodeAt(0) - 65] || 'N/A';
                    const correctOptText = question.options?.[question.correct.charCodeAt(0) - 65] || 'N/A';
                    return `
                        <div class="question-review">
                            <div class="question-review-header"><span class="question-number">Question ${qIdx + 1}</span><span>${pointsEarned}/${question.points || 1} pts</span></div>
                            <div><strong>Question:</strong> ${escapeHtml(question.question)}</div>
                            <div class="student-answer ${isCorrect ? 'answer-correct' : 'answer-wrong'}"><strong>Student's Answer:</strong> ${answer.selectedAnswer}. ${escapeHtml(studentOptText)}</div>
                            ${!isCorrect ? `<div class="correct-answer"><strong>Correct Answer:</strong> ${question.correct}. ${escapeHtml(correctOptText)}</div>` : ''}
                        </div>
                    `;
                }).join('');
            } else {
                const essayAnswer = submission.answers?.[0]?.essayContent || '';
                answersHtml = `
                    <div class="question-review">
                        <div class="question-review-header"><span class="question-number">Essay Response</span></div>
                        <div><strong>Prompt:</strong> ${escapeHtml(assignmentData.essayPrompt || 'No prompt')}</div>
                        <div class="student-answer" style="white-space: pre-wrap;"><strong>Student's Answer:</strong><div style="margin-top: 0.5rem;">${essayAnswer || 'No answer provided'}</div></div>
                    </div>
                `;
            }
            
            return `
                <div class="student-card" id="studentCard_${submission.id}">
                    <div class="student-header" onclick="window.toggleStudentCard('${submission.id}')">
                        <div class="student-info">
                            <div class="student-avatar">${initials}</div>
                            <div class="student-details">
                                <h4>${escapeHtml(studentName)}</h4>
                                <p>Submitted: ${submission.submittedAt ? new Date(submission.submittedAt.toDate()).toLocaleString() : 'Unknown'}</p>
                                ${submission.tabSwitchCount ? `<p><i class="fas fa-exclamation-triangle"></i> Tab switches: ${submission.tabSwitchCount}</p>` : ''}
                            </div>
                        </div>
                        <div class="student-status">
                            ${isGraded ? `<span class="status-badge status-graded">Graded</span><span class="score-display">${score}/${assignmentData.totalPoints} (${percentage.toFixed(0)}%)</span>` : `<span class="status-badge status-pending">Pending</span>`}
                            <i class="fas fa-chevron-down expand-icon"></i>
                        </div>
                    </div>
                    <div class="student-content">
                        <h4 style="margin-bottom: 1rem;"><i class="fas fa-question-circle"></i> Answers Review</h4>
                        ${answersHtml}
                        <div class="grading-form">
                            <h4 style="margin-bottom: 1rem;"><i class="fas fa-graduation-cap"></i> Grading</h4>
                            ${assignmentData.aiGradingSuggestions && !isGraded ? `<div class="ai-suggestion" id="aiSuggestion_${submission.id}"><span><i class="fas fa-robot"></i> AI Grading Suggestion</span><button class="btn btn-sm btn-outline" onclick="window.getAISuggestion('${submission.id}')"><i class="fas fa-magic"></i> Get Suggestion</button></div>` : ''}
                            <div class="score-input"><label>Score (out of ${assignmentData.totalPoints}):</label><input type="number" id="score_${submission.id}" value="${score || 0}" min="0" max="${assignmentData.totalPoints}" step="1"></div>
                            <div class="feedback-input"><label><i class="fas fa-comment"></i> Feedback / Remark:</label><textarea id="feedback_${submission.id}" rows="3" placeholder="Provide feedback to the student...">${escapeHtml(submission.feedback || '')}</textarea></div>
                            ${assignmentData.assignmentType === 'essay' ? `<div class="corrections-area"><label><i class="fas fa-edit"></i> Corrections / Edits:</label><div id="correctionsEditor_${submission.id}" style="height: 150px;"></div></div>` : ''}
                            <div class="grade-actions">
                                <button class="btn btn-success" onclick="window.saveGrade('${submission.id}')"><i class="fas fa-save"></i> Save & Publish Grade</button>
                                ${!isGraded ? `<button class="btn btn-outline" onclick="window.saveAsDraft('${submission.id}')"><i class="fas fa-clock"></i> Save as Draft</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        window.toggleStudentCard = (id) => { document.getElementById(`studentCard_${id}`).classList.toggle('expanded'); };
        
        window.getAISuggestion = async (submissionId) => {
            if (!groq) { alert('AI service not available'); return; }
            const submission = submissions.find(s => s.id === submissionId);
            if (!submission) return;
            const suggestionDiv = document.getElementById(`aiSuggestion_${submissionId}`);
            suggestionDiv.innerHTML = '<span><i class="fas fa-spinner fa-spin"></i> Analyzing...</span>';
            try {
                let prompt = '';
                if (assignmentData.assignmentType === 'mcq') {
                    let correctCount = 0;
                    (submission.answers || []).forEach(ans => {
                        const q = assignmentData.questions?.[ans.questionIndex];
                        if (ans.selectedAnswer === q?.correct) correctCount++;
                    });
                    const suggestedScore = (correctCount / (assignmentData.questions?.length || 1)) * assignmentData.totalPoints;
                    prompt = `Student scored approximately ${suggestedScore.toFixed(0)}/${assignmentData.totalPoints} on ${assignmentData.subject} - ${assignmentData.topic}. Provide brief encouraging feedback.`;
                } else {
                    const essay = submission.answers?.[0]?.essayContent || '';
                    prompt = `Based on this essay about "${assignmentData.topic}":\n\n${essay.substring(0, 1500)}\n\nProvide brief feedback (2-3 sentences) and suggest a score out of ${assignmentData.totalPoints}.`;
                }
                const res = await groq.chat.completions.create({ messages: [{ role: 'user', content: prompt }], model: 'llama-3.3-70b-versatile', temperature: 0.5, max_tokens: 300 });
                const suggestion = res.choices[0].message.content;
                suggestionDiv.innerHTML = `<i class="fas fa-robot"></i> AI Suggestion: <div style="margin-top: 0.5rem; font-size: 0.85rem;">${escapeHtml(suggestion)}</div><button class="btn btn-sm btn-outline" style="margin-top: 0.5rem;" onclick="window.applyAISuggestion('${submissionId}', \`${suggestion.replace(/`/g, '\\`')}\`)">Apply Suggestion</button>`;
            } catch(e) { suggestionDiv.innerHTML = '<span><i class="fas fa-exclamation-triangle"></i> AI suggestion failed. Try again.</span>'; }
        };
        
        window.applyAISuggestion = (submissionId, suggestion) => {
            const scoreMatch = suggestion.match(/(\d+)\s*\/\s*${assignmentData.totalPoints}/);
            if (scoreMatch) { const scoreInput = document.getElementById(`score_${submissionId}`); if (scoreInput) scoreInput.value = scoreMatch[1]; }
            const feedbackArea = document.getElementById(`feedback_${submissionId}`);
            if (feedbackArea) feedbackArea.value = suggestion;
        };
        
        window.saveGrade = async (submissionId) => {
            const submission = submissions.find(s => s.id === submissionId);
            if (!submission) return;
            const scoreInput = document.getElementById(`score_${submissionId}`);
            const feedbackArea = document.getElementById(`feedback_${submissionId}`);
            const score = parseInt(scoreInput?.value) || 0;
            const feedback = feedbackArea?.value || '';
            if (score < 0 || score > assignmentData.totalPoints) { alert(`Score must be between 0 and ${assignmentData.totalPoints}`); return; }
            showLoading();
            const updateData = { graded: true, score, feedback, gradedAt: firebase.firestore.FieldValue.serverTimestamp(), gradedBy: currentUser.uid };
            if (assignmentData.assignmentType === 'essay' && quills[submissionId]) updateData.corrections = quills[submissionId].root.innerHTML;
            try {
                await db.collection('submissions').doc(submissionId).update(updateData);
                submission.graded = true; submission.score = score; submission.feedback = feedback;
                alert('Grade published successfully!');
                renderGradeInterface();
            } catch(e) { alert('Error: ' + e.message); } finally { hideLoading(); }
        };
        
        window.saveAsDraft = async (submissionId) => {
            const scoreInput = document.getElementById(`score_${submissionId}`);
            const feedbackArea = document.getElementById(`feedback_${submissionId}`);
            const updateData = { draftScore: parseInt(scoreInput?.value) || 0, draftFeedback: feedbackArea?.value || '', draftUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() };
            if (assignmentData.assignmentType === 'essay' && quills[submissionId]) updateData.draftCorrections = quills[submissionId].root.innerHTML;
            showLoading();
            try { await db.collection('submissions').doc(submissionId).update(updateData); alert('Draft saved!'); } catch(e) { alert('Error: ' + e.message); } finally { hideLoading(); }
        };
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'teacher') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = userDoc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';
                await initGroq();
                await loadData();
            } catch(e) { console.error(e); }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('profileLink').addEventListener('click', () => window.location.href='teacher-profile.html');
        
        window.toggleStudentCard = window.toggleStudentCard;
        window.getAISuggestion = window.getAISuggestion;
        window.applyAISuggestion = window.applyAISuggestion;
        window.saveGrade = window.saveGrade;
        window.saveAsDraft = window.saveAsDraft;
    </script>
</body>
</html>

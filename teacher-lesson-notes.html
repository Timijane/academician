<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Teacher Lesson Notes</title>
    <!-- Font Awesome, Inter, Firebase (same as before) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style> /* (same as provided – keep all existing styles) */ </style>
</head>
<body>
    <!-- Sidebar (unchanged) -->
    <div class="sidebar" id="sidebar">...</div>

    <div class="main-content" id="mainContent">
        <!-- Top bar (unchanged) -->
        ...

        <!-- Subject Tabs (unchanged) -->
        <div class="subject-tabs" id="subjectTabs"></div>

        <!-- Main Tabs (Syllabus / AI Assistant / Notebook) -->
        <div class="subject-tabs" id="mainTabs">
            <div class="subject-tab active" data-tab="syllabus">Syllabus</div>
            <div class="subject-tab" data-tab="assistant">Teacher Assistant</div>
            <div class="subject-tab" data-tab="notebook">Notebook</div>
        </div>

        <!-- Syllabus Tab (unchanged) -->
        <div id="tab-syllabus" class="tab-content active">...</div>

        <!-- Teacher Assistant Tab (enhanced) -->
        <div id="tab-assistant" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>Teacher Assistant</h3>
                    <span id="assistantSyllabusStatus" class="status-badge"></span>
                </div>
                <p class="text-secondary">Select a week and use prompts to generate content. Each piece can be saved separately.</p>

                <div class="filter-bar" style="display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap;">
                    <select id="weekSelect" class="form-control" style="max-width:200px; padding:0.5rem; border-radius:2rem;">
                        <option value="">Select Week</option>
                    </select>
                    <button class="btn btn-outline" id="loadWeekMaterials">Load Saved</button>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <!-- Lesson Note Generator -->
                    <div class="card" style="padding:1rem;">
                        <h4>📝 Lesson Note</h4>
                        <textarea id="lessonNoteOutput" rows="6" class="form-control" placeholder="Generated lesson note will appear here..."></textarea>
                        <div style="margin-top:0.5rem;">
                            <button class="btn btn-sm btn-primary" data-prompt="lessonNote">Generate</button>
                            <button class="btn btn-sm btn-outline" data-save="lessonNote">Save Draft</button>
                        </div>
                    </div>
                    <!-- Teaching Process Generator -->
                    <div class="card" style="padding:1rem;">
                        <h4>🧑‍🏫 Teaching Process</h4>
                        <textarea id="teachingProcessOutput" rows="6" class="form-control" placeholder="Generated teaching process..."></textarea>
                        <div style="margin-top:0.5rem;">
                            <button class="btn btn-sm btn-primary" data-prompt="teachingProcess">Generate</button>
                            <button class="btn btn-sm btn-outline" data-save="teachingProcess">Save Draft</button>
                        </div>
                    </div>
                    <!-- Student Resource Generator -->
                    <div class="card" style="padding:1rem;">
                        <h4>📄 Student Resource</h4>
                        <textarea id="studentResourceOutput" rows="6" class="form-control" placeholder="Student-friendly explanation..."></textarea>
                        <div style="margin-top:0.5rem;">
                            <button class="btn btn-sm btn-primary" data-prompt="studentResource">Generate</button>
                            <button class="btn btn-sm btn-outline" data-save="studentResource">Save Draft</button>
                        </div>
                    </div>
                    <!-- Handwritten Notes Generator -->
                    <div class="card" style="padding:1rem;">
                        <h4>✍️ Handwritten Notes</h4>
                        <textarea id="handwrittenOutput" rows="6" class="form-control" placeholder="Handwritten-style text..."></textarea>
                        <div style="margin-top:0.5rem;">
                            <button class="btn btn-sm btn-primary" data-prompt="handwritten">Generate</button>
                            <button class="btn btn-sm btn-outline" data-save="handwritten">Save Draft</button>
                        </div>
                    </div>
                    <!-- YouTube Links Generator -->
                    <div class="card" style="padding:1rem;">
                        <h4>📺 YouTube Links</h4>
                        <textarea id="youtubeOutput" rows="6" class="form-control" placeholder="Suggested video links..."></textarea>
                        <div style="margin-top:0.5rem;">
                            <button class="btn btn-sm btn-primary" data-prompt="youtube">Generate</button>
                            <button class="btn btn-sm btn-outline" data-save="youtube">Save Draft</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notebook Tab (unchanged but will load the week's lesson note) -->
        <div id="tab-notebook" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>Notebook – Lesson Note Editor</h3>
                    <span id="lessonNoteStatus" class="status-badge status-draft">Draft</span>
                </div>
                <div class="filter-bar" style="display:flex; gap:1rem; margin-bottom:1rem;">
                    <select id="notebookWeekSelect" class="form-control" style="max-width:200px; padding:0.5rem; border-radius:2rem;">
                        <option value="">Select Week</option>
                    </select>
                </div>
                <div class="notebook" id="notebookContent" contenteditable="true" style="border:1px solid var(--border); padding:1rem; border-radius:1rem; background:var(--input-bg); min-height:300px;"></div>
                <div class="actions" style="margin-top:1rem;">
                    <button class="btn btn-primary" id="saveNotebookBtn">Save Draft</button>
                    <button class="btn btn-success" id="submitLessonNoteBtn">Submit for Approval</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase config (same)
        const firebaseConfig = { ... };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ... (sidebar, theme, auth check same as before) ...

        let currentUser = null;
        let userData = null;
        let subjects = [];
        let currentSubject = null;
        let syllabusData = {};      // { id, weeks, status }
        let lessonPackage = {};      // key: subject_week, object with fields

        auth.onAuthStateChanged(async (user) => { ... }); // unchanged

        // Subject tabs and switchSubject (same, but loadLessonPackage when switching)
        async function switchSubject(subject) {
            currentSubject = subject;
            document.getElementById('currentSubject').textContent = subject;
            await loadSyllabus(subject);
            await loadLessonPackage(subject);
            populateWeekSelect();
        }

        // Load the lesson package for the current subject (all weeks)
        async function loadLessonPackage(subject) {
            try {
                const snapshot = await db.collection('lessonNotes')
                    .where('teacherId', '==', currentUser.uid)
                    .where('subject', '==', subject)
                    .get();
                lessonPackage = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const key = `${subject}_${data.week}`;
                    lessonPackage[key] = { id: doc.id, ...data };
                });
            } catch (error) {
                console.error('Error loading lesson package:', error);
            }
        }

        // Populate week dropdowns from syllabus
        function populateWeekSelect() {
            const weeks = syllabusData[currentSubject]?.weeks || [];
            const weekSelect = document.getElementById('weekSelect');
            const notebookWeekSelect = document.getElementById('notebookWeekSelect');
            weekSelect.innerHTML = '<option value="">Select Week</option>';
            notebookWeekSelect.innerHTML = '<option value="">Select Week</option>';
            weeks.forEach((w, idx) => {
                const option = document.createElement('option');
                option.value = w.week;
                option.textContent = `Week ${w.week}: ${w.topic || 'No topic'}`;
                weekSelect.appendChild(option.cloneNode(true));
                notebookWeekSelect.appendChild(option);
            });
        }

        // AI generation simulation (replace with actual API)
        function generateAIContent(promptType, weekData) {
            const topic = weekData?.topic || 'General Topic';
            const age = '4-5'; // could be derived from class
            if (promptType === 'lessonNote') {
                return `# Lesson Note: ${topic}\n\n**Class:** Basic 3 (Age ${age})\n**Duration:** 40 min\n\n## Introduction\n...\n## Content\n...\n## Conclusion\n...`;
            } else if (promptType === 'teachingProcess') {
                return `# Teaching Process for ${topic}\n\n## Teacher's Activities\n1. ...\n## Student's Activities\n1. ...`;
            } else if (promptType === 'studentResource') {
                return `# Student Resource: ${topic}\n\nSimple explanation for students...`;
            } else if (promptType === 'handwritten') {
                return `(Simulated handwritten note)\n\n🌱 Plants are green.\nThey give us food.\n- Roots\n- Stem\n- Leaves\n- Flowers\n\n*Draw a plant here*`;
            } else if (promptType === 'youtube') {
                return `Suggested YouTube videos:\n- https://youtu.be/example1\n- https://youtu.be/example2`;
            }
            return '';
        }

        // Attach generate buttons
        document.querySelectorAll('[data-prompt]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const promptType = e.target.dataset.prompt;
                const weekNum = document.getElementById('weekSelect').value;
                if (!weekNum) { alert('Select a week.'); return; }
                const weekData = syllabusData[currentSubject].weeks.find(w => w.week == weekNum);
                const content = generateAIContent(promptType, weekData);
                // Put content into corresponding textarea
                if (promptType === 'lessonNote') document.getElementById('lessonNoteOutput').value = content;
                else if (promptType === 'teachingProcess') document.getElementById('teachingProcessOutput').value = content;
                else if (promptType === 'studentResource') document.getElementById('studentResourceOutput').value = content;
                else if (promptType === 'handwritten') document.getElementById('handwrittenOutput').value = content;
                else if (promptType === 'youtube') document.getElementById('youtubeOutput').value = content;
            });
        });

        // Save individual pieces
        document.querySelectorAll('[data-save]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const field = e.target.dataset.save; // lessonNote, teachingProcess, etc.
                const weekNum = document.getElementById('weekSelect').value;
                if (!weekNum) { alert('Select a week.'); return; }
                const weekData = syllabusData[currentSubject].weeks.find(w => w.week == weekNum);
                const content = document.getElementById(`${field}Output`).value;
                if (!content.trim()) { alert('Nothing to save.'); return; }
                const key = `${currentSubject}_${weekNum}`;
                const existing = lessonPackage[key] || {};
                const updateData = {
                    teacherId: currentUser.uid,
                    subject: currentSubject,
                    week: weekNum,
                    topic: weekData.topic,
                    [field]: content,
                    status: existing.status || 'draft',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                try {
                    if (existing.id) {
                        await db.collection('lessonNotes').doc(existing.id).update(updateData);
                    } else {
                        const docRef = await db.collection('lessonNotes').add(updateData);
                        lessonPackage[key] = { id: docRef.id, ...updateData };
                    }
                    alert(`${field} saved.`);
                } catch (error) {
                    alert('Error saving: ' + error.message);
                }
            });
        });

        // Load saved materials when week selected in assistant
        document.getElementById('loadWeekMaterials').addEventListener('click', () => {
            const weekNum = document.getElementById('weekSelect').value;
            if (!weekNum) return;
            const key = `${currentSubject}_${weekNum}`;
            const pkg = lessonPackage[key] || {};
            document.getElementById('lessonNoteOutput').value = pkg.lessonNote || '';
            document.getElementById('teachingProcessOutput').value = pkg.teachingProcess || '';
            document.getElementById('studentResourceOutput').value = pkg.studentResource || '';
            document.getElementById('handwrittenOutput').value = pkg.handwrittenNotes || '';
            document.getElementById('youtubeOutput').value = pkg.youtubeLinks ? pkg.youtubeLinks.join('\n') : '';
        });

        // Notebook: load lesson note for selected week
        document.getElementById('notebookWeekSelect').addEventListener('change', (e) => {
            const weekNum = e.target.value;
            if (!weekNum) { document.getElementById('notebookContent').innerText = ''; return; }
            const key = `${currentSubject}_${weekNum}`;
            const pkg = lessonPackage[key] || {};
            document.getElementById('notebookContent').innerText = pkg.lessonNote || '';
            updateLessonNoteStatus(pkg.status || 'draft');
        });

        // Save notebook (lesson note)
        document.getElementById('saveNotebookBtn').addEventListener('click', async () => {
            const weekNum = document.getElementById('notebookWeekSelect').value;
            if (!weekNum) { alert('Select a week.'); return; }
            const weekData = syllabusData[currentSubject].weeks.find(w => w.week == weekNum);
            const content = document.getElementById('notebookContent').innerText;
            if (!content.trim()) { alert('Content is empty.'); return; }
            const key = `${currentSubject}_${weekNum}`;
            const existing = lessonPackage[key] || {};
            const updateData = {
                teacherId: currentUser.uid,
                subject: currentSubject,
                week: weekNum,
                topic: weekData.topic,
                lessonNote: content,
                status: existing.status || 'draft',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                if (existing.id) {
                    await db.collection('lessonNotes').doc(existing.id).update(updateData);
                } else {
                    const docRef = await db.collection('lessonNotes').add(updateData);
                    lessonPackage[key] = { id: docRef.id, ...updateData };
                }
                alert('Lesson note saved.');
                updateLessonNoteStatus('draft');
            } catch (error) {
                alert('Error saving: ' + error.message);
            }
        });

        // Submit lesson note for approval
        document.getElementById('submitLessonNoteBtn').addEventListener('click', async () => {
            const weekNum = document.getElementById('notebookWeekSelect').value;
            if (!weekNum) { alert('Select a week.'); return; }
            const weekData = syllabusData[currentSubject].weeks.find(w => w.week == weekNum);
            const content = document.getElementById('notebookContent').innerText;
            if (!content.trim()) { alert('Content is empty.'); return; }
            const key = `${currentSubject}_${weekNum}`;
            const existing = lessonPackage[key] || {};
            const updateData = {
                teacherId: currentUser.uid,
                subject: currentSubject,
                week: weekNum,
                topic: weekData.topic,
                lessonNote: content,
                status: 'pending',
                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                if (existing.id) {
                    await db.collection('lessonNotes').doc(existing.id).update(updateData);
                } else {
                    const docRef = await db.collection('lessonNotes').add(updateData);
                    lessonPackage[key] = { id: docRef.id, ...updateData };
                }
                alert('Lesson note submitted for approval.');
                updateLessonNoteStatus('pending');
            } catch (error) {
                alert('Error submitting: ' + error.message);
            }
        });

        function updateLessonNoteStatus(status) {
            const el = document.getElementById('lessonNoteStatus');
            el.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            el.className = `status-badge status-${status}`;
        }

        // Syllabus functions (unchanged from earlier, but ensure they work with above)
        // ... (copy syllabus functions from the provided code)
    </script>
</body>
</html>

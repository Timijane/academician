<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Report Card Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --gradient-start: #1e3c72; --gradient-end: #2a5298; --input-bg: rgba(255,255,255,0.9);
            --debug-bg: #1e293b; --debug-text: #e2e8f0;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6; --input-bg: rgba(30,41,59,0.8);
            --debug-bg: #0f172a; --debug-text: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; animation: float 25s infinite alternate; }
        .orb-1 { top: -150px; right: -150px; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -150px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.10), transparent 70%); width: 500px; height: 500px; animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.15); } }

        .top-nav { position: sticky; top: 0; z-index: 100; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 0.8rem; }
        .nav-btn { background: transparent; border: 1px solid var(--border); border-radius: 2rem; padding: 0.45rem 1rem; color: var(--text-primary); font-weight: 500; font-size: 0.82rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
        .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 3rem; padding: 0.25rem 0.25rem 0.25rem 0.7rem; }
        .profile-name { font-weight: 600; font-size: 0.8rem; }
        .profile-pic { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; }
        .dropdown-menu { position: absolute; right: 0; top: 48px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 0.8rem; color: var(--text-primary); border-radius: 0.6rem; cursor: pointer; font-size: 0.8rem; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .main-container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 5; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1rem; font-weight: 600; }

        .settings-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.6rem; }
        .settings-row label { font-size: 0.68rem; color: var(--text-secondary); display: block; margin-bottom: 0.15rem; }
        .form-control { width: 100%; padding: 0.45rem 0.65rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.6rem; color: var(--text-primary); font-size: 0.78rem; font-family: inherit; }
        select.form-control { appearance: auto; }
        textarea.form-control { min-height: 50px; resize: vertical; }

        .two-col { display: grid; grid-template-columns: 300px 1fr; gap: 1rem; }
        .student-list-panel { max-height: 650px; overflow-y: auto; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.75rem; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; margin-bottom: 0.2rem; border: 1px solid transparent; background: var(--hover-bg); }
        .student-row:hover { border-color: var(--accent); }
        .student-row.active { background: rgba(59,130,246,0.15); border-color: var(--accent); }
        .student-row .name { font-weight: 500; font-size: 0.8rem; flex: 1; }
        .student-row .avg { font-weight: 700; font-size: 0.8rem; }
        .student-row .pos { font-size: 0.65rem; padding: 0.12rem 0.4rem; border-radius: 1rem; background: var(--accent); color: white; font-weight: 600; }

        .rc-scroll { max-height: 72vh; overflow-y: auto; }

        /* PROFESSIONAL REPORT CARD - NIGERIAN STANDARD */
        .report-card { background: #ffffff; color: #000000; font-family: 'Georgia', 'Times New Roman', serif; max-width: 1050px; margin: 0 auto; border: 3px double #1a1a2e; font-size: 12px; line-height: 1.45; }
        .rc-header-bg { background: #1a1a2e; color: #ffffff; padding: 12px 20px; text-align: center; }
        .rc-header-bg h1 { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .rc-header-bg .motto { font-size: 10px; font-style: italic; margin-top: 2px; opacity: 0.9; }
        .rc-header-bg .address { font-size: 9px; margin-top: 2px; opacity: 0.8; }
        .rc-title-bar { background: #e8ecf1; color: #1a1a2e; text-align: center; padding: 6px; font-weight: bold; font-size: 12px; border-bottom: 2px solid #1a1a2e; text-transform: uppercase; letter-spacing: 1px; }
        .rc-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 15px; gap: 2px 15px; font-size: 10px; border-bottom: 1px solid #ccc; }
        .rc-table-wrap { padding: 8px 15px; }
        .rc-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .rc-table thead th { background: #1a1a2e; color: #ffffff; padding: 6px 4px; border: 1px solid #1a1a2e; text-align: center; font-size: 9px; font-weight: 600; }
        .rc-table thead th.sub-col { text-align: left; min-width: 120px; }
        .rc-table tbody td { padding: 5px 4px; border: 1px solid #ccc; text-align: center; }
        .rc-table tbody td.sub-col { text-align: left; font-weight: 600; }
        .rc-table tbody tr:nth-child(even) { background: #f8f9fa; }
        .rc-table tbody tr.total-row { background: #e8ecf1; font-weight: bold; }
        .no-data { color: #999; font-style: italic; }
        .rc-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin: 0 15px 8px; }
        .rc-summary-box { border: 1px solid #ccc; padding: 8px; font-size: 10px; }
        .rc-summary-box h5 { background: #e8ecf1; margin: -8px -8px 6px -8px; padding: 5px 8px; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .rc-extracurricular { margin: 0 15px 8px; }
        .rc-extracurricular h5 { background: #e8ecf1; padding: 5px 8px; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin: 0; border: 1px solid #ccc; border-bottom: none; }
        .rc-extra-table { width: 100%; border-collapse: collapse; font-size: 9px; }
        .rc-extra-table th { background: #f0f0f0; padding: 5px 6px; border: 1px solid #ccc; text-align: left; font-size: 8px; }
        .rc-extra-table td { padding: 4px 6px; border: 1px solid #ccc; }
        .rc-extra-table select { width: 100%; border: 1px solid #ccc; padding: 3px; font-size: 9px; font-family: inherit; }
        .rc-attendance { margin: 0 15px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .rc-signatures { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 20px 15px 12px; text-align: center; font-size: 10px; }
        .rc-sign-line { border-top: 1px solid #000; padding-top: 4px; margin-top: 35px; }
        .rc-footer { text-align: center; font-size: 9px; padding: 6px; background: #e8ecf1; border-top: 2px solid #1a1a2e; }
        .grade-A { color: #16a34a; font-weight: 700; }
        .grade-B { color: #2563eb; font-weight: 700; }
        .grade-C { color: #d97706; font-weight: 700; }
        .grade-D { color: #ea580c; font-weight: 700; }
        .grade-E { color: #dc2626; font-weight: 700; }
        .grade-F { color: #991b1b; font-weight: 700; }

        .btn { padding: 0.45rem 0.9rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.78rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.35rem; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.7rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .signature-pad-wrap { border: 1px solid #ccc; border-radius: 4px; overflow: hidden; display: inline-block; margin-top: 5px; }
        .signature-pad-wrap canvas { display: block; cursor: crosshair; background: #fff; }
        .sig-actions { display: flex; gap: 4px; justify-content: center; margin-top: 3px; }
        .sig-actions button { font-size: 9px; padding: 2px 8px; border: 1px solid #ccc; background: #f0f0f0; cursor: pointer; border-radius: 3px; }

        .debug-panel { background: var(--debug-bg); color: var(--debug-text); border-radius: 1rem; padding: 1rem; margin-top: 1rem; font-family: 'Space Grotesk', monospace; font-size: 0.68rem; max-height: 300px; overflow-y: auto; display: none; }
        .debug-panel.active { display: block; }
        .debug-entry { padding: 0.2rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .debug-entry.error { color: #f87171; }
        .debug-entry.success { color: #4ade80; }
        .debug-entry.warn { color: #fbbf24; }
        .btn-debug { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 4000; background: var(--debug-bg); color: var(--debug-text); border: 1px solid var(--border); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; opacity: 0.5; }
        .btn-debug:hover { opacity: 1; }

        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }

        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .student-list-panel { max-height: 200px; } }
        @media print {
            body { background: white !important; }
            .orb, .top-nav, .card:not(.print-visible), .student-list-panel, .btn, .loading-overlay, .theme-toggle, .profile-dropdown, .settings-row, .two-col, .debug-panel, .btn-debug, .sig-actions { display: none !important; }
            .main-container { padding: 0 !important; max-width: 100% !important; }
            .rc-scroll { max-height: none !important; overflow: visible !important; }
            .report-card { border: 2px solid #000 !important; box-shadow: none !important; margin: 0 !important; }
            @page { margin: 0.4cm; size: A4; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div class="top-nav">
        <div class="nav-left">
            <a href="teacher-analysis.html" class="nav-btn"><i class="fas fa-chart-bar"></i> Scoring Engine</a>
            <a href="teacher-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
            <div class="profile-dropdown">
                <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                <div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-cog"></i> Report Card Settings</h3>
                <button class="btn btn-primary btn-sm" id="loadDataBtn"><i class="fas fa-database"></i> Load Data from Scoring Engine</button>
            </div>
            <div class="settings-row">
                <div><label>Session</label><input type="text" id="sessionInput" class="form-control" value="2025/2026"></div>
                <div><label>Term</label><select id="termSelect" class="form-control"><option value="first">First Term</option><option value="second">Second Term</option><option value="third">Third Term</option></select></div>
                <div><label>Next Term Begins</label><input type="text" id="nextTermInput" class="form-control" value="12th January, 2026"></div>
                <div><label>School Name</label><input type="text" id="schoolNameInput" class="form-control"></div>
                <div><label>School Motto</label><input type="text" id="schoolMotto" class="form-control" value="Moulding Future Leaders with Excellence"></div>
                <div><label>School Address</label><input type="text" id="schoolAddress" class="form-control" value="123 Education Avenue, Lagos State"></div>
                <div><label>School Phone</label><input type="text" id="schoolPhone" class="form-control" value="+234-800-000-0000"></div>
                <div><label>Class Teacher Name</label><input type="text" id="teacherSignName" class="form-control"></div>
            </div>
        </div>

        <div class="two-col">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-users"></i> Students</h3><span id="studentCount" style="font-size:0.75rem;color:var(--text-secondary);"></span></div>
                <div class="student-list-panel" id="studentList"><p style="color:var(--text-secondary);text-align:center;padding:2rem;">Click <strong>"Load Data"</strong> to begin.</p></div>
            </div>
            <div class="card print-visible">
                <div class="card-header">
                    <h3><i class="fas fa-graduation-cap"></i> Report Card Preview</h3>
                    <div style="display:flex;gap:0.3rem;flex-wrap:wrap;">
                        <button class="btn btn-sm btn-outline" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                        <button class="btn btn-sm btn-outline" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                        <button class="btn btn-sm btn-success" id="saveBtn"><i class="fas fa-save"></i> Save</button>
                        <button class="btn btn-sm btn-warning" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit</button>
                        <button class="btn btn-sm btn-outline" id="printBtn"><i class="fas fa-print"></i> Print</button>
                    </div>
                </div>
                <div class="rc-scroll" id="reportCardContainer"><p style="color:var(--text-secondary);text-align:center;padding:3rem;">Select a student to preview.</p></div>
            </div>
        </div>
        <div class="debug-panel" id="debugPanel"><strong>🐛 Debug Console</strong><br><div id="debugContent"></div></div>
    </div>

    <button class="btn-debug" id="debugToggle" title="Debug"><i class="fas fa-bug"></i></button>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-content"><i class="fas fa-spinner fa-spin fa-2x"></i><h3 style="margin-top:0.75rem;">Processing...</h3></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', s);
            const sp = document.getElementById('themeToggle').querySelector('span');
            sp.textContent = s === 'dark' ? 'Light' : 'Dark';
            document.getElementById('themeToggle').addEventListener('click', () => {
                const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', n);
                localStorage.setItem('edutopscholars-theme', n);
                sp.textContent = n === 'dark' ? 'Light' : 'Dark';
            });
        })();

        const debugLogs = [];
        function debug(msg, type = 'info') { const ts = new Date().toLocaleTimeString(); debugLogs.push({ msg, type, ts }); console.log(`[${type.toUpperCase()}] ${msg}`); renderDebug(); }
        function renderDebug() { const el = document.getElementById('debugContent'); if (!el) return; el.innerHTML = debugLogs.slice(-40).map(d => `<div class="debug-entry ${d.type}">[${d.ts}] ${d.msg}</div>`).join(''); }
        document.getElementById('debugToggle').addEventListener('click', () => document.getElementById('debugPanel').classList.toggle('active'));

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getGrade(s) { if (s >= 70) return 'A'; if (s >= 60) return 'B'; if (s >= 50) return 'C'; if (s >= 45) return 'D'; if (s >= 40) return 'E'; return 'F'; }
        function getRemark(g) { const r = { A: 'Excellent performance', B: 'Very Good performance', C: 'Good performance', D: 'Fair performance', E: 'Below average', F: 'Needs improvement' }; return r[g] || ''; }
        function getOrdinal(n) { return n + ['th','st','nd','rd'][n % 10 < 4 && Math.floor(n / 10) !== 1 ? n % 10 : 0]; }

        let currentUser = null, userData = null, classId = '';
        let config = null, allStudents = [], currentIdx = 0;
        let attendanceData = { totalDays: 50, presentMap: {} };
        let studentExtras = {}, signatures = {};

        const extraActivities = ['Sports & Physical Education','Music & Performing Arts','Arts & Crafts','Clubs & Societies','Leadership Roles','Public Speaking','ICT & Computer Skills','Handwriting'];
        const affectiveTraits = ['Punctuality','Neatness','Politeness','Cooperation with Others','Attentiveness in Class','Honesty & Integrity','Self-Control','Organizational Skills'];

        // ===== LOAD DATA =====
        async function loadData() {
            showLoading();
            try {
                classId = userData.classTeaching || 'jss2';
                document.getElementById('teacherSignName').value = `${userData.firstName||''} ${userData.surname||''}`.trim();
                if (userData.schoolName) document.getElementById('schoolNameInput').value = userData.schoolName;
                debug('Loading config from reportCardConfig/' + currentUser.uid + '_' + classId);

                const configDoc = await db.collection('reportCardConfig').doc(`${currentUser.uid}_${classId}`).get();
                if (!configDoc.exists) { debug('Config NOT FOUND', 'error'); alert('No scoring data. Go to Scoring Engine first.'); hideLoading(); return; }
                config = configDoc.data();
                if (!config.globalWeights) { config.globalWeights = { a: 10, t: 30, e: 60 }; debug('globalWeights defaulted', 'warn'); }
                if (!config.subjectConfigs) { config.subjectConfigs = {}; debug('subjectConfigs defaulted', 'warn'); }
                if (config.useAssignments === undefined) config.useAssignments = true;
                debug(`Weights: A=${config.globalWeights.a} T=${config.globalWeights.t} E=${config.globalWeights.e} | Subjects: ${Object.keys(config.subjectConfigs).join(', ') || 'NONE'}`);

                const stuSnap = await db.collection('users').where('role','==','student').where('class','==',classId).where('approved','==',true).get();
                allStudents = [];
                stuSnap.forEach(d => { const dd = d.data(); allStudents.push({ id: d.id, name: `${dd.surname||''} ${dd.firstName||''}`.trim(), firstName: dd.firstName||'', surname: dd.surname||'', gender: dd.gender||'N/A', admissionNo: dd.admissionNo||'N/A' }); studentExtras[d.id] = { activities: {}, traits: {}, teacherComment: '', principalComment: '', attOverride: null }; signatures[d.id] = { teacher: null, principal: null }; });
                allStudents.sort((a,b) => a.name.localeCompare(b.name));
                debug(`Students: ${allStudents.length}`);

                await loadAttendance();

                const session = document.getElementById('sessionInput').value, term = document.getElementById('termSelect').value;
                const rcSnap = await db.collection('reportCards').where('teacherId','==',currentUser.uid).where('classId','==',classId).where('session','==',session).where('term','==',term).limit(1).get();
                if (!rcSnap.empty) {
                    const d = rcSnap.docs[0].data();
                    (d.studentExtras||[]).forEach(se => { if (studentExtras[se.studentId]) studentExtras[se.studentId] = se; });
                    if (d.signatures) signatures = d.signatures;
                }

                document.getElementById('studentCount').textContent = `${allStudents.length} students`;
                renderStudentList();
                if (allStudents.length) selectStudent(0);
            } catch(e) { debug('Load error: ' + e.message, 'error'); alert('Error: ' + e.message); }
            finally { hideLoading(); }
        }

        async function loadAttendance() {
            try {
                const attSnap = await db.collection('attendance').where('classId','==',classId).get();
                const dates = new Set(); const presentMap = {};
                attSnap.forEach(doc => { const d = doc.data(); if (d.date) dates.add(d.date); if (!presentMap[d.studentId]) presentMap[d.studentId] = 0; if (d.status === 'present' || d.morning === true) presentMap[d.studentId]++; });
                attendanceData = { totalDays: dates.size || 50, presentMap };
                debug(`Attendance: ${attendanceData.totalDays} school days, ${Object.keys(presentMap).length} students with records`);
            } catch(e) { attendanceData = { totalDays: 50, presentMap: {} }; }
        }

        function renderStudentList() {
            const el = document.getElementById('studentList');
            const subjects = Object.keys(config?.subjectConfigs || {});
            const sorted = [...allStudents].sort((a,b) => {
                let sa=0,ca=0,sb=0,cb=0;
                subjects.forEach(sub => { const scA=config.subjectConfigs[sub]?.studentScores?.[a.id], scB=config.subjectConfigs[sub]?.studentScores?.[b.id]; if(scA&&scA.total>0){sa+=(scA.override??scA.total);ca++;} if(scB&&scB.total>0){sb+=(scB.override??scB.total);cb++;} });
                return (cb>0?sb/cb:0)-(ca>0?sa/ca:0);
            });
            el.innerHTML = sorted.map((s,i) => {
                let sum=0,cnt=0; subjects.forEach(sub => { const sc=config.subjectConfigs[sub]?.studentScores?.[s.id]; if(sc&&sc.total>0){sum+=(sc.override??sc.total);cnt++;} });
                const avg=cnt>0?sum/cnt:0, idx=allStudents.indexOf(s);
                return `<div class="student-row${idx===currentIdx?' active':''}" onclick="selectStudent(${idx})"><span class="pos">#${i+1}</span><span class="name">${escapeHtml(s.name)}</span><span class="avg">${avg.toFixed(1)}%</span></div>`;
            }).join('');
        }

        window.selectStudent = idx => { currentIdx = idx; renderStudentList(); if (allStudents[idx]) renderReportCard(allStudents[idx]); };

        function renderReportCard(student) {
            if (!config || !student) return;
            const subjects = Object.keys(config.subjectConfigs || {});
            const session = document.getElementById('sessionInput').value || '2025/2026';
            const term = document.getElementById('termSelect').value;
            const termName = { first: 'FIRST', second: 'SECOND', third: 'THIRD' }[term] || 'FIRST';
            const schoolName = document.getElementById('schoolNameInput').value || 'Triangle International School';
            const motto = document.getElementById('schoolMotto').value || 'Moulding Future Leaders with Excellence';
            const address = document.getElementById('schoolAddress').value || '123 Education Avenue, Lagos State';
            const phone = document.getElementById('schoolPhone').value || '+234-800-000-0000';
            const nextTerm = document.getElementById('nextTermInput').value || 'To Be Announced';
            const teacherSign = document.getElementById('teacherSignName').value || '';
            const useA = config.useAssignments !== false;
            const w = config.globalWeights;

            let rankings = []; allStudents.forEach(s => { let sum=0,cnt=0; subjects.forEach(sub => { const sc=config.subjectConfigs[sub]?.studentScores?.[s.id]; if(sc&&sc.total>0){sum+=(sc.override??sc.total);cnt++;} }); rankings.push({id:s.id,avg:cnt>0?sum/cnt:0}); });
            rankings.sort((a,b)=>b.avg-a.avg);
            const rank = rankings.findIndex(r=>r.id===student.id)+1, classAvg = rankings.length?rankings.reduce((s,r)=>s+r.avg,0)/rankings.length:0;

            const att = studentExtras[student.id]?.attOverride || { total: attendanceData.totalDays||50, present: attendanceData.presentMap?.[student.id]||45 };
            const extras = studentExtras[student.id] || { activities: {}, traits: {}, teacherComment: '', principalComment: '' };

            let subjectRows = '', totalScored = 0, subjectCount = 0;
            subjects.forEach(sub => {
                const sc = config.subjectConfigs[sub]?.studentScores?.[student.id];
                const hasAny = sc && (sc.assignAvg > 0 || sc.testAvg > 0 || sc.examScore > 0);
                if (hasAny) {
                    const total = Math.round(sc.override ?? (sc.total||0));
                    const grade = getGrade(sc.override ?? (sc.total||0));
                    totalScored += total; subjectCount++;
                    subjectRows += `<tr><td class="sub-col">${escapeHtml(sub)}</td>${useA?`<td>${sc.assignAvg>0?sc.assignAvg.toFixed(1):'<span class="no-data">—</span>'}</td>`:''}<td>${sc.testAvg>0?sc.testAvg.toFixed(1):'<span class="no-data">—</span>'}</td><td>${sc.examScore>0?sc.examScore.toFixed(1):'<span class="no-data">—</span>'}</td><td><strong>${total}</strong></td><td><strong class="grade-${grade}">${grade}</strong></td><td>${getRemark(grade)}</td></tr>`;
                } else {
                    subjectRows += `<tr><td class="sub-col">${escapeHtml(sub)}</td>${useA?'<td><span class="no-data">—</span></td>':''}<td><span class="no-data">—</span></td><td><span class="no-data">—</span></td><td><span class="no-data">—</span></td><td><span class="no-data">—</span></td><td><span class="no-data">—</span></td></tr>`;
                }
            });
            const average = subjectCount > 0 ? totalScored / subjectCount : 0;
            const overallGrade = subjectCount > 0 ? getGrade(average) : '-';

            const extraRows = extraActivities.map(act => `<tr><td>${act}</td><td><select onchange="updateExtra('${student.id}','activities','${act.replace(/'/g,"\\'")}',this.value)"><option value="">—</option><option value="A" ${(extras.activities||{})[act]==='A'?'selected':''}>A</option><option value="B" ${(extras.activities||{})[act]==='B'?'selected':''}>B</option><option value="C" ${(extras.activities||{})[act]==='C'?'selected':''}>C</option></select></td></tr>`).join('');
            const traitRows = affectiveTraits.map(trait => `<tr><td>${trait}</td><td><select onchange="updateExtra('${student.id}','traits','${trait.replace(/'/g,"\\'")}',this.value)"><option value="5">5</option><option value="4" selected>4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></td></tr>`).join('');

            document.getElementById('reportCardContainer').innerHTML = `
                <div class="report-card">
                    <div class="rc-header-bg"><h1>${escapeHtml(schoolName)}</h1><div class="motto">"${escapeHtml(motto)}"</div><div class="address">${escapeHtml(address)} | Tel: ${escapeHtml(phone)}</div></div>
                    <div class="rc-title-bar">Student Progress Report Card — ${termName} Term, ${session} Academic Session</div>
                    <div class="rc-info-grid">
                        <div><strong>Name:</strong> ${escapeHtml(student.surname)} ${escapeHtml(student.firstName)}</div><div><strong>Admission No:</strong> ${escapeHtml(student.admissionNo)}</div><div><strong>Class:</strong> ${classId.toUpperCase()}</div>
                        <div><strong>Gender:</strong> ${student.gender}</div><div><strong>No. in Class:</strong> ${allStudents.length}</div><div><strong>Position:</strong> ${subjectCount>0?getOrdinal(rank)+' out of '+allStudents.length:'—'}</div>
                        <div><strong>Term:</strong> ${termName}</div><div><strong>Session:</strong> ${session}</div><div><strong>Next Term:</strong> ${escapeHtml(nextTerm)}</div>
                    </div>
                    <div class="rc-table-wrap">
                        <table class="rc-table">
                            <thead><tr><th rowspan="2" class="sub-col">SUBJECTS</th>${useA?`<th rowspan="2">Assign.<br>(${w.a}%)</th>`:''}<th rowspan="2">Test<br>(${w.t}%)</th><th rowspan="2">Exam<br>(${w.e}%)</th><th rowspan="2">TOTAL<br>(100%)</th><th rowspan="2">GRADE</th><th rowspan="2">REMARK</th></tr></thead>
                            <tbody>${subjectRows}<tr class="total-row"><td class="sub-col"><strong>AGGREGATE</strong></td>${useA?'<td></td>':''}<td colspan="2"></td><td><strong>${subjectCount>0?Math.round(totalScored):'—'}</strong></td><td><strong class="grade-${overallGrade}">${overallGrade}</strong></td><td>${subjectCount>0?getRemark(overallGrade):'—'}</td></tr></tbody>
                        </table>
                    </div>
                    <div class="rc-summary">
                        <div class="rc-summary-box"><h5>📊 Academic Summary</h5><p><strong>Total:</strong> ${subjectCount>0?Math.round(totalScored)+' / '+(subjectCount*100):'—'}</p><p><strong>Term Average:</strong> ${subjectCount>0?average.toFixed(1)+'%':'—'}</p><p><strong>Class Average:</strong> ${classAvg.toFixed(1)}%</p><p><strong>Overall Grade:</strong> <strong>${overallGrade} — ${getRemark(overallGrade)}</strong></p></div>
                        <div class="rc-summary-box"><h5>🎯 Grading System</h5><p>A: 70-100% | B: 60-69% | C: 50-59%</p><p>D: 45-49% | E: 40-44% | F: 0-39%</p><p style="margin-top:4px;"><strong>Teacher's Comment:</strong></p><textarea id="tc_${student.id}" style="width:100%;border:1px solid #ccc;padding:4px;font-family:inherit;font-size:9px;min-height:40px;" onchange="updateComment('${student.id}',this.value)">${escapeHtml(extras.teacherComment||'')}</textarea></div>
                    </div>
                    <div class="rc-extracurricular"><h5>🏅 Extracurricular Activities</h5><table class="rc-extra-table"><thead><tr><th style="width:60%;">Activity</th><th>Rating</th></tr></thead><tbody>${extraRows}</tbody></table></div>
                    <div class="rc-extracurricular" style="margin-top:8px;"><h5>🧠 Affective Traits (5=Excellent)</h5><table class="rc-extra-table"><thead><tr><th style="width:60%;">Trait</th><th>Rating</th></tr></thead><tbody>${traitRows}</tbody></table></div>
                    <div class="rc-attendance">
                        <div class="rc-summary-box"><h5>📅 Attendance</h5><p><strong>School Days:</strong> <input type="number" id="attTotal_${student.id}" value="${att.total}" style="width:55px;border:1px solid #ccc;padding:2px;font-size:9px;" onchange="updateAtt('${student.id}')"></p><p><strong>Days Present:</strong> <input type="number" id="attPresent_${student.id}" value="${att.present}" style="width:55px;border:1px solid #ccc;padding:2px;font-size:9px;" onchange="updateAtt('${student.id}')"></p><p><strong>Days Absent:</strong> <span id="attAbsent_${student.id}">${att.total-att.present}</span></p></div>
                        <div class="rc-summary-box"><h5>💬 Principal's Comment</h5><textarea id="pc_${student.id}" style="width:100%;border:1px solid #ccc;padding:4px;font-family:inherit;font-size:9px;min-height:40px;" onchange="updatePrincipalComment('${student.id}',this.value)">${escapeHtml(extras.principalComment||'')}</textarea></div>
                    </div>
                    <div class="rc-signatures">
                        <div><div class="signature-pad-wrap"><canvas id="sigTeacher_${student.id}" width="180" height="60" style="width:180px;height:60px;"></canvas></div><div class="sig-actions"><button onclick="clearSig('sigTeacher_${student.id}','${student.id}','teacher')">Clear</button></div><div class="rc-sign-line">${escapeHtml(teacherSign)}<br><small>Class Teacher</small></div></div>
                        <div><div class="signature-pad-wrap"><canvas id="sigPrincipal_${student.id}" width="180" height="60" style="width:180px;height:60px;"></canvas></div><div class="sig-actions"><button onclick="clearSig('sigPrincipal_${student.id}','${student.id}','principal')">Clear</button></div><div class="rc-sign-line"><br><small>Principal</small></div></div>
                        <div><div class="rc-sign-line" style="margin-top:90px;"><br><small>Parent/Guardian</small></div></div>
                    </div>
                    <div class="rc-footer"><strong>Next Term Begins:</strong> ${escapeHtml(nextTerm)} | <strong>Resumption:</strong> 8:00 AM | This report card is computer-generated.</div>
                </div>`;
            setTimeout(() => { initSig(`sigTeacher_${student.id}`,student.id,'teacher'); initSig(`sigPrincipal_${student.id}`,student.id,'principal'); },200);
        }

        function initSig(cid,sid,type){const c=document.getElementById(cid);if(!c)return;const ctx=c.getContext('2d');let d=false;if(signatures[sid]?.[type]){const i=new Image();i.onload=()=>ctx.drawImage(i,0,0);i.src=signatures[sid][type];}c.onmousedown=e=>{d=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);};c.onmousemove=e=>{if(!d)return;ctx.lineWidth=2;ctx.strokeStyle='#000';ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();};c.onmouseup=()=>{d=false;saveSig(c,sid,type);};c.onmouseleave=()=>{d=false;saveSig(c,sid,type);};c.ontouchstart=e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();d=true;ctx.beginPath();ctx.moveTo(t.clientX-r.left,t.clientY-r.top);};c.ontouchmove=e=>{e.preventDefault();if(!d)return;const t=e.touches[0],r=c.getBoundingClientRect();ctx.lineWidth=2;ctx.strokeStyle='#000';ctx.lineTo(t.clientX-r.left,t.clientY-r.top);ctx.stroke();};c.ontouchend=()=>{d=false;saveSig(c,sid,type);};}
        function saveSig(c,sid,type){signatures[sid]=signatures[sid]||{};signatures[sid][type]=c.toDataURL();}
        window.clearSig=(cid,sid,type)=>{const c=document.getElementById(cid);if(!c)return;c.getContext('2d').clearRect(0,0,c.width,c.height);signatures[sid]=signatures[sid]||{};signatures[sid][type]=null;};
        window.updateExtra=(sid,cat,n,v)=>{if(!studentExtras[sid])studentExtras[sid]={activities:{},traits:{}};studentExtras[sid][cat][n]=v;};
        window.updateComment=(sid,v)=>{if(!studentExtras[sid])studentExtras[sid]={activities:{},traits:{}};studentExtras[sid].teacherComment=v;};
        window.updatePrincipalComment=(sid,v)=>{if(!studentExtras[sid])studentExtras[sid]={activities:{},traits:{}};studentExtras[sid].principalComment=v;};
        window.updateAtt=sid=>{const t=parseInt(document.getElementById(`attTotal_${sid}`)?.value)||50,p=parseInt(document.getElementById(`attPresent_${sid}`)?.value)||0;const el=document.getElementById(`attAbsent_${sid}`);if(el)el.textContent=t-p;studentExtras[sid].attOverride={total:t,present:p};};

        async function saveReportCards(status) {
            showLoading();
            try {
                const session = document.getElementById('sessionInput').value || '2025/2026', term = document.getElementById('termSelect').value || 'first';
                const schoolName = document.getElementById('schoolNameInput').value || 'Triangle International School', motto = document.getElementById('schoolMotto').value || 'Moulding Future Leaders with Excellence';
                const address = document.getElementById('schoolAddress').value || '', phone = document.getElementById('schoolPhone').value || '';
                const nextTerm = document.getElementById('nextTermInput').value || 'TBA', teacherSign = document.getElementById('teacherSignName').value || '';
                const subjects = Object.keys(config?.subjectConfigs || {}), useA = config?.useAssignments !== false;
                const gw = config?.globalWeights || { a: 10, t: 30, e: 60 };

                const studentResults = allStudents.map(stu => {
                    let sum = 0, cnt = 0;
                    const subResults = subjects.map(sub => {
                        const sc = config?.subjectConfigs?.[sub]?.studentScores?.[stu.id];
                        const assignAvg = sc?.assignAvg ?? 0, testAvg = sc?.testAvg ?? 0, examScore = sc?.examScore ?? 0;
                        const rawTotal = sc ? ((sc.override ?? sc.total) ?? 0) : 0, total = Math.round(rawTotal);
                        if (sc && sc.total > 0) { sum += (sc.override ?? sc.total); cnt++; }
                        return { name: sub, assignAvg, testAvg, examScore, total, grade: sc ? getGrade((sc.override ?? sc.total) ?? 0) : 'F' };
                    });
                    const extras = studentExtras[stu.id] || {}, att = extras.attOverride || { total: attendanceData.totalDays||50, present: attendanceData.presentMap?.[stu.id]||45 };
                    return { studentId: stu.id, studentName: stu.name, admissionNo: stu.admissionNo||'N/A', gender: stu.gender||'N/A', subjects: subResults, totalScore: sum, averageScore: cnt>0?sum/cnt:0, attendance: att, teacherComment: extras.teacherComment||'', principalComment: extras.principalComment||'', activities: extras.activities||{}, traits: extras.traits||{} };
                });

                const cleanSig = {}; Object.keys(signatures).forEach(sid => { if(signatures[sid]?.teacher||signatures[sid]?.principal) cleanSig[sid]=signatures[sid]; });

                const data = {};
                data.teacherId = currentUser.uid || ''; data.teacherName = teacherSign; data.classId = classId || ''; data.className = (classId||'').toUpperCase();
                data.session = session; data.term = term; data.schoolName = schoolName; data.motto = motto; data.address = address; data.phone = phone; data.nextTerm = nextTerm;
                data.useAssignments = useA; data.globalWeights = { a: gw.a ?? 10, t: gw.t ?? 30, e: gw.e ?? 60 }; data.subjects = subjects;
                data.studentResults = studentResults; data.totalStudents = allStudents.length;
                data.studentExtras = allStudents.map(s => ({ studentId: s.id, ...(studentExtras[s.id]||{activities:{},traits:{}}) }));
                data.signatures = cleanSig; data.extraActivities = extraActivities; data.affectiveTraits = affectiveTraits;
                data.attendanceTotalDays = attendanceData.totalDays || 50; data.status = status;
                data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                if (status === 'pending_approval') data.submittedForApprovalAt = firebase.firestore.FieldValue.serverTimestamp();

                debug(`SAVING: weights=${JSON.stringify(data.globalWeights)}, subjects=${subjects.length}, students=${allStudents.length}`);

                const existingSnap = await db.collection('reportCards').where('teacherId','==',currentUser.uid).where('classId','==',classId).where('session','==',session).where('term','==',term).limit(1).get();
                let docId;
                if (!existingSnap.empty) { docId=existingSnap.docs[0].id; await db.collection('reportCards').doc(docId).update(data); }
                else { const ref = await db.collection('reportCards').add(data); docId=ref.id; }
                await db.collection('auditLogs').add({ userId:currentUser.uid, userName:teacherSign, action:status==='pending_approval'?'REPORT_CARD_SUBMITTED':'REPORT_CARD_SAVED', timestamp:firebase.firestore.FieldValue.serverTimestamp(), details:{reportCardId:docId,classId,session,term,studentCount:allStudents.length} }).catch(()=>{});
                debug('Save complete!', 'success');
                alert(`Report cards ${status==='pending_approval'?'submitted for approval!':'saved!'}`);
            } catch(e) { debug('SAVE ERROR: '+e.message,'error'); console.error(e); alert('Error: '+e.message); }
            finally { hideLoading(); }
        }

        document.getElementById('loadDataBtn').addEventListener('click', loadData);
        document.getElementById('prevBtn').addEventListener('click',()=>{if(currentIdx>0)selectStudent(currentIdx-1);});
        document.getElementById('nextBtn').addEventListener('click',()=>{if(currentIdx<allStudents.length-1)selectStudent(currentIdx+1);});
        document.getElementById('saveBtn').addEventListener('click',()=>saveReportCards('draft'));
        document.getElementById('submitBtn').addEventListener('click',()=>{if(confirm('Submit for admin approval?'))saveReportCards('pending_approval');});
        document.getElementById('printBtn').addEventListener('click',()=>window.print());

        auth.onAuthStateChanged(async user => {
            if(!user){window.location.href='teacher-login.html';return;}
            try{const doc=await db.collection('users').doc(user.uid).get();if(!doc.exists||doc.data().role!=='teacher'){auth.signOut();window.location.href='index.html';return;}currentUser=user;userData=doc.data();document.getElementById('profilePic').textContent=(userData.firstName?.[0]||'T')+(userData.surname?.[0]||'E');document.getElementById('profileName').textContent=userData.firstName||'Teacher';}catch(e){console.error(e);}
        });
        document.getElementById('logoutBtn').addEventListener('click',()=>auth.signOut().then(()=>window.location.href='index.html'));
    </script>
</body>
</html>

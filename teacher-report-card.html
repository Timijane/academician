<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Scoring Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #1e3c72; --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --gradient-start: #1e3c72; --gradient-end: #2a5298;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #3b82f6; --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
            --input-bg: rgba(30,41,59,0.8);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; animation: float 25s infinite alternate; }
        .orb-1 { top: -150px; right: -150px; background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.12), transparent 70%); }
        .orb-2 { bottom: -200px; left: -150px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.10), transparent 70%); width: 500px; height: 500px; animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.15); } }

        .top-nav { position: sticky; top: 0; z-index: 100; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 0.8rem; }
        .nav-btn { background: transparent; border: 1px solid var(--border); border-radius: 2rem; padding: 0.45rem 1rem; color: var(--text-primary); font-weight: 500; font-size: 0.82rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
        .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 3rem; padding: 0.25rem 0.25rem 0.25rem 0.7rem; }
        .profile-name { font-weight: 600; font-size: 0.8rem; }
        .profile-pic { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; }
        .dropdown-menu { position: absolute; right: 0; top: 48px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 0.8rem; color: var(--text-primary); border-radius: 0.6rem; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .main-container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 5; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 1rem; font-weight: 600; }

        .weight-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 0.75rem; }
        .weight-card { background: var(--hover-bg); border: 2px solid var(--border); border-radius: 1rem; padding: 0.75rem; text-align: center; }
        .weight-card.assign { border-color: #3b82f6; }
        .weight-card.test { border-color: #8b5cf6; }
        .weight-card.exam { border-color: #ec4899; }
        .weight-card h4 { font-size: 0.75rem; margin-bottom: 0.4rem; text-transform: uppercase; }
        .weight-card input { width: 65px; padding: 0.4rem; border-radius: 0.5rem; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary); text-align: center; font-size: 1.1rem; font-weight: 700; }
        .weight-total { text-align: center; padding: 0.5rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.85rem; }
        .weight-total.ok { background: var(--success-bg); color: var(--success-text); }
        .weight-total.err { background: rgba(239,68,68,0.2); color: #f87171; }

        .subject-tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .subject-tab { padding: 0.4rem 0.9rem; border-radius: 2rem; font-size: 0.78rem; cursor: pointer; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); transition: 0.2s; }
        .subject-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .subject-tab.has-data { border-color: var(--success-text); }
        .subject-tab.no-data { opacity: 0.5; }

        .selection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.75rem; }
        .selection-card { background: var(--hover-bg); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.6rem 0.75rem; cursor: pointer; transition: 0.2s; display: flex; gap: 0.5rem; align-items: center; }
        .selection-card:hover { border-color: var(--accent); }
        .selection-card.selected { border-color: var(--accent); background: var(--info-bg); }
        .selection-card input { accent-color: var(--accent); width: 0.9rem; height: 0.9rem; cursor: pointer; }
        .selection-card .info { flex: 1; font-size: 0.78rem; }
        .selection-card .info strong { font-size: 0.82rem; }

        .scores-table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; margin-top: 0.75rem; }
        .table-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 0.6rem 0.5rem; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border); background: var(--hover-bg); font-size: 0.7rem; white-space: nowrap; }
        td { padding: 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.76rem; }
        tr:hover td { background: var(--hover-bg); }
        .grade-A { color: #22c55e; font-weight: 700; }
        .grade-B { color: #3b82f6; font-weight: 700; }
        .grade-C { color: #f59e0b; font-weight: 700; }
        .grade-D { color: #f97316; font-weight: 700; }
        .grade-E { color: #ef4444; font-weight: 700; }
        .grade-F { color: #dc2626; font-weight: 700; }
        .editable-cell { background: var(--input-bg); border: 1px dashed var(--border); padding: 0.3rem; border-radius: 0.3rem; cursor: text; min-width: 40px; text-align: center; }
        .editable-cell:focus { outline: none; border-color: var(--accent); }

        .btn { padding: 0.45rem 0.9rem; border: none; border-radius: 2rem; font-weight: 500; font-size: 0.78rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.35rem; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.7rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .loading-overlay.active { display: flex; }
        .loading-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; text-align: center; }

        @media (max-width: 768px) { .main-container { padding: 0.75rem; } }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div class="top-nav">
        <div class="nav-left">
            <a href="teacher-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a href="teacher-report-card.html" class="nav-btn"><i class="fas fa-graduation-cap"></i> Report Cards</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span></div>
            <div class="profile-dropdown">
                <div class="profile-trigger"><span class="profile-name" id="profileName">Teacher</span><div class="profile-pic" id="profilePic">T</div></div>
                <div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- WEIGHTS -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-sliders-h"></i> Scoring Configuration</h3>
                <div style="display:flex;gap:0.5rem;">
                    <span style="font-size:0.7rem;color:var(--text-secondary);">Use assignments?</span>
                    <select id="useAssignments" onchange="toggleAssignments()" style="padding:0.3rem 0.5rem;border-radius:0.5rem;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);font-size:0.75rem;">
                        <option value="yes" selected>Yes (10 marks)</option>
                        <option value="no">No (Tests = 40 marks)</option>
                    </select>
                </div>
            </div>
            <div class="weight-config">
                <div class="weight-card assign" id="assignCard">
                    <h4>📝 Assignments</h4>
                    <input type="number" id="weightAssign" value="10" min="0" max="100" onchange="validateWeights()"> marks
                    <div style="margin-top:0.3rem;"><select id="assignCountSelect" style="padding:0.2rem;border-radius:0.4rem;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);font-size:0.7rem;"><option value="1">Use 1</option><option value="2" selected>Use 2</option><option value="3">Use 3</option></select></div>
                </div>
                <div class="weight-card test">
                    <h4>📋 Tests</h4>
                    <input type="number" id="weightTest" value="30" min="0" max="100" onchange="validateWeights()"> marks
                    <div style="margin-top:0.3rem;"><select id="testCountSelect" style="padding:0.2rem;border-radius:0.4rem;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);font-size:0.7rem;"><option value="1">Use 1</option><option value="2" selected>Use 2</option></select></div>
                </div>
                <div class="weight-card exam">
                    <h4>📝 Exam</h4>
                    <input type="number" id="weightExam" value="60" min="0" max="100" onchange="validateWeights()"> marks
                </div>
            </div>
            <div class="weight-total ok" id="weightMsg">Total: 100 marks ✓</div>
        </div>

        <!-- SUBJECT TABS -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-book"></i> Configure Per Subject</h3>
                <button class="btn btn-primary btn-sm" id="saveAllBtn"><i class="fas fa-save"></i> Save All Scores</button>
            </div>
            <div class="subject-tabs" id="subjectTabs"></div>
            <div id="subjectContent"><p style="color:var(--text-secondary);padding:1rem;font-size:0.85rem;">Select a subject above to configure assignments, tests, and exam scores.</p></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content"><i class="fas fa-spinner fa-spin fa-2x"></i><h3 style="margin-top:0.75rem;">Loading data...</h3></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        (() => {
            const s = localStorage.getItem('edutopscholars-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', s);
            const sp = document.getElementById('themeToggle').querySelector('span');
            sp.textContent = s === 'dark' ? 'Light' : 'Dark';
            document.getElementById('themeToggle').addEventListener('click', () => {
                const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', n);
                localStorage.setItem('edutopscholars-theme', n);
                sp.textContent = n === 'dark' ? 'Light' : 'Dark';
            });
        })();

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getGrade(s) { if (s >= 70) return 'A'; if (s >= 60) return 'B'; if (s >= 50) return 'C'; if (s >= 45) return 'D'; if (s >= 40) return 'E'; return 'F'; }

        let currentUser = null, userData = null, classId = '';
        let subjects = [], currentSubject = null;
        let allStudents = [], allAssignments = [], allTests = [], allExams = [];
        let allSubmissions = [], allTestSubs = [], allExamSubs = [];

        // PER-SUBJECT config: { subject: { selectedAssignIds:Set, selectedTestIds:Set, selectedExamId:null, weights:{a,t,e}, counts:{a,t}, studentScores:{studentId:{assignAvg,testAvg,examScore,total,grade}} } }
        let subjectConfigs = {};

        function validateWeights() {
            const useA = document.getElementById('useAssignments').value === 'yes';
            const a = useA ? (parseInt(document.getElementById('weightAssign').value)||0) : 0;
            const t = parseInt(document.getElementById('weightTest').value)||0;
            const e = parseInt(document.getElementById('weightExam').value)||0;
            const total = a + t + e;
            const el = document.getElementById('weightMsg');
            if (total === 100) { el.className = 'weight-total ok'; el.textContent = `Total: ${total} marks ✓`; }
            else { el.className = 'weight-total err'; el.textContent = `Total: ${total} (must be 100)`; }
            return total === 100;
        }

        window.toggleAssignments = () => {
            const useA = document.getElementById('useAssignments').value === 'yes';
            document.getElementById('assignCard').style.opacity = useA ? '1' : '0.4';
            document.getElementById('assignCard').style.pointerEvents = useA ? 'auto' : 'none';
            if (!useA) { document.getElementById('weightAssign').value = 0; document.getElementById('weightTest').value = 40; }
            else { document.getElementById('weightAssign').value = 10; document.getElementById('weightTest').value = 30; }
            document.getElementById('weightExam').value = 60;
            validateWeights();
        };

        // ===== INIT =====
        async function init() {
            showLoading();
            try {
                classId = userData.classTeaching || 'jss2';
                subjects = userData.subjects || [];

                // Students
                const stuSnap = await db.collection('users').where('role','==','student').where('class','==',classId).where('approved','==',true).get();
                allStudents = []; stuSnap.forEach(d => { const dd = d.data(); allStudents.push({ id: d.id, name: `${dd.surname||''} ${dd.firstName||''}`.trim() }); });
                allStudents.sort((a,b) => a.name.localeCompare(b.name));

                // Published assessments
                const [aSnap, tSnap, eSnap] = await Promise.all([
                    db.collection('assignments').where('classId','==',classId).where('status','==','published').get(),
                    db.collection('tests').where('classId','==',classId).where('status','==','published').get(),
                    db.collection('exams').where('classId','==',classId).where('status','==','published').get()
                ]);
                allAssignments = []; aSnap.forEach(d => { const dd = d.data(); allAssignments.push({ id: d.id, title: dd.title, subject: dd.subject, totalPoints: dd.totalPoints || 10 }); });
                allTests = []; tSnap.forEach(d => { const dd = d.data(); allTests.push({ id: d.id, title: dd.title, subject: dd.subject, totalPoints: dd.totalPoints || 30 }); });
                allExams = []; eSnap.forEach(d => { const dd = d.data(); allExams.push({ id: d.id, title: dd.title, subject: dd.subject, totalPoints: dd.totalPoints || 60 }); });

                // Submissions
                const [sSnap, tsSnap, esSnap] = await Promise.all([
                    db.collection('submissions').where('classId','==',classId).get(),
                    db.collection('testSubmissions').where('classId','==',classId).get(),
                    db.collection('examSubmissions').where('classId','==',classId).get()
                ]);
                allSubmissions = []; sSnap.forEach(d => { const dd = d.data(); allSubmissions.push({ assignmentId: dd.assignmentId, studentId: dd.studentId, score: dd.score || 0 }); });
                allTestSubs = []; tsSnap.forEach(d => { const dd = d.data(); allTestSubs.push({ testId: dd.testId, studentId: dd.studentId, score: dd.score || 0 }); });
                allExamSubs = []; esSnap.forEach(d => { const dd = d.data(); allExamSubs.push({ examId: dd.examId, studentId: dd.studentId, score: dd.score || 0 }); });

                // Init subject configs
                subjects.forEach(sub => {
                    const subjAssigns = allAssignments.filter(a => a.subject === sub);
                    const subjTests = allTests.filter(t => t.subject === sub);
                    const subjExams = allExams.filter(e => e.subject === sub);
                    subjectConfigs[sub] = {
                        selectedAssignIds: new Set(subjAssigns.slice(0, 2).map(a => a.id)),
                        selectedTestIds: new Set(subjTests.slice(0, 2).map(t => t.id)),
                        selectedExamId: subjExams.length ? subjExams[0].id : null,
                        weights: { a: 10, t: 30, e: 60 },
                        counts: { a: 2, t: 2 },
                        studentScores: {}
                    };
                    computeSubjectScores(sub);
                });

                // Load saved config
                try {
                    const doc = await db.collection('reportCardConfig').doc(`${currentUser.uid}_${classId}`).get();
                    if (doc.exists) {
                        const saved = doc.data();
                        if (saved.subjectConfigs) {
                            Object.keys(saved.subjectConfigs).forEach(sub => {
                                if (subjectConfigs[sub]) {
                                    const sc = saved.subjectConfigs[sub];
                                    subjectConfigs[sub].weights = sc.weights || { a: 10, t: 30, e: 60 };
                                    subjectConfigs[sub].counts = sc.counts || { a: 2, t: 2 };
                                    if (sc.selectedAssignIds) subjectConfigs[sub].selectedAssignIds = new Set(sc.selectedAssignIds);
                                    if (sc.selectedTestIds) subjectConfigs[sub].selectedTestIds = new Set(sc.selectedTestIds);
                                    if (sc.selectedExamId) subjectConfigs[sub].selectedExamId = sc.selectedExamId;
                                    subjectConfigs[sub].studentScores = sc.studentScores || {};
                                }
                            });
                        }
                        if (saved.globalWeights) {
                            document.getElementById('weightAssign').value = saved.globalWeights.a || 10;
                            document.getElementById('weightTest').value = saved.globalWeights.t || 30;
                            document.getElementById('weightExam').value = saved.globalWeights.e || 60;
                            document.getElementById('assignCountSelect').value = saved.globalCounts?.a || 2;
                            document.getElementById('testCountSelect').value = saved.globalCounts?.t || 2;
                            document.getElementById('useAssignments').value = (saved.globalWeights.a === 0) ? 'no' : 'yes';
                            toggleAssignments();
                        }
                    }
                } catch(e) { console.warn('Config load:', e); }

                validateWeights();
                renderSubjectTabs();
                if (subjects.length) selectSubject(subjects[0]);
            } catch(e) { console.error(e); alert('Error: ' + e.message); }
            finally { hideLoading(); }
        }

        function renderSubjectTabs() {
            const el = document.getElementById('subjectTabs');
            el.innerHTML = subjects.map(sub => {
                const hasAssigns = allAssignments.some(a => a.subject === sub);
                const hasTests = allTests.some(t => t.subject === sub);
                const hasExams = allExams.some(e => e.subject === sub);
                const hasData = hasAssigns || hasTests || hasExams;
                return `<span class="subject-tab${sub === currentSubject ? ' active' : ''} ${hasData ? 'has-data' : 'no-data'}" onclick="selectSubject('${sub.replace(/'/g,"\\'")}')">${sub} ${hasData?'':'⚠️'}</span>`;
            }).join('');
        }

        window.selectSubject = sub => {
            currentSubject = sub;
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.subject-tab').forEach(t => { if (t.textContent.includes(sub)) t.classList.add('active'); });
            renderSubjectContent(sub);
        };

        function renderSubjectContent(sub) {
            const cfg = subjectConfigs[sub] || { selectedAssignIds: new Set(), selectedTestIds: new Set(), selectedExamId: null };
            const subjAssigns = allAssignments.filter(a => a.subject === sub);
            const subjTests = allTests.filter(t => t.subject === sub);
            const subjExams = allExams.filter(e => e.subject === sub);
            const maxA = parseInt(document.getElementById('assignCountSelect').value) || 2;
            const maxT = parseInt(document.getElementById('testCountSelect').value) || 2;
            const useA = document.getElementById('useAssignments').value === 'yes';

            let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0.75rem;margin-bottom:0.75rem;">';

            if (useA) {
                html += '<div><h5 style="font-size:0.8rem;margin-bottom:0.4rem;">📝 Assignments (select ' + maxA + ')</h5>';
                if (!subjAssigns.length) html += '<p style="color:var(--text-secondary);font-size:0.75rem;">No assignments published for ' + sub + '.</p>';
                else subjAssigns.forEach(a => {
                    const sel = cfg.selectedAssignIds.has(a.id);
                    html += `<div class="selection-card${sel?' selected':''}" onclick="toggleItem('${sub}','assign','${a.id}',${maxA})"><input type="checkbox" ${sel?'checked':''}> <div class="info"><strong>${escapeHtml(a.title)}</strong><br>${a.totalPoints} pts</div></div>`;
                });
                html += '</div>';
            }

            html += '<div><h5 style="font-size:0.8rem;margin-bottom:0.4rem;">📋 Tests (select ' + maxT + ')</h5>';
            if (!subjTests.length) html += '<p style="color:var(--text-secondary);font-size:0.75rem;">No tests published for ' + sub + '.</p>';
            else subjTests.forEach(t => {
                const sel = cfg.selectedTestIds.has(t.id);
                html += `<div class="selection-card${sel?' selected':''}" onclick="toggleItem('${sub}','test','${t.id}',${maxT})"><input type="checkbox" ${sel?'checked':''}> <div class="info"><strong>${escapeHtml(t.title)}</strong><br>${t.totalPoints} pts</div></div>`;
            });
            html += '</div>';

            html += '<div><h5 style="font-size:0.8rem;margin-bottom:0.4rem;">📝 Exam</h5>';
            if (!subjExams.length) html += '<p style="color:var(--text-secondary);font-size:0.75rem;">No exam published for ' + sub + '.</p>';
            else subjExams.forEach(e => {
                const sel = cfg.selectedExamId === e.id;
                html += `<div class="selection-card${sel?' selected':''}" onclick="selectExam('${sub}','${e.id}')"><input type="radio" name="exam_${sub}" ${sel?'checked':''}> <div class="info"><strong>${escapeHtml(e.title)}</strong><br>${e.totalPoints} pts</div></div>`;
            });
            html += '</div></div>';

            // Scores table
            computeSubjectScores(sub);
            const scores = cfg.studentScores || {};
            html += `<div class="scores-table-wrap"><div class="table-scroll"><table>
                <thead><tr><th>#</th><th>Student</th>${useA?'<th>Assign (' + cfg.weights.a + ')</th>':''}<th>Test (' + cfg.weights.t + ')</th><th>Exam (' + cfg.weights.e + ')</th><th>Total</th><th>Grade</th><th>Override</th></tr></thead>
                <tbody>`;

            const sorted = [...allStudents].sort((a,b) => (scores[b.id]?.total||0) - (scores[a.id]?.total||0));
            sorted.forEach((stu, i) => {
                const sc = scores[stu.id] || { assignAvg: 0, testAvg: 0, examScore: 0, total: 0, grade: 'F', override: null };
                const g = sc.override ? getGrade(sc.override) : sc.grade;
                const total = sc.override !== null ? sc.override : sc.total;
                html += `<tr>
                    <td>${i+1}</td><td>${escapeHtml(stu.name)}</td>
                    ${useA ? `<td>${sc.assignAvg > 0 ? sc.assignAvg.toFixed(1) : '-'}</td>` : ''}
                    <td>${sc.testAvg > 0 ? sc.testAvg.toFixed(1) : '-'}</td>
                    <td>${sc.examScore > 0 ? sc.examScore.toFixed(1) : '-'}</td>
                    <td><strong>${Math.round(total)}</strong></td>
                    <td><strong class="grade-${g}">${g}</strong></td>
                    <td><span class="editable-cell" contenteditable="true" onblur="overrideScore('${sub}','${stu.id}',this.textContent)">${sc.override !== null ? sc.override : ''}</span></td>
                </tr>`;
            });
            html += '</tbody></table></div></div>';

            document.getElementById('subjectContent').innerHTML = html;
        }

        window.toggleItem = (sub, type, id, max) => {
            const cfg = subjectConfigs[sub];
            const set = type === 'assign' ? cfg.selectedAssignIds : cfg.selectedTestIds;
            if (set.has(id)) { set.delete(id); }
            else if (set.size < max) { set.add(id); }
            else { alert(`Maximum ${max} ${type}s allowed.`); return; }
            computeSubjectScores(sub);
            renderSubjectContent(sub);
        };

        window.selectExam = (sub, id) => {
            subjectConfigs[sub].selectedExamId = id;
            computeSubjectScores(sub);
            renderSubjectContent(sub);
        };

        function computeSubjectScores(sub) {
            const cfg = subjectConfigs[sub];
            if (!cfg) return;
            const useA = document.getElementById('useAssignments').value === 'yes';
            const wA = useA ? (parseInt(document.getElementById('weightAssign').value) || 10) : 0;
            const wT = parseInt(document.getElementById('weightTest').value) || 30;
            const wE = parseInt(document.getElementById('weightExam').value) || 60;

            cfg.weights = { a: wA, t: wT, e: wE };
            cfg.studentScores = {};

            allStudents.forEach(stu => {
                let assignAvg = 0, testAvg = 0, examScore = 0;

                if (useA && cfg.selectedAssignIds.size > 0) {
                    let sum = 0, cnt = 0;
                    cfg.selectedAssignIds.forEach(aid => {
                        const sub = allSubmissions.find(s => s.assignmentId === aid && s.studentId === stu.id);
                        const a = allAssignments.find(x => x.id === aid);
                        if (sub && a && a.totalPoints > 0) { sum += (sub.score / a.totalPoints) * wA; cnt++; }
                    });
                    assignAvg = cnt > 0 ? sum / cnt : 0;
                }

                if (cfg.selectedTestIds.size > 0) {
                    let sum = 0, cnt = 0;
                    cfg.selectedTestIds.forEach(tid => {
                        const sub = allTestSubs.find(s => s.testId === tid && s.studentId === stu.id);
                        const t = allTests.find(x => x.id === tid);
                        if (sub && t && t.totalPoints > 0) { sum += (sub.score / t.totalPoints) * wT; cnt++; }
                    });
                    testAvg = cnt > 0 ? sum / cnt : 0;
                }

                if (cfg.selectedExamId) {
                    const sub = allExamSubs.find(s => s.examId === cfg.selectedExamId && s.studentId === stu.id);
                    const e = allExams.find(x => x.id === cfg.selectedExamId);
                    if (sub && e && e.totalPoints > 0) examScore = (sub.score / e.totalPoints) * wE;
                }

                const total = assignAvg + testAvg + examScore;
                cfg.studentScores[stu.id] = {
                    assignAvg: Math.round(assignAvg * 10) / 10,
                    testAvg: Math.round(testAvg * 10) / 10,
                    examScore: Math.round(examScore * 10) / 10,
                    total: Math.round(total * 10) / 10,
                    grade: getGrade(total),
                    override: null
                };
            });
        }

        window.overrideScore = (sub, stuId, val) => {
            const num = parseFloat(val);
            const cfg = subjectConfigs[sub];
            if (!cfg || !cfg.studentScores[stuId]) return;
            if (isNaN(num) || val.trim() === '') {
                cfg.studentScores[stuId].override = null;
            } else {
                cfg.studentScores[stuId].override = Math.min(100, Math.max(0, num));
            }
        };

        // ===== SAVE =====
        async function saveAll() {
            if (!validateWeights()) { alert('Weights must total 100.'); return; }
            showLoading();
            try {
                const useA = document.getElementById('useAssignments').value === 'yes';
                const data = {
                    teacherId: currentUser.uid,
                    classId,
                    globalWeights: {
                        a: useA ? (parseInt(document.getElementById('weightAssign').value)||10) : 0,
                        t: parseInt(document.getElementById('weightTest').value)||30,
                        e: parseInt(document.getElementById('weightExam').value)||60
                    },
                    globalCounts: {
                        a: parseInt(document.getElementById('assignCountSelect').value)||2,
                        t: parseInt(document.getElementById('testCountSelect').value)||2
                    },
                    useAssignments: useA,
                    subjectConfigs: {},
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Save per-subject configs
                Object.keys(subjectConfigs).forEach(sub => {
                    const cfg = subjectConfigs[sub];
                    data.subjectConfigs[sub] = {
                        selectedAssignIds: [...cfg.selectedAssignIds],
                        selectedTestIds: [...cfg.selectedTestIds],
                        selectedExamId: cfg.selectedExamId,
                        weights: cfg.weights,
                        counts: cfg.counts,
                        studentScores: cfg.studentScores
                    };
                });

                await db.collection('reportCardConfig').doc(`${currentUser.uid}_${classId}`).set(data, { merge: true });
                await db.collection('auditLogs').add({
                    userId: currentUser.uid,
                    userName: `${userData.firstName||''} ${userData.surname||''}`.trim(),
                    action: 'SCORES_SAVED',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { classId, subjects, studentCount: allStudents.length }
                }).catch(() => {});
                alert('All scores saved! Go to Report Cards to generate.');
            } catch(e) { alert('Error: ' + e.message); }
            finally { hideLoading(); }
        }

        document.getElementById('saveAllBtn').addEventListener('click', saveAll);
        document.getElementById('weightAssign').addEventListener('change', () => { validateWeights(); if (currentSubject) { computeSubjectScores(currentSubject); renderSubjectContent(currentSubject); } });
        document.getElementById('weightTest').addEventListener('change', () => { validateWeights(); if (currentSubject) { computeSubjectScores(currentSubject); renderSubjectContent(currentSubject); } });
        document.getElementById('weightExam').addEventListener('change', () => { validateWeights(); if (currentSubject) { computeSubjectScores(currentSubject); renderSubjectContent(currentSubject); } });

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || doc.data().role !== 'teacher') { auth.signOut(); window.location.href = 'index.html'; return; }
                currentUser = user; userData = doc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0]||'T')+(userData.surname?.[0]||'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';
                await init();
            } catch(e) { console.error(e); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>

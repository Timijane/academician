<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Teacher Teach</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --bg-sidebar: rgba(255,255,255,0.75);
            --glass-border: rgba(255,255,255,0.3);
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --bg-sidebar: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .sidebar.collapsed { width: 90px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
        .sidebar .logo-area i { font-size: 2.4rem; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .logo-area h2 { font-size: 1.3rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; white-space: nowrap; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 1.2rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.4rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(5px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 8px 20px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.3rem; width: 1.8rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            z-index: 5;
        }
        .main-content.expanded { margin-left: 90px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .page-title h1 { font-size: 2.4rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.2rem; }
        .page-title p { color: var(--text-secondary); font-weight: 400; }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle { background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer; color: var(--text-secondary); font-weight: 500; transition: 0.2s; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-trigger { display: flex; align-items: center; gap: 0.8rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.4rem 0.4rem 0.4rem 1rem; }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.1rem; box-shadow: 0 5px 15px var(--accent); background-size: cover; background-position: center; }
        .dropdown-menu { position: absolute; right: 0; top: 60px; background: var(--bg-sidebar); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.5rem; min-width: 180px; display: none; z-index: 1000; box-shadow: var(--shadow); }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.8rem 1.2rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem; transition: 0.2s; }

        /* Tabs */
        .subject-tabs, .week-tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 3rem; padding: 0.3rem; width: fit-content; flex-wrap: wrap;
        }
        .tab {
            padding: 0.7rem 2rem; border-radius: 3rem; font-weight: 500; cursor: pointer; transition: 0.2s; color: var(--text-secondary); white-space: nowrap;
        }
        .tab.active { background: var(--accent); color: white; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 2rem; padding: 1.8rem; box-shadow: var(--shadow); margin-bottom: 2rem;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .card-header h3 { font-size: 1.3rem; font-weight: 600; }

        .resource-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1rem;
        }
        .resource-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow);
        }
        .resource-card h4 { margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .resource-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .resource-card .badge {
            display: inline-block; padding: 0.2rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 500; margin-top: 0.5rem;
        }
        .badge.published { background: var(--success-bg); color: var(--success-text); }

        .btn {
            padding: 0.6rem 1.5rem; border: none; border-radius: 2rem; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.3rem 1rem; font-size: 0.9rem; }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index:2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border:1px solid var(--border); border-radius:2rem; padding:2rem; max-width:500px; width:90%;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom:1.5rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; margin-bottom:0.3rem; color:var(--text-secondary); }
        .form-control {
            width:100%; padding:0.6rem 1rem; background:var(--input-bg); border:1px solid var(--border); border-radius:1rem; color:var(--text-primary);
        }
        .modal-actions { display: flex; gap:1rem; justify-content: flex-end; margin-top:1rem; }

        .error-message {
            background: var(--danger-bg); color: var(--danger-text); padding:1rem; border-radius:1rem; margin-bottom:1rem; border-left:4px solid var(--danger-text);
        }
        .empty-state {
            text-align: center; padding: 2rem; color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .sidebar { width: 90px; }
            .sidebar .logo-area h2 { display: none; }
            .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 90px; }
            .subject-tabs { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-area"><i class="fas fa-chalkboard"></i><h2>Teacher Panel</h2></div>
        <a href="teacher-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="teacher-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>

        <a href="teacher-cbt.html" class="nav-item"><i class="fas fa-laptop"></i><span>Test & Exam</span></a>
        <a href="teacher-my-class.html" class="nav-item"><i class="fas fa-users"></i><span>My Class</span></a>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Teach</h1>
                <p>Access your lesson materials and launch virtual classes</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
                <div class="profile-dropdown">
                    <div class="profile-trigger">
                        <span class="profile-name" id="profileName">Teacher</span>

                    <div class="dropdown-menu">

        <div class="week-tabs" id="weekTabs"></div>

        <!-- Main Content Card -->
        <div class="card">
            <div class="card-header">
                <h3>Teaching Resources for <span id="currentSubjectDisplay"></span> – Week <span id="currentWeekDisplay"></span></h3>
                <div>
                    <button class="btn btn-outline btn-sm" id="viewStudentViewBtn"><i class="fas fa-external-link-alt"></i> Student View</button>
                    <button class="btn btn-primary btn-sm" id="startVirtualClassBtn"><i class="fas fa-video"></i> Start Virtual Class</button>
                </div>

    <!-- Virtual Class Modal -->
    <div class="modal" id="virtualClassModal">

                <i class="fas fa-times" style="cursor:pointer;" onclick="closeVirtualModal()"></i>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Global variables
        let currentUser = null;
        let userData = null;
        let subjects = [];
        let currentSubject = null;
        let weeks = []; // array of week numbers from approved syllabus or lesson notes
        let currentWeek = null;
        let lessonNotesMap = {}; // key: week -> lessonNote document

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                currentUser = user;
                userData = userDoc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';

                subjects = userData.subjects || [];
                renderSubjectTabs();

                // If subject specified in URL, pre-select it
                const urlParams = new URLSearchParams(window.location.search);
                const subj = urlParams.get('subject');
                const wk = urlParams.get('week');
                if (subj && subjects.includes(subj)) {
                    switchSubject(subj);
                    if (wk) setTimeout(() => selectWeek(parseInt(wk)), 500);
                } else if (subjects.length > 0) {
                    switchSubject(subjects[0]);
                }
            } catch (error) { console.error(error); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        // Render subject tabs
        function renderSubjectTabs() {
            const container = document.getElementById('subjectTabs');
            container.innerHTML = '';
            subjects.forEach(sub => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = sub;
                tab.onclick = () => switchSubject(sub);
                container.appendChild(tab);
            });
            if (subjects.length > 0) container.children[0].classList.add('active');
        }

        // Switch subject: fetch approved lesson notes
        async function switchSubject(subject) {
            document.querySelectorAll('#subjectTabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            currentSubject = subject;
            document.getElementById('currentSubjectDisplay').textContent = subject;

            // Fetch approved lesson notes for this subject
            try {
                const snapshot = await db.collection('lessonNotes')
                    .where('teacherId', '==', currentUser.uid)
                    .where('subject', '==', subject)
                    .where('status', '==', 'approved')
                    .orderBy('week', 'asc')
                    .get();
                weeks = [];
                lessonNotesMap = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    weeks.push(data.week);
                    lessonNotesMap[data.week] = { id: doc.id, ...data };
                });
                renderWeekTabs();
                if (weeks.length > 0) selectWeek(weeks[0]);
                else {
                    document.getElementById('weekTabs').innerHTML = '';
                    document.getElementById('resourcesContainer').innerHTML = '<div class="empty-state">No approved lesson notes for this subject.</div>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('resourcesContainer').innerHTML = '<div class="error-message">Error loading lesson notes.</div>';
            }
        }

        function renderWeekTabs() {
            const container = document.getElementById('weekTabs');
            container.innerHTML = '';
            weeks.forEach(week => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = `Week ${week}`;
                tab.onclick = () => selectWeek(week);
                container.appendChild(tab);
            });
        }

        function selectWeek(week) {
            document.querySelectorAll('#weekTabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            currentWeek = week;
            document.getElementById('currentWeekDisplay').textContent = week;
            renderResources(lessonNotesMap[week]);
        }

        function renderResources(note) {
            const container = document.getElementById('resourcesContainer');
            if (!note) {
                container.innerHTML = '<div class="empty-state">No resources for this week.</div>';
                return;
            }

            let youtubeHtml = '';
            if (note.youtubeLinks && note.youtubeLinks.length) {
                youtubeHtml = note.youtubeLinks.map(link => `<li><a href="${link}" target="_blank" class="youtube-link">${link}</a></li>`).join('');
            } else {
                youtubeHtml = '<li>No links</li>';
            }

            container.innerHTML = `
                <div class="resource-grid">
                    <div class="resource-card">
                        <h4><i class="fas fa-book"></i> Lesson Note</h4>
                        <p>${note.lessonNote ? note.lessonNote : 'Not available.'}</p>
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-chalkboard-teacher"></i> Teaching Process</h4>
                        <p>${note.teachingProcess ? note.teachingProcess : 'Not available.'}</p>
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-users"></i> Student Resource</h4>
                        <p>${note.studentResource ? note.studentResource : 'Not available.'}</p>
                        ${note.studentResourcePublished ? '<span class="badge published">Published</span>' : ''}
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-pen-fancy"></i> Handwritten Notes</h4>
                        <p>${note.handwrittenNotes ? note.handwrittenNotes : 'Not available.'}</p>
                        ${note.handwrittenPublished ? '<span class="badge published">Published</span>' : ''}
                    </div>
                    <div class="resource-card">
                        <h4><i class="fab fa-youtube"></i> YouTube Links</h4>
                        <ul>${youtubeHtml}</ul>
                    </div>
                </div>
            `;

            // Log that teacher viewed materials (optional)
            logAudit('view_teaching_materials', { subject: currentSubject, week: currentWeek });
        }

        // Virtual class modal
        const virtualModal = document.getElementById('virtualClassModal');
        const platformSelect = document.getElementById('platformSelect');
        const customLinkGroup = document.getElementById('customLinkGroup');
        const customLink = document.getElementById('customLink');

        platformSelect.addEventListener('change', () => {
            customLinkGroup.style.display = platformSelect.value === 'custom' ? 'block' : 'none';
        });

        document.getElementById('startVirtualClassBtn').addEventListener('click', () => {
            virtualModal.classList.add('active');
        });

        window.closeVirtualModal = () => {
            virtualModal.classList.remove('active');
        };

        document.getElementById('virtualClassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const platform = platformSelect.value;
            let link = '';
            const date = document.getElementById('classDate').value;
            const time = document.getElementById('classTime').value;
            const duration = document.getElementById('classDuration').value;

            if (platform === 'custom') {
                link = customLink.value;
                if (!link) { alert('Please enter a custom link.'); return; }
            } else {
                const meetingId = Math.random().toString(36).substring(7);
                if (platform === 'zoom') link = `https://zoom.us/j/${meetingId}`;
                else if (platform === 'google-meet') link = `https://meet.google.com/${meetingId}`;
                else if (platform === 'jitsi') link = `https://meet.jit.si/${meetingId}`;
            }

            const session = {
                teacherId: currentUser.uid,
                classId: userData.classTeaching,
                subject: currentSubject,
                week: currentWeek,
                platform,
                link,
                date,
                time,
                duration: parseInt(duration),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('virtualClasses').add(session);
                await logAudit('start_virtual_class', { subject: currentSubject, week: currentWeek, platform });
                alert('Virtual class session created! Students will see it in their classroom.');
                closeVirtualModal();
                e.target.reset();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('viewStudentViewBtn').addEventListener('click', () => {
            window.open(`student-classroom.html?subject=${encodeURIComponent(currentSubject)}&week=${currentWeek}`, '_blank');
        });

        async function logAudit(action, details) {
            if (!currentUser || !userData) return;
            try {
                await db.collection('auditLogs').add({
                    userId: currentUser.uid,
                    userName: `${userData.firstName || ''} ${userData.surname || ''}`.trim() || 'Teacher',
                    userEmail: userData.email || currentUser.email,
                    role: 'teacher',
                    action,
                    details: JSON.stringify(details),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent
                });
            } catch (e) { console.warn('Audit log failed', e); }
        }
    </script>
</body>
</html>

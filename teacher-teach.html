<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Teacher Teach</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* (same base styles as before) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar .logo-area {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2.5rem; padding: 0 0.5rem;
        }
        .sidebar .logo-area i { font-size: 2rem; color: var(--accent); }
        .sidebar .logo-area h2 { font-size: 1.2rem; font-weight: 600; white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem;
            border-radius: 0.75rem; color: var(--text-secondary); transition: 0.2s;
            cursor: pointer; margin-bottom: 0.3rem; white-space: nowrap; text-decoration: none;
        }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); }
        .sidebar .nav-item.active { background: var(--accent); color: white; }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.5rem; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 1rem 0.5rem; cursor: pointer; color: var(--text-secondary); }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }
        .main-content.expanded { margin-left: 80px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }
        .page-title h1 { font-size: 2rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); }
        .profile-area { display: flex; align-items: center; gap: 1.5rem; }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-icon {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 1rem; padding: 0.5rem;
            min-width: 150px; display: none; z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { padding: 0.5rem 1rem; color: var(--text-primary); border-radius: 0.5rem; }
        .dropdown-item:hover { background: var(--hover-bg); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: var(--warning-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-sm { padding: 0.25rem 0.8rem; font-size: 0.85rem; }

        .week-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.3rem;
            width: fit-content;
            flex-wrap: wrap;
        }
        .week-tab {
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .week-tab.active { background: var(--accent); color: white; }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .resource-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: var(--shadow);
        }
        .resource-card h4 { margin-bottom: 0.5rem; }
        .resource-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .resource-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .youtube-link { color: var(--accent); text-decoration: none; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 2rem; max-width: 500px; width: 90%;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: var(--text-secondary); }
        .form-control {
            width: 100%; padding: 0.6rem 1rem; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-area h2 { display: none; }
            .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class="fas fa-chalkboard-teacher"></i>
            <h2>Teacher Panel</h2>
        </div>
        <a href="teacher-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="teacher-timetable.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a>
        <a href="teacher-lesson-notes.html" class="nav-item"><i class="fas fa-book-open"></i><span>Lesson Notes</span></a>
        <a href="teacher-daily-report.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Daily Report</span></a>
        <a href="teacher-assignments.html" class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></a>
        <a href="teacher-my-class.html" class="nav-item"><i class="fas fa-users"></i><span>My Class</span></a>
        <a href="teacher-attendance.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
        <a href="teacher-announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
        <a href="teacher-calendar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Calendar</span></a>
        <a href="teacher-teach.html" class="nav-item active"><i class="fas fa-chalkboard"></i><span>Teach</span></a>
        <a href="teacher-profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1>Teach</h1>
                <p>Access your lesson resources and start virtual classes</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">T</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Subject Tabs (from teacher's subjects) -->
        <div class="week-tabs" id="subjectTabs"></div>

        <!-- Week Tabs -->
        <div class="week-tabs" id="weekTabs"></div>

        <!-- Resources Display -->
        <div class="card">
            <div class="card-header">
                <h3>Teaching Resources for Week <span id="currentWeek"></span></h3>
                <div>
                    <button class="btn btn-outline btn-sm" id="viewStudentClassroomBtn"><i class="fas fa-external-link-alt"></i> View Student Classroom</button>
                    <button class="btn btn-primary btn-sm" id="startVirtualClassBtn"><i class="fas fa-video"></i> Start Virtual Class</button>
                </div>
            </div>
            <div id="resourcesContainer">
                <!-- Resources will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Virtual Class Modal -->
    <div class="modal" id="virtualClassModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start Virtual Class</h3>
                <i class="fas fa-times" style="cursor:pointer;" onclick="closeVirtualModal()"></i>
            </div>
            <form id="virtualClassForm">
                <div class="form-group">
                    <label>Select Platform</label>
                    <select id="platformSelect" class="form-control">
                        <option value="zoom">Zoom</option>
                        <option value="google-meet">Google Meet</option>
                        <option value="jitsi">Jitsi</option>
                        <option value="custom">Custom Link</option>
                    </select>
                </div>
                <div class="form-group" id="customLinkGroup" style="display:none;">
                    <label>Meeting Link</label>
                    <input type="url" id="customLink" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="classDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="classTime" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="classDuration" class="form-control" value="40" min="5">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="closeVirtualModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Session</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        let currentUser = null;
        let userData = null;
        let subjects = [];
        let currentSubject = null;
        let weeks = [];
        let currentWeekIndex = 0;
        let resources = {}; // key: subject_week, value: { lessonNote, teachingProcess, studentResource, handwrittenNotes, youtubeLinks }

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');

            subjects = userData.subjects || [];
            renderSubjectTabs();

            // Check for query params to pre-select subject and week
            const urlParams = new URLSearchParams(window.location.search);
            const subj = urlParams.get('subject');
            const wk = urlParams.get('week');
            if (subj && wk) {
                currentSubject = subj;
                // Find the tab and click it
                setTimeout(() => {
                    const tabs = document.querySelectorAll('#subjectTabs .week-tab');
                    for (let tab of tabs) {
                        if (tab.textContent === subj) {
                            tab.click();
                            // After loading weeks, select the week
                            setTimeout(() => {
                                const weekTabs = document.querySelectorAll('#weekTabs .week-tab');
                                for (let wt of weekTabs) {
                                    if (wt.textContent.includes(`Week ${wk}`)) {
                                        wt.click();
                                        break;
                                    }
                                }
                            }, 500);
                            break;
                        }
                    }
                }, 1000);
            } else if (subjects.length > 0) {
                switchSubject(subjects[0]);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        function renderSubjectTabs() {
            const container = document.getElementById('subjectTabs');
            container.innerHTML = '';
            subjects.forEach(sub => {
                const tab = document.createElement('span');
                tab.className = 'week-tab';
                tab.textContent = sub;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('#subjectTabs .week-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    switchSubject(sub);
                });
                container.appendChild(tab);
            });
            if (subjects.length > 0) {
                container.children[0].classList.add('active');
            }
        }

        function switchSubject(subject) {
            currentSubject = subject;
            loadWeeksForSubject(subject);
        }

        async function loadWeeksForSubject(subject) {
            // Fetch approved lesson notes for this subject
            const snapshot = await db.collection('lessonNotes')
                .where('teacherId', '==', currentUser.uid)
                .where('subject', '==', subject)
                .where('status', '==', 'approved')
                .orderBy('week', 'asc')
                .get();
            weeks = [];
            snapshot.forEach(doc => {
                weeks.push({ id: doc.id, ...doc.data() });
            });
            renderWeekTabs();
            if (weeks.length > 0) {
                selectWeek(0);
            } else {
                document.getElementById('resourcesContainer').innerHTML = '<p>No approved lesson notes for this subject.</p>';
                document.getElementById('currentWeek').textContent = '';
            }
        }

        function renderWeekTabs() {
            const container = document.getElementById('weekTabs');
            container.innerHTML = '';
            weeks.forEach((week, idx) => {
                const tab = document.createElement('span');
                tab.className = 'week-tab';
                tab.textContent = `Week ${week.week}`;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('#weekTabs .week-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectWeek(idx);
                });
                container.appendChild(tab);
            });
            if (weeks.length > 0) {
                container.children[0]?.classList.add('active');
            }
        }

        function selectWeek(index) {
            currentWeekIndex = index;
            const week = weeks[index];
            document.getElementById('currentWeek').textContent = week.week;
            renderResources(week);
        }

        function renderResources(week) {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = `
                <div class="resource-grid">
                    <div class="resource-card">
                        <h4>📝 Lesson Note</h4>
                        <p>${week.lessonNote ? week.lessonNote.substring(0,150)+'...' : 'No lesson note.'}</p>
                        <div class="resource-actions">
                            <button class="btn btn-outline btn-sm" onclick="viewResource('lessonNote', ${week.week})">View</button>
                            <button class="btn btn-primary btn-sm" onclick="publishResource('lessonNote', ${week.week})">Publish</button>
                        </div>
                    </div>
                    <div class="resource-card">
                        <h4>🧑‍🏫 Teaching Process</h4>
                        <p>${week.teachingProcess ? week.teachingProcess.substring(0,150)+'...' : 'No teaching process.'}</p>
                        <div class="resource-actions">
                            <button class="btn btn-outline btn-sm" onclick="viewResource('teachingProcess', ${week.week})">View</button>
                            <button class="btn btn-primary btn-sm" onclick="publishResource('teachingProcess', ${week.week})">Publish</button>
                        </div>
                    </div>
                    <div class="resource-card">
                        <h4>📄 Student Resource</h4>
                        <p>${week.studentResource ? week.studentResource.substring(0,150)+'...' : 'No student resource.'}</p>
                        <div class="resource-actions">
                            <button class="btn btn-outline btn-sm" onclick="viewResource('studentResource', ${week.week})">View</button>
                            ${week.studentResourcePublished ? '<span class="badge success">Published</span>' : '<button class="btn btn-primary btn-sm" onclick="publishResource(\'studentResource\', '+week.week+')">Publish</button>'}
                        </div>
                    </div>
                    <div class="resource-card">
                        <h4>✍️ Handwriting Notes</h4>
                        <p>${week.handwrittenNotes ? week.handwrittenNotes.substring(0,150)+'...' : 'No handwriting notes.'}</p>
                        <div class="resource-actions">
                            <button class="btn btn-outline btn-sm" onclick="viewResource('handwrittenNotes', ${week.week})">View</button>
                            ${week.handwrittenPublished ? '<span class="badge success">Published</span>' : '<button class="btn btn-primary btn-sm" onclick="publishResource(\'handwrittenNotes\', '+week.week+')">Publish</button>'}
                        </div>
                    </div>
                    <div class="resource-card">
                        <h4>📺 YouTube Links</h4>
                        <ul>
                            ${week.youtubeLinks ? week.youtubeLinks.map(link => `<li><a href="${link}" target="_blank" class="youtube-link">${link}</a></li>`).join('') : '<li>No links</li>'}
                        </ul>
                        <div class="resource-actions">
                            <button class="btn btn-primary btn-sm" onclick="publishResource('youtubeLinks', ${week.week})">Publish</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.viewResource = (type, weekNum) => {
            const week = weeks.find(w => w.week == weekNum);
            if (week && week[type]) {
                alert(week[type]); // For demo; in real app, open modal with formatted content
            }
        };

        window.publishResource = async (type, weekNum) => {
            const week = weeks.find(w => w.week == weekNum);
            if (!week) return;
            let updateField = {};
            if (type === 'studentResource') updateField.studentResourcePublished = true;
            else if (type === 'handwrittenNotes') updateField.handwrittenPublished = true;
            else if (type === 'lessonNote' || type === 'teachingProcess' || type === 'youtubeLinks') {
                // For these, maybe they are always visible? But we can set a generic published flag
                updateField.published = true;
            }
            try {
                await db.collection('lessonNotes').doc(week.id).update(updateField);
                alert('Resource published to students!');
                // Refresh week data
                const refreshed = await db.collection('lessonNotes').doc(week.id).get();
                Object.assign(week, refreshed.data());
                renderResources(week);
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        // Virtual class modal
        const virtualModal = document.getElementById('virtualClassModal');
        const platformSelect = document.getElementById('platformSelect');
        const customLinkGroup = document.getElementById('customLinkGroup');
        const customLink = document.getElementById('customLink');

        platformSelect.addEventListener('change', () => {
            customLinkGroup.style.display = platformSelect.value === 'custom' ? 'block' : 'none';
        });

        document.getElementById('startVirtualClassBtn').addEventListener('click', () => {
            virtualModal.classList.add('active');
        });

        window.closeVirtualModal = () => {
            virtualModal.classList.remove('active');
        };

        document.getElementById('virtualClassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const platform = platformSelect.value;
            let link = '';
            const date = document.getElementById('classDate').value;
            const time = document.getElementById('classTime').value;
            const duration = document.getElementById('classDuration').value;

            if (platform === 'custom') {
                link = customLink.value;
            } else {
                const meetingId = Math.random().toString(36).substring(7);
                if (platform === 'zoom') link = `https://zoom.us/j/${meetingId}`;
                else if (platform === 'google-meet') link = `https://meet.google.com/${meetingId}`;
                else if (platform === 'jitsi') link = `https://meet.jit.si/${meetingId}`;
            }

            const session = {
                classId: userData.classTeaching,
                teacherId: currentUser.uid,
                platform,
                link,
                date,
                time,
                duration,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('virtualClasses').add(session);
            alert('Virtual class session created!');
            closeVirtualModal();
        });

        document.getElementById('viewStudentClassroomBtn').addEventListener('click', () => {
            window.open('student-classroom.html', '_blank');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduTop · Teach</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter (system‑friendly fallback) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --accent: #1e3c72;
            --accent-glow: #2a5298;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #b91c1c;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --border: rgba(255,255,255,0.05);
            --card-bg: rgba(15, 23, 42, 0.6);
            --hover-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            --success-bg: rgba(34,197,94,0.2);
            --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2);
            --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2);
            --danger-text: #f87171;
            --input-bg: rgba(30,41,59,0.8);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s;
            position: relative;
            overflow-x: hidden;
        }
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15), transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; background: radial-gradient(circle at 70% 70%, rgba(139,92,246,0.15), transparent); animation-duration: 30s; }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        /* Top navigation */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.4rem 0.4rem 0.4rem 1rem;
        }
        .profile-name { font-weight: 600; color: var(--text-primary); }
        .profile-pic {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 1.1rem;
            box-shadow: 0 5px 15px var(--accent);
        }
        .dropdown-menu {
            position: absolute; right: 0; top: 60px;
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 1.2rem;
            padding: 0.5rem; min-width: 180px; display: none;
            z-index: 1000; box-shadow: var(--shadow);
        }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            padding: 0.8rem 1.2rem; color: var(--text-primary);
            border-radius: 0.8rem; display: flex; align-items: center; gap: 0.8rem;
            transition: 0.2s; text-decoration: none;
        }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        /* Main container – wide */
        .main-container {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 5;
        }

        /* Tabs */
        .subject-tabs, .week-tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: var(--card-bg); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 3rem;
            padding: 0.3rem; width: fit-content; flex-wrap: wrap;
        }
        .tab {
            padding: 0.7rem 2rem; border-radius: 3rem; font-weight: 500;
            cursor: pointer; transition: 0.2s; color: var(--text-secondary);
            white-space: nowrap;
        }
        .tab.active { background: var(--accent); color: white; }

        /* Cards */
        .card {
            background: var(--card-bg); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 2rem;
            padding: 1.8rem; box-shadow: var(--shadow); margin-bottom: 2rem;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .card-header h3 { font-size: 1.3rem; font-weight: 600; }

        .resource-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem; margin-top: 1rem;
        }
        .resource-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow);
            display: flex; flex-direction: column;
        }
        .resource-card h4 {
            margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
            color: var(--accent);
        }
        .resource-card p {
            color: var(--text-secondary); font-size: 1rem; line-height: 1.6;
            margin-bottom: 1rem; white-space: pre-wrap; max-height: 250px;
            overflow-y: auto; flex: 1;
        }
        .resource-card .badge {
            display: inline-block; padding: 0.2rem 1rem; border-radius: 2rem;
            font-size: 0.8rem; font-weight: 500; margin-top: 0.5rem;
        }
        .badge.published { background: var(--success-bg); color: var(--success-text); }

        .btn {
            padding: 0.6rem 1.5rem; border: none; border-radius: 2rem;
            font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success-text); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 0.3rem 1rem; font-size: 0.9rem; }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            align-items: center; justify-content: center; z-index:2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border:1px solid var(--border);
            border-radius:2rem; padding:2rem; max-width:500px; width:90%;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom:1.5rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; margin-bottom:0.3rem; color:var(--text-secondary); }
        .form-control {
            width:100%; padding:0.6rem 1rem; background:var(--input-bg);
            border:1px solid var(--border); border-radius:1rem; color:var(--text-primary);
        }
        .modal-actions { display: flex; gap:1rem; justify-content: flex-end; margin-top:1rem; }

        .error-message {
            background: var(--danger-bg); color: var(--danger-text);
            padding:1rem; border-radius:1rem; margin-bottom:1rem;
            border-left:4px solid var(--danger-text);
        }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-secondary); }

        .access-info {
            background: var(--hover-bg); border-left: 4px solid var(--accent);
            padding: 1rem; border-radius: 1rem; margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Top Navigation (no sidebar) -->
    <div class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <a href="teacher-lesson-notes.html" class="nav-btn"><i class="fas fa-book-open"></i> Lesson Notes</a>
        </div>
        <div class="nav-right">
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
            </div>
            <div class="profile-dropdown">
                <div class="profile-trigger">
                    <span class="profile-name" id="profileName">Teacher</span>
                    <div class="profile-pic" id="profilePic">T</div>
                </div>
                <div class="dropdown-menu">
                    <a href="teacher-profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                    <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- Firestore index error display -->
        <div id="indexError" class="error-message" style="display: none;"></div>

        <!-- Subject Tabs -->
        <div class="subject-tabs" id="subjectTabs"></div>

        <!-- Week Tabs -->
        <div class="week-tabs" id="weekTabs"></div>

        <!-- Access info / timer -->
        <div id="accessInfo" class="access-info" style="display: none;"></div>

        <!-- Main Content Card -->
        <div class="card">
            <div class="card-header">
                <h3>Teaching Resources for <span id="currentSubjectDisplay"></span> – Week <span id="currentWeekDisplay"></span></h3>
                <div>
                    <button class="btn btn-outline btn-sm" id="viewStudentViewBtn"><i class="fas fa-external-link-alt"></i> Student View</button>
                    <button class="btn btn-primary btn-sm" id="startVirtualClassBtn"><i class="fas fa-video"></i> Start Virtual Class</button>
                </div>
            </div>
            <div id="resourcesContainer">
                <p class="empty-state">Select a subject and week to view resources.</p>
            </div>
        </div>

        <!-- Upcoming Virtual Classes -->
        <div class="card">
            <div class="card-header">
                <h3>Upcoming Virtual Classes</h3>
            </div>
            <div id="virtualClassesContainer">
                <p class="empty-state">No upcoming virtual classes.</p>
            </div>
        </div>
    </div>

    <!-- Virtual Class Modal -->
    <div class="modal" id="virtualClassModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start Virtual Class</h3>
                <i class="fas fa-times" style="cursor:pointer;" onclick="closeVirtualModal()"></i>
            </div>
            <form id="virtualClassForm">
                <div class="form-group">
                    <label>Platform</label>
                    <select id="platformSelect" class="form-control">
                        <option value="zoom">Zoom</option>
                        <option value="google-meet">Google Meet</option>
                        <option value="jitsi">Jitsi</option>
                        <option value="custom">Custom Link</option>
                    </select>
                </div>
                <div class="form-group" id="customLinkGroup" style="display:none;">
                    <label>Meeting Link</label>
                    <input type="url" id="customLink" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="classDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="classTime" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="classDuration" class="form-control" value="40" min="5">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeVirtualModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Session</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Firebase config (same as yours)
        const firebaseConfig = {
            apiKey: "AIzaSyCY0Kin3x6SFMNzQIMF0ZHp_ASxzGyXwP0",
            authDomain: "triangle-6e6b7.firebaseapp.com",
            projectId: "triangle-6e6b7",
            storageBucket: "triangle-6e6b7.firebasestorage.app",
            messagingSenderId: "673937760480",
            appId: "1:673937760480:web:f03c06e1207232213ef085",
            measurementId: "G-ELBMT8WHQ9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Error handler for Firestore index
        function handleFirestoreError(error, context) {
            console.error(`Firestore error in ${context}:`, error);
            const errorDiv = document.getElementById('indexError');
            if (error.code === 'failed-precondition' && error.message.includes('index')) {
                const match = error.message.match(/https:\/\/console\.firebase\.google\.com[^\s]*/);
                const url = match ? match[0] : '#';
                errorDiv.innerHTML = `
                    <strong>Missing Firestore index.</strong><br>
                    Please create it by clicking 
                    <a href="${url}" target="_blank">this link</a>.
                `;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        }

        // Global variables
        let currentUser = null;
        let userData = null;
        let subjects = [];
        let currentSubject = null;
        let weeks = [];
        let currentWeek = null;
        let lessonNotesMap = {};
        let todaysPeriods = [];
        let accessInterval = null;
        let hasLoggedAccess = false;
        let currentLessonNote = null;

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'teacher-login.html'; return; }
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                    auth.signOut(); window.location.href = 'index.html'; return;
                }
                currentUser = user;
                userData = userDoc.data();
                document.getElementById('profilePic').textContent = (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
                document.getElementById('profileName').textContent = userData.firstName || 'Teacher';

                subjects = userData.subjects || [];
                renderSubjectTabs();

                const urlParams = new URLSearchParams(window.location.search);
                const subj = urlParams.get('subject');
                const wk = urlParams.get('week');
                if (subj && subjects.includes(subj)) {
                    switchSubject(subj);
                    if (wk) setTimeout(() => selectWeek(parseInt(wk)), 500);
                } else if (subjects.length > 0) {
                    switchSubject(subjects[0]);
                }
            } catch (error) { console.error(error); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

        function renderSubjectTabs() {
            const container = document.getElementById('subjectTabs');
            container.innerHTML = '';
            subjects.forEach(sub => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = sub;
                tab.onclick = (e) => switchSubject(sub, e.target);
                container.appendChild(tab);
            });
            if (subjects.length > 0) container.children[0].classList.add('active');
        }

        async function switchSubject(subject, clickedElement) {
            const tabs = document.querySelectorAll('#subjectTabs .tab');
            tabs.forEach(t => t.classList.remove('active'));
            if (clickedElement) clickedElement.classList.add('active');
            else {
                for (let tab of tabs) {
                    if (tab.textContent === subject) { tab.classList.add('active'); break; }
                }
            }

            currentSubject = subject;
            document.getElementById('currentSubjectDisplay').textContent = subject;
            document.getElementById('indexError').style.display = 'none';

            if (accessInterval) clearInterval(accessInterval);

            try {
                const snapshot = await db.collection('lessonNotes')
                    .where('teacherId', '==', currentUser.uid)
                    .where('subject', '==', subject)
                    .where('status', '==', 'approved')
                    .where('teachable', '==', true)
                    .orderBy('week', 'asc')
                    .get();

                weeks = [];
                lessonNotesMap = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    weeks.push(data.week);
                    lessonNotesMap[data.week] = { id: doc.id, ...data };
                });
                renderWeekTabs();
                if (weeks.length > 0) {
                    selectWeek(weeks[0]);
                } else {
                    document.getElementById('weekTabs').innerHTML = '';
                    document.getElementById('resourcesContainer').innerHTML = '<div class="empty-state">No ready‑to‑teach notes for this subject.</div>';
                }

                accessInterval = setInterval(() => {
                    if (currentLessonNote) {
                        const status = getAccessStatus(currentLessonNote);
                        updateAccessUI(status);
                    }
                }, 60000);

            } catch (error) {
                handleFirestoreError(error, 'loadApprovedLessonNotes');
                document.getElementById('resourcesContainer').innerHTML = '<div class="empty-state">Error loading lesson notes.</div>';
            }
        }

        function renderWeekTabs() {
            const container = document.getElementById('weekTabs');
            container.innerHTML = '';
            weeks.forEach(week => {
                const tab = document.createElement('span');
                tab.className = 'tab';
                tab.textContent = `Week ${week}`;
                tab.onclick = (e) => selectWeek(week, e.target);
                container.appendChild(tab);
            });
        }

        function selectWeek(week, clickedElement) {
            const tabs = document.querySelectorAll('#weekTabs .tab');
            tabs.forEach(t => t.classList.remove('active'));
            if (clickedElement) clickedElement.classList.add('active');
            else {
                for (let tab of tabs) {
                    if (tab.textContent.includes(`Week ${week}`)) {
                        tab.classList.add('active'); break;
                    }
                }
            }

            currentWeek = week;
            document.getElementById('currentWeekDisplay').textContent = week;
            currentLessonNote = lessonNotesMap[week];
            if (currentLessonNote) {
                if (currentLessonNote.scheduledPeriods && currentLessonNote.scheduledPeriods.length > 0) {
                    const today = new Date().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
                    todaysPeriods = currentLessonNote.scheduledPeriods.filter(p => p.day === today);
                } else {
                    fetchTodaysTimetableFallback();
                }
                const status = getAccessStatus(currentLessonNote);
                updateAccessUI(status);
            } else {
                document.getElementById('resourcesContainer').innerHTML = '<div class="empty-state">No note for this week.</div>';
            }
        }

        async function fetchTodaysTimetableFallback() {
            if (!userData.classTeaching) return;
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
            try {
                const docId = `${userData.classTeaching}_academic`;
                const doc = await db.collection('timetables').doc(docId).get();
                if (!doc.exists) { todaysPeriods = []; return; }
                const data = doc.data();
                const periods = data.periods || [];
                todaysPeriods = periods
                    .filter(p => p[today] && p[today].trim() !== '' && p[today] === currentSubject)
                    .map(p => ({ day: today, startTime: p.startTime, endTime: p.endTime }));
            } catch (error) {
                handleFirestoreError(error, 'fetchTimetableFallback');
            }
        }

        function getAccessStatus(note) {
            if (!note) return { canAccess: false, message: 'No lesson note selected.' };
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            const today = now.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();

            let periods = [];
            if (note.scheduledPeriods && note.scheduledPeriods.length > 0) {
                periods = note.scheduledPeriods.filter(p => p.day === today);
            } else {
                periods = todaysPeriods;
            }

            if (periods.length === 0) {
                return { canAccess: false, message: 'No class scheduled for this subject today.' };
            }

            let activePeriod = null, nextPeriod = null;
            for (let p of periods) {
                if (currentTime >= p.startTime && currentTime <= p.endTime) {
                    activePeriod = p;
                    break;
                }
                if (p.startTime > currentTime) {
                    if (!nextPeriod || p.startTime < nextPeriod.startTime) nextPeriod = p;
                }
            }

            if (activePeriod) {
                const isLate = currentTime > activePeriod.startTime;
                return {
                    canAccess: true,
                    activePeriod,
                    isLate,
                    message: isLate ? `You are late (started at ${activePeriod.startTime})` : 'Class is in session.'
                };
            } else if (nextPeriod) {
                return {
                    canAccess: false,
                    nextPeriod,
                    message: `Next class is at ${nextPeriod.startTime}.`
                };
            } else {
                return {
                    canAccess: false,
                    message: 'All classes for today have ended.'
                };
            }
        }

        function updateAccessUI(status) {
            const accessDiv = document.getElementById('accessInfo');
            if (!status.canAccess) {
                accessDiv.innerHTML = `<i class="fas fa-lock"></i> ${status.message}`;
                accessDiv.style.display = 'block';
                document.getElementById('resourcesContainer').innerHTML = '<p class="empty-state">Lesson materials are locked until class time.</p>';
                hasLoggedAccess = false;
            } else {
                accessDiv.innerHTML = `<i class="fas fa-unlock"></i> ${status.message}`;
                accessDiv.style.display = 'block';
                if (!hasLoggedAccess) {
                    logAccess(status.activePeriod, status.isLate);
                    hasLoggedAccess = true;
                }
                if (currentLessonNote) {
                    renderResources(currentLessonNote);
                }
            }
        }

        async function logAccess(period, isLate) {
            if (!currentUser || !userData || !currentSubject || !currentWeek) return;
            try {
                await db.collection('auditLogs').add({
                    userId: currentUser.uid,
                    userName: `${userData.firstName || ''} ${userData.surname || ''}`.trim() || 'Teacher',
                    userEmail: userData.email || currentUser.email,
                    action: isLate ? 'opened_lesson_late' : 'opened_lesson_on_time',
                    details: JSON.stringify({
                        subject: currentSubject,
                        week: currentWeek,
                        scheduledStart: period.startTime,
                        scheduledEnd: period.endTime,
                        actualOpenTime: new Date().toLocaleTimeString()
                    }),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent
                });
            } catch (e) { console.warn('Audit log failed', e); }
        }

        async function publishResource(docId, type) {
            const update = type === 'studentResource' ? { studentResourcePublished: true } : { handwrittenPublished: true };
            try {
                await db.collection('lessonNotes').doc(docId).update(update);
                alert('Published to students.');
                const refreshed = await db.collection('lessonNotes').doc(docId).get();
                lessonNotesMap[currentWeek] = { id: docId, ...refreshed.data() };
                currentLessonNote = lessonNotesMap[currentWeek];
                renderResources(currentLessonNote);
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function publishAllYoutube(docId) {
            try {
                await db.collection('lessonNotes').doc(docId).update({ youtubePublished: true });
                alert('All YouTube links published to students.');
                const refreshed = await db.collection('lessonNotes').doc(docId).get();
                lessonNotesMap[currentWeek] = { id: docId, ...refreshed.data() };
                currentLessonNote = lessonNotesMap[currentWeek];
                renderResources(currentLessonNote);
            } catch (e) { alert('Error: ' + e.message); }
        }

        function renderResources(note) {
            const container = document.getElementById('resourcesContainer');
            if (!note) {
                container.innerHTML = '<div class="empty-state">No resources for this week.</div>';
                return;
            }

            let youtubeHtml = '';
            if (note.youtubeLinks && note.youtubeLinks.length) {
                youtubeHtml = note.youtubeLinks.map(link => `<li><a href="${link}" target="_blank" class="youtube-link">${link}</a></li>`).join('');
            } else {
                youtubeHtml = '<li>No links</li>';
            }

            container.innerHTML = `
                <div class="resource-grid">
                    <div class="resource-card">
                        <h4><i class="fas fa-book"></i> Lesson Note</h4>
                        <p>${note.lessonNote ? note.lessonNote : 'Not available.'}</p>
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-chalkboard-teacher"></i> Teaching Process</h4>
                        <p>${note.teachingProcess ? note.teachingProcess : 'Not available.'}</p>
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-users"></i> Student Resource</h4>
                        <p>${note.studentResource ? note.studentResource : 'Not available.'}</p>
                        ${note.studentResourcePublished ? '<span class="badge published">Published</span>' : '<button class="btn btn-sm btn-outline" onclick="publishResource(\'' + note.id + '\', \'studentResource\')">Publish</button>'}
                    </div>
                    <div class="resource-card">
                        <h4><i class="fas fa-pen-fancy"></i> Handwritten Notes</h4>
                        <p>${note.handwrittenNotes ? note.handwrittenNotes : 'Not available.'}</p>
                        ${note.handwrittenPublished ? '<span class="badge published">Published</span>' : '<button class="btn btn-sm btn-outline" onclick="publishResource(\'' + note.id + '\', \'handwritten\')">Publish</button>'}
                    </div>
                    <div class="resource-card">
                        <h4><i class="fab fa-youtube"></i> YouTube Links</h4>
                        <ul>${youtubeHtml}</ul>
                        ${note.youtubePublished ? '<span class="badge published">Published</span>' : '<button class="btn btn-sm btn-outline" onclick="publishAllYoutube(\'' + note.id + '\')">Publish All</button>'}
                    </div>
                </div>
            `;
        }

        // Virtual class modal
        const virtualModal = document.getElementById('virtualClassModal');
        const platformSelect = document.getElementById('platformSelect');
        const customLinkGroup = document.getElementById('customLinkGroup');
        platformSelect.addEventListener('change', () => {
            customLinkGroup.style.display = platformSelect.value === 'custom' ? 'block' : 'none';
        });
        document.getElementById('startVirtualClassBtn').addEventListener('click', () => {
            virtualModal.classList.add('active');
        });
        window.closeVirtualModal = () => {
            virtualModal.classList.remove('active');
        };
        document.getElementById('virtualClassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const platform = platformSelect.value;
            let link = '';
            const date = document.getElementById('classDate').value;
            const time = document.getElementById('classTime').value;
            const duration = document.getElementById('classDuration').value;

            if (platform === 'custom') {
                link = document.getElementById('customLink').value;
                if (!link) { alert('Please enter a custom link.'); return; }
            } else {
                const meetingId = Math.random().toString(36).substring(7);
                if (platform === 'zoom') link = `https://zoom.us/j/${meetingId}`;
                else if (platform === 'google-meet') link = `https://meet.google.com/${meetingId}`;
                else if (platform === 'jitsi') link = `https://meet.jit.si/${meetingId}`;
            }

            const session = {
                teacherId: currentUser.uid,
                classId: userData.classTeaching,
                subject: currentSubject,
                week: currentWeek,
                platform,
                link,
                date,
                time,
                duration: parseInt(duration),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('virtualClasses').add(session);
                alert('Virtual class session created!');
                closeVirtualModal();
                e.target.reset();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('viewStudentViewBtn').addEventListener('click', () => {
            window.open(`student-classroom.html?subject=${encodeURIComponent(currentSubject)}&week=${currentWeek}`, '_blank');
        });

        // Expose functions globally
        window.publishResource = publishResource;
        window.publishAllYoutube = publishAllYoutube;
    </script>
</body>
</html>

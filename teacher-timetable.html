<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Teacher Timetable</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* (same styles as before, with addition for feedback) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
        }
        .page-title p {
            color: var(--text-secondary);
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            border-radius: 0.5rem;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: var(--warning-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-sm { padding: 0.25rem 0.8rem; font-size: 0.85rem; }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .status-approved { background: var(--success-bg); color: var(--success-text); }
        .status-pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-rejected { background: var(--danger-bg); color: var(--danger-text); }
        .status-draft { background: var(--hover-bg); color: var(--text-secondary); }
        .status-published { background: var(--success-bg); color: var(--success-text); }

        .feedback-message {
            margin-top: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--danger-bg);
            color: var(--danger-text);
            border-radius: 0.75rem;
            font-size: 0.9rem;
            border-left: 4px solid var(--danger-text);
        }

        .class-info {
            background: var(--hover-bg);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background: var(--hover-bg);
            font-weight: 500;
        }
        .time-input {
            width: 80px;
            max-width: 100%;
        }
        .subject-input {
            width: 120px;
            max-width: 100%;
        }
        .delete-row {
            color: var(--danger-text);
            cursor: pointer;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .profile-area { align-self: flex-end; }
            .card-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="page-title">
                <h1>Timetable</h1>
                <p>Create and manage your class timetable</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">T</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div>
                    <h3>Your Class Timetable</h3>
                    <div id="statusDisplay" class="status-badge status-draft">Loading...</div>
                    <div id="feedbackMessage" class="feedback-message" style="display: none;"></div>
                </div>
            </div>
            <div class="class-info" id="classDisplay"></div>

            <div class="table-responsive">
                <table id="timetableTable">
                    <thead>
                        <tr>
                            <th>Start</th>
                            <th>End</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rows added dynamically -->
                    </tbody>
                </table>
            </div>

            <div class="actions">
                <button class="btn btn-outline" id="addRowBtn"><i class="fas fa-plus"></i> Add Period</button>
                <button class="btn btn-primary" id="saveDraftBtn">Save Draft</button>
                <button class="btn btn-success" id="submitBtn">Submit for Approval</button>
                <button class="btn btn-warning" id="editBtn" style="display: none;">Edit</button>
                <button class="btn btn-success" id="publishBtn" style="display: none;">Publish to Students</button>
                <button class="btn btn-outline" id="viewStudentLink" style="display: none;" onclick="window.open('student-timetable.html', '_blank')">View Student View</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth check
        let currentUser = null;
        let userData = null;
        let currentClassId = null;
        let currentProposalId = null;
        let currentTimetableData = [];
        let currentStatus = 'draft'; // draft, pending, approved, published, rejected

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
            document.querySelector('.page-title p').textContent = `Welcome back, ${userData.firstName || 'Teacher'}`;

            currentClassId = userData.classTeaching;
            if (!currentClassId) {
                document.getElementById('classDisplay').innerHTML = 'You are not assigned to any class.';
                document.getElementById('addRowBtn').disabled = true;
                document.getElementById('saveDraftBtn').disabled = true;
                document.getElementById('submitBtn').disabled = true;
                return;
            }
            document.getElementById('classDisplay').innerHTML = `Class: <strong>${currentClassId}</strong>`;

            await loadTimetable();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        async function loadTimetable() {
            // Hide feedback initially
            document.getElementById('feedbackMessage').style.display = 'none';

            // 1. Check for pending proposal
            const pendingSnap = await db.collection('timetableProposals')
                .where('classId', '==', currentClassId)
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'pending')
                .orderBy('submittedAt', 'desc')
                .limit(1)
                .get();

            if (!pendingSnap.empty) {
                const proposal = pendingSnap.docs[0];
                currentProposalId = proposal.id;
                const data = proposal.data();
                currentTimetableData = data.periods || [];
                currentStatus = 'pending';
                renderTable();
                updateUIForStatus();
                return;
            }

            // 2. Check for approved/published timetable
            const approvedSnap = await db.collection('timetables').doc(currentClassId).get();
            if (approvedSnap.exists) {
                const data = approvedSnap.data();
                currentTimetableData = data.periods || [];
                currentStatus = data.published ? 'published' : 'approved';
                currentProposalId = null; // Not a proposal
                renderTable();
                updateUIForStatus();
                return;
            }

            // 3. Check for rejected proposal (if no pending/approved)
            const rejectedSnap = await db.collection('timetableProposals')
                .where('classId', '==', currentClassId)
                .where('teacherId', '==', currentUser.uid)
                .where('status', '==', 'rejected')
                .orderBy('submittedAt', 'desc')
                .limit(1)
                .get();

            if (!rejectedSnap.empty) {
                const proposal = rejectedSnap.docs[0];
                currentProposalId = proposal.id;
                const data = proposal.data();
                currentTimetableData = data.periods || [];
                currentStatus = 'rejected';
                renderTable();
                updateUIForStatus();

                // Show feedback if any
                if (data.feedback) {
                    const feedbackEl = document.getElementById('feedbackMessage');
                    feedbackEl.textContent = `Rejection feedback: ${data.feedback}`;
                    feedbackEl.style.display = 'block';
                }
                return;
            }

            // 4. No timetable yet → start with empty draft
            currentTimetableData = [];
            currentStatus = 'draft';
            currentProposalId = null;
            addEmptyRow(); // start with one empty row
            renderTable();
            updateUIForStatus();
        }

        function addEmptyRow() {
            currentTimetableData.push({
                startTime: '08:00',
                endTime: '08:40',
                monday: '',
                tuesday: '',
                wednesday: '',
                thursday: '',
                friday: ''
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            let html = '';
            currentTimetableData.forEach((period, index) => {
                const disabled = (currentStatus === 'approved' || currentStatus === 'published') ? 'disabled' : '';
                html += `
                <tr>
                    <td><input type="time" class="time-input" value="${period.startTime}" data-index="${index}" data-field="startTime" ${disabled}></td>
                    <td><input type="time" class="time-input" value="${period.endTime}" data-index="${index}" data-field="endTime" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.monday || ''}" placeholder="Subject" data-index="${index}" data-field="monday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.tuesday || ''}" placeholder="Subject" data-index="${index}" data-field="tuesday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.wednesday || ''}" placeholder="Subject" data-index="${index}" data-field="wednesday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.thursday || ''}" placeholder="Subject" data-index="${index}" data-field="thursday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.friday || ''}" placeholder="Subject" data-index="${index}" data-field="friday" ${disabled}></td>
                    <td class="delete-row" onclick="deleteRow(${index})" ${disabled ? 'style="display:none;"' : ''}><i class="fas fa-trash"></i></td>
                </tr>
                `;
            });
            tbody.innerHTML = html;

            // Attach input listeners only if editable
            if (currentStatus !== 'approved' && currentStatus !== 'published') {
                document.querySelectorAll('input[data-index]').forEach(input => {
                    input.addEventListener('input', function(e) {
                        const index = this.dataset.index;
                        const field = this.dataset.field;
                        currentTimetableData[index][field] = this.value;
                    });
                });
            }
        }

        window.deleteRow = (index) => {
            if (currentStatus === 'approved' || currentStatus === 'published') return;
            currentTimetableData.splice(index, 1);
            renderTable();
        };

        document.getElementById('addRowBtn').addEventListener('click', () => {
            if (currentStatus === 'approved' || currentStatus === 'published') return;
            addEmptyRow();
            renderTable();
        });

        function updateUIForStatus() {
            const statusEl = document.getElementById('statusDisplay');
            const editBtn = document.getElementById('editBtn');
            const saveDraftBtn = document.getElementById('saveDraftBtn');
            const submitBtn = document.getElementById('submitBtn');
            const publishBtn = document.getElementById('publishBtn');
            const viewStudentLink = document.getElementById('viewStudentLink');
            const feedbackEl = document.getElementById('feedbackMessage');

            if (currentStatus === 'pending') {
                statusEl.textContent = 'Pending Approval';
                statusEl.className = 'status-badge status-pending';
                editBtn.style.display = 'inline-block';
                saveDraftBtn.style.display = 'none';
                submitBtn.style.display = 'none';
                publishBtn.style.display = 'none';
                viewStudentLink.style.display = 'none';
                feedbackEl.style.display = 'none';
            } else if (currentStatus === 'approved') {
                statusEl.textContent = 'Approved (Not Published)';
                statusEl.className = 'status-badge status-approved';
                editBtn.style.display = 'inline-block';
                saveDraftBtn.style.display = 'none';
                submitBtn.style.display = 'none';
                publishBtn.style.display = 'inline-block';
                viewStudentLink.style.display = 'inline-block';
                feedbackEl.style.display = 'none';
            } else if (currentStatus === 'published') {
                statusEl.textContent = 'Published';
                statusEl.className = 'status-badge status-published';
                editBtn.style.display = 'inline-block';
                saveDraftBtn.style.display = 'none';
                submitBtn.style.display = 'none';
                publishBtn.style.display = 'none';
                viewStudentLink.style.display = 'inline-block';
                feedbackEl.style.display = 'none';
            } else if (currentStatus === 'rejected') {
                statusEl.textContent = 'Rejected';
                statusEl.className = 'status-badge status-rejected';
                editBtn.style.display = 'inline-block';
                saveDraftBtn.style.display = 'none';
                submitBtn.style.display = 'none';
                publishBtn.style.display = 'none';
                viewStudentLink.style.display = 'none';
                // feedback already shown in loadTimetable
            } else { // draft
                statusEl.textContent = 'Draft';
                statusEl.className = 'status-badge status-draft';
                editBtn.style.display = 'none';
                saveDraftBtn.style.display = 'inline-block';
                submitBtn.style.display = 'inline-block';
                publishBtn.style.display = 'none';
                viewStudentLink.style.display = 'none';
                feedbackEl.style.display = 'none';
            }
        }

        // Save draft
        document.getElementById('saveDraftBtn').addEventListener('click', async () => {
            if (!currentClassId) return;
            const data = {
                classId: currentClassId,
                teacherId: currentUser.uid,
                periods: currentTimetableData,
                status: 'draft',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (currentProposalId) {
                // Update existing proposal (draft, pending, or rejected — but button only visible in draft)
                await db.collection('timetableProposals').doc(currentProposalId).update(data);
            } else {
                // Check for existing draft
                const draftSnap = await db.collection('timetableProposals')
                    .where('classId', '==', currentClassId)
                    .where('teacherId', '==', currentUser.uid)
                    .where('status', '==', 'draft')
                    .limit(1)
                    .get();
                if (!draftSnap.empty) {
                    await draftSnap.docs[0].ref.update(data);
                } else {
                    await db.collection('timetableProposals').add(data);
                }
            }
            alert('Draft saved.');
            await loadTimetable(); // reload to get updated proposal id
        });

        // Submit for approval
        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (!currentClassId) return;
            if (currentTimetableData.length === 0) {
                alert('Please add at least one period.');
                return;
            }
            const data = {
                classId: currentClassId,
                teacherId: currentUser.uid,
                periods: currentTimetableData,
                status: 'pending',
                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (currentProposalId) {
                // Update existing proposal (draft, pending, or rejected)
                await db.collection('timetableProposals').doc(currentProposalId).update(data);
            } else {
                // Check for existing draft or pending
                const existingSnap = await db.collection('timetableProposals')
                    .where('classId', '==', currentClassId)
                    .where('teacherId', '==', currentUser.uid)
                    .where('status', 'in', ['draft', 'pending'])
                    .limit(1)
                    .get();
                if (!existingSnap.empty) {
                    await existingSnap.docs[0].ref.update(data);
                } else {
                    await db.collection('timetableProposals').add(data);
                }
            }
            alert('Timetable submitted for approval.');
            await loadTimetable();
        });

        // Edit button
        document.getElementById('editBtn').addEventListener('click', async () => {
            if (currentStatus === 'pending') {
                if (currentProposalId) {
                    await db.collection('timetableProposals').doc(currentProposalId).update({
                        status: 'draft',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                currentStatus = 'draft';
                renderTable();
                updateUIForStatus();
            } else if (currentStatus === 'approved' || currentStatus === 'published') {
                // Create a draft proposal based on current data
                const data = {
                    classId: currentClassId,
                    teacherId: currentUser.uid,
                    periods: currentTimetableData,
                    status: 'draft',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                const docRef = await db.collection('timetableProposals').add(data);
                currentProposalId = docRef.id;
                currentStatus = 'draft';
                renderTable();
                updateUIForStatus();
            } else if (currentStatus === 'rejected') {
                if (currentProposalId) {
                    await db.collection('timetableProposals').doc(currentProposalId).update({
                        status: 'draft',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    currentStatus = 'draft';
                    renderTable();
                    updateUIForStatus();
                    // Hide feedback
                    document.getElementById('feedbackMessage').style.display = 'none';
                }
            }
        });

        // Publish button
        document.getElementById('publishBtn').addEventListener('click', async () => {
            if (!currentClassId || currentStatus !== 'approved') return;
            await db.collection('timetables').doc(currentClassId).update({
                published: true,
                publishedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            currentStatus = 'published';
            updateUIForStatus();
            alert('Timetable published to students.');
        });
    </script>
</body>
</html>

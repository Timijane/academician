<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTop Scholars · Teacher Timetable</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* (keep existing CSS, add new styles for proposal list) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --hover-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --success-bg: #22c55e20;
            --success-text: #22c55e;
            --warning-bg: #f59e0b20;
            --warning-text: #f59e0b;
            --danger-bg: #ef444420;
            --danger-text: #ef4444;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-sidebar: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --card-bg: #1e293b;
            --hover-bg: #2d3a4f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --success-bg: #22c55e20;
            --success-text: #4ade80;
            --warning-bg: #f59e0b20;
            --warning-text: #fbbf24;
            --danger-bg: #ef444420;
            --danger-text: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
        }
        .page-title p {
            color: var(--text-secondary);
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .profile-dropdown {
            position: relative;
            cursor: pointer;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }
        .profile-dropdown:hover .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            border-radius: 0.5rem;
        }
        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        /* Main two‑column layout */
        .dashboard-layout {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        .proposal-sidebar {
            flex: 0 0 300px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }
        .proposal-sidebar h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .proposal-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
        }
        .proposal-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .proposal-item:hover {
            background: var(--hover-bg);
            transform: translateX(4px);
        }
        .proposal-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent);
        }
        .proposal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .proposal-status {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-weight: 500;
        }
        .status-draft { background: var(--hover-bg); color: var(--text-secondary); }
        .status-pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-approved { background: var(--success-bg); color: var(--success-text); }
        .status-rejected { background: var(--danger-bg); color: var(--danger-text); }
        .status-published { background: var(--success-bg); color: var(--success-text); }
        .proposal-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .proposal-feedback {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: var(--danger-bg);
            border-radius: 0.5rem;
            color: var(--danger-text);
        }
        .btn-create {
            width: 100%;
            margin-top: 1rem;
        }

        .timetable-editor {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-warning { background: var(--warning-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-sm { padding: 0.25rem 0.8rem; font-size: 0.85rem; }

        .class-info {
            background: var(--hover-bg);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background: var(--hover-bg);
            font-weight: 500;
        }
        .time-input {
            width: 80px;
            max-width: 100%;
        }
        .subject-input {
            width: 120px;
            max-width: 100%;
        }
        .delete-row {
            color: var(--danger-text);
            cursor: pointer;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        @media (max-width: 1024px) {
            .dashboard-layout { flex-direction: column; }
            .proposal-sidebar { width: 100%; }
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .profile-area { align-self: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="page-title">
                <h1>Timetable</h1>
                <p>Create and manage your class timetable</p>
            </div>
            <div class="profile-area">
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i>
                </div>
                <div class="profile-dropdown">
                    <div class="profile-icon" id="profileInitials">T</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" id="profileLink"><i class="fas fa-user"></i> Profile</div>
                        <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-layout">
            <!-- Left: Proposal List -->
            <div class="proposal-sidebar">
                <h3>Your Timetables</h3>
                <div class="proposal-list" id="proposalList">
                    <!-- Populated by JS -->
                </div>
                <button class="btn btn-primary btn-create" id="createDraftBtn">
                    <i class="fas fa-plus"></i> New Draft
                </button>
            </div>

            <!-- Right: Editable Timetable -->
            <div class="timetable-editor" id="editorPanel">
                <div class="card-header">
                    <h3 id="editorTitle">Select a timetable to edit</h3>
                    <div id="editorStatus" class="status-badge status-draft"></div>
                </div>
                <div class="class-info" id="classDisplay"></div>

                <div class="table-responsive">
                    <table id="timetableTable">
                        <thead>
                            <tr>
                                <th>Start</th>
                                <th>End</th>
                                <th>Monday</th>
                                <th>Tuesday</th>
                                <th>Wednesday</th>
                                <th>Thursday</th>
                                <th>Friday</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows added dynamically -->
                        </tbody>
                    </table>
                </div>

                <div class="actions" id="editorActions">
                    <!-- Buttons appear based on state -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByuuS7efaHOtUai4fqUgRIQr6pMtCo2SE",
            authDomain: "edutopscholars-be54a.firebaseapp.com",
            projectId: "edutopscholars-be54a",
            storageBucket: "edutopscholars-be54a.firebasestorage.app",
            messagingSenderId: "713866508372",
            appId: "1:713866508372:web:92d49db6c867a48654d5c1",
            measurementId: "G-CCCDYZQ6LE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme toggle
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i:first-child');
        const themeText = themeToggle.querySelector('span');
        function updateThemeUI(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
        }
        const savedTheme = localStorage.getItem('edutopscholars-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edutopscholars-theme', next);
            updateThemeUI(next);
        });

        // Auth & user data
        let currentUser = null;
        let userData = null;
        let currentClassId = null;
        let proposals = [];               // all proposals for this class
        let currentProposal = null;       // the proposal being edited
        let currentProposalId = null;
        let officialTimetable = null;      // timetables/{classId} document (if any)

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher-login.html';
                return;
            }
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'teacher') {
                auth.signOut();
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userData = userDoc.data();
            document.getElementById('profileInitials').textContent = 
                (userData.firstName?.[0] || 'T') + (userData.surname?.[0] || 'E');
            document.querySelector('.page-title p').textContent = `Welcome back, ${userData.firstName || 'Teacher'}`;

            currentClassId = userData.classTeaching;
            if (!currentClassId) {
                document.getElementById('classDisplay').innerHTML = 'You are not assigned to any class.';
                return;
            }
            document.getElementById('classDisplay').innerHTML = `Class: <strong>${currentClassId}</strong>`;

            await loadAllData();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });

        // Load both proposals and official timetable
        async function loadAllData() {
            // Load official timetable
            const officialDoc = await db.collection('timetables').doc(currentClassId).get();
            officialTimetable = officialDoc.exists ? { id: officialDoc.id, ...officialDoc.data() } : null;

            // Load all proposals for this class, ordered by updatedAt desc
            const proposalsSnap = await db.collection('timetableProposals')
                .where('classId', '==', currentClassId)
                .where('teacherId', '==', currentUser.uid)
                .orderBy('updatedAt', 'desc')
                .get();

            proposals = proposalsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // If no proposals exist, create an empty draft automatically?
            // We'll let the user click "New Draft" instead.

            renderProposalList();

            // If there is an approved but not published timetable, we may want to show it as a proposal item.
            // But proposals only come from timetableProposals. The official timetable is separate.
            // To show "Published" status, we need to create a proposal record for the published version.
            // We'll handle that by showing a special item for the official published timetable if it exists and is published.
            // For simplicity, we'll just show the official timetable as a "Published" item if it's published.
            // But the teacher might want to edit it, which should create a new draft.
            // We'll add a synthetic proposal for the official published timetable.

            if (officialTimetable && officialTimetable.published) {
                // Add a synthetic entry for the published timetable (not in proposals collection)
                // We'll give it a fake id starting with "published_"
                proposals.unshift({
                    id: 'published_official',
                    synthetic: true,
                    status: 'published',
                    periods: officialTimetable.periods || [],
                    updatedAt: officialTimetable.publishedAt ? new Date(officialTimetable.publishedAt.toDate()) : new Date(),
                    feedback: null
                });
            }

            // Also, if there is an approved but not published official timetable, we may want to show it as "Approved"
            if (officialTimetable && !officialTimetable.published && officialTimetable.approvedAt) {
                proposals.unshift({
                    id: 'approved_official',
                    synthetic: true,
                    status: 'approved',
                    periods: officialTimetable.periods || [],
                    updatedAt: officialTimetable.approvedAt ? new Date(officialTimetable.approvedAt.toDate()) : new Date(),
                    feedback: null
                });
            }

            // Re-render after adding synthetic ones
            renderProposalList();

            // If there's a draft proposal, auto-select the most recent draft; otherwise select nothing.
            const draft = proposals.find(p => p.status === 'draft' && !p.synthetic);
            if (draft) {
                selectProposal(draft.id);
            } else {
                // Clear editor
                clearEditor();
            }
        }

        function renderProposalList() {
            const listEl = document.getElementById('proposalList');
            let html = '';
            proposals.forEach(p => {
                const statusClass = `status-${p.status}`;
                const date = p.updatedAt ? (p.updatedAt.toDate ? p.updatedAt.toDate().toLocaleString() : p.updatedAt.toLocaleString()) : 'Unknown';
                const feedback = p.feedback ? `<div class="proposal-feedback">⚠️ ${p.feedback}</div>` : '';
                const activeClass = (currentProposalId === p.id) ? 'active' : '';
                html += `
                    <div class="proposal-item ${activeClass}" onclick="selectProposal('${p.id}')">
                        <div class="proposal-header">
                            <span class="proposal-status ${statusClass}">${p.status}</span>
                            <span class="proposal-date">${date}</span>
                        </div>
                        ${feedback}
                    </div>
                `;
            });
            if (!proposals.length) {
                html = '<p style="color: var(--text-secondary); text-align: center;">No timetables yet. Create a draft.</p>';
            }
            listEl.innerHTML = html;
        }

        window.selectProposal = async (proposalId) => {
            // Find proposal (could be synthetic)
            const proposal = proposals.find(p => p.id === proposalId);
            if (!proposal) return;

            currentProposalId = proposalId;
            currentProposal = proposal;

            // Highlight active
            document.querySelectorAll('.proposal-item').forEach(el => el.classList.remove('active'));
            const activeEl = Array.from(document.querySelectorAll('.proposal-item')).find(
                el => el.getAttribute('onclick')?.includes(`'${proposalId}'`)
            );
            if (activeEl) activeEl.classList.add('active');

            // If synthetic approved/published, we cannot edit directly.
            // We'll show a read-only table with appropriate actions.
            if (proposal.synthetic) {
                // Read-only mode
                renderTable(proposal.periods, true); // true = readonly
                updateEditorUIForSynthetic(proposal);
            } else {
                // Normal proposal from collection
                renderTable(proposal.periods, proposal.status !== 'draft' && proposal.status !== 'rejected');
                updateEditorUIForProposal(proposal);
            }
        };

        function renderTable(periods, readOnly) {
            const tbody = document.getElementById('tableBody');
            let html = '';
            periods.forEach((period, index) => {
                const disabled = readOnly ? 'disabled' : '';
                html += `
                <tr>
                    <td><input type="time" class="time-input" value="${period.startTime}" data-index="${index}" data-field="startTime" ${disabled}></td>
                    <td><input type="time" class="time-input" value="${period.endTime}" data-index="${index}" data-field="endTime" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.monday || ''}" placeholder="Subject" data-index="${index}" data-field="monday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.tuesday || ''}" placeholder="Subject" data-index="${index}" data-field="tuesday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.wednesday || ''}" placeholder="Subject" data-index="${index}" data-field="wednesday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.thursday || ''}" placeholder="Subject" data-index="${index}" data-field="thursday" ${disabled}></td>
                    <td><input type="text" class="subject-input" value="${period.friday || ''}" placeholder="Subject" data-index="${index}" data-field="friday" ${disabled}></td>
                    <td class="delete-row" onclick="deleteRow(${index})" ${disabled ? 'style="display:none;"' : ''}><i class="fas fa-trash"></i></td>
                </tr>
                `;
            });
            tbody.innerHTML = html;

            if (!readOnly) {
                // Attach input listeners to update currentProposal.periods
                document.querySelectorAll('input[data-index]').forEach(input => {
                    input.addEventListener('input', function(e) {
                        const index = this.dataset.index;
                        const field = this.dataset.field;
                        if (currentProposal && currentProposal.periods) {
                            currentProposal.periods[index][field] = this.value;
                        }
                    });
                });
            }
        }

        window.deleteRow = (index) => {
            if (!currentProposal || currentProposal.synthetic) return;
            currentProposal.periods.splice(index, 1);
            renderTable(currentProposal.periods, false);
        };

        document.getElementById('addRowBtn')?.addEventListener('click', () => {
            if (!currentProposal || currentProposal.synthetic) return;
            currentProposal.periods.push({
                startTime: '08:00',
                endTime: '08:40',
                monday: '',
                tuesday: '',
                wednesday: '',
                thursday: '',
                friday: ''
            });
            renderTable(currentProposal.periods, false);
        });

        function clearEditor() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;">Select a timetable to begin editing</td></tr>';
            document.getElementById('editorTitle').innerText = 'No timetable selected';
            document.getElementById('editorStatus').innerText = '';
            document.getElementById('editorActions').innerHTML = '';
        }

        function updateEditorUIForProposal(proposal) {
            document.getElementById('editorTitle').innerText = `Editing ${proposal.status} timetable`;
            document.getElementById('editorStatus').innerText = proposal.status;
            document.getElementById('editorStatus').className = `status-badge status-${proposal.status}`;

            let actionsHtml = '';
            if (proposal.status === 'draft' || proposal.status === 'rejected') {
                actionsHtml = `
                    <button class="btn btn-outline" id="addRowBtn"><i class="fas fa-plus"></i> Add Period</button>
                    <button class="btn btn-primary" id="saveDraftBtn">Save Draft</button>
                    <button class="btn btn-success" id="submitBtn">Submit for Approval</button>
                `;
            } else if (proposal.status === 'pending') {
                actionsHtml = `
                    <button class="btn btn-warning" id="editBtn">Edit (make draft)</button>
                `;
            } else if (proposal.status === 'approved') {
                // For approved, we might show publish if this is the official approved timetable
                // But proposal.approved is from proposals? Actually approved status only exists on proposals that were approved? 
                // We'll treat it as: if proposal.status === 'approved', it means this proposal was approved, but the official timetable might already be updated.
                // We can allow teacher to publish directly from this proposal if it's the latest approved.
                actionsHtml = `
                    <button class="btn btn-success" id="publishBtn">Publish to Students</button>
                    <button class="btn btn-outline" id="editBtn">Create New Draft</button>
                `;
            } else if (proposal.status === 'published') {
                actionsHtml = `
                    <button class="btn btn-outline" id="editBtn">Create New Draft</button>
                    <button class="btn btn-outline" id="viewStudentLink" onclick="window.open('student-timetable.html', '_blank')">View Student View</button>
                `;
            }

            document.getElementById('editorActions').innerHTML = actionsHtml;

            // Re-attach listeners
            document.getElementById('saveDraftBtn')?.addEventListener('click', saveDraft);
            document.getElementById('submitBtn')?.addEventListener('click', submitForApproval);
            document.getElementById('editBtn')?.addEventListener('click', editProposal);
            document.getElementById('publishBtn')?.addEventListener('click', publishTimetable);
        }

        function updateEditorUIForSynthetic(proposal) {
            document.getElementById('editorTitle').innerText = `Viewing ${proposal.status} timetable (read-only)`;
            document.getElementById('editorStatus').innerText = proposal.status;
            document.getElementById('editorStatus').className = `status-badge status-${proposal.status}`;

            let actionsHtml = '';
            if (proposal.status === 'approved' || proposal.status === 'published') {
                actionsHtml = `
                    <button class="btn btn-outline" id="editBtn">Create New Draft</button>
                    ${proposal.status === 'published' ? '<button class="btn btn-outline" id="viewStudentLink" onclick="window.open(\'student-timetable.html\', \'_blank\')">View Student View</button>' : ''}
                `;
            }
            document.getElementById('editorActions').innerHTML = actionsHtml;
            document.getElementById('editBtn')?.addEventListener('click', () => createDraftFrom(proposal.periods));
        }

        // Actions
        async function saveDraft() {
            if (!currentProposal || currentProposal.synthetic) return;
            const data = {
                classId: currentClassId,
                teacherId: currentUser.uid,
                periods: currentProposal.periods,
                status: 'draft',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('timetableProposals').doc(currentProposalId).update(data);
            alert('Draft saved.');
            await loadAllData(); // refresh list
        }

        async function submitForApproval() {
            if (!currentProposal || currentProposal.synthetic) return;
            if (currentProposal.periods.length === 0) {
                alert('Please add at least one period.');
                return;
            }
            const data = {
                status: 'pending',
                submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('timetableProposals').doc(currentProposalId).update(data);
            alert('Submitted for approval.');
            await loadAllData();
        }

        async function editProposal() {
            if (!currentProposal) return;
            if (currentProposal.synthetic) {
                // Create a new draft from synthetic
                createDraftFrom(currentProposal.periods);
                return;
            }
            // For pending or approved proposals, change status to draft
            if (currentProposal.status === 'pending' || currentProposal.status === 'approved') {
                await db.collection('timetableProposals').doc(currentProposalId).update({
                    status: 'draft',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await loadAllData();
            }
        }

        async function publishTimetable() {
            if (!currentProposal) return;
            // Publishing sets the official timetable document to published = true
            // We need to ensure that the periods in the official doc are the ones we want.
            // If currentProposal is an approved proposal, we should copy its periods to the official doc if not already.
            // But the official doc already should have been set when admin approved.
            // We'll just update the official doc's published flag.
            await db.collection('timetables').doc(currentClassId).update({
                published: true,
                publishedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Timetable published to students.');
            await loadAllData();
        }

        document.getElementById('createDraftBtn').addEventListener('click', async () => {
            // Create a new empty draft proposal
            const newProposal = {
                classId: currentClassId,
                teacherId: currentUser.uid,
                periods: [], // start empty
                status: 'draft',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            const docRef = await db.collection('timetableProposals').add(newProposal);
            await loadAllData();
            selectProposal(docRef.id);
        });

        async function createDraftFrom(periods) {
            // Create a new draft proposal based on given periods
            const newProposal = {
                classId: currentClassId,
                teacherId: currentUser.uid,
                periods: JSON.parse(JSON.stringify(periods)), // deep copy
                status: 'draft',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            const docRef = await db.collection('timetableProposals').add(newProposal);
            await loadAllData();
            selectProposal(docRef.id);
        }
    </script>
</body>
</html>

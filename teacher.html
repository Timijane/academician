<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUMETA | Staff Onboarding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reusing the same Root variables for consistency */
        :root[data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --accent: #2563eb;
            --input-bg: #fff;
            --border: rgba(0,0,0,0.1);
        }
        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --input-bg: #1e293b;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        .signup-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        h2 { grid-column: span 2; margin-bottom: 1.5rem; text-align: center; font-size: 2rem; }
        
        .section-title {
            grid-column: span 2;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--accent);
            margin: 1rem 0;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .full-width { grid-column: span 2; }

        .form-control { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; }

        input, select, textarea {
            padding: 12px;
            border-radius: 0.6rem;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        .phone-group { display: flex; gap: 5px; }
        .prefix { background: var(--border); padding: 12px; border-radius: 0.6rem; font-weight: bold; }

        .btn-submit {
            grid-column: span 2;
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
        }

        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } h2, .section-title, .btn-submit { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="signup-container">
        <form id="staffSignup">
            <h2>Staff Registration</h2>
            <p style="text-align: center; margin-top: -1rem; opacity: 0.7; margin-bottom: 2rem;">Join the EDUMETA Academic Network</p>

            <div class="grid-layout">
                <div class="form-control">
                    <label>First Name</label>
                    <input type="text" placeholder="John" required>
                </div>
                <div class="form-control">
                    <label>Surname</label>
                    <input type="text" placeholder="Doe" required>
                </div>

                <div class="form-control">
                    <label>Gmail Address</label>
                    <input type="email" placeholder="name@gmail.com" required>
                </div>
                <div class="form-control">
                    <label>Phone Number</label>
                    <div class="phone-group">
                        <span class="prefix">+234</span>
                        <input type="tel" placeholder="8012345678" style="flex: 1;">
                    </div>
                </div>

                <div class="section-title">Academic Qualifications</div>
                
                <div class="form-control full-width">
                    <label>Highest Qualification (e.g., B.Ed, M.Sc, PhD)</label>
                    <input type="text" placeholder="Bachelor of Education (Maths)">
                </div>

                <div class="form-control">
                    <label>Junior Secondary School</label>
                    <input type="text" placeholder="Name of school">
                </div>
                <div class="form-control">
                    <label>Senior Secondary School</label>
                    <input type="text" placeholder="Name of school">
                </div>
                <div class="form-control full-width">
                    <label>Higher Institution(s)</label>
                    <textarea rows="2" placeholder="University of Lagos..."></textarea>
                </div>

                <div class="section-title">Class Assignment</div>
                <div class="form-control full-width">
                    <label>Primary Class to Teach</label>
                    <select required>
                        <option value="">Select a class...</option>
                        <option>Creche</option>
                        <option>Nursery 1</option>
                        <option>Nursery 2</option>
                        <option>KG 1</option>
                        <option>KG 2</option>
                        <optgroup label="Primary/Basic">
                            <option>Basic 1</option>
                            <option>Basic 2</option>
                            <option>Basic 3</option>
                            <option>Basic 4</option>
                            <option>Basic 5</option>
                            <option>Basic 6</option>
                        </optgroup>
                        <optgroup label="Secondary">
                            <option>JSS 1</option>
                            <option>JSS 2</option>
                            <option>JSS 3</option>
                            <option>SSS 1</option>
                            <option>SSS 2</option>
                            <option>SSS 3</option>
                        </optgroup>
                    </select>
                </div>

                <div class="section-title">Security</div>
                <div class="form-control">
                    <label>Create Password</label>
                    <input type="password" id="p1" required>
                </div>
                <div class="form-control">
                    <label>Confirm Password</label>
                    <input type="password" id="p2" required>
                </div>

                <button type="submit" class="btn-submit">Submit Application to Admin</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('staffSignup').addEventListener('submit', function(e) {
            e.preventDefault();
            if(document.getElementById('p1').value !== document.getElementById('p2').value) {
                alert("Passwords do not match!");
                return;
            }
            alert("Application submitted! Please wait for Master Admin approval.");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
